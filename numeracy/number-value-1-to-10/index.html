<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Count and Write Scrapbook Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS",sans-serif;
  background:#f6eadf;
  touch-action:none;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#f4c7b8,#c9d8b6,#c7dbe8,#d8c4e8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#logoScreen img{width:min(60vw,350px)}

#game{
  display:none;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  flex-direction:column;
  background:linear-gradient(135deg,#f4c7b8,#f5df9e,#b8d6c2,#c7dbe8);
}

.header{
  height:52px;
  flex-shrink:0;
  background:#fff7df;
  color:#6b3a00;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(16px,2.5vw,28px);
  font-weight:bold;
  box-shadow:0 3px 8px rgba(0,0,0,.12);
  padding:6px;
}

.stage{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  perspective:1400px;
}

.notebook{
  width:min(94vw,920px);
  height:min(78vh,560px);
  background:#f8f2df;
  border-radius:28px;
  box-shadow:0 14px 28px rgba(0,0,0,.22);
  display:flex;
  position:relative;
  overflow:hidden;
  border:6px solid #9f735c;
}

.notebook::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:8px;
  transform:translateX(-50%);
  background:#8b5e4b;
  z-index:5;
  box-shadow:0 0 10px rgba(0,0,0,.25);
}

.spiral{
  position:absolute;
  left:50%;
  top:20px;
  bottom:20px;
  width:28px;
  transform:translateX(-50%);
  z-index:8;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  align-items:center;
}

.ring{
  width:26px;
  height:26px;
  border:5px solid #6f5a4b;
  border-radius:50%;
  background:#f6eadf;
}

.page{
  width:50%;
  height:100%;
  padding:24px 26px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.leftPage{
  background:#fff5df;
  border-right:2px dashed rgba(90,60,30,.25);
}

.rightPage{
  background:#edf7ee;
  border-left:2px dashed rgba(90,60,30,.25);
}

.pageTitle{
  position:absolute;
  top:16px;
  font-size:clamp(18px,2.2vw,28px);
  font-weight:bold;
  color:#7a4c2c;
}

.objectGrid{
  width:88%;
  max-height:72%;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  align-items:center;
  justify-items:center;
  margin-left:-12px;
}

.itemBox{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffffb8;
  border-radius:18px;
  padding:5px;
  box-shadow:0 3px 6px rgba(0,0,0,.1);
}

.itemBox img{
  width:clamp(46px,5.4vw,72px);
  height:clamp(46px,5.4vw,72px);
  object-fit:contain;
}

.fallbackEmoji{
  font-size:clamp(42px,5.8vw,76px);
}

.itemLabel{
  margin-top:12px;
  font-size:clamp(20px,2.5vw,34px);
  font-weight:bold;
  color:#355c4a;
  text-align:center;
  background:#f5df9e;
  padding:5px 18px;
  border-radius:18px;
}

.singleItem{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
}

.singleItem img{
  width:150px !important;
  height:150px !important;
  object-fit:contain;
}

.writeTitle{
  font-size:clamp(18px,2.2vw,28px);
  font-weight:bold;
  color:#6b3a00;
  margin-bottom:12px;
  text-align:center;
}

#drawCanvas{
  width:min(34vw,300px);
  height:min(29vh,205px);
  background:white;
  border:4px solid #6aa5b8;
  border-radius:20px;
  touch-action:none;
  box-shadow:inset 0 0 0 3px #f8f2df;
}

.controls{
  display:flex;
  gap:12px;
  margin-top:14px;
}

button{
  border:none;
  border-radius:16px;
  padding:9px 20px;
  font-size:clamp(15px,2vw,21px);
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,.15);
}

.clearBtn{background:#d68b73;color:white}
.nextBtn{background:#7aa874;color:white}

.pageFlip{
  position:absolute;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:#edf7ee;
  transform-origin:left center;
  transform-style:preserve-3d;
  z-index:20;
  display:none;
}

.pageFlip.show{
  display:block;
  animation:turnNotebookPage .75s ease-in-out forwards;
}

.pageFlip::before,
.pageFlip::after{
  content:"";
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  background:#edf7ee;
  box-shadow:inset 18px 0 25px rgba(0,0,0,.12),0 8px 18px rgba(0,0,0,.18);
}

.pageFlip::after{
  transform:rotateY(180deg);
  background:#fff5df;
}

@keyframes turnNotebookPage{
  0%{transform:rotateY(0deg)}
  40%{transform:rotateY(-80deg)}
  100%{transform:rotateY(-180deg)}
}

.final{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#6f5a8a,#a66f73,#7aa874);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:white;
  overflow:hidden;
  z-index:1000;
}

.final h1{font-size:clamp(42px,7vw,82px);z-index:2}
.final p{font-size:clamp(24px,4vw,42px);z-index:2}
.playAgain{margin-top:24px;background:#f5df9e;color:#5a3500;z-index:2}

.cracker{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  animation:cracker 1.7s ease-out forwards;
}

@keyframes cracker{
  0%{transform:translate(0,0) scale(.4);opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}
}

@media(max-width:768px){
  .header{height:44px;font-size:15px}
  .stage{padding:6px}
  .notebook{width:98vw;height:78vh;border-width:4px}
  .page{padding:18px 14px}
  .objectGrid{
    width:84%;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-left:-8px;
  }
  .itemBox img{width:40px;height:40px}
  .fallbackEmoji{font-size:40px}
  .singleItem img{width:125px!important;height:125px!important}
  #drawCanvas{width:36vw;height:25vh}
  .controls{gap:7px;margin-top:8px}
  button{padding:7px 12px}
  .writeTitle{font-size:14px}
  .itemLabel{font-size:16px}
  .spiral{width:20px}
  .ring{width:18px;height:18px;border-width:4px}
}

@media(max-height:560px){
  .header{height:36px;font-size:13px}
  .notebook{height:82vh}
  .itemBox img{width:32px;height:32px}
  .fallbackEmoji{font-size:32px}
  .singleItem img{width:95px!important;height:95px!important}
  #drawCanvas{height:21vh}
  .pageTitle{font-size:14px;top:8px}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="header">Count the pictures and write the number on the right page.</div>

  <div class="stage">
    <div class="notebook">
      <div class="page leftPage">
        <div class="pageTitle">Count</div>
        <div class="objectGrid" id="objectGrid"></div>
        <div class="itemLabel" id="itemLabel"></div>
      </div>

      <div class="page rightPage">
        <div class="pageTitle">Write</div>
        <div class="writeTitle">Write the number here</div>
        <canvas id="drawCanvas" width="420" height="300"></canvas>
        <div class="controls">
          <button class="clearBtn" onclick="clearCanvasWithSound()">Clear</button>
          <button class="nextBtn" onclick="nextPage()">Next Page</button>
        </div>
      </div>

      <div class="spiral">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>

      <div class="pageFlip" id="pageFlip"></div>
    </div>
  </div>
</div>

<div class="final" id="finalScreen">
  <h1>🎉 Congratulations! 🎉</h1>
  <p>Great counting work!</p>
  <button class="playAgain" onclick="playAgain()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
document.addEventListener("touchmove",function(e){
  if(!e.target.closest("#drawCanvas")){
    e.preventDefault();
  }
},{passive:false});

const originalPages=[
  {count:8, name:"football", img:"football.png", emoji:"⚽"},
  {count:4, name:"cars", img:"car.png", emoji:"🚗"},
  {count:9, name:"teddy bears", img:"teddy.png", emoji:"🧸"},
  {count:3, name:"cycles", img:"cycle.png", emoji:"🚲"},
  {count:1, name:"fruits", img:"fruits.png", emoji:"🍎"},
  {count:10, name:"bees", img:"honeybee.png", emoji:"🐝"},
  {count:2, name:"stars", img:"star.png", emoji:"⭐"},
  {count:1, name:"elephant", img:"elephant.png", emoji:"🐘"},
  {count:1, name:"ice-cream", img:"ice-cream.png", emoji:"🍦"},
  {count:7, name:"umbrellas", img:"umbrella.png", emoji:"☂️"}
];

let pages=[...originalPages];
let current=0;
let turning=false;

let objectGrid;
let itemLabel;
let pageFlip;
let canvas;
let ctx;
let drawing=false;

window.addEventListener("load",()=>{
  objectGrid=document.getElementById("objectGrid");
  itemLabel=document.getElementById("itemLabel");
  pageFlip=document.getElementById("pageFlip");
  canvas=document.getElementById("drawCanvas");
  ctx=canvas.getContext("2d");

  ctx.lineWidth=10;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  ctx.strokeStyle="#333";

  addCanvasEvents();

  setTimeout(()=>{
    document.getElementById("logoScreen").style.display="none";
    document.getElementById("game").style.display="flex";
    loadPage();
  },5000);
});

function playSound(id){
  const s=document.getElementById(id);
  if(!s)return;
  s.currentTime=0;
  s.play().catch(()=>{});
}

function loadPage(){
  if(!objectGrid || !itemLabel)return;

  clearCanvas();
  objectGrid.innerHTML="";

  const page=pages[current];
  itemLabel.textContent=page.name;

  if(page.count===1){
    objectGrid.style.display="flex";
    objectGrid.style.justifyContent="center";
    objectGrid.style.alignItems="center";

    const single=document.createElement("div");
    single.className="singleItem";

    const img=document.createElement("img");
    img.src="assets/"+page.img;
    img.alt=page.name;

    if(page.img==="fruits.png"){
      img.style.width="180px";
      img.style.height="180px";
    }

    if(page.img==="ice-cream.png"){
      img.style.width="170px";
      img.style.height="170px";
    }

    if(page.img==="elephant.png"){
      img.style.width="170px";
      img.style.height="170px";
    }

    img.onerror=()=>{
      single.innerHTML=`<span class="fallbackEmoji">${page.emoji}</span>`;
    };

    single.appendChild(img);
    objectGrid.appendChild(single);
  }else{
    objectGrid.style.display="grid";
    objectGrid.style.gridTemplateColumns=window.innerWidth<=768 ? "repeat(3,1fr)" : "repeat(4,1fr)";

    for(let i=0;i<page.count;i++){
      const box=document.createElement("div");
      box.className="itemBox";

      const img=document.createElement("img");
      img.src="assets/"+page.img;
      img.alt=page.name;

      img.onerror=()=>{
        box.innerHTML=`<span class="fallbackEmoji">${page.emoji}</span>`;
      };

      box.appendChild(img);
      objectGrid.appendChild(box);
    }
  }
}

function nextPage(){
  if(turning)return;
  turning=true;

  playSound("rightSound");

  pageFlip.classList.remove("show");
  void pageFlip.offsetWidth;
  pageFlip.classList.add("show");

  setTimeout(()=>{
    current++;

    if(current>=pages.length){
      showFinal();
    }else{
      loadPage();
      pageFlip.classList.remove("show");
      turning=false;
    }
  },720);
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("finalScreen");
  final.style.display="flex";
  playSound("clapSound");
  createCrackers();
  turning=false;
}

function playAgain(){
  document.querySelectorAll(".cracker").forEach(c=>c.remove());
  pages=[...originalPages].sort(()=>Math.random()-0.5);
  current=0;
  turning=false;
  document.getElementById("finalScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  pageFlip.classList.remove("show");
  loadPage();
}

function createCrackers(){
  const final=document.getElementById("finalScreen");
  const colors=["#ff4d4d","#ffd93d","#6bff95","#4dc3ff","#ff73d9","#ffffff"];

  for(let burst=0;burst<18;burst++){
    const cx=Math.random()*100;
    const cy=Math.random()*80+5;

    for(let i=0;i<32;i++){
      const c=document.createElement("div");
      c.className="cracker";
      c.style.left=cx+"vw";
      c.style.top=cy+"vh";
      c.style.background=colors[Math.floor(Math.random()*colors.length)];

      const angle=(Math.PI*2*i)/32;
      const distance=80+Math.random()*130;

      c.style.setProperty("--x",Math.cos(angle)*distance+"px");
      c.style.setProperty("--y",Math.sin(angle)*distance+"px");
      c.style.animationDelay=(burst*.12)+"s";

      final.appendChild(c);
    }
  }
}

function addCanvasEvents(){
  canvas.addEventListener("mousedown",startDraw);
  canvas.addEventListener("mousemove",draw);
  canvas.addEventListener("mouseup",stopDraw);
  canvas.addEventListener("mouseleave",stopDraw);

  canvas.addEventListener("touchstart",startDraw,{passive:false});
  canvas.addEventListener("touchmove",draw,{passive:false});
  canvas.addEventListener("touchend",stopDraw);

  canvas.addEventListener("pointerdown",startDraw);
  canvas.addEventListener("pointermove",draw);
  canvas.addEventListener("pointerup",stopDraw);
  canvas.addEventListener("pointercancel",stopDraw);
}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;

  return{
    x:(p.clientX-r.left)*(canvas.width/r.width),
    y:(p.clientY-r.top)*(canvas.height/r.height)
  };
}

function startDraw(e){
  e.preventDefault();
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function stopDraw(){drawing=false}

function clearCanvas(){
  if(ctx && canvas){
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

function clearCanvasWithSound(){
  playSound("wrongSound");
  clearCanvas();
}
</script>

</body>
</html>
