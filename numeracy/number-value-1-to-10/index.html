<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Count and Write Book Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS",sans-serif;
  background:#fff3d8;
  touch-action:none;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffe2a8,#cdefff,#ffd7e8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#logoScreen img{
  width:min(60vw,350px);
}

#game{
  display:none;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  flex-direction:column;
  background:linear-gradient(#dff6ff,#fff4d6);
}

.header{
  height:54px;
  flex-shrink:0;
  background:#fff5cf;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(17px,2.5vw,30px);
  font-weight:bold;
  color:#6b3a00;
  text-align:center;
  padding:6px;
}

.stage{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  perspective:1600px;
}

.book{
  width:min(94vw,940px);
  height:min(76vh,530px);
  position:relative;
  display:flex;
  border-radius:30px;
  background:#3d86bd;
  padding:18px;
  box-shadow:0 16px 30px rgba(0,0,0,.24);
}

.book::before{
  content:"";
  position:absolute;
  inset:18px;
  border-radius:22px;
  background:linear-gradient(90deg,transparent 48%,rgba(0,0,0,.25) 50%,transparent 52%);
  pointer-events:none;
  z-index:6;
}

.spine{
  position:absolute;
  left:50%;
  top:24px;
  bottom:24px;
  width:12px;
  transform:translateX(-50%);
  background:linear-gradient(90deg,#1d1d1d,#444,#1d1d1d);
  border-radius:10px;
  z-index:12;
  box-shadow:0 0 8px rgba(0,0,0,.35);
}

.page{
  width:50%;
  height:100%;
  background:#fff8df;
  border:4px solid #222;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.leftPage{
  border-radius:22px 8px 8px 22px;
  border-right:none;
  box-shadow:inset -20px 0 25px rgba(0,0,0,.08);
}

.rightPage{
  border-radius:8px 22px 22px 8px;
  border-left:none;
  box-shadow:inset 20px 0 25px rgba(0,0,0,.08);
}

.leftPage::after,
.rightPage::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
}

.leftPage::after{
  background:linear-gradient(90deg,transparent 80%,rgba(0,0,0,.08));
}

.rightPage::after{
  background:linear-gradient(90deg,rgba(0,0,0,.08),transparent 20%);
}

.flipPage{
  position:absolute;
  top:18px;
  right:18px;
  width:calc(50% - 18px);
  height:calc(100% - 36px);
  background:#fff8df;
  border:4px solid #222;
  border-left:none;
  border-radius:8px 22px 22px 8px;
  transform-origin:left center;
  transform-style:preserve-3d;
  z-index:20;
  display:none;
  box-shadow:inset 20px 0 25px rgba(0,0,0,.08), 0 8px 18px rgba(0,0,0,.22);
}

.flipPage.show{
  display:block;
  animation:realPageTurn .9s ease-in-out forwards;
}

.flipFront,
.flipBack{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  background:#fff8df;
  border-radius:8px 22px 22px 8px;
}

.flipBack{
  transform:rotateY(180deg);
  box-shadow:inset -18px 0 22px rgba(0,0,0,.10);
}

@keyframes realPageTurn{
  0%{
    transform:rotateY(0deg);
  }
  35%{
    transform:rotateY(-75deg);
    box-shadow:0 12px 28px rgba(0,0,0,.28);
  }
  70%{
    transform:rotateY(-145deg);
  }
  100%{
    transform:rotateY(-180deg);
  }
}

.objectGrid{
  width:92%;
  max-height:75%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  align-items:center;
  justify-items:center;
}

.itemBox{
  display:flex;
  align-items:center;
  justify-content:center;
}

.itemBox img{
  width:clamp(44px,6vw,78px);
  height:clamp(44px,6vw,78px);
  object-fit:contain;
}

.fallbackEmoji{
  font-size:clamp(42px,6vw,76px);
}

.itemLabel{
  margin-top:10px;
  font-size:clamp(20px,2.4vw,34px);
  font-weight:bold;
  color:#174a75;
  text-align:center;
}

.writeTitle{
  font-size:clamp(18px,2.2vw,28px);
  font-weight:bold;
  color:#6b3a00;
  margin-bottom:12px;
  text-align:center;
}

#drawCanvas{
  width:min(35vw,300px);
  height:min(30vh,210px);
  background:white;
  border:4px solid #4e9add;
  border-radius:18px;
  touch-action:none;
}

.controls{
  display:flex;
  gap:12px;
  margin-top:12px;
}

button{
  border:none;
  border-radius:16px;
  padding:9px 20px;
  font-size:clamp(15px,2vw,21px);
  font-weight:bold;
  cursor:pointer;
}

.clearBtn{
  background:#ffc45c;
  color:#5a3300;
}

.nextBtn{
  background:#81d267;
  color:#153b00;
}

.final{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(#271b55,#6f39a7);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:white;
  overflow:hidden;
  z-index:1000;
}

.final h1{
  font-size:clamp(42px,7vw,82px);
  z-index:2;
}

.final p{
  font-size:clamp(24px,4vw,42px);
  z-index:2;
}

.playAgain{
  margin-top:24px;
  background:#ffd35a;
  color:#5a3500;
  z-index:2;
}

.cracker{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  animation:cracker 1.7s ease-out forwards;
}

@keyframes cracker{
  0%{transform:translate(0,0) scale(.4);opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}
}

@media(max-width:768px){
  .header{height:46px;font-size:16px}
  .book{height:72vh;padding:10px}
  .book::before{inset:10px}
  .spine{top:15px;bottom:15px;width:9px}
  .flipPage{top:10px;right:10px;width:calc(50% - 10px);height:calc(100% - 20px)}
  .objectGrid{grid-template-columns:repeat(3,1fr);gap:6px}
  #drawCanvas{width:38vw;height:28vh}
  .controls{gap:8px;margin-top:8px}
  button{padding:7px 14px}
}

@media(max-height:560px){
  .header{height:38px;font-size:14px}
  .book{height:78vh}
  .itemBox img{width:42px;height:42px}
  .fallbackEmoji{font-size:40px}
  #drawCanvas{height:24vh}
  .itemLabel{font-size:18px}
  .writeTitle{font-size:15px}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="header">Count the pictures and write the number on the right page.</div>

  <div class="stage">
    <div class="book" id="book">

      <div class="page leftPage">
        <div class="objectGrid" id="objectGrid"></div>
        <div class="itemLabel" id="itemLabel"></div>
      </div>

      <div class="page rightPage">
        <div class="writeTitle">Write the number here</div>
        <canvas id="drawCanvas" width="420" height="300"></canvas>
        <div class="controls">
          <button class="clearBtn" onclick="clearCanvasWithSound()">Clear</button>
          <button class="nextBtn" onclick="nextPage()">Next Page</button>
        </div>
      </div>

      <div class="spine"></div>

      <div class="flipPage" id="flipPage">
        <div class="flipFront"></div>
        <div class="flipBack"></div>
      </div>

    </div>
  </div>
</div>

<div class="final" id="finalScreen">
  <h1>🎉 Congratulations! 🎉</h1>
  <p>Great counting work!</p>
  <button class="playAgain" onclick="playAgain()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
document.addEventListener("touchmove",function(e){
  if(!e.target.closest("#drawCanvas")){
    e.preventDefault();
  }
},{passive:false});

const originalPages=[
  {count:8, name:"football", img:"football.png", emoji:"⚽"},
  {count:4, name:"cars", img:"car.png", emoji:"🚗"},
  {count:9, name:"teddy bears", img:"teddy.png", emoji:"🧸"},
  {count:3, name:"bikes", img:"bike.png", emoji:"🚲"},
  {count:1, name:"fruit", img:"fruits.png", emoji:"🍎"},
  {count:10, name:"bees", img:"bee.png", emoji:"🐝"},
  {count:2, name:"stars", img:"star.png", emoji:"⭐"},
  {count:1, name:"elephant", img:"elephant.png", emoji:"🐘"},
  {count:1, name:"ice-cream", img:"ice-cream.png", emoji:"🍦"},
  {count:7, name:"umbrellas", img:"umbrella.png", emoji:"☂️"}
];

let pages=[...originalPages];
let current=0;
let turning=false;

const objectGrid=document.getElementById("objectGrid");
const itemLabel=document.getElementById("itemLabel");
const flipPage=document.getElementById("flipPage");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadPage();
},5000);

function playSound(id){
  const s=document.getElementById(id);
  if(!s)return;
  s.currentTime=0;
  s.play().catch(()=>{});
}

function loadPage(){
  clearCanvas();
  objectGrid.innerHTML="";

  const page=pages[current];
  itemLabel.textContent=page.name;

  for(let i=0;i<page.count;i++){
    const box=document.createElement("div");
    box.className="itemBox";

    const img=document.createElement("img");
    img.src="assets/"+page.img;
    img.alt=page.name;

    img.onerror=()=>{
      box.innerHTML=`<span class="fallbackEmoji">${page.emoji}</span>`;
    };

    box.appendChild(img);
    objectGrid.appendChild(box);
  }
}

function nextPage(){
  if(turning)return;
  turning=true;

  playSound("rightSound");

  flipPage.classList.remove("show");
  void flipPage.offsetWidth;
  flipPage.classList.add("show");

  setTimeout(()=>{
    current++;

    if(current>=pages.length){
      showFinal();
    }else{
      loadPage();
      flipPage.classList.remove("show");
      turning=false;
    }
  },850);
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("finalScreen");
  final.style.display="flex";
  playSound("clapSound");
  createCrackers();
  turning=false;
}

function playAgain(){
  document.querySelectorAll(".cracker").forEach(c=>c.remove());
  pages=[...originalPages].sort(()=>Math.random()-0.5);
  current=0;
  turning=false;
  document.getElementById("finalScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  flipPage.classList.remove("show");
  loadPage();
}

function createCrackers(){
  const final=document.getElementById("finalScreen");
  const colors=["#ff4d4d","#ffd93d","#6bff95","#4dc3ff","#ff73d9","#ffffff"];

  for(let burst=0;burst<18;burst++){
    const cx=Math.random()*100;
    const cy=Math.random()*80+5;

    for(let i=0;i<32;i++){
      const c=document.createElement("div");
      c.className="cracker";
      c.style.left=cx+"vw";
      c.style.top=cy+"vh";
      c.style.background=colors[Math.floor(Math.random()*colors.length)];

      const angle=(Math.PI*2*i)/32;
      const distance=80+Math.random()*130;

      c.style.setProperty("--x",Math.cos(angle)*distance+"px");
      c.style.setProperty("--y",Math.sin(angle)*distance+"px");
      c.style.animationDelay=(burst*.12)+"s";

      final.appendChild(c);
    }
  }
}

/* Drawing */
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.lineJoin="round";
ctx.strokeStyle="#333";

let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;

  return{
    x:(p.clientX-r.left)*(canvas.width/r.width),
    y:(p.clientY-r.top)*(canvas.height/r.height)
  };
}

function startDraw(e){
  e.preventDefault();
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function stopDraw(){
  drawing=false;
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function clearCanvasWithSound(){
  playSound("wrongSound");
  clearCanvas();
}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);

canvas.addEventListener("pointerdown",startDraw);
canvas.addEventListener("pointermove",draw);
canvas.addEventListener("pointerup",stopDraw);
canvas.addEventListener("pointercancel",stopDraw);
</script>

</body>
</html>
