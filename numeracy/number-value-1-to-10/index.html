<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number Value Game</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
  background:#fff6d8;
  overflow:hidden;
  color:#4b2e0f;
}
#logoScreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}
#logoScreen img{width:min(55vw,360px)}

#game{
  display:none;
  height:100vh;
  width:100vw;
  flex-direction:column;
}
.instruction{
  min-height:56px;
  padding:8px 10px;
  text-align:center;
  font-size:clamp(17px,2.6vw,32px);
  font-weight:bold;
  background:#fff6d8;
  line-height:1.15;
}
.scene{
  flex:1;
  position:relative;
  overflow:hidden;
}
.object{
  position:absolute;
  width:clamp(55px,8vw,110px);
  cursor:pointer;
  touch-action:manipulation;
  transition:transform 1.8s ease, opacity 1.8s ease;
  z-index:4;
  filter:saturate(1.25) brightness(1.08);
}
.object.bright{
  filter:saturate(1.55) brightness(1.25) drop-shadow(0 0 8px rgba(255,240,90,.8));
}
.bigObject{width:clamp(80px,12vw,145px)}

.writeArea{
  min-height:145px;
  max-height:28vh;
  background:#fff9e8;
  text-align:center;
  padding:6px;
  position:relative;
  z-index:10;
}
.writeArea p{
  margin:0 0 4px;
  font-size:clamp(15px,2.2vw,24px);
  font-weight:bold;
}
.answerBox{
  width:min(42vw,180px);
  height:min(12vh,78px);
  background:white;
  border:4px solid #4e9add;
  border-radius:16px;
  font-size:clamp(36px,6vw,58px);
  font-weight:bold;
  text-align:center;
  color:#333;
  outline:none;
}
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:4px;
  flex-wrap:wrap;
}
button{
  border:0;
  border-radius:16px;
  background:#f4b84f;
  padding:7px 16px;
  font-size:clamp(14px,2vw,18px);
  font-weight:bold;
  cursor:pointer;
}
#nextBtn{
  background:#8bcf70;
  display:none;
}

.cloud{
  position:absolute;
  width:130px;
  height:48px;
  background:white;
  border-radius:40px;
  opacity:.9;
  z-index:1;
}
.cloud:before,.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}
.cloud:before{width:55px;height:55px;left:18px;top:-25px}
.cloud:after{width:72px;height:72px;left:58px;top:-38px}

.tree{
  position:absolute;
  width:min(35vw,310px);
  top:54%;
  transform:translate(-50%,-50%);
  z-index:2;
}
.tree.one{left:34%}
.tree.two{left:66%}

.sun{
  position:absolute;
  width:clamp(120px,18vw,180px);
  height:clamp(120px,18vw,180px);
  border-radius:50%;
  background:#ffd452;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%);
  cursor:pointer;
  z-index:4;
}
.sun.rays{
  box-shadow:0 0 0 35px #ffe88c,0 0 0 75px #fff3bb,0 0 80px 110px #fff8d8;
}
.roadLine{
  position:absolute;
  height:7px;
  width:100%;
  top:78%;
  background:repeating-linear-gradient(90deg,#fff 0 45px,transparent 45px 85px);
  opacity:.9;
}
.lampLight{
  position:absolute;
  width:150px;
  height:170px;
  background:radial-gradient(ellipse at top,rgba(255,245,120,.8),rgba(255,245,120,.25),transparent 70%);
  transform:translate(-35px,35px);
  pointer-events:none;
  z-index:1;
}

.final{
  display:none;
  height:100vh;
  background:linear-gradient(#101849,#3b186d);
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
  color:white;
}
.final h1{font-size:clamp(34px,7vw,70px)}
.final p{font-size:clamp(22px,4vw,42px)}
.cracker{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  animation:cracker 1.6s ease-out forwards;
  z-index:20;
}
@keyframes cracker{
  0%{transform:translate(0,0) scale(.5);opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}
}
.fallback{
  position:absolute;
  font-size:clamp(45px,8vw,95px);
  z-index:4;
  cursor:pointer;
  transition:transform 1.8s ease, opacity 1.8s ease;
}

@media(max-width:768px){
  .instruction{min-height:50px}
  .writeArea{min-height:132px}
  .cloud{transform:scale(.72)}
  .object{width:clamp(46px,14vw,76px)}
  .bigObject{width:clamp(65px,18vw,100px)}
  .tree{width:46vw}
}
@media(max-height:620px){
  .instruction{font-size:17px;min-height:44px}
  .writeArea{min-height:110px}
  .answerBox{height:56px}
  .writeArea p{font-size:15px}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="instruction" id="instruction"></div>
  <div class="scene" id="scene"></div>

  <div class="writeArea">
    <p>Write the number in the box given below.</p>
    <input id="answerInput" class="answerBox" type="tel" maxlength="2" inputmode="numeric">
    <div class="controls">
      <button onclick="clearAnswer()">Clear</button>
      <button id="nextBtn" onclick="nextSlide()">Next</button>
    </div>
  </div>
</div>

<div id="final" class="final">
  <div>
    <h1>🎉 Congratulations! 🎉</h1>
    <p>Great counting work!</p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const slides=[
  {text:"Count the number of honeybees and write in the box given below.", count:5, img:"honeybee.png", action:"beeFly", scene:"garden", fallback:"🐝"},
  {text:"Count the number of apples and write in the box given below.", count:8, img:"apple.png", action:"fall", scene:"tree", fallback:"🍎"},
  {text:"Count the sun and write in the box given below.", count:1, action:"sun", scene:"sky"},
  {text:"Count the number of sunflowers and write in the box given below.", count:10, img:"closed-sunflower.png", openImg:"open-sunflower.png", action:"open", scene:"sunflowerGarden", fallback:"🌻"},
  {text:"Count the number of stars and write in the box given below.", count:4, img:"star.png", action:"starup", scene:"night", fallback:"⭐", bright:true},
  {text:"Count the number of eyes and write in the box given below.", count:2, img:"closed-eye.png", openImg:"open-eye.png", action:"open", scene:"eyesOnly", fallback:"👁️"},
  {text:"Count the number of cars and write in the box given below.", count:6, img:"car.png", action:"driveLeft", scene:"road", fallback:"🚗"},
  {text:"Count the number of lamps and write in the box given below.", count:3, img:"lamp-off.png", openImg:"lamp-on.png", action:"lamp", scene:"room", fallback:"💡"},
  {text:"Count the number of balls and write in the box given below.", count:9, img:"ball.png", action:"roll", scene:"playground", fallback:"⚽"},
  {text:"Count the number of kites and write in the box given below.", count:7, img:"kite.png", action:"fly", scene:"sky", fallback:"🪁"}
];

let current=0;
const scene=document.getElementById("scene");
const instruction=document.getElementById("instruction");
const answerInput=document.getElementById("answerInput");
const nextBtn=document.getElementById("nextBtn");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadSlide();
},5000);

answerInput.addEventListener("input",()=>{
  answerInput.value=answerInput.value.replace(/\D/g,"");
  const correct=Number(answerInput.value)===slides[current].count;
  nextBtn.style.display=correct ? "inline-block" : "none";
  if(correct) document.getElementById("rightSound").play().catch(()=>{});
});

function clearAnswer(){
  answerInput.value="";
  nextBtn.style.display="none";
  answerInput.focus();
}

function loadSlide(){
  clearAnswer();
  const s=slides[current];
  instruction.textContent=s.text;
  createScene(s.scene);

  if(s.action==="sun"){
    const sun=document.createElement("div");
    sun.className="sun";
    sun.onclick=()=>sun.classList.add("rays");
    scene.appendChild(sun);
    return;
  }

  for(let i=0;i<s.count;i++){
    const obj=createObject(s,i);
    scene.appendChild(obj);
    obj.addEventListener("click",()=>animate(obj,s,i));
    obj.addEventListener("touchstart",(e)=>{
      e.preventDefault();
      animate(obj,s,i);
    },{passive:false});
  }
}

function createObject(s,i){
  const img=document.createElement("img");
  img.src="assets/"+s.img;
  img.className="object";
  if(s.bright) img.classList.add("bright");

  img.onerror=()=>{
    const span=document.createElement("div");
    span.textContent=s.fallback || "⭐";
    span.className="fallback";
    span.style.left=img.style.left;
    span.style.top=img.style.top;
    img.replaceWith(span);
    span.addEventListener("click",()=>animate(span,s,i));
  };

  placeObject(img,s,i);
  return img;
}

function placeObject(el,s,i){
  if(s.scene==="tree"){
    const xs=[20,30,39,50,60,70,36,63];
    const ys=[24,15,31,18,34,22,47,50];
    el.style.left=xs[i]+"%";
    el.style.top=ys[i]+"%";
    el.style.zIndex=5;
    return;
  }

  if(s.scene==="eyesOnly"){
    el.style.left=i===0?"28%":"58%";
    el.style.top="36%";
    el.style.width="clamp(105px,15vw,185px)";
    return;
  }

  if(s.scene==="road"){
    el.style.left=(105+i*18)+"%";
    el.style.top=(60+(i%2)*13)+"%";
    return;
  }

  if(s.scene==="room"){
    el.style.left=(24+i*24)+"%";
    el.style.top="36%";
    el.classList.add("bigObject");
    return;
  }

  if(s.scene==="playground"){
    el.style.left=(8+(i%5)*18)+"%";
    el.style.top=(i<5?"64%":"78%");
    return;
  }

  if(s.scene==="garden" && s.action==="beeFly"){
    const xs=[12,30,49,68,86];
    const ys=[26,22,28,24,30];
    el.style.left=xs[i]+"%";
    el.style.top=ys[i]+"%";
    return;
  }

  el.style.left=getX(i,s.count)+"%";
  el.style.top=getY(i,s.count,s.scene)+"%";
}

function createScene(type){
  scene.innerHTML="";

  if(type==="garden"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 55%,#79c765 55%,#79c765 100%)";
    addCloud(7,12);
    addCloud(73,15);
    addFlowers();
  }

  if(type==="sunflowerGarden"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 48%,#7ccc65 48%,#7ccc65 100%)";
    addCloud(8,12);
    addCloud(72,15);
  }

  if(type==="tree"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 58%,#7ccc65 58%,#7ccc65 100%)";
    addCloud(7,12);
    addCloud(75,15);

    const tree1=document.createElement("img");
    tree1.src="assets/tree.png";
    tree1.className="tree one";
    tree1.onerror=()=>tree1.style.display="none";
    scene.appendChild(tree1);

    const tree2=document.createElement("img");
    tree2.src="assets/tree.png";
    tree2.className="tree two";
    tree2.onerror=()=>tree2.style.display="none";
    scene.appendChild(tree2);
  }

  if(type==="sky"){
    scene.style.background="linear-gradient(#bceeff,#fff3b4)";
    addCloud(8,16);
    addCloud(68,12);
  }

  if(type==="night"){
    scene.style.background="linear-gradient(#07123f,#2d4388)";
  }

  if(type==="eyesOnly"){
    scene.style.background="linear-gradient(#ffe3c7,#ffd0a6)";
  }

  if(type==="road"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 45%,#7bc96a 45%,#7bc96a 62%,#5d5d5d 62%,#5d5d5d 100%)";
    addCloud(12,12);
    addCloud(70,15);
    const line=document.createElement("div");
    line.className="roadLine";
    scene.appendChild(line);
  }

  if(type==="room"){
    scene.style.background="linear-gradient(#ffe4bd 0%,#ffe4bd 66%,#c7854b 66%,#c7854b 100%)";
  }

  if(type==="playground"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 50%,#8ad06c 50%,#8ad06c 100%)";
    addCloud(8,12);
    addCloud(72,15);
  }
}

function addCloud(left,top){
  const c=document.createElement("div");
  c.className="cloud";
  c.style.left=left+"%";
  c.style.top=top+"%";
  scene.appendChild(c);
}

function addFlowers(){
  for(let i=0;i<8;i++){
    const f=document.createElement("div");
    f.textContent="🌼";
    f.style.position="absolute";
    f.style.fontSize="clamp(22px,4vw,34px)";
    f.style.left=(5+i*12)+"%";
    f.style.bottom="18px";
    scene.appendChild(f);
  }
}

function getX(i,count){
  if(count<=3)return 24+i*22;
  if(count<=5)return 14+i*18;
  return 9+(i%5)*18;
}

function getY(i,count,type){
  if(type==="night")return 70-Math.floor(i/4)*22;
  if(type==="sky")return 28+Math.floor(i/4)*24;
  if(type==="sunflowerGarden")return 25+Math.floor(i/5)*32;
  return 14+Math.floor(i/5)*26;
}

function animate(obj,s,i){
  if(obj.dataset.done)return;
  obj.dataset.done="true";

  if(s.action==="open"){
    if(obj.tagName==="IMG" && s.openImg) obj.src="assets/"+s.openImg;
    obj.style.transform="scale(1.18)";
    return;
  }

  if(s.action==="lamp"){
    if(obj.tagName==="IMG" && s.openImg) obj.src="assets/"+s.openImg;
    const light=document.createElement("div");
    light.className="lampLight";
    light.style.left=obj.style.left;
    light.style.top=obj.style.top;
    scene.appendChild(light);
    obj.style.transform="scale(1.12)";
    return;
  }

  let x=0,y=0,r=Math.random()*80-40;

  if(s.action==="beeFly"){
    const moves=[
      {x:160,y:-80,r:25},
      {x:0,y:-260,r:-15},
      {x:window.innerWidth*.8,y:-70,r:20},
      {x:-window.innerWidth*.8,y:-70,r:-20},
      {x:120,y:-170,r:35}
    ];
    x=moves[i%moves.length].x;
    y=moves[i%moves.length].y;
    r=moves[i%moves.length].r;
  }

  if(s.action==="fly"){
    x=(Math.random()>.5?1:-1)*(window.innerWidth*.42);
    y=-(100+Math.random()*180);
  }

  if(s.action==="fall"){
    x=(Math.random()*80)-40;
    y=window.innerHeight*.34;
  }

  if(s.action==="starup"){
    x=(Math.random()*120)-60;
    y=-(window.innerHeight*.45);
  }

  if(s.action==="driveLeft"){
    x=-(window.innerWidth*1.3);
  }

  if(s.action==="roll"){
    x=(Math.random()>.5?1:-1)*(window.innerWidth*.5);
    y=window.innerHeight*.08;
    r=720;
  }

  obj.style.transform=`translate(${x}px,${y}px) rotate(${r}deg)`;

  if(["beeFly","fly","driveLeft","roll","starup"].includes(s.action)){
    setTimeout(()=>obj.remove(),1700);
  }
}

function nextSlide(){
  current++;
  if(current>=slides.length){
    showFinal();
  }else{
    loadSlide();
  }
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("final");
  final.style.display="flex";
  createCrackers(final);
}

function createCrackers(final){
  const colors=["#ff3131","#ffb703","#00d4ff","#7cff6b","#ff5efc","#ffffff"];
  for(let center=0;center<22;center++){
    const cx=Math.random()*100;
    const cy=Math.random()*80+5;
    for(let i=0;i<34;i++){
      const b=document.createElement("div");
      b.className="cracker";
      b.style.left=cx+"vw";
      b.style.top=cy+"vh";
      b.style.background=colors[Math.floor(Math.random()*colors.length)];
      const angle=(Math.PI*2*i)/34;
      const distance=80+Math.random()*130;
      b.style.setProperty("--x",Math.cos(angle)*distance+"px");
      b.style.setProperty("--y",Math.sin(angle)*distance+"px");
      b.style.animationDelay=(center*.1)+"s";
      final.appendChild(b);
    }
  }
}
</script>

</body>
</html>
