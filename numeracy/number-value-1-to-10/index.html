<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Count and Write Book Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS",sans-serif;
  background:#eef9f8;
  touch-action:none;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffe2a8,#cdefff,#ffd7e8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#logoScreen img{width:min(60vw,350px)}

#game{
  display:none;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  flex-direction:column;
  background:linear-gradient(#e3f7fb,#fff6db);
}

.header{
  height:42px;
  flex-shrink:0;
  background:#fff5cf;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(15px,2.2vw,25px);
  font-weight:bold;
  color:#6b3a00;
  text-align:center;
}

.stage{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px;
  perspective:1800px;
}

.bookWrap{
  width:99vw;
  height:calc(100dvh - 48px);
  max-width:1180px;
  max-height:760px;
  position:relative;
}

.bookImage{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
  pointer-events:none;
}

/* content is now placed INSIDE the real book page area */
.leftContent{
  position:absolute;
  left:15.5%;
  top:26%;
  width:33%;
  height:42%;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.rightContent{
  position:absolute;
  right:15.5%;
  top:25%;
  width:32%;
  height:44%;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.objectGrid{
  width:100%;
  max-height:76%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  align-items:center;
  justify-items:center;
}

.itemBox img{
  width:clamp(34px,4.4vw,64px);
  height:clamp(34px,4.4vw,64px);
  object-fit:contain;
}

.fallbackEmoji{
  font-size:clamp(34px,4.4vw,64px);
}

.itemLabel{
  margin-top:8px;
  font-size:clamp(17px,2.2vw,30px);
  font-weight:bold;
  color:#174a75;
  text-align:center;
}

.writeTitle{
  font-size:clamp(15px,1.9vw,25px);
  font-weight:bold;
  color:#6b3a00;
  margin-bottom:8px;
  text-align:center;
}

#drawCanvas{
  width:min(27vw,285px);
  height:min(22vh,165px);
  background:white;
  border:4px solid #4e9add;
  border-radius:18px;
  touch-action:none;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:9px;
}

button{
  border:none;
  border-radius:16px;
  padding:8px 18px;
  font-size:clamp(14px,1.7vw,20px);
  font-weight:bold;
  cursor:pointer;
}

.clearBtn{background:#ffc45c;color:#5a3300}
.nextBtn{background:#81d267;color:#153b00}

/* improved page flip: anchored at centre spine, curls from right page to left */
.pageFlip{
  position:absolute;
  left:50%;
  top:19%;
  width:35%;
  height:58%;
  z-index:20;
  transform-origin:left center;
  transform-style:preserve-3d;
  display:none;
  pointer-events:none;
}

.pageFlip.show{
  display:block;
  animation:realisticFlip 1.15s ease-in-out forwards;
}

.pageFace{
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#fff4ce 0%,#fff8df 45%,#f3d99f 100%);
  border-radius:5px 45px 45px 5px;
  backface-visibility:hidden;
  box-shadow:
    inset 18px 0 22px rgba(0,0,0,.13),
    8px 8px 18px rgba(0,0,0,.22);
}

.pageFace.back{
  transform:rotateY(180deg);
  background:linear-gradient(90deg,#f3d99f 0%,#fff8df 55%,#fff4ce 100%);
  box-shadow:inset -18px 0 22px rgba(0,0,0,.13);
}

.pageCurl{
  position:absolute;
  right:0;
  top:0;
  width:30%;
  height:100%;
  border-radius:0 45px 45px 0;
  background:linear-gradient(90deg,transparent,rgba(0,0,0,.18),rgba(255,255,255,.35));
  z-index:5;
  pointer-events:none;
}

@keyframes realisticFlip{
  0%{
    transform:rotateY(0deg) translateX(0) skewY(0deg);
    filter:brightness(1);
  }
  20%{
    transform:rotateY(-38deg) translateX(-2%) skewY(-1deg);
    filter:brightness(.98);
  }
  45%{
    transform:rotateY(-95deg) translateX(-5%) skewY(-4deg);
    filter:brightness(.9);
  }
  70%{
    transform:rotateY(-145deg) translateX(-4%) skewY(-2deg);
    filter:brightness(.96);
  }
  100%{
    transform:rotateY(-180deg) translateX(0) skewY(0deg);
    filter:brightness(1);
  }
}

.final{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(#271b55,#6f39a7);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:white;
  overflow:hidden;
  z-index:1000;
}

.final h1{
  font-size:clamp(42px,7vw,82px);
  z-index:2;
}

.final p{
  font-size:clamp(24px,4vw,42px);
  z-index:2;
}

.playAgain{
  margin-top:24px;
  background:#ffd35a;
  color:#5a3500;
  z-index:2;
}

.cracker{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  animation:cracker 1.7s ease-out forwards;
}

@keyframes cracker{
  0%{transform:translate(0,0) scale(.4);opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}
}

@media(max-width:768px){
  .header{height:40px;font-size:14px}
  .bookWrap{width:100vw;height:calc(100dvh - 42px)}
  .leftContent{left:15%;top:27%;width:34%;height:40%}
  .rightContent{right:14.5%;top:27%;width:33%;height:40%}
  .objectGrid{grid-template-columns:repeat(3,1fr);gap:4px}
  #drawCanvas{width:29vw;height:19vh}
  .controls{gap:6px;margin-top:6px}
  button{padding:6px 11px;font-size:13px}
  .itemLabel{font-size:16px}
  .writeTitle{font-size:13px}
  .itemBox img{width:34px;height:34px}
}

@media(max-height:560px){
  .header{height:34px;font-size:12px}
  .bookWrap{height:calc(100dvh - 36px)}
  .itemBox img{width:30px;height:30px}
  .fallbackEmoji{font-size:30px}
  #drawCanvas{height:18vh}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="header">Count the pictures and write the number on the right page.</div>

  <div class="stage">
    <div class="bookWrap">
      <img class="bookImage" src="assets/book-bg.png" alt="Book">

      <div class="leftContent">
        <div class="objectGrid" id="objectGrid"></div>
        <div class="itemLabel" id="itemLabel"></div>
      </div>

      <div class="rightContent">
        <div class="writeTitle">Write the number here</div>
        <canvas id="drawCanvas" width="420" height="300"></canvas>
        <div class="controls">
          <button class="clearBtn" onclick="clearCanvasWithSound()">Clear</button>
          <button class="nextBtn" onclick="nextPage()">Next Page</button>
        </div>
      </div>

      <div class="pageFlip" id="pageFlip">
        <div class="pageFace front"></div>
        <div class="pageFace back"></div>
        <div class="pageCurl"></div>
      </div>
    </div>
  </div>
</div>

<div class="final" id="finalScreen">
  <h1>🎉 Congratulations! 🎉</h1>
  <p>Great counting work!</p>
  <button class="playAgain" onclick="playAgain()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
document.addEventListener("touchmove",function(e){
  if(!e.target.closest("#drawCanvas")){
    e.preventDefault();
  }
},{passive:false});

const originalPages=[
  {count:8, name:"football", img:"football.png", emoji:"⚽"},
  {count:4, name:"cars", img:"car.png", emoji:"🚗"},
  {count:9, name:"teddy bears", img:"teddy.png", emoji:"🧸"},
  {count:3, name:"bikes", img:"bike.png", emoji:"🚲"},
  {count:1, name:"fruit", img:"fruits.png", emoji:"🍎"},
  {count:10, name:"bees", img:"bee.png", emoji:"🐝"},
  {count:2, name:"stars", img:"star.png", emoji:"⭐"},
  {count:1, name:"elephant", img:"elephant.png", emoji:"🐘"},
  {count:1, name:"ice-cream", img:"ice-cream.png", emoji:"🍦"},
  {count:7, name:"umbrellas", img:"umbrella.png", emoji:"☂️"}
];

let pages=[...originalPages];
let current=0;
let turning=false;

const objectGrid=document.getElementById("objectGrid");
const itemLabel=document.getElementById("itemLabel");
const pageFlip=document.getElementById("pageFlip");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadPage();
},5000);

function playSound(id){
  const s=document.getElementById(id);
  if(!s)return;
  s.currentTime=0;
  s.play().catch(()=>{});
}

function loadPage(){
  clearCanvas();
  objectGrid.innerHTML="";

  const page=pages[current];
  itemLabel.textContent=page.name;

  for(let i=0;i<page.count;i++){
    const box=document.createElement("div");
    box.className="itemBox";

    const img=document.createElement("img");
    img.src="assets/"+page.img;
    img.alt=page.name;

    img.onerror=()=>{
      box.innerHTML=`<span class="fallbackEmoji">${page.emoji}</span>`;
    };

    box.appendChild(img);
    objectGrid.appendChild(box);
  }
}

function nextPage(){
  if(turning)return;
  turning=true;

  playSound("rightSound");

  pageFlip.classList.remove("show");
  void pageFlip.offsetWidth;
  pageFlip.classList.add("show");

  setTimeout(()=>{
    current++;

    if(current>=pages.length){
      showFinal();
    }else{
      loadPage();
      pageFlip.classList.remove("show");
      turning=false;
    }
  },1050);
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("finalScreen");
  final.style.display="flex";
  playSound("clapSound");
  createCrackers();
  turning=false;
}

function playAgain(){
  document.querySelectorAll(".cracker").forEach(c=>c.remove());
  pages=[...originalPages].sort(()=>Math.random()-0.5);
  current=0;
  turning=false;
  document.getElementById("finalScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  pageFlip.classList.remove("show");
  loadPage();
}

function createCrackers(){
  const final=document.getElementById("finalScreen");
  const colors=["#ff4d4d","#ffd93d","#6bff95","#4dc3ff","#ff73d9","#ffffff"];

  for(let burst=0;burst<18;burst++){
    const cx=Math.random()*100;
    const cy=Math.random()*80+5;

    for(let i=0;i<32;i++){
      const c=document.createElement("div");
      c.className="cracker";
      c.style.left=cx+"vw";
      c.style.top=cy+"vh";
      c.style.background=colors[Math.floor(Math.random()*colors.length)];

      const angle=(Math.PI*2*i)/32;
      const distance=80+Math.random()*130;

      c.style.setProperty("--x",Math.cos(angle)*distance+"px");
      c.style.setProperty("--y",Math.sin(angle)*distance+"px");
      c.style.animationDelay=(burst*.12)+"s";

      final.appendChild(c);
    }
  }
}

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.lineJoin="round";
ctx.strokeStyle="#333";

let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;

  return{
    x:(p.clientX-r.left)*(canvas.width/r.width),
    y:(p.clientY-r.top)*(canvas.height/r.height)
  };
}

function startDraw(e){
  e.preventDefault();
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function stopDraw(){drawing=false}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function clearCanvasWithSound(){
  playSound("wrongSound");
  clearCanvas();
}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);

canvas.addEventListener("pointerdown",startDraw);
canvas.addEventListener("pointermove",draw);
canvas.addEventListener("pointerup",stopDraw);
canvas.addEventListener("pointercancel",stopDraw);
</script>

</body>
</html>
