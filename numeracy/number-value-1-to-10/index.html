<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Count and Write Book Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS",sans-serif;
  background:#fff3d8;
  touch-action:none;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffe2a8,#cdefff,#ffd7e8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#logoScreen img{
  width:min(60vw,350px);
}

#game{
  display:none;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  flex-direction:column;
  background:linear-gradient(#dff6ff,#fff4d6);
}

.header{
  height:50px;
  flex-shrink:0;
  background:#fff5cf;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,2.4vw,28px);
  font-weight:bold;
  color:#6b3a00;
  text-align:center;
  padding:6px;
}

.stage{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  perspective:1600px;
}

.bookWrap{
  width:min(96vw,980px);
  height:min(80vh,620px);
  position:relative;
}

.bookImage{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
  pointer-events:none;
}

.leftContent{
  position:absolute;
  left:14%;
  top:25%;
  width:33%;
  height:45%;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.rightContent{
  position:absolute;
  right:14%;
  top:25%;
  width:33%;
  height:45%;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.objectGrid{
  width:100%;
  max-height:75%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  align-items:center;
  justify-items:center;
}

.itemBox{
  display:flex;
  align-items:center;
  justify-content:center;
}

.itemBox img{
  width:clamp(36px,5vw,66px);
  height:clamp(36px,5vw,66px);
  object-fit:contain;
}

.fallbackEmoji{
  font-size:clamp(34px,5vw,62px);
}

.itemLabel{
  margin-top:8px;
  font-size:clamp(18px,2.3vw,32px);
  font-weight:bold;
  color:#174a75;
  text-align:center;
}

.writeTitle{
  font-size:clamp(16px,2vw,26px);
  font-weight:bold;
  color:#6b3a00;
  margin-bottom:10px;
  text-align:center;
}

#drawCanvas{
  width:min(28vw,250px);
  height:min(23vh,165px);
  background:white;
  border:4px solid #4e9add;
  border-radius:18px;
  touch-action:none;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  border:none;
  border-radius:16px;
  padding:8px 18px;
  font-size:clamp(14px,1.8vw,20px);
  font-weight:bold;
  cursor:pointer;
}

.clearBtn{
  background:#ffc45c;
  color:#5a3300;
}

.nextBtn{
  background:#81d267;
  color:#153b00;
}

/* Realistic page flip overlay */
.pageFlip{
  position:absolute;
  right:9%;
  top:15%;
  width:41%;
  height:65%;
  z-index:20;
  transform-origin:left center;
  transform-style:preserve-3d;
  display:none;
  border-radius:6px 55px 55px 6px;
}

.pageFlip.show{
  display:block;
  animation:bookPageTurn 1.05s ease-in-out forwards;
}

.pageFace{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  background:linear-gradient(90deg,#fff2c9,#fff8df 40%,#f7ddb0);
  border-radius:6px 55px 55px 6px;
  box-shadow:inset 22px 0 25px rgba(0,0,0,.12), 0 12px 22px rgba(0,0,0,.22);
}

.pageFace.back{
  transform:rotateY(180deg);
  background:linear-gradient(90deg,#f8ddb0,#fff8df 50%,#fff2c9);
  box-shadow:inset -22px 0 25px rgba(0,0,0,.12);
}

.pageCurl{
  position:absolute;
  right:0;
  top:0;
  width:32%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,0,0,.18),rgba(255,255,255,.35));
  border-radius:0 55px 55px 0;
  z-index:3;
  pointer-events:none;
}

@keyframes bookPageTurn{
  0%{
    transform:rotateY(0deg) skewY(0deg);
    filter:brightness(1);
  }
  25%{
    transform:rotateY(-45deg) skewY(-2deg);
    filter:brightness(.98);
  }
  50%{
    transform:rotateY(-95deg) skewY(-4deg);
    filter:brightness(.92);
  }
  75%{
    transform:rotateY(-145deg) skewY(-2deg);
    filter:brightness(.96);
  }
  100%{
    transform:rotateY(-180deg) skewY(0deg);
    filter:brightness(1);
  }
}

.final{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(#271b55,#6f39a7);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:white;
  overflow:hidden;
  z-index:1000;
}

.final h1{
  font-size:clamp(42px,7vw,82px);
  z-index:2;
}

.final p{
  font-size:clamp(24px,4vw,42px);
  z-index:2;
}

.playAgain{
  margin-top:24px;
  background:#ffd35a;
  color:#5a3500;
  z-index:2;
}

.cracker{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  animation:cracker 1.7s ease-out forwards;
}

@keyframes cracker{
  0%{transform:translate(0,0) scale(.4);opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}
}

@media(max-width:768px){
  .header{height:44px;font-size:15px}
  .bookWrap{width:98vw;height:78vh}
  .leftContent{left:13%;top:27%;width:34%;height:42%}
  .rightContent{right:13%;top:27%;width:34%;height:42%}
  .objectGrid{grid-template-columns:repeat(3,1fr);gap:5px}
  #drawCanvas{width:30vw;height:22vh}
  .controls{gap:7px;margin-top:7px}
  button{padding:6px 12px}
  .itemLabel{font-size:17px}
  .writeTitle{font-size:14px}
}

@media(max-height:560px){
  .header{height:36px;font-size:13px}
  .bookWrap{height:82vh}
  .itemBox img{width:36px;height:36px}
  .fallbackEmoji{font-size:34px}
  #drawCanvas{height:20vh}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="header">Count the pictures and write the number on the right page.</div>

  <div class="stage">
    <div class="bookWrap" id="bookWrap">
      <img class="bookImage" src="assets/book-bg.png" alt="Book">

      <div class="leftContent">
        <div class="objectGrid" id="objectGrid"></div>
        <div class="itemLabel" id="itemLabel"></div>
      </div>

      <div class="rightContent">
        <div class="writeTitle">Write the number here</div>
        <canvas id="drawCanvas" width="420" height="300"></canvas>
        <div class="controls">
          <button class="clearBtn" onclick="clearCanvasWithSound()">Clear</button>
          <button class="nextBtn" onclick="nextPage()">Next Page</button>
        </div>
      </div>

      <div class="pageFlip" id="pageFlip">
        <div class="pageFace front"></div>
        <div class="pageFace back"></div>
        <div class="pageCurl"></div>
      </div>
    </div>
  </div>
</div>

<div class="final" id="finalScreen">
  <h1>🎉 Congratulations! 🎉</h1>
  <p>Great counting work!</p>
  <button class="playAgain" onclick="playAgain()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
document.addEventListener("touchmove",function(e){
  if(!e.target.closest("#drawCanvas")){
    e.preventDefault();
  }
},{passive:false});

const originalPages=[
  {count:8, name:"football", img:"football.png", emoji:"⚽"},
  {count:4, name:"cars", img:"car.png", emoji:"🚗"},
  {count:9, name:"teddy bears", img:"teddy.png", emoji:"🧸"},
  {count:3, name:"bikes", img:"bike.png", emoji:"🚲"},
  {count:1, name:"fruit", img:"fruits.png", emoji:"🍎"},
  {count:10, name:"bees", img:"bee.png", emoji:"🐝"},
  {count:2, name:"stars", img:"star.png", emoji:"⭐"},
  {count:1, name:"elephant", img:"elephant.png", emoji:"🐘"},
  {count:1, name:"ice-cream", img:"ice-cream.png", emoji:"🍦"},
  {count:7, name:"umbrellas", img:"umbrella.png", emoji:"☂️"}
];

let pages=[...originalPages];
let current=0;
let turning=false;

const objectGrid=document.getElementById("objectGrid");
const itemLabel=document.getElementById("itemLabel");
const pageFlip=document.getElementById("pageFlip");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadPage();
},5000);

function playSound(id){
  const s=document.getElementById(id);
  if(!s)return;
  s.currentTime=0;
  s.play().catch(()=>{});
}

function loadPage(){
  clearCanvas();
  objectGrid.innerHTML="";

  const page=pages[current];
  itemLabel.textContent=page.name;

  for(let i=0;i<page.count;i++){
    const box=document.createElement("div");
    box.className="itemBox";

    const img=document.createElement("img");
    img.src="assets/"+page.img;
    img.alt=page.name;

    img.onerror=()=>{
      box.innerHTML=`<span class="fallbackEmoji">${page.emoji}</span>`;
    };

    box.appendChild(img);
    objectGrid.appendChild(box);
  }
}

function nextPage(){
  if(turning)return;
  turning=true;

  playSound("rightSound");

  pageFlip.classList.remove("show");
  void pageFlip.offsetWidth;
  pageFlip.classList.add("show");

  setTimeout(()=>{
    current++;

    if(current>=pages.length){
      showFinal();
    }else{
      loadPage();
      pageFlip.classList.remove("show");
      turning=false;
    }
  },980);
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("finalScreen");
  final.style.display="flex";
  playSound("clapSound");
  createCrackers();
  turning=false;
}

function playAgain(){
  document.querySelectorAll(".cracker").forEach(c=>c.remove());
  pages=[...originalPages].sort(()=>Math.random()-0.5);
  current=0;
  turning=false;
  document.getElementById("finalScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  pageFlip.classList.remove("show");
  loadPage();
}

function createCrackers(){
  const final=document.getElementById("finalScreen");
  const colors=["#ff4d4d","#ffd93d","#6bff95","#4dc3ff","#ff73d9","#ffffff"];

  for(let burst=0;burst<18;burst++){
    const cx=Math.random()*100;
    const cy=Math.random()*80+5;

    for(let i=0;i<32;i++){
      const c=document.createElement("div");
      c.className="cracker";
      c.style.left=cx+"vw";
      c.style.top=cy+"vh";
      c.style.background=colors[Math.floor(Math.random()*colors.length)];

      const angle=(Math.PI*2*i)/32;
      const distance=80+Math.random()*130;

      c.style.setProperty("--x",Math.cos(angle)*distance+"px");
      c.style.setProperty("--y",Math.sin(angle)*distance+"px");
      c.style.animationDelay=(burst*.12)+"s";

      final.appendChild(c);
    }
  }
}

/* Drawing */
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.lineJoin="round";
ctx.strokeStyle="#333";

let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;

  return{
    x:(p.clientX-r.left)*(canvas.width/r.width),
    y:(p.clientY-r.top)*(canvas.height/r.height)
  };
}

function startDraw(e){
  e.preventDefault();
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function stopDraw(){
  drawing=false;
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function clearCanvasWithSound(){
  playSound("wrongSound");
  clearCanvas();
}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);

canvas.addEventListener("pointerdown",startDraw);
canvas.addEventListener("pointermove",draw);
canvas.addEventListener("pointerup",stopDraw);
canvas.addEventListener("pointercancel",stopDraw);
</script>

</body>
</html>
