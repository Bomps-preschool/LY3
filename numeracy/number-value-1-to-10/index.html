<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Value Game</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
  background:#fff7df;
  overflow:hidden;
  color:#3d2a14;
}
#logoScreen{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
#logoScreen img{width:min(55vw,360px)}
#game{
  display:none;
  width:100vw;
  height:100vh;
  flex-direction:column;
  background:linear-gradient(#fff3c4,#dff7ff);
}
.instruction{
  padding:10px;
  text-align:center;
  font-size:clamp(20px,3.2vw,34px);
  font-weight:bold;
}
.scene{
  flex:1;
  position:relative;
  overflow:hidden;
  margin:8px 16px;
  border-radius:28px;
  background:linear-gradient(#bceeff 0 55%,#8fd27a 55% 100%);
}
.cloud{
  position:absolute;
  background:white;
  border-radius:50px;
  opacity:.85;
}
.cloud:before,.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}
.cloud:before{width:55px;height:55px;left:20px;top:-25px}
.cloud:after{width:75px;height:75px;left:65px;top:-38px}
.object{
  position:absolute;
  width:clamp(75px,11vw,135px);
  cursor:pointer;
  transition:transform 1.8s ease, opacity 1.8s ease;
  touch-action:manipulation;
}
.tree{
  position:absolute;
  width:min(48vw,430px);
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}
.ground{
  position:absolute;
  bottom:0;
  width:100%;
  height:35%;
  background:#7fca64;
}
.writePanel{
  background:#fffdf4;
  border-top:4px dashed #82b35f;
  padding:10px;
  text-align:center;
}
.writePanel p{
  margin:0 0 6px;
  font-size:clamp(18px,2.8vw,28px);
  font-weight:bold;
}
canvas{
  width:180px;
  height:90px;
  border:4px solid #5799db;
  border-radius:16px;
  background:white;
  touch-action:none;
}
.controls{margin-top:6px}
button{
  background:#f6b84f;
  border:0;
  border-radius:18px;
  padding:9px 18px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}
#nextBtn{background:#7fc768}
.final{
  display:none;
  height:100vh;
  background:#fff3c4;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.final h1{font-size:clamp(38px,7vw,72px)}
.score{
  font-size:clamp(24px,4vw,44px);
  background:white;
  padding:18px 30px;
  border-radius:24px;
  border:4px solid #f6b84f;
}
.sun{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:#ffd14f;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
.sun.rays{
  box-shadow:0 0 0 45px #ffe889,0 0 0 95px #fff2b2,0 0 80px 140px #fff9d4;
}
.burst{
  position:absolute;
  font-size:32px;
  animation:burst 1.8s ease forwards;
}
@keyframes burst{
  from{transform:scale(.3);opacity:1}
  to{transform:scale(2) translateY(-90px);opacity:0}
}
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="instruction" id="instruction"></div>
  <div class="scene" id="scene"></div>

  <div class="writePanel">
    <p>Write the number in the box given below.</p>
    <canvas id="drawCanvas" width="360" height="180"></canvas>
    <div class="controls">
      <button onclick="clearCanvas()">Clear</button>
      <button id="nextBtn" onclick="nextSlide()">Next</button>
    </div>
  </div>
</div>

<div id="final" class="final">
  <div>
    <h1>🎉 Congratulations! 🎉</h1>
    <div class="score" id="scoreCard"></div><br><br>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const slides=[
  {instruction:"Count the number of honeybees and write in the box given below.", count:5, img:"honeybee.png", action:"fly", scene:"garden"},
  {instruction:"Count the number of apples and write in the box given below.", count:8, img:"apple.png", action:"fall", scene:"tree"},
  {instruction:"Count the sun and write in the box given below.", count:1, action:"sun", scene:"sky"},
  {instruction:"Count the number of sunflowers and write in the box given below.", count:10, img:"closed-sunflower.png", openImg:"open-sunflower.png", action:"open", scene:"garden"},
  {instruction:"Count the number of stars and write in the box given below.", count:4, img:"star.png", action:"starfall", scene:"night"},
  {instruction:"Count the number of eyes and write in the box given below.", count:2, img:"closed-eye.png", openImg:"open-eye.png", action:"open", scene:"face"},
  {instruction:"Count the number of cars and write in the box given below.", count:6, img:"car.png", action:"drive", scene:"road"},
  {instruction:"Count the number of lamps and write in the box given below.", count:3, img:"lamp-off.png", openImg:"lamp-on.png", action:"open", scene:"room"},
  {instruction:"Count the number of balls and write in the box given below.", count:9, img:"ball.png", action:"roll", scene:"playground"},
  {instruction:"Count the number of kites and write in the box given below.", count:7, img:"kite.png", action:"fly", scene:"sky"}
];

let current=0;
const scene=document.getElementById("scene");
const instruction=document.getElementById("instruction");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadSlide();
},5000);

function createScene(type){
  scene.innerHTML="";
  scene.style.background="linear-gradient(#bceeff 0 55%,#8fd27a 55% 100%)";

  if(type==="night"){
    scene.style.background="linear-gradient(#17285c,#3a4d85)";
  }
  if(type==="room"){
    scene.style.background="linear-gradient(#ffe0b3,#f7c58b)";
  }
  if(type==="road"){
    scene.style.background="linear-gradient(#bceeff 0 45%,#89cf74 45% 65%,#5f5f5f 65% 100%)";
  }
  if(type==="sky"){
    scene.style.background="linear-gradient(#bceeff,#fff3ba)";
  }
  if(type==="face"){
    scene.style.background="linear-gradient(#ffe4c8,#ffd0a8)";
  }

  if(type!=="night" && type!=="room" && type!=="face"){
    addCloud(8,16); addCloud(68,12);
  }

  if(type==="tree"){
    const tree=document.createElement("img");
    tree.src="assets/tree.png";
    tree.className="tree";
    scene.appendChild(tree);
  }
}

function addCloud(left,top){
  const c=document.createElement("div");
  c.className="cloud";
  c.style.left=left+"%";
  c.style.top=top+"%";
  c.style.width="150px";
  c.style.height="55px";
  scene.appendChild(c);
}

function loadSlide(){
  clearCanvas();
  const s=slides[current];
  instruction.textContent=s.instruction;
  createScene(s.scene);

  if(s.action==="sun"){
    const sun=document.createElement("div");
    sun.className="sun";
    sun.onclick=()=>sun.classList.add("rays");
    scene.appendChild(sun);
    return;
  }

  for(let i=0;i<s.count;i++){
    const img=document.createElement("img");
    img.src="assets/"+s.img;
    img.className="object";
    img.style.left=getX(i,s.count)+"%";
    img.style.top=getY(i,s.count,s.scene)+"%";
    scene.appendChild(img);

    img.addEventListener("click",()=>animate(img,s));
    img.addEventListener("touchstart",(e)=>{
      e.preventDefault();
      animate(img,s);
    },{passive:false});
  }
}

function getX(i,count){
  if(count<=4) return 20+i*18;
  return 8+(i%5)*18;
}
function getY(i,count,type){
  if(type==="road") return i<3?58:72;
  if(type==="tree") return 18+Math.floor(i/4)*18;
  if(type==="night") return 18+i*10;
  if(type==="face") return 35;
  if(type==="sky") return 20+Math.floor(i/4)*16;
  return 18+Math.floor(i/5)*28;
}

function animate(img,s){
  if(img.dataset.done) return;
  img.dataset.done="true";

  if(s.action==="open"){
    img.src="assets/"+s.openImg;
    img.style.transform="scale(1.18)";
    return;
  }

  let x=0,y=0,rot=Math.random()*80-40;

  if(s.action==="fly"){
    x=(Math.random()>.5?1:-1)*(window.innerWidth*.55);
    y=-(80+Math.random()*220);
  }
  if(s.action==="fall"){
    x=(Math.random()*160)-80;
    y=window.innerHeight*.45;
  }
  if(s.action==="starfall"){
    x=(Math.random()*180)-90;
    y=window.innerHeight*.45;
  }
  if(s.action==="drive"){
    x=window.innerWidth*.75;
    y=0;
  }
  if(s.action==="roll"){
    x=(Math.random()>.5?1:-1)*(window.innerWidth*.65);
    y=window.innerHeight*.25;
    rot=720;
  }

  img.style.transform=`translate(${x}px,${y}px) rotate(${rot}deg)`;
  if(["fly","drive","roll","starfall"].includes(s.action)){
    img.style.opacity=".2";
  }
}

function nextSlide(){
  current++;
  if(current>=slides.length){
    showFinal();
  }else{
    loadSlide();
  }
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("final");
  final.style.display="flex";
  document.getElementById("scoreCard").textContent="Great counting work!";
  for(let i=0;i<45;i++){
    const b=document.createElement("div");
    b.className="burst";
    b.textContent=["⭐","✨","🪙","🎆"][Math.floor(Math.random()*4)];
    b.style.left=Math.random()*100+"vw";
    b.style.top=Math.random()*100+"vh";
    b.style.animationDelay=Math.random()*1.2+"s";
    final.appendChild(b);
  }
}

/* Writing canvas */
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
ctx.lineWidth=9;
ctx.lineCap="round";
ctx.strokeStyle="#333";
let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;
  return{
    x:(p.clientX-r.left)*(canvas.width/r.width),
    y:(p.clientY-r.top)*(canvas.height/r.height)
  };
}
function startDraw(e){
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}
function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}
function stopDraw(){drawing=false}
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height)}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);
canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);
</script>

</body>
</html>
