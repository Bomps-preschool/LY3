<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Count and Write Scrapbook Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS",sans-serif;
  background:#f6eadf;
  touch-action:none;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#f4c7b8,#c9d8b6,#c7dbe8,#d8c4e8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#logoScreen img{
  width:min(60vw,350px);
}

#game{
  display:none;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  flex-direction:column;
  background:linear-gradient(135deg,#f4c7b8,#f5df9e,#b8d6c2,#c7dbe8);
}

.header{
  height:52px;
  background:#fff7df;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(16px,2.5vw,28px);
  font-weight:bold;
  color:#6b3a00;
  padding:6px;
}

.stage{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.notebook{
  width:min(94vw,920px);
  height:min(78vh,560px);
  background:#f8f2df;
  border-radius:28px;
  box-shadow:0 14px 28px rgba(0,0,0,.22);
  display:flex;
  position:relative;
  overflow:hidden;
  border:6px solid #9f735c;
}

.notebook::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:8px;
  transform:translateX(-50%);
  background:#8b5e4b;
}

.spiral{
  position:absolute;
  left:50%;
  top:20px;
  bottom:20px;
  width:28px;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  align-items:center;
  z-index:5;
}

.ring{
  width:26px;
  height:26px;
  border:5px solid #6f5a4b;
  border-radius:50%;
  background:#f6eadf;
}

.page{
  width:50%;
  height:100%;
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

.leftPage{
  background:#fff5df;
}

.rightPage{
  background:#edf7ee;
}

.pageTitle{
  position:absolute;
  top:16px;
  font-size:clamp(18px,2.2vw,28px);
  font-weight:bold;
  color:#7a4c2c;
}

.objectGrid{
  width:88%;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  align-items:center;
  justify-items:center;
  margin-left:-12px;
}

.itemBox{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffffb8;
  border-radius:18px;
  padding:5px;
}

.itemBox img{
  width:70px;
  height:70px;
  object-fit:contain;
}

.singleItem{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
}

.singleItem img{
  width:190px;
  height:190px;
  object-fit:contain;
}

.itemLabel{
  margin-top:10px;
  font-size:clamp(18px,2vw,30px);
  font-weight:bold;
  color:#355c4a;
  background:#f5df9e;
  padding:5px 18px;
  border-radius:18px;
}

.writeTitle{
  font-size:clamp(18px,2vw,28px);
  font-weight:bold;
  margin-bottom:12px;
  color:#6b3a00;
}

#drawCanvas{
  width:min(34vw,300px);
  height:min(29vh,205px);
  background:white;
  border:4px solid #6aa5b8;
  border-radius:20px;
  touch-action:none;
}

.controls{
  display:flex;
  gap:12px;
  margin-top:14px;
}

button{
  border:none;
  border-radius:16px;
  padding:9px 20px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.clearBtn{
  background:#d68b73;
  color:white;
}

.nextBtn{
  background:#7aa874;
  color:white;
}

.pageFlip{
  position:absolute;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:#edf7ee;
  transform-origin:left center;
  display:none;
  z-index:20;
}

.pageFlip.show{
  display:block;
  animation:flip .7s ease-in-out forwards;
}

@keyframes flip{
  0%{transform:rotateY(0deg)}
  100%{transform:rotateY(-180deg)}
}

.final{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#6f5a8a,#a66f73,#7aa874);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:1000;
}

.playAgain{
  margin-top:24px;
  background:#f5df9e;
  color:#5a3500;
}

@media(max-width:768px){

  .notebook{
    width:98vw;
    height:78vh;
  }

  .objectGrid{
    grid-template-columns:repeat(3,1fr);
  }

  .itemBox img{
    width:45px;
    height:45px;
  }

  .singleItem img{
    width:170px;
    height:170px;
  }

}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png">
</div>

<div id="game">

<div class="header">
Count the pictures and write the number on the right page.
</div>

<div class="stage">

<div class="notebook">

<div class="page leftPage">

<div class="pageTitle">Count</div>

<div class="objectGrid" id="objectGrid"></div>

<div class="itemLabel" id="itemLabel"></div>

</div>

<div class="page rightPage">

<div class="pageTitle">Write</div>

<div class="writeTitle">Write the number here</div>

<canvas id="drawCanvas" width="420" height="300"></canvas>

<div class="controls">
<button class="clearBtn" onclick="clearCanvas()">Clear</button>
<button class="nextBtn" onclick="nextPage()">Next Page</button>
</div>

</div>

<div class="spiral">
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
</div>

<div class="pageFlip" id="pageFlip"></div>

</div>

</div>

</div>

<div class="final" id="finalScreen">
<h1>🎉 Congratulations 🎉</h1>
<button class="playAgain" onclick="playAgain()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>

const originalPages=[
{count:8,name:"football",img:"football.png"},
{count:4,name:"cars",img:"car.png"},
{count:9,name:"teddy bears",img:"teddy.png"},
{count:3,name:"cycles",img:"cycle.png"},
{count:1,name:"fruits",img:"fruits.png"},
{count:10,name:"bees",img:"honeybee.png"},
{count:2,name:"stars",img:"star.png"},
{count:1,name:"elephant",img:"elephant.png"},
{count:1,name:"ice-cream",img:"ice-cream.png"},
{count:7,name:"umbrellas",img:"umbrella.png"}
];

let pages=[...originalPages];
let current=0;

const objectGrid=document.getElementById("objectGrid");
const itemLabel=document.getElementById("itemLabel");
const pageFlip=document.getElementById("pageFlip");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadPage();
},5000);

function loadPage(){

  objectGrid.innerHTML="";

  const page=pages[current];

  itemLabel.textContent=page.name;

  if(page.count===1){

    objectGrid.style.display="flex";
    objectGrid.style.justifyContent="center";
    objectGrid.style.alignItems="center";

    const single=document.createElement("div");
    single.className="singleItem";

    const img=document.createElement("img");

    img.src="assets/"+page.img;

    if(page.img==="fruits.png"){
      img.style.width="320px";
      img.style.height="320px";
    }

    else if(page.img==="ice-cream.png"){
      img.style.width="300px";
      img.style.height="300px";
    }

    else if(page.img==="elephant.png"){
      img.style.width="230px";
      img.style.height="230px";
    }

    else{
      img.style.width="190px";
      img.style.height="190px";
    }

    single.appendChild(img);

    objectGrid.appendChild(single);

  }

  else{

    objectGrid.style.display="grid";

    objectGrid.style.gridTemplateColumns=
    window.innerWidth<=768
    ?"repeat(3,1fr)"
    :"repeat(4,1fr)";

    for(let i=0;i<page.count;i++){

      const box=document.createElement("div");
      box.className="itemBox";

      const img=document.createElement("img");

      img.src="assets/"+page.img;

      box.appendChild(img);

      objectGrid.appendChild(box);

    }

  }

}

function nextPage(){

  document.getElementById("rightSound").play();

  pageFlip.classList.remove("show");

  void pageFlip.offsetWidth;

  pageFlip.classList.add("show");

  setTimeout(()=>{

    current++;

    if(current>=pages.length){

      document.getElementById("game").style.display="none";

      document.getElementById("finalScreen").style.display="flex";

      document.getElementById("clapSound").play();

    }

    else{

      loadPage();

      pageFlip.classList.remove("show");

    }

  },700);

}

function playAgain(){

  pages=[...originalPages].sort(()=>Math.random()-0.5);

  current=0;

  document.getElementById("finalScreen").style.display="none";

  document.getElementById("game").style.display="flex";

  loadPage();

}

const canvas=document.getElementById("drawCanvas");

const ctx=canvas.getContext("2d");

ctx.lineWidth=10;
ctx.lineCap="round";
ctx.strokeStyle="#333";

let drawing=false;

function getPos(e){

  const rect=canvas.getBoundingClientRect();

  const point=e.touches?e.touches[0]:e;

  return{
    x:(point.clientX-rect.left)*(canvas.width/rect.width),
    y:(point.clientY-rect.top)*(canvas.height/rect.height)
  };

}

function startDraw(e){

  drawing=true;

  const pos=getPos(e);

  ctx.beginPath();

  ctx.moveTo(pos.x,pos.y);

}

function draw(e){

  if(!drawing)return;

  e.preventDefault();

  const pos=getPos(e);

  ctx.lineTo(pos.x,pos.y);

  ctx.stroke();

}

function stopDraw(){
  drawing=false;
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);

</script>

</body>
</html>
