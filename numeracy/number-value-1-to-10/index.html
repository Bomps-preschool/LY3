<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Counting Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:"Comic Sans MS",sans-serif;background:#fff6d8}

#logoScreen{position:fixed;inset:0;background:white;display:flex;justify-content:center;align-items:center;z-index:999}
#logoScreen img{width:min(60vw,360px)}

#game{display:none;height:100vh;width:100vw;flex-direction:column}
.instruction{background:#fff6d8;text-align:center;padding:10px;font-size:clamp(18px,2.5vw,30px);font-weight:bold;min-height:60px;z-index:20}
.scene{flex:1;position:relative;overflow:hidden}

.garden{background:linear-gradient(#bdeeff 0%,#bdeeff 58%,#7aca64 58%,#7aca64 100%)}
.treeScene{background:linear-gradient(#bdeeff 0%,#bdeeff 58%,#7aca64 58%,#7aca64 100%)}
.night{background:linear-gradient(#081746,#324f9d)}
.sky{background:linear-gradient(#bdeeff,#fff1a6)}
.room{background:linear-gradient(#ffe2bc 0%,#ffe2bc 70%,#c9854a 70%,#c9854a 100%)}
.road{background:linear-gradient(#bdeeff 0%,#bdeeff 45%,#79c765 45%,#79c765 62%,#595959 62%,#595959 100%)}
.playground{background:linear-gradient(#bdeeff 0%,#bdeeff 52%,#7ccc65 52%,#7ccc65 100%)}

.cloud{position:absolute;width:140px;height:50px;background:white;border-radius:50px;opacity:.9;z-index:1}
.cloud:before,.cloud:after{content:"";position:absolute;background:white;border-radius:50%}
.cloud:before{width:60px;height:60px;left:18px;top:-28px}
.cloud:after{width:78px;height:78px;left:55px;top:-38px}

.tree{position:absolute;width:min(72vw,620px);left:50%;top:54%;transform:translate(-50%,-50%);z-index:2}

.object{position:absolute;cursor:pointer;transition:transform 1.8s ease,opacity 1.8s ease;touch-action:manipulation;z-index:5}
.bee{width:clamp(62px,8vw,110px);filter:saturate(1.6) brightness(1.2);z-index:30}
.apple{width:clamp(34px,5vw,58px);filter:saturate(1.4) brightness(1.1)}
.star{width:clamp(55px,7vw,90px);filter:brightness(1.8) saturate(2.1) drop-shadow(0 0 16px #fff36b)}
.eye{width:clamp(120px,17vw,210px)}
.car{width:clamp(75px,11vw,125px)}
.lamp{width:clamp(85px,12vw,140px)}
.ball{width:clamp(46px,6vw,72px)}
.kite{width:clamp(62px,8vw,100px)}
.sunflower{width:clamp(70px,9vw,130px)}

.fallback{position:absolute;font-size:clamp(55px,8vw,100px);z-index:5;cursor:pointer;transition:transform 1.8s ease,opacity 1.8s ease}

.sun{position:absolute;width:160px;height:160px;border-radius:50%;background:#ffd74a;left:50%;top:42%;transform:translate(-50%,-50%);z-index:4;cursor:pointer}
.sun.rays{box-shadow:0 0 0 35px #ffe88c,0 0 0 70px #fff3ba,0 0 100px 120px rgba(255,244,180,.4)}

.roadLine{position:absolute;width:100%;height:8px;top:79%;background:repeating-linear-gradient(90deg,white 0 50px,transparent 50px 90px)}

.lampLight{position:absolute;width:250px;height:270px;background:radial-gradient(ellipse at top,rgba(255,255,120,1) 0%,rgba(255,235,60,.85) 28%,rgba(255,220,80,.45) 55%,transparent 78%);filter:blur(2px);transform:translate(-75px,45px);pointer-events:none;z-index:1}

.writeArea{background:#fff9e8;padding:6px;text-align:center;min-height:150px;z-index:20}
.writeArea p{font-size:clamp(15px,2vw,22px);margin-bottom:5px;font-weight:bold}
#drawCanvas{width:min(46vw,190px);height:min(12vh,80px);background:white;border:4px solid #4e9add;border-radius:16px;touch-action:none}
.controls{display:flex;justify-content:center;gap:10px;margin-top:6px}
button{border:none;border-radius:15px;padding:8px 16px;font-size:clamp(14px,2vw,18px);font-weight:bold;cursor:pointer}
.clearBtn{background:#f4b84f}
.nextBtn{background:#8bcf70}

.final{display:none;position:fixed;inset:0;background:linear-gradient(#101849,#3b186d);justify-content:center;align-items:center;flex-direction:column;color:white;text-align:center;overflow:hidden}
.final h1{font-size:clamp(38px,7vw,70px)}
.final p{font-size:clamp(22px,4vw,40px)}
.cracker{position:absolute;width:10px;height:10px;border-radius:50%;animation:cracker 1.8s ease-out forwards}
@keyframes cracker{0%{transform:translate(0,0) scale(.5);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}}

@media(max-width:768px){
  .tree{width:96vw}
  .bee{width:78px}
  .apple{width:42px}
  .ball{width:52px}
  .car{width:90px}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png">
</div>

<div id="game">
  <div class="instruction" id="instruction"></div>
  <div class="scene" id="scene"></div>

  <div class="writeArea">
    <p>Write the number in the box given below.</p>
    <canvas id="drawCanvas" width="380" height="170"></canvas>
    <div class="controls">
      <button class="clearBtn" onclick="clearCanvasWithSound()">Clear</button>
      <button class="nextBtn" onclick="nextSlide()">Next</button>
    </div>
  </div>
</div>

<div class="final" id="final">
  <h1>🎉 Congratulations 🎉</h1>
  <p>Great Counting!</p>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="rightSound" src="assets/right.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
const slides=[
{text:"Count the number of honeybees and write in the box given below.",count:5,img:"honeybee.png",scene:"garden",action:"beeFly",cls:"bee",fallback:"🐝"},
{text:"Count the number of apples and write in the box given below.",count:8,img:"apple.png",scene:"treeScene",action:"fall",cls:"apple",fallback:"🍎"},
{text:"Count the sun and write in the box given below.",count:1,scene:"sky",action:"sun"},
{text:"Count the number of sunflowers and write in the box given below.",count:10,img:"closed-sunflower.png",openImg:"open-sunflower.png",scene:"garden",action:"open",cls:"sunflower",fallback:"🌻"},
{text:"Count the number of stars and write in the box given below.",count:4,img:"star.png",scene:"night",action:"starup",cls:"star",fallback:"⭐"},
{text:"Count the number of eyes and write in the box given below.",count:2,img:"closed-eye.png",openImg:"open-eye.png",scene:"sky",action:"open",cls:"eye",fallback:"👁️"},
{text:"Count the number of lamps and write in the box given below.",count:3,img:"lamp-off.png",openImg:"lamp-on.png",scene:"room",action:"lamp",cls:"lamp",fallback:"💡"},
{text:"Count the number of cars and write in the box given below.",count:6,img:"car.png",scene:"road",action:"driveLeft",cls:"car",fallback:"🚗"},
{text:"Count the number of balls and write in the box given below.",count:9,img:"ball.png",scene:"playground",action:"roll",cls:"ball",fallback:"⚽"},
{text:"Count the number of kites and write in the box given below.",count:7,img:"kite.png",scene:"sky",action:"fly",cls:"kite",fallback:"🪁"}
];

let current=0;
const scene=document.getElementById("scene");
const instruction=document.getElementById("instruction");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadSlide();
},5000);

function playSound(id){
  const s=document.getElementById(id);
  if(!s)return;
  s.currentTime=0;
  s.play().catch(()=>{});
}

function loadSlide(){
  clearCanvas();
  scene.innerHTML="";
  const s=slides[current];
  instruction.textContent=s.text;
  scene.className="scene "+s.scene;

  addCloud(5,8);
  addCloud(72,12);

  if(s.scene==="treeScene"){
    const tree=document.createElement("img");
    tree.src="assets/tree.png";
    tree.className="tree";
    scene.appendChild(tree);
  }

  if(s.scene==="road"){
    const road=document.createElement("div");
    road.className="roadLine";
    scene.appendChild(road);
  }

  if(s.action==="sun"){
    const sun=document.createElement("div");
    sun.className="sun";
    sun.onclick=()=>sun.classList.add("rays");
    scene.appendChild(sun);
    return;
  }

  for(let i=0;i<s.count;i++){
    const img=document.createElement("img");
    img.src="assets/"+s.img;
    img.className="object "+(s.cls||"");
    img.onerror=function(){
      const fb=document.createElement("div");
      fb.className="fallback";
      fb.textContent=s.fallback||"⭐";
      fb.style.left=img.style.left;
      fb.style.top=img.style.top;
      fb.onclick=()=>animate(fb,s,i);
      img.replaceWith(fb);
    };
    placeObject(img,s,i);
    img.onclick=()=>animate(img,s,i);
    img.addEventListener("touchstart",e=>{e.preventDefault();animate(img,s,i)},{passive:false});
    scene.appendChild(img);
  }
}

function addCloud(left,top){
  const c=document.createElement("div");
  c.className="cloud";
  c.style.left=left+"%";
  c.style.top=top+"%";
  scene.appendChild(c);
}

function placeObject(el,s,i){
  if(s.scene==="treeScene"){
    const xs=[38,45,52,59,42,49,56,63];
    const ys=[18,14,19,16,31,28,33,30];
    el.style.left=xs[i]+"%";
    el.style.top=ys[i]+"%";
    return;
  }

  if(s.scene==="road"){
    el.style.left=(8+i*14)+"%";
    el.style.top=(58+(i%2)*16)+"%";
    return;
  }

  if(s.scene==="playground"){
    const xs=[6,17,28,39,50,61,72,83,44];
    const ys=[66,66,66,66,66,66,66,66,80];
    el.style.left=xs[i]+"%";
    el.style.top=ys[i]+"%";
    return;
  }

  if(s.action==="beeFly"){
    const xs=[14,30,46,62,78];
    const ys=[30,24,31,25,32];
    el.style.left=xs[i]+"%";
    el.style.top=ys[i]+"%";
    el.style.transform="rotate("+[-10,12,-8,14,-12][i]+"deg)";
    return;
  }

  if(s.action==="starup"){
    const xs=[20,40,60,80];
    const ys=[68,72,66,74];
    el.style.left=xs[i]+"%";
    el.style.top=ys[i]+"%";
    return;
  }

  if(s.cls==="eye"){
    el.style.left=i===0?"28%":"58%";
    el.style.top="35%";
    return;
  }

  if(s.cls==="lamp"){
    el.style.left=[25,48,70][i]+"%";
    el.style.top="38%";
    return;
  }

  el.style.left=(10+(i%5)*16)+"%";
  el.style.top=(20+Math.floor(i/5)*26)+"%";
}

function animate(obj,s,i){
  if(obj.dataset.done)return;
  obj.dataset.done="true";

  if(s.action==="open"){
    if(s.openImg){
      obj.style.transition="all .5s ease";
      obj.style.transform+=" scale(.9)";
      setTimeout(()=>{
        obj.src="assets/"+s.openImg;
        obj.onload=()=>{obj.style.transform=obj.style.transform.replace("scale(.9)","scale(1.08)")};
      },220);
    }
    return;
  }

  if(s.action==="lamp"){
    if(s.openImg)obj.src="assets/"+s.openImg;
    const light=document.createElement("div");
    light.className="lampLight";
    light.style.left=obj.style.left;
    light.style.top=obj.style.top;
    scene.appendChild(light);
    obj.style.transform+=" scale(1.12)";
    return;
  }

  let x=0,y=0,r=0;

  if(s.action==="beeFly"){
    obj.style.zIndex=30;
    const moves=[
      {x:-window.innerWidth*.75,y:-140,r:-20},
      {x:-window.innerWidth*.65,y:120,r:18},
      {x:-window.innerWidth*.90,y:-50,r:-12},
      {x:-window.innerWidth*.80,y:90,r:24},
      {x:-window.innerWidth*1.00,y:-180,r:-28}
    ];
    x=moves[i%moves.length].x;
    y=moves[i%moves.length].y;
    r=moves[i%moves.length].r;
  }

  if(s.action==="fly"){
    const dir=Math.random()>.5?1:-1;
    x=dir*window.innerWidth*.85;
    y=-(100+Math.random()*180);
    r=dir*25;
  }

  if(s.action==="fall"){
    x=(Math.random()*80)-40;
    y=window.innerHeight*.34;
    r=35;
  }

  if(s.action==="starup"){
    obj.style.zIndex=30;
    x=(Math.random()*120)-60;
    y=-(window.innerHeight*1.4);
    r=35;
  }

  if(s.action==="driveLeft"){
    x=-(window.innerWidth*1.4);
  }

  if(s.action==="roll"){
    const dir=Math.random()>.5?1:-1;
    x=dir*window.innerWidth*.55;
    y=window.innerHeight*.05;
    r=dir*720;
  }

  obj.style.transform+=` translate(${x}px,${y}px) rotate(${r}deg)`;

  if(["beeFly","fly","driveLeft","roll","starup"].includes(s.action)){
    setTimeout(()=>obj.remove(),1700);
  }
}

function nextSlide(){
  playSound("rightSound");
  current++;
  if(current>=slides.length){showFinal()}
  else{loadSlide()}
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("final");
  final.style.display="flex";
  playSound("clapSound");
  createCrackers(final);
}

function createCrackers(final){
  const colors=["#ff3131","#ffb703","#00d4ff","#7cff6b","#ff5efc","#ffffff"];
  for(let center=0;center<28;center++){
    const cx=Math.random()*100;
    const cy=Math.random()*80+5;
    for(let i=0;i<40;i++){
      const b=document.createElement("div");
      b.className="cracker";
      b.style.left=cx+"vw";
      b.style.top=cy+"vh";
      b.style.background=colors[Math.floor(Math.random()*colors.length)];
      const angle=(Math.PI*2*i)/40;
      const distance=90+Math.random()*150;
      b.style.setProperty("--x",Math.cos(angle)*distance+"px");
      b.style.setProperty("--y",Math.sin(angle)*distance+"px");
      b.style.animationDelay=(center*.07)+"s";
      final.appendChild(b);
    }
  }
}

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
ctx.lineWidth=9;
ctx.lineCap="round";
ctx.lineJoin="round";
ctx.strokeStyle="#333";
let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;
  return{x:(p.clientX-r.left)*(canvas.width/r.width),y:(p.clientY-r.top)*(canvas.height/r.height)};
}

function startDraw(e){
  e.preventDefault();
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function stopDraw(){drawing=false}
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height)}
function clearCanvasWithSound(){playSound("wrongSound");clearCanvas()}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);

canvas.addEventListener("pointerdown",startDraw);
canvas.addEventListener("pointermove",draw);
canvas.addEventListener("pointerup",stopDraw);
canvas.addEventListener("pointercancel",stopDraw);
</script>

</body>
</html>
