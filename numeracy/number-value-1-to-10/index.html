<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Value Game</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
  background:#fff6d8;
  overflow:hidden;
  color:#4b2e0f;
}
#logoScreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}
#logoScreen img{
  width:min(55vw,380px);
}
#game{
  display:none;
  height:100vh;
  width:100vw;
  flex-direction:column;
}
.instruction{
  min-height:70px;
  padding:12px;
  text-align:center;
  font-size:clamp(21px,3vw,34px);
  font-weight:bold;
  background:#fff6d8;
}
.scene{
  flex:1;
  position:relative;
  overflow:hidden;
}
.object{
  position:absolute;
  width:clamp(75px,10vw,130px);
  cursor:pointer;
  touch-action:manipulation;
  transition:transform 1.8s ease, opacity 1.8s ease;
}
.bigObject{
  width:clamp(110px,15vw,180px);
}
.writeArea{
  height:165px;
  background:#fff9e8;
  text-align:center;
  padding:8px;
}
.writeArea p{
  margin:0 0 5px;
  font-size:clamp(18px,2.5vw,26px);
  font-weight:bold;
}
canvas{
  width:185px;
  height:85px;
  background:white;
  border:4px solid #4e9add;
  border-radius:16px;
  touch-action:none;
}
button{
  margin-top:5px;
  border:0;
  border-radius:16px;
  background:#f4b84f;
  padding:8px 18px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}
#nextBtn{
  background:#8bcf70;
}
.cloud{
  position:absolute;
  width:150px;
  height:55px;
  background:white;
  border-radius:40px;
  opacity:.9;
}
.cloud:before,.cloud:after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}
.cloud:before{
  width:60px;
  height:60px;
  left:20px;
  top:-28px;
}
.cloud:after{
  width:80px;
  height:80px;
  left:65px;
  top:-42px;
}
.tree{
  position:absolute;
  width:min(45vw,420px);
  left:50%;
  top:48%;
  transform:translate(-50%,-50%);
}
.sun{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:#ffd452;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
.sun.rays{
  box-shadow:
  0 0 0 45px #ffe88c,
  0 0 0 95px #fff3bb,
  0 0 90px 140px #fff8d8;
}
.final{
  display:none;
  height:100vh;
  background:#fff2c7;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.final h1{
  font-size:clamp(38px,7vw,70px);
}
.final p{
  font-size:clamp(24px,4vw,42px);
}
.burst{
  position:absolute;
  font-size:32px;
  animation:burst 1.8s ease forwards;
}
@keyframes burst{
  from{transform:scale(.3);opacity:1}
  to{transform:scale(2) translateY(-90px);opacity:0}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div class="instruction" id="instruction"></div>
  <div class="scene" id="scene"></div>

  <div class="writeArea">
    <p>Write the number in the box given below.</p>
    <canvas id="drawCanvas" width="370" height="170"></canvas><br>
    <button onclick="clearCanvas()">Clear</button>
    <button id="nextBtn" onclick="nextSlide()">Next</button>
  </div>
</div>

<div id="final" class="final">
  <div>
    <h1>🎉 Congratulations! 🎉</h1>
    <p>Great counting work!</p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const slides=[
  {text:"Count the number of honeybees and write in the box given below.", count:5, img:"honeybee.png", action:"fly", scene:"garden"},
  {text:"Count the number of apples and write in the box given below.", count:8, img:"apple.png", action:"fall", scene:"tree"},
  {text:"Count the sun and write in the box given below.", count:1, action:"sun", scene:"sky"},
  {text:"Count the number of sunflowers and write in the box given below.", count:10, img:"closed-sunflower.png", openImg:"open-sunflower.png", action:"open", scene:"garden"},
  {text:"Count the number of stars and write in the box given below.", count:4, img:"star.png", action:"starfall", scene:"night"},
  {text:"Count the number of eyes and write in the box given below.", count:2, img:"closed-eye.png", openImg:"open-eye.png", action:"open", scene:"face"},
  {text:"Count the number of cars and write in the box given below.", count:6, img:"car.png", action:"drive", scene:"road"},
  {text:"Count the number of lamps and write in the box given below.", count:3, img:"lamp-off.png", openImg:"lamp-on.png", action:"open", scene:"room"},
  {text:"Count the number of balls and write in the box given below.", count:9, img:"ball.png", action:"roll", scene:"playground"},
  {text:"Count the number of kites and write in the box given below.", count:7, img:"kite.png", action:"fly", scene:"sky"}
];

let current=0;
const scene=document.getElementById("scene");
const instruction=document.getElementById("instruction");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadSlide();
},5000);

function loadSlide(){
  clearCanvas();
  const s=slides[current];
  instruction.textContent=s.text;
  createScene(s.scene);

  if(s.action==="sun"){
    const sun=document.createElement("div");
    sun.className="sun";
    sun.onclick=()=>sun.classList.add("rays");
    scene.appendChild(sun);
    return;
  }

  for(let i=0;i<s.count;i++){
    const img=document.createElement("img");
    img.src="assets/"+s.img;
    img.className="object";

    if(s.scene==="tree"){
      img.style.left=[30,42,55,65,35,48,58,70][i]+"%";
      img.style.top=[20,18,22,30,38,36,42,47][i]+"%";
    }else{
      img.style.left=getX(i,s.count)+"%";
      img.style.top=getY(i,s.count,s.scene)+"%";
    }

    scene.appendChild(img);

    img.addEventListener("click",()=>animate(img,s));
    img.addEventListener("touchstart",(e)=>{
      e.preventDefault();
      animate(img,s);
    },{passive:false});
  }
}

function createScene(type){
  scene.innerHTML="";

  if(type==="garden"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 55%,#79c765 55%,#79c765 100%)";
    addCloud(10,12);
    addCloud(70,15);
    addFlowers();
  }

  if(type==="tree"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 55%,#7ccc65 55%,#7ccc65 100%)";
    addCloud(8,12);
    addCloud(72,15);
    const tree=document.createElement("img");
    tree.src="assets/tree.png";
    tree.className="tree";
    scene.appendChild(tree);
  }

  if(type==="sky"){
    scene.style.background="linear-gradient(#bceeff,#fff3b4)";
    addCloud(8,16);
    addCloud(68,12);
  }

  if(type==="night"){
    scene.style.background="linear-gradient(#18275c,#42548c)";
  }

  if(type==="face"){
    scene.style.background="linear-gradient(#ffe3c7,#ffd0a6)";
  }

  if(type==="road"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 45%,#7bc96a 45%,#7bc96a 65%,#5d5d5d 65%,#5d5d5d 100%)";
    addCloud(12,12);
    addCloud(70,15);
  }

  if(type==="room"){
    scene.style.background="linear-gradient(#ffe4bd,#f7c994)";
  }

  if(type==="playground"){
    scene.style.background="linear-gradient(#bceeff 0%,#bceeff 50%,#8ad06c 50%,#8ad06c 100%)";
    addCloud(8,12);
    addCloud(72,15);
  }
}

function addCloud(left,top){
  const c=document.createElement("div");
  c.className="cloud";
  c.style.left=left+"%";
  c.style.top=top+"%";
  scene.appendChild(c);
}

function addFlowers(){
  for(let i=0;i<8;i++){
    const f=document.createElement("div");
    f.textContent="🌼";
    f.style.position="absolute";
    f.style.fontSize="34px";
    f.style.left=(5+i*12)+"%";
    f.style.bottom="18px";
    scene.appendChild(f);
  }
}

function getX(i,count){
  if(count<=3)return 24+i*22;
  if(count<=5)return 12+i*18;
  return 8+(i%5)*18;
}

function getY(i,count,type){
  if(type==="road")return i<3?60:75;
  if(type==="night")return 15+i*12;
  if(type==="face")return 35;
  if(type==="sky")return 16+Math.floor(i/4)*22;
  return 15+Math.floor(i/5)*26;
}

function animate(img,s){
  if(img.dataset.done)return;
  img.dataset.done="true";

  if(s.action==="open"){
    img.src="assets/"+s.openImg;
    img.style.transform="scale(1.2)";
    return;
  }

  let x=0,y=0,r=Math.random()*80-40;

  if(s.action==="fly"){
    x=(Math.random()>.5?1:-1)*(window.innerWidth*.5);
    y=-(100+Math.random()*220);
  }
  if(s.action==="fall"){
    x=(Math.random()*160)-80;
    y=window.innerHeight*.4;
  }
  if(s.action==="starfall"){
    x=(Math.random()*180)-90;
    y=window.innerHeight*.45;
  }
  if(s.action==="drive"){
    x=window.innerWidth*.8;
  }
  if(s.action==="roll"){
    x=(Math.random()>.5?1:-1)*(window.innerWidth*.6);
    y=window.innerHeight*.25;
    r=720;
  }

  img.style.transform=`translate(${x}px,${y}px) rotate(${r}deg)`;

  if(["fly","drive","roll","starfall"].includes(s.action)){
    img.style.opacity=".15";
  }
}

function nextSlide(){
  current++;
  if(current>=slides.length){
    showFinal();
  }else{
    loadSlide();
  }
}

function showFinal(){
  document.getElementById("game").style.display="none";
  const final=document.getElementById("final");
  final.style.display="flex";

  for(let i=0;i<45;i++){
    const b=document.createElement("div");
    b.className="burst";
    b.textContent=["⭐","✨","🪙","🎆"][Math.floor(Math.random()*4)];
    b.style.left=Math.random()*100+"vw";
    b.style.top=Math.random()*100+"vh";
    b.style.animationDelay=Math.random()*1.2+"s";
    final.appendChild(b);
  }
}

/* Drawing box */
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
ctx.lineWidth=9;
ctx.lineCap="round";
ctx.strokeStyle="#333";
let drawing=false;

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;
  return{
    x:(p.clientX-r.left)*(canvas.width/r.width),
    y:(p.clientY-r.top)*(canvas.height/r.height)
  };
}
function startDraw(e){
  drawing=true;
  const p=getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}
function draw(e){
  if(!drawing)return;
  e.preventDefault();
  const p=getPos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}
function stopDraw(){drawing=false}
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height)}

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",startDraw,{passive:false});
canvas.addEventListener("touchmove",draw,{passive:false});
canvas.addEventListener("touchend",stopDraw);
</script>

</body>
</html>
