<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Names Ice Cream Game</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(#dff8ff,#fff5cf);
  color:#4b3b2f;
}

.screen{
  width:100vw;
  height:100vh;
  display:none;
}

.active{
  display:flex;
}

/* LOGO SCREEN */
#logoScreen{
  background:#ffffff;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:260px;
  max-width:75%;
}

/* GAME SCREEN */
#gameScreen{
  flex-direction:column;
}

/* SMALL HEADER */
.header{
  height:58px;
  width:100%;
  text-align:center;
  background:#fff1b8;
  border-bottom:3px solid #f2c86b;
  padding:3px 8px;
}

.header h1{
  margin:0;
  font-size:26px;
  line-height:1.1;
}

.header p{
  margin:1px 0 0;
  font-size:13px;
  line-height:1.1;
}

/* MAIN GAME AREA */
.gameArea{
  width:100%;
  height:calc(100vh - 58px);
  display:grid;
  grid-template-rows:26% 46% 26%;
  gap:1%;
  padding:8px 18px;
}

/* ANIMAL ROWS */
.row{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:14px;
}

.card{
  background:rgba(255,255,255,0.96);
  border:4px solid #f4c976;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px;
  cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,0.08);
  overflow:hidden;
}

.card img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.card.correct{
  background:#d9ffd7;
  border-color:#6fc06f;
  transform:scale(1.03);
}

.card.wrong{
  animation:wiggle .35s ease;
}

.card.glow{
  box-shadow:0 0 18px 7px #8fe58f;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

/* CART AREA */
.middleArea{
  width:100%;
  height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.cartWrap{
  position:absolute;
  width:430px;
  height:270px;
  left:-480px;
  opacity:0;
  z-index:5;
}

.cartWrap img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.cartNumber{
  position:absolute;
  top:43%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:78px;
  font-weight:bold;
  color:#2f7edb;
  text-shadow:4px 4px #ffffff;
}

.cartIn{
  animation:cartIn 3s ease forwards;
}

.cartCenter{
  left:50%;
  transform:translateX(-50%);
  opacity:1;
}

.cartOut{
  animation:cartOut 3s ease forwards;
}

@keyframes cartIn{
  from{
    left:-480px;
    opacity:0;
  }
  to{
    left:50%;
    transform:translateX(-50%);
    opacity:1;
  }
}

@keyframes cartOut{
  from{
    left:50%;
    transform:translateX(-50%);
    opacity:1;
  }
  to{
    left:115%;
    opacity:0;
  }
}

/* END SCREEN */
#endScreen{
  background:linear-gradient(#dff8ff,#fff5cf);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#endScreen h1{
  font-size:50px;
  margin-bottom:8px;
}

#endScreen p{
  font-size:26px;
}

button{
  font-size:24px;
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#f2c86b;
  color:#4b3b2f;
  font-weight:bold;
  cursor:pointer;
}

/* MOBILE / SMALL SCREENS */
@media(max-width:800px){

  .header{
    height:52px;
  }

  .header h1{
    font-size:20px;
  }

  .header p{
    font-size:11px;
  }

  .gameArea{
    height:calc(100vh - 52px);
    grid-template-rows:25% 48% 25%;
    padding:6px;
    gap:1%;
  }

  .row{
    gap:6px;
  }

  .card{
    border-radius:14px;
    border-width:3px;
    padding:3px;
  }

  .cartWrap{
    width:250px;
    height:165px;
  }

  .cartNumber{
    font-size:48px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">

  <div class="header">
    <h1>Number Names Ice Cream Game</h1>
    <p>Look at the number on the cart. Tap the matching animal board.</p>
  </div>

  <div class="gameArea">

    <div class="row" id="topRow"></div>

    <div class="middleArea">
      <div class="cartWrap" id="cartWrap">
        <img src="assets/icecream-cart.png" alt="Ice Cream Cart">
        <div class="cartNumber" id="cartNumber">1</div>
      </div>
    </div>

    <div class="row" id="bottomRow"></div>

  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You matched all number names.</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const numbers = [
  { number: 1, word: "one", image: "bear.png" },
  { number: 2, word: "two", image: "koala.png" },
  { number: 3, word: "three", image: "rabbit.png" },
  { number: 4, word: "four", image: "monkey.png" },
  { number: 5, word: "five", image: "penguin.png" },
  { number: 6, word: "six", image: "giraffe.png" },
  { number: 7, word: "seven", image: "duck.png" },
  { number: 8, word: "eight", image: "cat.png" },
  { number: 9, word: "nine", image: "tiger.png" },
  { number: 10, word: "ten", image: "deer.png" }
];

let questionOrder = [];
let currentIndex = 0;
let currentAnswer = null;
let wrongAttempts = 0;
let canClick = false;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");
const cartWrap = document.getElementById("cartWrap");
const cartNumber = document.getElementById("cartNumber");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(() => {
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  }, 5000);
};

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  currentIndex = 0;
  questionOrder = shuffle([...numbers]);
  renderAnimals();
  showQuestion();
}

function renderAnimals(){
  topRow.innerHTML = "";
  bottomRow.innerHTML = "";

  const shuffledCards = shuffle([...numbers]);

  shuffledCards.slice(0,5).forEach(item => {
    topRow.appendChild(createCard(item));
  });

  shuffledCards.slice(5,10).forEach(item => {
    bottomRow.appendChild(createCard(item));
  });
}

function createCard(item){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.word = item.word;

  card.innerHTML = `<img src="assets/${item.image}" alt="${item.word}">`;

  card.addEventListener("click", () => {
    checkAnswer(card,item.word);
  });

  return card;
}

function showQuestion(){
  if(currentIndex >= questionOrder.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    return;
  }

  canClick = false;
  wrongAttempts = 0;
  currentAnswer = questionOrder[currentIndex];

  document.querySelectorAll(".card").forEach(card => {
    card.classList.remove("correct","wrong","glow");
  });

  cartNumber.textContent = currentAnswer.number;
  cartWrap.className = "cartWrap cartIn";

  setTimeout(() => {
    cartWrap.className = "cartWrap cartCenter";
    canClick = true;
  }, 3000);
}

function checkAnswer(card, selectedWord){
  if(!canClick) return;

  if(selectedWord === currentAnswer.word){
    canClick = false;

    correctSound.currentTime = 0;
    clapSound.currentTime = 0;

    correctSound.play();
    clapSound.play();

    card.classList.add("correct");
    cartWrap.className = "cartWrap cartOut";

    setTimeout(() => {
      currentIndex++;
      showQuestion();
    }, 3200);

  }else{
    wrongAttempts++;

    wrongSound.currentTime = 0;
    wrongSound.play();

    card.classList.add("wrong");

    setTimeout(() => {
      card.classList.remove("wrong");
    }, 600);

    if(wrongAttempts >= 2){
      const correctCard = document.querySelector(`[data-word="${currentAnswer.word}"]`);
      if(correctCard){
        correctCard.classList.add("glow");
      }
    }
  }
}

function restartGame(){
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
