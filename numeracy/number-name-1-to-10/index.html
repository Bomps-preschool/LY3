<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Names Ice Cream Cart Game</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(#dff8ff,#fff5cf);
  color:#4b3b2f;
}

.screen{
  width:100vw;
  height:100vh;
  display:none;
}

.active{display:flex}

#logoScreen{
  background:white;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:280px;
  max-width:75%;
}

#gameScreen{
  flex-direction:column;
}

.header{
  width:100%;
  text-align:center;
  background:#fff1b8;
  border-bottom:4px solid #f2c86b;
  padding:8px 10px;
}

.header h1{
  margin:0;
  font-size:clamp(26px,4vw,42px);
}

.header p{
  margin:4px 0 0;
  font-size:clamp(16px,2vw,23px);
}

.gameArea{
  width:100%;
  height:calc(100vh - 95px);
  position:relative;
  padding:12px 20px;
}

.row{
  width:100%;
  height:32%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  position:relative;
  z-index:3;
}

.bottomRow{
  position:absolute;
  left:20px;
  right:20px;
  bottom:12px;
  width:calc(100% - 40px);
}

.card{
  background:rgba(255,255,255,0.92);
  border:4px solid #f4c976;
  border-radius:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
  cursor:pointer;
  box-shadow:0 6px 12px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.card.correct{
  background:#d9ffd7;
  border-color:#6fc06f;
  transform:scale(1.04);
}

.card.wrong{
  animation:wiggle .35s ease;
}

.card.glow{
  box-shadow:0 0 20px 8px #8fe58f;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

.cartArea{
  position:absolute;
  top:34%;
  left:0;
  width:100%;
  height:30%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.cartWrap{
  position:absolute;
  width:min(390px,32vw);
  height:min(300px,28vh);
  left:-420px;
  opacity:0;
}

.cartWrap img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.cartNumber{
  position:absolute;
  top:39%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(56px,6vw,92px);
  font-weight:bold;
  color:#4f86c6;
  text-shadow:3px 3px white;
}

.cartIn{
  animation:cartIn 3s ease forwards;
}

.cartCenter{
  left:50%;
  transform:translateX(-50%);
  opacity:1;
}

.cartOut{
  animation:cartOut 3s ease forwards;
}

@keyframes cartIn{
  from{left:-420px;opacity:0}
  to{left:50%;transform:translateX(-50%);opacity:1}
}

@keyframes cartOut{
  from{left:50%;transform:translateX(-50%);opacity:1}
  to{left:110%;opacity:0}
}

.message{
  position:absolute;
  left:50%;
  top:64%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.96);
  border:4px solid #f2c86b;
  border-radius:24px;
  padding:10px 28px;
  font-size:clamp(18px,2.2vw,28px);
  font-weight:bold;
  text-align:center;
  z-index:5;
}

#endScreen{
  background:linear-gradient(#dff8ff,#fff5cf);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#endScreen h1{
  font-size:54px;
  margin-bottom:8px;
}

#endScreen p{
  font-size:28px;
}

button{
  font-size:24px;
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#f2c86b;
  color:#4b3b2f;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:800px){
  .gameArea{padding:8px}
  .row{
    height:30%;
    gap:7px;
  }
  .bottomRow{
    left:8px;
    right:8px;
    width:calc(100% - 16px);
  }
  .card{
    border-radius:16px;
    border-width:3px;
    padding:4px;
  }
  .cartWrap{
    width:210px;
    height:170px;
  }
  .cartNumber{
    font-size:46px;
  }
  .message{
    top:65%;
    font-size:17px;
    padding:8px 14px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Number Names Ice Cream Game</h1>
    <p>Look at the number on the cart. Tap the matching animal board.</p>
  </div>

  <div class="gameArea">
    <div class="row" id="topRow"></div>

    <div class="cartArea">
      <div class="cartWrap" id="cartWrap">
        <img src="assets/icecream-cart.png" alt="Ice Cream Cart">
        <div class="cartNumber" id="cartNumber">1</div>
      </div>
    </div>

    <div class="message" id="message">Look at the cart!</div>

    <div class="row bottomRow" id="bottomRow"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You matched all number names.</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const numbers = [
  { number: 1, word: "one", image: "bear.png" },
  { number: 2, word: "two", image: "koala.png" },
  { number: 3, word: "three", image: "rabbit.png" },
  { number: 4, word: "four", image: "monkey.png" },
  { number: 5, word: "five", image: "penguin.png" },
  { number: 6, word: "six", image: "giraffe.png" },
  { number: 7, word: "seven", image: "duck.png" },
  { number: 8, word: "eight", image: "cat.png" },
  { number: 9, word: "nine", image: "tiger.png" },
  { number: 10, word: "ten", image: "deer.png" }
];

let questionOrder = [];
let currentIndex = 0;
let currentAnswer = null;
let wrongAttempts = 0;
let canClick = false;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");
const cartWrap = document.getElementById("cartWrap");
const cartNumber = document.getElementById("cartNumber");
const message = document.getElementById("message");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(() => {
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  }, 5000);
};

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  currentIndex = 0;
  questionOrder = shuffle([...numbers]);
  renderAnimals();
  showQuestion();
}

function renderAnimals(){
  topRow.innerHTML = "";
  bottomRow.innerHTML = "";

  const shuffledCards = shuffle([...numbers]);
  shuffledCards.slice(0,5).forEach(item => topRow.appendChild(createCard(item)));
  shuffledCards.slice(5,10).forEach(item => bottomRow.appendChild(createCard(item)));
}

function createCard(item){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.word = item.word;

  card.innerHTML = `<img src="assets/${item.image}" alt="${item.word}">`;

  card.addEventListener("click", () => checkAnswer(card, item.word));
  return card;
}

function showQuestion(){
  if(currentIndex >= questionOrder.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    return;
  }

  canClick = false;
  wrongAttempts = 0;
  currentAnswer = questionOrder[currentIndex];

  document.querySelectorAll(".card").forEach(card => {
    card.classList.remove("correct","wrong","glow");
  });

  cartNumber.textContent = currentAnswer.number;
  message.textContent = "Look at the cart!";

  cartWrap.className = "cartWrap cartIn";

  setTimeout(() => {
    cartWrap.className = "cartWrap cartCenter";
    canClick = true;
    message.textContent = "Tap the matching animal board!";
  }, 3000);
}

function checkAnswer(card, selectedWord){
  if(!canClick) return;

  if(selectedWord === currentAnswer.word){
    canClick = false;

    correctSound.currentTime = 0;
    clapSound.currentTime = 0;
    correctSound.play();
    clapSound.play();

    card.classList.add("correct");
    message.textContent = "Good job!";

    cartWrap.className = "cartWrap cartOut";

    setTimeout(() => {
      currentIndex++;
      showQuestion();
    }, 3200);

  } else {
    wrongAttempts++;

    wrongSound.currentTime = 0;
    wrongSound.play();

    card.classList.add("wrong");
    message.textContent = "Try again!";

    setTimeout(() => {
      card.classList.remove("wrong");
    }, 600);

    if(wrongAttempts >= 2){
      const correctCard = document.querySelector(`[data-word="${currentAnswer.word}"]`);
      if(correctCard) correctCard.classList.add("glow");
      message.textContent = "Look carefully and try again!";
    }
  }
}

function restartGame(){
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
