<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Names Ice Cream Game</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(#dff8ff,#fff5cf);
  color:#4b3b2f;
}

.screen{
  width:100vw;
  height:100vh;
  display:none;
}

.active{
  display:flex;
}

/* LOGO SCREEN */
#logoScreen{
  background:#ffffff;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:280px;
  max-width:75%;
}

/* GAME SCREEN */
#gameScreen{
  flex-direction:column;
}

/* SMALL HEADER */
.header{
  width:100%;
  text-align:center;
  background:#fff1b8;
  border-bottom:3px solid #f2c86b;
  padding:4px 8px;
  height:72px;
}

.header h1{
  margin:0;
  font-size:clamp(20px,2.8vw,32px);
  line-height:1.1;
}

.header p{
  margin:2px 0 0;
  font-size:clamp(11px,1.2vw,16px);
  line-height:1.2;
}

/* GAME AREA */
.gameArea{
  width:100%;
  height:calc(100vh - 72px);
  position:relative;
  padding:10px 20px;
}

/* ANIMAL ROWS */
.row{
  width:100%;
  height:22%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  position:relative;
  z-index:3;
}

.bottomRow{
  position:absolute;
  left:20px;
  right:20px;
  bottom:8px;
  width:calc(100% - 40px);
}

/* ANIMAL CARDS */
.card{
  background:rgba(255,255,255,0.92);
  border:4px solid #f4c976;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px;
  cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,0.08);
  transition:0.2s ease;
}

.card img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.card.correct{
  background:#d9ffd7;
  border-color:#6fc06f;
  transform:scale(1.03);
}

.card.wrong{
  animation:wiggle .35s ease;
}

.card.glow{
  box-shadow:0 0 18px 7px #8fe58f;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

/* ICE CREAM CART */
.cartArea{
  position:absolute;
  top:31%;
  left:0;
  width:100%;
  height:38%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:2;
}

.cartWrap{
  position:absolute;
  width:min(520px,40vw);
  height:min(390px,36vh);
  left:-560px;
  opacity:0;
}

.cartWrap img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.cartNumber{
  position:absolute;
  top:42%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(56px,6vw,96px);
  font-weight:bold;
  color:#4f86c6;
  text-shadow:3px 3px #ffffff;
}

.cartIn{
  animation:cartIn 3s ease forwards;
}

.cartCenter{
  left:50%;
  transform:translateX(-50%);
  opacity:1;
}

.cartOut{
  animation:cartOut 3s ease forwards;
}

@keyframes cartIn{
  from{
    left:-560px;
    opacity:0;
  }
  to{
    left:50%;
    transform:translateX(-50%);
    opacity:1;
  }
}

@keyframes cartOut{
  from{
    left:50%;
    transform:translateX(-50%);
    opacity:1;
  }
  to{
    left:110%;
    opacity:0;
  }
}

/* NO CENTER MESSAGE */
.message{
  display:none !important;
}

/* END SCREEN */
#endScreen{
  background:linear-gradient(#dff8ff,#fff5cf);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#endScreen h1{
  font-size:54px;
  margin-bottom:8px;
}

#endScreen p{
  font-size:28px;
}

button{
  font-size:24px;
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#f2c86b;
  color:#4b3b2f;
  font-weight:bold;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:800px){

  .header{
    height:62px;
    padding:4px 6px;
  }

  .header h1{
    font-size:20px;
  }

  .header p{
    font-size:11px;
  }

  .gameArea{
    height:calc(100vh - 62px);
    padding:8px;
  }

  .row{
    height:21%;
    gap:7px;
  }

  .bottomRow{
    left:8px;
    right:8px;
    width:calc(100% - 16px);
    bottom:6px;
  }

  .card{
    border-radius:15px;
    border-width:3px;
    padding:3px;
  }

  .cartArea{
    top:31%;
    height:38%;
  }

  .cartWrap{
    width:260px;
    height:200px;
  }

  .cartNumber{
    font-size:50px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">

  <div class="header">
    <h1>Number Names Ice Cream Game</h1>
    <p>Look at the number on the cart. Tap the matching animal board.</p>
  </div>

  <div class="gameArea">

    <div class="row" id="topRow"></div>

    <div class="cartArea">
      <div class="cartWrap" id="cartWrap">
        <img src="assets/icecream-cart.png" alt="Ice Cream Cart">
        <div class="cartNumber" id="cartNumber">1</div>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="row bottomRow" id="bottomRow"></div>

  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You matched all number names.</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const numbers = [
  { number: 1, word: "one", image: "bear.png" },
  { number: 2, word: "two", image: "koala.png" },
  { number: 3, word: "three", image: "rabbit.png" },
  { number: 4, word: "four", image: "monkey.png" },
  { number: 5, word: "five", image: "penguin.png" },
  { number: 6, word: "six", image: "giraffe.png" },
  { number: 7, word: "seven", image: "duck.png" },
  { number: 8, word: "eight", image: "cat.png" },
  { number: 9, word: "nine", image: "tiger.png" },
  { number: 10, word: "ten", image: "deer.png" }
];

let questionOrder = [];
let currentIndex = 0;
let currentAnswer = null;
let wrongAttempts = 0;
let canClick = false;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");
const cartWrap = document.getElementById("cartWrap");
const cartNumber = document.getElementById("cartNumber");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(() => {
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  }, 5000);
};

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  currentIndex = 0;
  questionOrder = shuffle([...numbers]);
  renderAnimals();
  showQuestion();
}

function renderAnimals(){
  topRow.innerHTML = "";
  bottomRow.innerHTML = "";

  const shuffledCards = shuffle([...numbers]);

  shuffledCards.slice(0,5).forEach(item => {
    topRow.appendChild(createCard(item));
  });

  shuffledCards.slice(5,10).forEach(item => {
    bottomRow.appendChild(createCard(item));
  });
}

function createCard(item){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.word = item.word;

  card.innerHTML = `<img src="assets/${item.image}" alt="${item.word}">`;

  card.addEventListener("click", () => {
    checkAnswer(card,item.word);
  });

  return card;
}

function showQuestion(){
  if(currentIndex >= questionOrder.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    return;
  }

  canClick = false;
  wrongAttempts = 0;
  currentAnswer = questionOrder[currentIndex];

  document.querySelectorAll(".card").forEach(card => {
    card.classList.remove("correct","wrong","glow");
  });

  cartNumber.textContent = currentAnswer.number;
  cartWrap.className = "cartWrap cartIn";

  setTimeout(() => {
    cartWrap.className = "cartWrap cartCenter";
    canClick = true;
  }, 3000);
}

function checkAnswer(card,selectedWord){
  if(!canClick) return;

  if(selectedWord === currentAnswer.word){
    canClick = false;

    correctSound.currentTime = 0;
    clapSound.currentTime = 0;

    correctSound.play();
    clapSound.play();

    card.classList.add("correct");
    cartWrap.className = "cartWrap cartOut";

    setTimeout(() => {
      currentIndex++;
      showQuestion();
    }, 3200);

  }else{
    wrongAttempts++;

    wrongSound.currentTime = 0;
    wrongSound.play();

    card.classList.add("wrong");

    setTimeout(() => {
      card.classList.remove("wrong");
    }, 600);

    if(wrongAttempts >= 2){
      const correctCard = document.querySelector(`[data-word="${currentAnswer.word}"]`);
      if(correctCard){
        correctCard.classList.add("glow");
      }
    }
  }
}

function restartGame(){
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
