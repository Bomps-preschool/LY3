<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Names Ice Cream Game</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(#dff8ff,#fff5cf);
  color:#4b3b2f;
}

.screen{
  width:100vw;
  height:100dvh;
  display:none;
}

.active{display:flex}

#logoScreen{
  background:white;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:min(280px,70vw);
}

#gameScreen{
  flex-direction:column;
}

.header{
  height:58px;
  width:100%;
  text-align:center;
  background:#fff1b8;
  border-bottom:3px solid #f2c86b;
  padding:3px 8px;
  flex-shrink:0;
}

.header h1{
  margin:0;
  font-size:clamp(18px,2.5vw,28px);
  line-height:1.1;
}

.header p{
  margin:1px 0 0;
  font-size:clamp(10px,1.2vw,14px);
  line-height:1.1;
}

.gameArea{
  width:100%;
  height:calc(100dvh - 58px);
  display:grid;
  grid-template-rows:25% 48% 25%;
  gap:1%;
  padding:8px 18px;
}

.row{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
}

.card{
  background:rgba(255,255,255,0.96);
  border:4px solid #f4c976;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px;
  cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,0.08);
  overflow:hidden;
  touch-action:manipulation;
}

.card img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.card.correct{
  background:#d9ffd7;
  border-color:#6fc06f;
  transform:scale(1.03);
}

.card.wrong{
  animation:wiggle .35s ease;
}

.card.glow{
  box-shadow:0 0 18px 7px #8fe58f;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

.middleArea{
  width:100%;
  height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.cartWrap{
  position:absolute;
  width:min(430px,42vw);
  height:min(270px,36vh);
  left:-520px;
  opacity:0;
  z-index:5;
}

.cartWrap img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.cartNumber{
  position:absolute;
  top:43%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(48px,6vw,82px);
  font-weight:bold;
  color:#2f7edb;
  text-shadow:4px 4px white;
}

.cartIn{
  animation:cartIn 3s ease forwards;
}

.cartCenter{
  left:50%;
  transform:translateX(-50%);
  opacity:1;
}

.cartOut{
  animation:cartOut 3s ease forwards;
}

@keyframes cartIn{
  from{left:-520px;opacity:0}
  to{left:50%;transform:translateX(-50%);opacity:1}
}

@keyframes cartOut{
  from{left:50%;transform:translateX(-50%);opacity:1}
  to{left:115%;opacity:0}
}

#endScreen{
  background:linear-gradient(#dff8ff,#fff5cf);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#endScreen h1{
  font-size:clamp(42px,7vw,76px);
  margin:0 0 10px;
  z-index:2;
}

#endScreen p{
  font-size:clamp(22px,3vw,34px);
  z-index:2;
}

button{
  font-size:clamp(20px,2.5vw,28px);
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#f2c86b;
  color:#4b3b2f;
  font-weight:bold;
  cursor:pointer;
  z-index:2;
}

.sparkle{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#ffd45c;
  animation:sparkleFall 2.8s linear forwards;
  pointer-events:none;
}

@keyframes sparkleFall{
  0%{transform:translateY(-20px) scale(1);opacity:1}
  100%{transform:translateY(110dvh) scale(.3);opacity:0}
}

@media(max-width:900px){
  .header{
    height:52px;
  }

  .gameArea{
    height:calc(100dvh - 52px);
    grid-template-rows:24% 50% 24%;
    padding:6px;
    gap:1%;
  }

  .row{
    gap:6px;
  }

  .card{
    border-radius:14px;
    border-width:3px;
    padding:3px;
  }

  .cartWrap{
    width:min(290px,50vw);
    height:min(190px,32vh);
  }

  .cartNumber{
    font-size:clamp(42px,8vw,58px);
  }
}

@media(max-width:600px) and (orientation:portrait){
  .header{
    height:62px;
  }

  .header h1{
    font-size:19px;
  }

  .header p{
    font-size:11px;
  }

  .gameArea{
    height:calc(100dvh - 62px);
    grid-template-rows:24% 48% 24%;
    padding:6px;
  }

  .row{
    gap:5px;
  }

  .cartWrap{
    width:78vw;
    height:34vh;
  }
}

@media(max-height:500px) and (orientation:landscape){
  .header{
    height:46px;
  }

  .header h1{
    font-size:20px;
  }

  .header p{
    font-size:11px;
  }

  .gameArea{
    height:calc(100dvh - 46px);
    grid-template-rows:24% 50% 24%;
    padding:5px 12px;
  }

  .cartWrap{
    width:300px;
    height:180px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Number Names Ice Cream Game</h1>
    <p>Look at the number on the cart. Tap the matching animal board.</p>
  </div>

  <div class="gameArea">
    <div class="row" id="topRow"></div>

    <div class="middleArea">
      <div class="cartWrap" id="cartWrap">
        <img src="assets/icecream-cart.png" alt="Ice Cream Cart">
        <div class="cartNumber" id="cartNumber">1</div>
      </div>
    </div>

    <div class="row" id="bottomRow"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You matched all number names.</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
const numbers = [
  { number: 1, word: "one", image: "bear.png" },
  { number: 2, word: "two", image: "koala.png" },
  { number: 3, word: "three", image: "rabbit.png" },
  { number: 4, word: "four", image: "monkey.png" },
  { number: 5, word: "five", image: "penguin.png" },
  { number: 6, word: "six", image: "giraffe.png" },
  { number: 7, word: "seven", image: "duck.png" },
  { number: 8, word: "eight", image: "cat.png" },
  { number: 9, word: "nine", image: "tiger.png" },
  { number: 10, word: "ten", image: "deer.png" }
];

let questionOrder = [];
let currentIndex = 0;
let currentAnswer = null;
let wrongAttempts = 0;
let canClick = false;
let sparkleTimer = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");
const cartWrap = document.getElementById("cartWrap");
const cartNumber = document.getElementById("cartNumber");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(() => {
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  }, 5000);
};

function playSound(sound){
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  stopSparkles();
  currentIndex = 0;
  questionOrder = shuffle([...numbers]);
  renderAnimals();
  showQuestion();
}

function renderAnimals(){
  topRow.innerHTML = "";
  bottomRow.innerHTML = "";

  const shuffledCards = shuffle([...numbers]);

  shuffledCards.slice(0,5).forEach(item => {
    topRow.appendChild(createCard(item));
  });

  shuffledCards.slice(5,10).forEach(item => {
    bottomRow.appendChild(createCard(item));
  });
}

function createCard(item){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.word = item.word;
  card.innerHTML = `<img src="assets/${item.image}" alt="${item.word}">`;

  card.addEventListener("click", () => {
    checkAnswer(card,item.word);
  });

  return card;
}

function showQuestion(){
  if(currentIndex >= questionOrder.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    startSparkles();
    return;
  }

  canClick = false;
  wrongAttempts = 0;
  currentAnswer = questionOrder[currentIndex];

  document.querySelectorAll(".card").forEach(card => {
    card.classList.remove("correct","wrong","glow");
  });

  cartNumber.textContent = currentAnswer.number;
  cartWrap.className = "cartWrap cartIn";

  setTimeout(() => {
    cartWrap.className = "cartWrap cartCenter";
    canClick = true;
  }, 3000);
}

function checkAnswer(card, selectedWord){
  if(!canClick) return;

  if(selectedWord === currentAnswer.word){
    canClick = false;

    playSound(correctSound);
    setTimeout(() => playSound(clapSound), 150);

    card.classList.add("correct");
    cartWrap.className = "cartWrap cartOut";

    setTimeout(() => {
      currentIndex++;
      showQuestion();
    }, 3200);

  } else {
    wrongAttempts++;
    playSound(wrongSound);

    card.classList.add("wrong");

    setTimeout(() => {
      card.classList.remove("wrong");
    }, 600);

    if(wrongAttempts >= 2){
      const correctCard = document.querySelector(`[data-word="${currentAnswer.word}"]`);
      if(correctCard){
        correctCard.classList.add("glow");
      }
    }
  }
}

function startSparkles(){
  stopSparkles();

  sparkleTimer = setInterval(() => {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = "-20px";
    sparkle.style.background = ["#ffd45c","#ffb6c1","#9ee7ff","#b8f7b0","#d9b3ff"][Math.floor(Math.random()*5)];
    sparkle.style.width = sparkle.style.height = (8 + Math.random()*10) + "px";
    endScreen.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 3000);
  }, 90);
}

function stopSparkles(){
  if(sparkleTimer){
    clearInterval(sparkleTimer);
    sparkleTimer = null;
  }

  document.querySelectorAll(".sparkle").forEach(s => s.remove());
}

function restartGame(){
  stopSparkles();
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
