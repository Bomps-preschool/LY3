<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Number Names Balloon Game</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: "Comic Sans MS", "Arial Rounded MT Bold", sans-serif;
  background: linear-gradient(#d8f6ff, #fff4cc);
  color: #4b3b2f;
}

.screen {
  width: 100vw;
  height: 100vh;
  display: none;
}

.active {
  display: flex;
}

/* Logo Screen */
#logoScreen {
  background: #ffffff;
  align-items: center;
  justify-content: center;
}

#logoScreen img {
  width: 280px;
  max-width: 75%;
}

/* Game Screen */
#gameScreen {
  flex-direction: column;
  position: relative;
}

.header {
  width: 100%;
  text-align: center;
  background: #fff1b8;
  border-bottom: 4px solid #f2c86b;
  padding: 8px 10px;
  z-index: 10;
}

.header h1 {
  margin: 0;
  font-size: clamp(26px, 4vw, 44px);
}

.header p {
  margin: 4px 0 0;
  font-size: clamp(16px, 2vw, 24px);
}

.gameArea {
  height: calc(100vh - 95px);
  width: 100%;
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
}

/* Left and Right Animal Columns */
.sideGrid {
  width: 27%;
  height: 100%;
  display: grid;
  grid-template-rows: repeat(5, 1fr);
  gap: 10px;
  z-index: 5;
}

.card {
  background: rgba(255, 255, 255, 0.92);
  border: 4px solid #f4c976;
  border-radius: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 6px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.08);
  transition: transform 0.2s ease, background 0.2s ease;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.card.correct {
  background: #d9ffd7;
  border-color: #6fc06f;
  transform: scale(1.04);
}

.card.wrong {
  animation: wiggle 0.35s ease;
}

.card.glow {
  box-shadow: 0 0 20px 8px #8fe58f;
}

@keyframes wiggle {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Center Balloon Area */
.centerArea {
  width: 42%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.balloonWrap {
  position: absolute;
  width: min(330px, 70%);
  height: min(470px, 82%);
  left: 50%;
  bottom: -520px;
  transform: translateX(-50%);
  opacity: 0;
  pointer-events: none;
}

.balloonWrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.balloonNumber {
  position: absolute;
  top: 24%;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(58px, 8vw, 96px);
  font-weight: bold;
  color: #4f86c6;
  text-shadow: 3px 3px #ffffff;
}

.floatIn {
  animation: floatIn 3s ease forwards;
}

.holdCenter {
  bottom: 20%;
  opacity: 1;
  animation: gentleFloat 4s ease-in-out infinite;
}

.floatOut {
  animation: floatOut 3s ease forwards;
}

@keyframes floatIn {
  from {
    bottom: -520px;
    opacity: 0;
  }
  to {
    bottom: 20%;
    opacity: 1;
  }
}

@keyframes floatOut {
  from {
    bottom: 20%;
    opacity: 1;
  }
  to {
    bottom: 110%;
    opacity: 0;
  }
}

@keyframes gentleFloat {
  0% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
  100% { transform: translateX(-50%) translateY(0); }
}

.message {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96);
  border: 4px solid #f2c86b;
  border-radius: 24px;
  padding: 10px 26px;
  font-size: clamp(18px, 2.2vw, 28px);
  font-weight: bold;
  text-align: center;
  z-index: 20;
}

/* End Screen */
#endScreen {
  background: linear-gradient(#d8f6ff, #fff4cc);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

#endScreen h1 {
  font-size: 54px;
  margin-bottom: 8px;
}

#endScreen p {
  font-size: 28px;
}

button {
  font-size: 24px;
  padding: 14px 34px;
  border: none;
  border-radius: 18px;
  background: #f2c86b;
  color: #4b3b2f;
  font-weight: bold;
  cursor: pointer;
}

/* Mobile and Tablet */
@media (max-width: 900px) {
  .gameArea {
    padding: 8px;
  }

  .sideGrid {
    width: 30%;
    gap: 7px;
  }

  .centerArea {
    width: 36%;
  }

  .card {
    border-radius: 18px;
    padding: 4px;
  }

  .balloonWrap {
    width: 170px;
    height: 250px;
  }

  .balloonNumber {
    top: 23%;
    font-size: 48px;
  }

  .message {
    bottom: 6px;
    font-size: 17px;
    padding: 8px 14px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Number Names Balloon Game</h1>
    <p>Look at the number on the balloon. Tap the matching animal board.</p>
  </div>

  <div class="gameArea">
    <div class="sideGrid" id="leftGrid"></div>

    <div class="centerArea">
      <div class="balloonWrap" id="balloonWrap">
        <img src="assets/balloon.png" alt="Balloon">
        <div class="balloonNumber" id="balloonNumber">1</div>
      </div>
    </div>

    <div class="sideGrid" id="rightGrid"></div>

    <div class="message" id="message">Look at the balloon!</div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You matched all number names.</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clap.mp3"></audio>

<script>
const numbers = [
  { number: 1, word: "one", image: "one.png" },
  { number: 2, word: "two", image: "two.png" },
  { number: 3, word: "three", image: "three.png" },
  { number: 4, word: "four", image: "four.png" },
  { number: 5, word: "five", image: "five.png" },
  { number: 6, word: "six", image: "six.png" },
  { number: 7, word: "seven", image: "seven.png" },
  { number: 8, word: "eight", image: "eight.png" },
  { number: 9, word: "nine", image: "nine.png" },
  { number: 10, word: "ten", image: "ten.png" }
];

let questionOrder = [];
let currentIndex = 0;
let currentAnswer = null;
let wrongAttempts = 0;
let canClick = false;
let hintTimer = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const leftGrid = document.getElementById("leftGrid");
const rightGrid = document.getElementById("rightGrid");
const balloonWrap = document.getElementById("balloonWrap");
const balloonNumber = document.getElementById("balloonNumber");
const message = document.getElementById("message");

const rightSound = document.getElementById("rightSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function () {
  setTimeout(() => {
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  }, 5000);
};

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame() {
  currentIndex = 0;
  questionOrder = shuffle([...numbers]);
  renderAnimals();
  showQuestion();
}

function renderAnimals() {
  leftGrid.innerHTML = "";
  rightGrid.innerHTML = "";

  const shuffledCards = shuffle([...numbers]);
  const leftCards = shuffledCards.slice(0, 5);
  const rightCards = shuffledCards.slice(5, 10);

  leftCards.forEach(item => {
    leftGrid.appendChild(createCard(item));
  });

  rightCards.forEach(item => {
    rightGrid.appendChild(createCard(item));
  });
}

function createCard(item) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.word = item.word;

  card.innerHTML = `
    <img src="assets/${item.image}" alt="${item.word}">
  `;

  card.addEventListener("click", () => checkAnswer(card, item.word));
  return card;
}

function showQuestion() {
  clearTimeout(hintTimer);

  if (currentIndex >= questionOrder.length) {
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    return;
  }

  canClick = false;
  wrongAttempts = 0;
  currentAnswer = questionOrder[currentIndex];

  document.querySelectorAll(".card").forEach(card => {
    card.classList.remove("correct", "wrong", "glow");
  });

  balloonNumber.textContent = currentAnswer.number;
  message.textContent = "Look at the balloon!";

  balloonWrap.className = "balloonWrap floatIn";

  setTimeout(() => {
    balloonWrap.className = "balloonWrap holdCenter";
    canClick = true;
    message.textContent = "Tap the matching animal board!";

    hintTimer = setTimeout(() => {
      if (canClick) {
        message.textContent = "The balloon is waiting. Tap the answer!";
      }
    }, 10000);

  }, 3000);
}

function checkAnswer(card, selectedWord) {
  if (!canClick) return;

  if (selectedWord === currentAnswer.word) {
    canClick = false;
    clearTimeout(hintTimer);

    rightSound.currentTime = 0;
    clapSound.currentTime = 0;

    rightSound.play();
    clapSound.play();

    card.classList.add("correct");
    message.textContent = "Good job!";

    balloonWrap.className = "balloonWrap floatOut";

    setTimeout(() => {
      currentIndex++;
      showQuestion();
    }, 3200);

  } else {
    wrongAttempts++;

    wrongSound.currentTime = 0;
    wrongSound.play();

    card.classList.add("wrong");
    message.textContent = "Try again!";

    setTimeout(() => {
      card.classList.remove("wrong");
    }, 600);

    if (wrongAttempts >= 2) {
      const correctCard = document.querySelector(`[data-word="${currentAnswer.word}"]`);
      if (correctCard) {
        correctCard.classList.add("glow");
      }
      message.textContent = "Look carefully and try again!";
    }
  }
}

function restartGame() {
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
