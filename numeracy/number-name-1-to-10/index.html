<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Express Station - 3 Bogeys</title>
<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000;
}

/* SPLASH */
#splash{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:white;
  display:flex;justify-content:center;align-items:center;
  z-index:999;
}

/* INSTRUCTIONS */
#instructions{
  display:none;
  position:absolute;
  top:0;width:100%;
  background:#fff3cd;
  padding:12px;
  font-weight:bold;
  text-align:center;
  z-index:10;
}

/* GAME AREA */
#game{
  display:none;
  width:100%;
  height:100vh;
  background:url('assets/background.png') center/cover no-repeat;
  position:relative;
}

/* SCORE */
#score{
  position:absolute;top:5%;left:2%;
  background:white;padding:10px;border-radius:10px;font-weight:bold;
}

/* STAR BOARD */
#starBoard{
  position:absolute;top:5%;right:2%;
  background:white;padding:10px;border-radius:10px;
}

/* TRAIN */
#train{
  position:absolute;
  bottom:15%;
  width:90%;
  left:-100%;
  transition:1.5s ease;
}

#train img{
  width:100%;
  height:auto;
}

/* TICKET */
#ticket{
  position:absolute;
  bottom:40%;
  left:50%;
  transform:translateX(-50%);
  width:calc(25vw);
  max-width:300px;
  min-height:140px;
  background:url('assets/ticket.png') center/cover no-repeat;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  padding:20px;
  font-weight:bold;
  font-size:2vw;
  cursor:pointer;
  z-index:5;
  user-select:none;
  touch-action: none; /* ✅ improve touch */
}

/* FEEDBACK */
#msg{
  position:absolute;
  top:15%;
  width:100%;
  text-align:center;
  font-size:clamp(18px,3vw,28px);
  font-weight:bold;
  color:black;
}

/* CORRECT/WRONG ANIMATIONS */
.glow{box-shadow:0 0 15px gold;}
.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovinelogo.png" style="width:300px;">
</div>

<!-- INSTRUCTIONS -->
<div id="instructions">
🚂 Sentence Express Station: Drag the ticket to the correct bogey (Statement, Question, Exclamation)!
</div>

<!-- GAME -->
<div id="game">
<div id="score">Score: 0</div>
<div id="starBoard">⭐⭐⭐</div>
<div id="msg"></div>

<div id="train">
  <img src="assets/train-3bogeys.png" alt="Train with 3 bogeys">
</div>

<div id="ticket"></div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="whistle" src="assets/whistle.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>
// SENTENCES
const sentences = [
{type:"statement",text:"The giraffee is a tall animal."},
{type:"statement",text:"My brother plays football every evening."},
{type:"statement",text:"We visited the zoo yesterday."},
{type:"statement",text:"The flowers are blooming in the garden."},
{type:"statement",text:"I enjoy reading storybooks."},
{type:"question",text:"When is your birthday?"},
{type:"question",text:"Why is the sky blue?"},
{type:"question",text:"Can you help me?"},
{type:"question",text:"Why are you laughing?"},
{type:"question",text:"Did you finish your homework?"},
{type:"exclamation",text:"What a beautiful rainbow!"},
{type:"exclamation",text:"Hurray! We won the match!"},
{type:"exclamation",text:"Wow! This cake is delicious!"},
{type:"exclamation",text:"Oh no! I lost my pencil!"},
{type:"exclamation",text:"What an amazing performance!"}
];

let index=0;
let attempts=0;
let currentSentence = null;

const ticket=document.getElementById("ticket");
const train=document.getElementById("train");
const msg=document.getElementById("msg");
const scoreEl=document.getElementById("score");
let score=0;

// SPLASH SCREEN
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("instructions").style.display="block";
  document.getElementById("game").style.display="block";
  startRound();
},5000);

// START ROUND
function startRound(){
  attempts=0;
  const remaining = sentences.slice();
  currentSentence = remaining[index % remaining.length];
  ticket.innerText = currentSentence.text;
  msg.innerText = "";
  ticket.style.left="50%";
  ticket.style.top="40%";

  // Train arrives
  train.style.left="5%";
  setTimeout(()=>{train.style.left="50%";},100);
}

// DRAG TICKET (TOUCH-FRIENDLY FIX)
let dragging=false;

function dragStart(e){
  e.preventDefault();
  dragging=true;
  document.addEventListener("mousemove",dragMove);
  document.addEventListener("mouseup",dragEnd);
  document.addEventListener("touchmove",dragMove,{passive:false});
  document.addEventListener("touchend",dragEnd);
}

function dragMove(e){
  if(!dragging) return;
  let x = e.touches ? e.touches[0].clientX : e.clientX;
  let y = e.touches ? e.touches[0].clientY : e.clientY;
  ticket.style.left=(x-ticket.offsetWidth/2)+"px";
  ticket.style.top=(y-ticket.offsetHeight/2)+"px";
}

function dragEnd(e){
  dragging=false;
  document.removeEventListener("mousemove",dragMove);
  document.removeEventListener("mouseup",dragEnd);
  document.removeEventListener("touchmove",dragMove);
  document.removeEventListener("touchend",dragEnd);
  checkDrop();
}

ticket.addEventListener("mousedown",dragStart);
ticket.addEventListener("touchstart",dragStart,{passive:false});

// CHECK DROP LOGIC
function checkDrop(){
  const ticketRect = ticket.getBoundingClientRect();
  const trainRect = train.getBoundingClientRect();
  const bogeyWidth = trainRect.width/3;

  let droppedType = null;

  if(ticketRect.left + ticketRect.width/2 < trainRect.left + bogeyWidth){
    droppedType="statement";
  }else if(ticketRect.left + ticketRect.width/2 < trainRect.left + 2*bogeyWidth){
    droppedType="question";
  }else{
    droppedType="exclamation";
  }

  if(droppedType===currentSentence.type){
    document.getElementById("correct").play();
    document.getElementById("whistle").play();
    document.getElementById("clap").play();
    score++;
    scoreEl.innerText="Score: "+score;
    train.style.left="105%";
    setTimeout(()=>{index++; startRound(); train.style.left="-100%";},1000);
  }else{
    document.getElementById("wrong").play();
    attempts++;
    msg.innerText="Try Again!";
    if(attempts>=2){
      msg.innerText="Correct: "+currentSentence.type.toUpperCase();
    }
    ticket.style.left="50%";
    ticket.style.top="40%";
  }
}
</script>
</body>
</html>
