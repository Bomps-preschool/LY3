<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Names 1–10</title>
<style>
body {
  margin:0;
  font-family:'Comic Sans MS', sans-serif;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ffe0b2,#ffccbc,#fff9c4);
  height:100vh;
}

#logoScreen, #gameScreen, #winScreen {
  width:100%;
  height:100vh;
  position:absolute;
  top:0; left:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#logoScreen img { width:40vw; max-width:300px; }

#gameScreen {
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  padding:1vh 2vw;
  box-sizing:border-box;
  position:relative;
}

#instruction {
  margin-top:1vh;
  width:90%;
  text-align:center;
  font-size:2vw;
  max-font-size:22px;
  font-weight:bold;
  color:#003366;
  text-shadow:1px 1px 2px #fff;
  z-index:10;
}

/* Object display */
#objectsContainer {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1vw;
  margin-top:3vh;
  max-width:95vw;
}
.object {
  width:100px;
  height:100px;
}

/* Options buttons */
.options {
  display:flex;
  justify-content:center;
  gap:2vw;
  flex-wrap:wrap;
  margin-top:2vh;
}
.optionBtn {
  padding:1vh 2vw;
  font-size:4vw;
  max-font-size:28px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background-color:#ffcc80;
}
.optionBtn:hover { background-color:#ffb74d; }

/* Win Screen */
#winScreen {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: rgba(255,255,255,0.9);
  z-index: 10;
  height:100vh;
}
#winScreen h1 {
  font-size:7vw;
  max-font-size:48px;
  color:#28a745;
  margin-bottom:2vh;
}
#playAgainBtn {
  padding:2vh 4vw;
  font-size:4vw; max-font-size:24px;
  border:none;
  border-radius:10px;
  background-color:#4CAF50;
  color:white;
  cursor:pointer;
}
#playAgainBtn:hover {background-color:#45a049;}

/* Confetti */
.confetti {
  position:absolute;
  width:3vw; height:3vw;
  max-width:20px; max-height:20px;
  background-size:contain;
  z-index:20;
  animation: fall linear infinite;
}
@keyframes fall {
  0% { transform: translate(0,0) rotate(0deg); opacity:1; }
  100% { transform: translate(var(--x,0vw),100vh) rotate(360deg); opacity:0; }
}

/* Responsive */
@media (max-width:480px) {
  .object { width:60px; height:60px; }
  .optionBtn { font-size:5vw; }
  #instruction { font-size:3vw; }
}
</style>
</head>
<body>

<!-- Logo Slide -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="instruction">Count the objects and tap the correct number name!</div>
  <div id="objectsContainer"></div>
  <div class="options" id="optionsContainer"></div>
</div>

<!-- Win Screen -->
<div id="winScreen">
  <h1>🎉 Congratulations! 🎉</h1>
  <button id="playAgainBtn">Play Again</button>
</div>

<!-- Audio -->
<audio id="correctAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>
<audio id="clapAudio" src="assets/claps.mp3"></audio>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const winScreen = document.getElementById('winScreen');
const objectsContainer = document.getElementById('objectsContainer');
const optionsContainer = document.getElementById('optionsContainer');
const playAgainBtn = document.getElementById('playAgainBtn');
const correctAudio = document.getElementById('correctAudio');
const wrongAudio = document.getElementById('wrongAudio');
const clapAudio = document.getElementById('clapAudio');

const slides = [
  {img:'assets/bear.png', name:'One'},
  {img:'assets/cat.png', name:'Two'},
  {img:'assets/deer.png', name:'Three'},
  {img:'assets/duck.png', name:'Four'},
  {img:'assets/giraffe.png', name:'Five'},
  {img:'assets/koala.png', name:'Six'},
  {img:'assets/monkey.png', name:'Seven'},
  {img:'assets/penguin.png', name:'Eight'},
  {img:'assets/rabbit.png', name:'Nine'},
  {img:'assets/tiger.png', name:'Ten'},
];

let currentSlide = 0;

// Show splash
logoScreen.style.display='flex';
setTimeout(()=> {
  logoScreen.style.display='none';
  gameScreen.style.display='flex';
  showSlide(currentSlide);
},3000);

function showSlide(index){
  const slide = slides[index];
  objectsContainer.innerHTML='';
  optionsContainer.innerHTML='';

  // Show objects
  let imgEl = document.createElement('img');
  imgEl.src = slide.img;
  imgEl.classList.add('object');
  objectsContainer.appendChild(imgEl);

  // Options: correct + 2 random
  let options = [slide.name];
  while(options.length<3){
    let rand = slides[Math.floor(Math.random()*slides.length)].name;
    if(!options.includes(rand)) options.push(rand);
  }
  options.sort(()=>0.5-Math.random());

  options.forEach(opt=>{
    let btn = document.createElement('button');
    btn.classList.add('optionBtn');
    btn.textContent = opt;
    btn.onclick = ()=>{
      if(opt===slide.name){
        correctAudio.currentTime=0; correctAudio.play();
        clapAudio.currentTime=0; clapAudio.play();
        clapAudio.onended=()=>{
          currentSlide++;
          if(currentSlide<slides.length) showSlide(currentSlide);
          else showWinScreen();
        };
      } else {
        wrongAudio.currentTime=0; wrongAudio.play();
      }
    };
    optionsContainer.appendChild(btn);
  });
}

function showWinScreen(){
  gameScreen.style.display='none';
  winScreen.style.display='flex';
  clapAudio.currentTime=0; clapAudio.play();
}

playAgainBtn.onclick=()=>{
  currentSlide=0;
  winScreen.style.display='none';
  gameScreen.style.display='flex';
  showSlide(currentSlide);
};
</script>

</body>
</html>
