<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detective Ascending Order Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/detective-board.png") no-repeat center center fixed;
    background-size:cover;
    overflow:hidden;
}

/* SCREEN */
.screen{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SPLASH */
#splash{
    background:white;
    display:flex;
}

/* GAME */
#game{
    text-align:center;
}

/* TITLE */
h1{
    color:#3b2f2f;
}

/* INSTRUCTION */
#instruction{
    font-size:22px;
    margin:10px;
}

/* BOARD */
.board{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

/* CARD */
.card{
    width:140px;
    height:140px;
    background:#fffdf5;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    transition:0.2s;
}

/* EFFECTS */
.correct{
    background:#c8f7c5 !important;
    box-shadow:0 0 15px #2ecc71;
    transform:scale(1.05);
}

.wrong{
    animation:shake 0.3s;
    background:#ffb3b3 !important;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

/* BUTTON */
button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game" class="screen">

<h1>🕵️ Detective Number Mission</h1>
<div id="instruction">Tap numbers in ascending order</div>

<div class="board" id="board"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <h1>🎉 Case Solved!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* 🔢 5 SETS OF NUMBERS */
const sets = [
    [2,5,3],
    [9,4,1],
    [6,1,8],
    [3,7,6],
    [5,7,2]
];

let setIndex = 0;
let currentIndex = 0;
let currentSet = [];

/* SHUFFLE */
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

/* LOAD GAME */
function loadGame(){

    let board = document.getElementById("board");
    board.innerHTML = "";

    currentSet = shuffle([...sets[setIndex]]);
    currentIndex = 0;

    currentSet.forEach(num=>{
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = num;

        div.onclick = ()=>check(num, div);

        board.appendChild(div);
    });
}

/* CHECK */
function check(num, element){

    let sorted = [...currentSet].sort((a,b)=>a-b);

    if(num === sorted[currentIndex]){

        document.getElementById("correct").play();
        element.classList.add("correct");

        currentIndex++;

        if(currentIndex === sorted.length){

            document.getElementById("clap").play();

            setTimeout(()=>{

                /* 🎉 BIGGER CONFETTI */
                confetti({
                    particleCount:300,
                    spread:160,
                    origin:{y:0.6}
                });

                confetti({
                    particleCount:200,
                    spread:100,
                    origin:{x:0.2, y:0.6}
                });

                confetti({
                    particleCount:200,
                    spread:100,
                    origin:{x:0.8, y:0.6}
                });

                setIndex++;

                if(setIndex < sets.length){
                    setTimeout(loadGame, 1200);
                } else {
                    document.getElementById("game").style.display="none";
                    document.getElementById("end").style.display="flex";
                }

            },500);
        }

    } else {
        document.getElementById("wrong").play();
        element.classList.add("wrong");

        setTimeout(()=>{
            element.classList.remove("wrong");
        },400);
    }
}

/* RESTART */
function restart(){
    setIndex = 0;
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="flex";
    loadGame();
}

/* START */
window.onload = ()=>{

    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("game").style.display="flex";
        loadGame();
    },5000);

};

</script>

</body>
</html>
