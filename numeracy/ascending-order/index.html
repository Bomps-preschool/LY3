<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detective Number Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/detective-board.png") no-repeat center center fixed;
    background-size:cover;
    overflow:hidden;
}

/* TIMER (ONLY GAME SCREEN) */
#timer{
    position:absolute;
    top:15px;
    right:20px;
    font-size:22px;
    background:white;
    padding:8px 15px;
    border-radius:10px;
    display:none;
}

/* SCREEN SYSTEM */
.screen{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SPLASH */
#splash{
    background:white;
    display:flex;
}

/* GAME */
#game{
    text-align:center;
}

/* BOARD */
.board{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

/* CARD */
.card{
    width:140px;
    height:140px;
    background:#fffdf5;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

/* BUTTON */
button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- TIMER (ONLY GAME SCREEN) -->
<div id="timer">⏱ 10</div>

<!-- SPLASH -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game" class="screen">

<h1>🕵️ Detective Number Mission</h1>
<div id="instruction">Tap numbers in ascending order</div>

<div class="board" id="board"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <h1>🎉 Case Solved!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* SETS */
const sets = [
    [2,5,3],
    [9,4,1],
    [6,1,8],
    [3,7,6],
    [5,7,2]
];

let setIndex = 0;
let currentIndex = 0;
let currentSet = [];

let timer;
let timeLeft = 10;
let chances = 0;

/* SHUFFLE */
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

/* TIMER */
function startTimer(){

    clearInterval(timer);
    timeLeft = 10;

    document.getElementById("timer").style.display = "block";
    document.getElementById("timer").innerText = "⏱ " + timeLeft;

    timer = setInterval(()=>{

        timeLeft--;
        document.getElementById("timer").innerText = "⏱ " + timeLeft;

        if(timeLeft <= 0){
            handleTimeout();
        }

    },1000);
}

/* TIMEOUT LOGIC (EXACT 2 CHANCES RULE) */
function handleTimeout(){

    clearInterval(timer);
    document.getElementById("wrong").play();

    chances++;

    if(chances < 3){
        // repeat same set
        loadGame();
    } else {
        // move to next set
        chances = 0;
        nextSet();
    }
}

/* LOAD GAME */
function loadGame(){

    let board = document.getElementById("board");
    board.innerHTML = "";

    currentSet = shuffle([...sets[setIndex]]);
    currentIndex = 0;

    startTimer();

    currentSet.forEach(num=>{
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = num;

        div.onclick = ()=>check(num, div);

        board.appendChild(div);
    });
}

/* NEXT SET */
function nextSet(){

    setIndex++;

    if(setIndex >= sets.length){

        clearInterval(timer);

        confetti({
            particleCount:400,
            spread:180,
            origin:{y:0.6}
        });

        document.getElementById("game").style.display="none";
        document.getElementById("timer").style.display="none";
        document.getElementById("end").style.display="flex";

        document.getElementById("clap").play();

    } else {
        loadGame();
    }
}

/* CHECK */
function check(num, element){

    let sorted = [...currentSet].sort((a,b)=>a-b);

    if(num === sorted[currentIndex]){

        document.getElementById("correct").play();
        currentIndex++;

        if(currentIndex === sorted.length){
            clearInterval(timer);
            setTimeout(nextSet,500);
        }

    } else {
        document.getElementById("wrong").play();
    }
}

/* RESTART */
function restart(){
    setIndex = 0;
    chances = 0;
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="flex";
    loadGame();
}

/* START */
window.onload = ()=>{

    document.getElementById("timer").style.display = "none";

    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("game").style.display="flex";
        loadGame();
    },5000);

};

</script>

</body>
</html>
