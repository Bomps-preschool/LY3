<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detective Number Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/detective-board.png") no-repeat center center fixed;
    background-size:cover;
    overflow:hidden;
}

/* SCREENS */
.screen{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SPLASH */
#splash{
    background:white;
    display:flex;
}

/* GAME */
#game{
    text-align:center;
}

/* TITLE */
h1{
    color:#3b2f2f;
}

/* INSTRUCTION */
#instruction{
    font-size:22px;
    margin:10px;
    color:#333;
}

/* CLUE BOARD */
.board{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

/* CARD */
.card{
    width:150px;
    height:150px;
    background:#fffdf5;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    transition:0.2s;
}

.card img{
    width:70px;
}

/* EFFECTS */
.correct{
    background:#c8f7c5 !important;
    box-shadow:0 0 15px #2ecc71;
    transform:scale(1.05);
}

.wrong{
    animation:shake 0.3s;
    background:#ffb3b3 !important;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game" class="screen">

<h1>🕵️ Detective Number Mission</h1>
<div id="instruction">Tap clues in ascending order</div>

<div class="board" id="board"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <h1>🎉 Case Solved!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ORDER LOGIC */
const correctOrder = [1,2,5,8];
let currentIndex = 0;

/* CLUE DATA */
let clues = [
    {num:5, img:"assets/apple.png", label:"Apples"},
    {num:2, img:"assets/car.png", label:"Cars"},
    {num:8, img:"assets/teddy.png", label:"Teddies"},
    {num:1, img:"assets/banana.png", label:"Banana"}
];

/* SHUFFLE */
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

/* LOAD GAME */
function loadGame(){
    let board = document.getElementById("board");
    board.innerHTML = "";

    clues = shuffle(clues);

    clues.forEach(item=>{
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${item.img}">
            <div>${item.num} ${item.label}</div>
        `;

        div.onclick = ()=>check(item, div);

        board.appendChild(div);
    });
}

/* CHECK */
function check(item, element){

    if(item.num === correctOrder[currentIndex]){

        document.getElementById("correct").play();
        element.classList.add("correct");

        currentIndex++;

        if(currentIndex === correctOrder.length){

            document.getElementById("clap").play();

            setTimeout(()=>{
                confetti({
                    particleCount:200,
                    spread:120,
                    origin:{y:0.6}
                });

                document.getElementById("game").style.display="none";
                document.getElementById("end").style.display="flex";

            },800);
        }

    } else {
        document.getElementById("wrong").play();
        element.classList.add("wrong");

        setTimeout(()=>{
            element.classList.remove("wrong");
        },400);
    }
}

/* RESTART */
function restart(){
    currentIndex = 0;
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="flex";
    loadGame();
}

/* START FLOW */
window.onload = ()=>{

    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("game").style.display="flex";
        loadGame();
    },5000);

};

</script>

</body>
</html>
