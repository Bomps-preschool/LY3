<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Paint Mixing Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;background:linear-gradient(135deg,#f7e4ff,#ffe6f2,#dcfff4);color:#563b59;}

.screen{width:100vw;height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:flex-start;}
.active{display:flex;}

#logoScreen{background:white;align-items:center;justify-content:center;}
#logoScreen img{width:min(320px,70vw);}

#gameScreen{flex-direction:column;width:100%;align-items:center;}
.header{
  width:100%;
  padding:16px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:rgba(255,255,255,0.85);
  border-bottom:3px solid #caa8ff;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}
.header h1{font-size:clamp(22px,2.5vw,36px);line-height:1;}
.header p{font-size:clamp(12px,1.2vw,16px);line-height:1.3;margin-top:8px;}

.gameArea{
  flex:1;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
  gap:16px;
}

.message{
  font-size:12px;
  font-weight:bold;
  background:rgba(255,255,255,.88);
  border:2px solid #c9a7ff;
  border-radius:14px;
  padding:6px 16px;
  text-align:center;
  min-width:150px;
  max-width:320px;
}

.bucketLine{
  width:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:24px;
  padding:0 16px;
}

.bucketBox{
  width:min(35vw,300px);
  height:min(35vw,300px);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.bucketBox img{width:100%;height:100%;object-fit:contain;}

.plus,.equals{font-size:clamp(46px,5vw,78px);color:#755383;font-weight:bold;}

.emptyBucket{
  width:min(420px,32vw);
  height:min(360px,40vh);
  background:#fffdf7;
  border:7px solid #c9a7ff;
  border-radius:34px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 22px rgba(0,0,0,.12);
}

.paintArea{position:absolute;inset:0;overflow:hidden;border-radius:26px;}
.fillBottom,.fillTop{
  position:absolute;
  width:100%;
  left:0;
  transition:.5s;
  height:0%;
  bottom:0;
}

.bucketSmile{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:42px;
  z-index:5;
}

.optionsPanel{display:none;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap;}
.option{width:min(190px,24vw);height:130px;background:#fffaf5;border:4px solid #c9a7ff;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:8px;}
.circle{width:52px;height:52px;border-radius:50%;border:4px solid white;box-shadow:0 5px 12px rgba(0,0,0,.18);}
.optionName{font-size:clamp(18px,2.3vw,30px);font-weight:bold;}
.option.correct{background:#dfffd9;border-color:#77cf74;}
.option.wrong{animation:wiggle .35s ease;}
.option.glow{box-shadow:0 0 18px #98e7c7;}
@keyframes wiggle{0%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}}

/* Sparkles */
.sparkle{
  position:absolute;
  width:24px;
  height:24px;
  animation:sparkleFall 1.5s linear forwards;
}
@keyframes sparkleFall{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(100vh) scale(0.5);opacity:0;}
}

#endScreen{background:linear-gradient(135deg,#f7e4ff,#ffe6f2,#dcfff4);flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;}
#endScreen h1{font-size:clamp(48px,8vw,90px);}
#endScreen p{font-size:clamp(22px,3vw,36px);}
.playAgain{margin-top:18px;padding:14px 34px;font-size:clamp(20px,2vw,30px);border:none;border-radius:18px;background:#a8ecd1;color:#563b59;font-weight:bold;cursor:pointer;}

@media(max-width:900px){
  .bucketBox{width:70vw;height:70vw;}
  .emptyBucket{width:65vw;height:50vw;}
  .bucketLine{gap:16px;flex-wrap:wrap;}
  .message{font-size:10px;padding:3px 8px;min-width:120px;}
  .optionsPanel{gap:12px;flex-wrap:wrap;}
  .header{padding:12px 0;}
  .header p{margin-top:6px;}
}
</style>
</head>
<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Magic Paint Mixing Lab</h1>
    <p>Tap both paint buckets and see the new colour.</p>
  </div>

  <div class="gameArea">
    <div class="message" id="message">Tap the first paint bucket.</div>

    <div class="bucketLine">
      <div class="bucketBox" id="bucket1"></div>
      <div class="plus">+</div>
      <div class="bucketBox" id="bucket2"></div>
      <div class="equals">=</div>

      <div class="emptyBucket" id="emptyBucket">
        <div class="paintArea">
          <div class="fillBottom" id="fillBottom"></div>
          <div class="fillTop" id="fillTop"></div>
        </div>
        <div class="bucketSmile">😊</div>
      </div>
    </div>

    <div class="optionsPanel" id="optionsPanel"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You made all secondary colours!</p>
  <button class="playAgain" onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const questions=[
  {colours:["red","yellow"], answer:"orange"},
  {colours:["yellow","blue"], answer:"green"},
  {colours:["red","blue"], answer:"purple"}
];
const bucketImages={red:"red-bucket.png",yellow:"yellow-bucket.png",blue:"blue-bucket.png"};
const colourHex={red:"#ef3b45",yellow:"#f4e84a",blue:"#2385c7",orange:"#f7941e",green:"#35b85a",purple:"#713ca6"};

let currentIndex=0,currentQuestion,tapped=[],canTap=true,canAnswer=false,wrongAttempts=0;

const logoScreen=document.getElementById("logoScreen");
const gameScreen=document.getElementById("gameScreen");
const endScreen=document.getElementById("endScreen");
const bucket1=document.getElementById("bucket1");
const bucket2=document.getElementById("bucket2");
const fillBottom=document.getElementById("fillBottom");
const fillTop=document.getElementById("fillTop");
const optionsPanel=document.getElementById("optionsPanel");
const message=document.getElementById("message");
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

window.addEventListener("load",()=>{
  setTimeout(()=>{
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  },1500);
});

function playSound(s){s.pause();s.currentTime=0;s.play().catch(()=>{});}
function startGame(){currentIndex=0;showQuestion();}

function showQuestion(){
  if(currentIndex>=questions.length){showEndScreen();return;}
  currentQuestion=questions[currentIndex];tapped=[];canTap=true;canAnswer=false;wrongAttempts=0;
  fillBottom.style.height="0%"; fillTop.style.height="0%"; fillBottom.style.background=""; fillTop.style.background="";
  optionsPanel.style.display="none"; optionsPanel.innerHTML="";
  message.textContent="Tap the first paint bucket.";
  bucket1.innerHTML=`<img src="assets/${bucketImages[currentQuestion.colours[0]]}" alt="${currentQuestion.colours[0]} bucket">`;
  bucket2.innerHTML=`<img src="assets/${bucketImages[currentQuestion.colours[1]]}" alt="${currentQuestion.colours[1]} bucket">`;
  bucket1.onclick=()=>tapBucket(bucket1,currentQuestion.colours[0]);
  bucket2.onclick=()=>tapBucket(bucket2,currentQuestion.colours[1]);
}

function tapBucket(bucket,colour){
  if(!canTap||tapped.includes(colour)) return;
  tapped.push(colour); bucket.classList.add("tapGlow"); setTimeout(()=>bucket.classList.remove("tapGlow"),700);
  if(tapped.length===1){
    fillBottom.style.height="50%"; fillBottom.style.background=colourHex[colour];
    message.textContent="Tap the second paint bucket.";
  } else if(tapped.length===2){
    fillTop.style.height="50%"; fillTop.style.background=colourHex[colour];
    canTap=false; setTimeout(showOptions,500);
  }
}

function showOptions(){
  canAnswer=true; optionsPanel.style.display="flex";
  ["orange","green","purple"].sort(()=>Math.random()-0.5).forEach(c=>{
    const opt=document.createElement("div"); opt.className="option"; opt.dataset.answer=c;
    opt.innerHTML=`<div class="circle" style="background:${colourHex[c]}"></div><div class="optionName">${c}</div>`;
    opt.onclick=()=>checkAnswer(opt,c); optionsPanel.appendChild(opt);
  });
}

function checkAnswer(option,selected){
  if(!canAnswer) return;
  if(selected===currentQuestion.answer){
    canAnswer=false; playSound(correctSound); setTimeout(()=>playSound(clapSound),120);
    option.classList.add("correct"); message.textContent="Good job!";
    fillBottom.style.height="100%"; fillTop.style.height="100%";
    fillBottom.style.background=colourHex[currentQuestion.colours[0]];
    fillTop.style.background=colourHex[currentQuestion.colours[1]];
    showSparkles();
    setTimeout(()=>{currentIndex++;showQuestion();},1500);
  } else {
    wrongAttempts++; playSound(wrongSound); option.classList.add("wrong");
    setTimeout(()=>option.classList.remove("wrong"),400);
    if(wrongAttempts>=2){const copt=document.querySelector(`[data-answer="${currentQuestion.answer}"]`); if(copt)copt.classList.add("glow");}
  }
}

// Celebration sparkles
function showSparkles(){
  for(let i=0;i<25;i++){
    const sparkle=document.createElement("img");
    sparkle.src="assets/sparkle.png";
    sparkle.className="sparkle";
    sparkle.style.left=Math.random()*window.innerWidth+"px";
    sparkle.style.top="-30px";
    sparkle.style.width=20+Math.random()*20+"px";
    sparkle.style.height=20+Math.random()*20+"px";
    document.body.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),1500);
  }
}

function showEndScreen(){gameScreen.classList.remove("active"); endScreen.classList.add("active");}
function restartGame(){endScreen.classList.remove("active"); gameScreen.classList.add("active"); startGame();}
</script>
</body>
</html>
