<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Paint Mixing Lab</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(135deg,#ead8ff,#ffe0ea,#d9fff1);
  color:#51374d;
}

.screen{
  width:100vw;
  height:100dvh;
  display:none;
}

.active{
  display:flex;
}

/* LOGO SCREEN */
#logoScreen{
  background:#ffffff;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:min(280px,70vw);
}

/* GAME SCREEN */
#gameScreen{
  flex-direction:column;
}

/* HEADER */
.header{
  height:64px;
  background:#fff1df;
  border-bottom:4px solid #d1b1ff;
  text-align:center;
  padding:4px 10px;
  flex-shrink:0;
}

.header h1{
  margin:0;
  font-size:clamp(22px,3vw,34px);
}

.header p{
  margin:2px 0 0;
  font-size:clamp(12px,1.5vw,16px);
}

/* MAIN AREA */
.gameArea{
  height:calc(100dvh - 64px);
  display:grid;
  grid-template-columns:28% 44% 28%;
  gap:12px;
  padding:12px;
}

/* PANELS */
.leftPanel,
.rightPanel{
  background:rgba(255,255,255,0.76);
  border:4px solid #d1b1ff;
  border-radius:28px;
  padding:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.questionText,
.optionsTitle{
  font-size:clamp(18px,2vw,26px);
  font-weight:bold;
  text-align:center;
  margin-bottom:12px;
}

/* BUCKETS */
.bucketRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}

.bucketImg{
  width:min(150px,11vw);
  height:min(150px,20vh);
  object-fit:contain;
}

.plus{
  font-size:44px;
  font-weight:bold;
  color:#6c4d75;
}

/* CENTER */
.centerPanel{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

.bowlBox{
  width:min(430px,90%);
  height:min(360px,50vh);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bowl{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* BOWL GLOW */
.bowlGlow{
  animation:bowlGlow 1.3s ease;
}

@keyframes bowlGlow{
  0%{
    filter:drop-shadow(0 0 0px #ffffff);
  }

  50%{
    filter:drop-shadow(0 0 28px #fff6a5);
  }

  100%{
    filter:drop-shadow(0 0 0px #ffffff);
  }
}

/* MAGIC WAND */
.wand{
  position:absolute;
  width:120px;
  right:2%;
  top:2%;
  transform:rotate(-25deg);
  z-index:10;
}

.wandMove{
  animation:wandTap .8s ease;
}

@keyframes wandTap{
  0%{
    transform:rotate(-25deg) translateY(0);
  }

  50%{
    transform:rotate(-8deg) translateY(35px);
  }

  100%{
    transform:rotate(-25deg) translateY(0);
  }
}

/* BUBBLES */
.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.92);
  pointer-events:none;
  animation:bubbleUp 1.3s linear forwards;
}

@keyframes bubbleUp{
  0%{
    transform:translateY(30px) scale(.4);
    opacity:0;
  }

  20%{
    opacity:1;
  }

  100%{
    transform:translateY(-130px) scale(1.2);
    opacity:0;
  }
}

/* MIX BUTTON */
.mixButton{
  margin-top:10px;
  border:none;
  background:#a7ecd0;
  color:#51374d;
  border-radius:24px;
  padding:12px 36px;
  font-size:clamp(20px,2vw,28px);
  font-weight:bold;
  border:4px solid #75ceb1;
  cursor:pointer;
}

.mixButton:disabled{
  opacity:.55;
}

/* OPTIONS */
.optionGrid{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.option{
  background:#fffaf5;
  border:4px solid #d1b1ff;
  border-radius:22px;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  font-size:clamp(18px,2vw,26px);
  font-weight:bold;
  cursor:pointer;
}

.colourCircle{
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid white;
  box-shadow:0 5px 10px rgba(0,0,0,.14);
}

.option.correct{
  background:#d9ffd8;
  border-color:#7ecf7a;
}

.option.wrong{
  animation:wiggle .35s ease;
}

.option.glow{
  box-shadow:0 0 18px 6px #9be7c9;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

/* END SCREEN */
#endScreen{
  background:linear-gradient(135deg,#ead8ff,#ffe0ea,#d9fff1);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#endScreen h1{
  font-size:clamp(42px,7vw,78px);
  margin:0 0 10px;
  z-index:2;
}

#endScreen p{
  font-size:clamp(22px,3vw,34px);
  z-index:2;
}

.playAgain{
  font-size:clamp(20px,2.5vw,28px);
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#a7ecd0;
  color:#51374d;
  font-weight:bold;
  cursor:pointer;
  z-index:2;
}

/* SPARKLES */
.sparkle{
  position:absolute;
  width:32px;
  height:32px;
  pointer-events:none;
  animation:sparkleFall 3s linear forwards;
}

@keyframes sparkleFall{
  0%{
    transform:translateY(-30px) scale(1);
    opacity:1;
  }

  100%{
    transform:translateY(110dvh) scale(.4);
    opacity:0;
  }
}

/* RESPONSIVE */
@media(max-width:900px){

  .header{
    height:58px;
  }

  .gameArea{
    height:calc(100dvh - 58px);
    grid-template-columns:1fr;
    grid-template-rows:25% 42% 31%;
    padding:8px;
  }

  .bucketImg{
    width:82px;
    height:82px;
  }

  .plus{
    font-size:30px;
  }

  .wand{
    width:80px;
  }

  .optionGrid{
    flex-direction:row;
    justify-content:center;
    gap:8px;
  }

  .option{
    flex-direction:column;
    width:32%;
    padding:7px;
  }

  .colourCircle{
    width:42px;
    height:42px;
  }
}

@media(max-width:600px) and (orientation:portrait){

  .header h1{
    font-size:19px;
  }

  .header p{
    font-size:11px;
  }

  .bucketImg{
    width:68px;
    height:68px;
  }

  .mixButton{
    padding:9px 24px;
  }
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

  <div class="header">
    <h1>Magic Paint Mixing Lab</h1>
    <p>Mix the colours and tap the correct new colour.</p>
  </div>

  <div class="gameArea">

    <!-- LEFT -->
    <div class="leftPanel">
      <div class="questionText">Mix these colours</div>
      <div class="bucketRow" id="bucketRow"></div>
    </div>

    <!-- CENTER -->
    <div class="centerPanel">

      <div class="bowlBox" id="bowlBox">

        <img class="bowl" src="assets/mixing-bowl.png" alt="Mixing Bowl">

        <img class="wand" id="wand"
        src="assets/magic-wand.png"
        alt="Magic Wand">

      </div>

      <button class="mixButton"
      id="mixButton"
      onclick="mixColours()">
      Mix
      </button>

    </div>

    <!-- RIGHT -->
    <div class="rightPanel">

      <div class="optionsTitle">
        Choose the new colour
      </div>

      <div class="optionGrid" id="optionGrid"></div>

    </div>

  </div>
</div>

<!-- END -->
<div id="endScreen" class="screen">

  <h1>Magic Colour Scientist!</h1>

  <p>You mixed all the colours.</p>

  <button class="playAgain" onclick="restartGame()">
    Play Again
  </button>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const questions = [
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["blue","red"], answer:"purple" },
  { colours:["yellow","red"], answer:"orange" },
  { colours:["blue","yellow"], answer:"green" },
  { colours:["red","blue"], answer:"purple" },
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["blue","red"], answer:"purple" },
  { colours:["red","blue"], answer:"purple" }
];

const bucketImages = {
  red:"red-bucket.png",
  yellow:"yellow-bucket.png",
  blue:"blue-bucket.png"
};

const colourHex = {
  orange:"#f7941e",
  green:"#35b85a",
  purple:"#713ca6"
};

let currentIndex = 0;
let currentQuestion = null;
let mixed = false;
let canAnswer = false;
let wrongAttempts = 0;
let sparkleTimer = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");

const bucketRow = document.getElementById("bucketRow");
const optionGrid = document.getElementById("optionGrid");

const bowlBox = document.getElementById("bowlBox");
const wand = document.getElementById("wand");
const mixButton = document.getElementById("mixButton");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = () => {

  setTimeout(() => {

    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");

    startGame();

  },5000);
};

function playSound(sound){
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function startGame(){

  currentIndex = 0;

  questions.sort(()=>Math.random()-0.5);

  showQuestion();
}

function showQuestion(){

  if(currentIndex >= questions.length){

    gameScreen.classList.remove("active");
    endScreen.classList.add("active");

    startSparkles();

    return;
  }

  currentQuestion = questions[currentIndex];

  mixed = false;
  canAnswer = false;
  wrongAttempts = 0;

  mixButton.disabled = false;

  renderBuckets();
  renderOptions();
}

function renderBuckets(){

  bucketRow.innerHTML = "";

  currentQuestion.colours.forEach((colour,index)=>{

    const img = document.createElement("img");

    img.src = "assets/" + bucketImages[colour];
    img.className = "bucketImg";

    bucketRow.appendChild(img);

    if(index === 0){

      const plus = document.createElement("div");

      plus.className = "plus";
      plus.textContent = "+";

      bucketRow.appendChild(plus);
    }
  });
}

function renderOptions(){

  optionGrid.innerHTML = "";

  shuffle(["orange","green","purple"]).forEach(colour=>{

    const option = document.createElement("div");

    option.className = "option";
    option.dataset.answer = colour;

    option.innerHTML = `
      <div class="colourCircle"
      style="background:${colourHex[colour]}"></div>

      <div>${colour}</div>
    `;

    option.onclick = ()=>checkAnswer(option,colour);

    optionGrid.appendChild(option);
  });
}

function mixColours(){

  if(mixed) return;

  mixed = true;
  canAnswer = false;

  mixButton.disabled = true;

  wand.classList.add("wandMove");
  bowlBox.classList.add("bowlGlow");

  createBubbles();

  setTimeout(()=>{

    wand.classList.remove("wandMove");
    bowlBox.classList.remove("bowlGlow");

    canAnswer = true;

  },1200);
}

function createBubbles(){

  for(let i=0;i<14;i++){

    setTimeout(()=>{

      const bubble = document.createElement("div");

      bubble.className = "bubble";

      bubble.style.left = (38 + Math.random()*24) + "%";
      bubble.style.top = (52 + Math.random()*10) + "%";

      const size = 8 + Math.random()*18;

      bubble.style.width = size + "px";
      bubble.style.height = size + "px";

      bowlBox.appendChild(bubble);

      setTimeout(()=>bubble.remove(),1300);

    },i*70);
  }
}

function checkAnswer(option,selected){

  if(!canAnswer) return;

  if(selected === currentQuestion.answer){

    canAnswer = false;

    playSound(correctSound);

    setTimeout(()=>{
      playSound(clapSound);
    },150);

    option.classList.add("correct");

    setTimeout(()=>{

      currentIndex++;

      showQuestion();

    },1200);

  }else{

    wrongAttempts++;

    playSound(wrongSound);

    option.classList.add("wrong");

    setTimeout(()=>{
      option.classList.remove("wrong");
    },600);

    if(wrongAttempts >= 2){

      const correctOption =
      document.querySelector(`[data-answer="${currentQuestion.answer}"]`);

      if(correctOption){
        correctOption.classList.add("glow");
      }
    }
  }
}

function startSparkles(){

  stopSparkles();

  sparkleTimer = setInterval(()=>{

    const sparkle = document.createElement("img");

    sparkle.className = "sparkle";

    sparkle.src = "assets/sparkle.png";

    sparkle.style.left =
    Math.random()*100 + "vw";

    sparkle.style.top = "-30px";

    const size = 26 + Math.random()*22;

    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";

    endScreen.appendChild(sparkle);

    setTimeout(()=>{
      sparkle.remove();
    },3000);

  },120);
}

function stopSparkles(){

  if(sparkleTimer){

    clearInterval(sparkleTimer);

    sparkleTimer = null;
  }

  document.querySelectorAll(".sparkle")
  .forEach(s=>s.remove());
}

function restartGame(){

  stopSparkles();

  endScreen.classList.remove("active");
  gameScreen.classList.add("active");

  startGame();
}
</script>

</body>
</html>
