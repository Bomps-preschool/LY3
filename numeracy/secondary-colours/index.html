<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Paint Mixing Lab</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(135deg,#e8d7ff,#ffd9df,#d8fff0);
  color:#4b3448;
}

.screen{
  width:100vw;
  height:100dvh;
  display:none;
}

.active{display:flex}

#logoScreen{
  background:white;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:min(280px,70vw);
}

#gameScreen{
  flex-direction:column;
}

.header{
  height:64px;
  background:#fff0df;
  border-bottom:4px solid #c9a7ff;
  text-align:center;
  padding:5px 10px;
  flex-shrink:0;
}

.header h1{
  margin:0;
  font-size:clamp(22px,3vw,34px);
}

.header p{
  margin:2px 0 0;
  font-size:clamp(12px,1.5vw,17px);
}

.gameArea{
  height:calc(100dvh - 64px);
  display:grid;
  grid-template-columns:28% 44% 28%;
  gap:10px;
  padding:12px;
}

.leftPanel,.rightPanel{
  background:rgba(255,255,255,0.75);
  border:4px solid #c9a7ff;
  border-radius:28px;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.questionText,.optionsTitle{
  font-size:clamp(18px,2vw,26px);
  font-weight:bold;
  text-align:center;
  margin-bottom:10px;
}

.bucketRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.bucketImg{
  width:min(145px,10vw);
  height:min(145px,20vh);
  object-fit:contain;
}

.plus{
  font-size:44px;
  font-weight:bold;
  color:#684b72;
}

.centerPanel{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
}

.bowlBox{
  width:min(430px,90%);
  height:min(350px,48vh);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bowlBox img.bowl{
  width:100%;
  height:100%;
  object-fit:contain;
}

.bowlBox.glow{
  animation:bowlGlow 1.2s ease;
}

@keyframes bowlGlow{
  0%{filter:drop-shadow(0 0 0px #ffffff)}
  50%{filter:drop-shadow(0 0 28px #fff176)}
  100%{filter:drop-shadow(0 0 0px #ffffff)}
}

.magicBubble{
  position:absolute;
  width:16px;
  height:16px;
  border-radius:50%;
  background:rgba(255,255,255,0.9);
  animation:bubbleUp 1.2s ease forwards;
  pointer-events:none;
}

@keyframes bubbleUp{
  0%{transform:translateY(30px) scale(.4);opacity:0}
  30%{opacity:1}
  100%{transform:translateY(-120px) scale(1.2);opacity:0}
}

.wand{
  position:absolute;
  width:120px;
  right:2%;
  top:2%;
  transform:rotate(-25deg);
  z-index:5;
}

.wand.mix{
  animation:wandTap .8s ease;
}

@keyframes wandTap{
  0%{transform:rotate(-25deg) translateY(0)}
  50%{transform:rotate(-8deg) translateY(35px)}
  100%{transform:rotate(-25deg) translateY(0)}
}

.mixButton{
  border:none;
  background:#9ee8c9;
  color:#4b3448;
  border-radius:22px;
  padding:12px 34px;
  font-size:clamp(20px,2vw,28px);
  font-weight:bold;
  cursor:pointer;
  border:4px solid #70caaa;
}

.mixButton:disabled{
  opacity:.55;
}

.optionGrid{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.option{
  border:4px solid #c9a7ff;
  border-radius:24px;
  background:#fffaf5;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  cursor:pointer;
  font-size:clamp(18px,2vw,26px);
  font-weight:bold;
}

.colourCircle{
  width:58px;
  height:58px;
  border-radius:50%;
  border:4px solid white;
  box-shadow:0 5px 10px rgba(0,0,0,.15);
}

.option.correct{
  background:#dcffd8;
  border-color:#7acb73;
}

.option.wrong{
  animation:wiggle .35s ease;
}

.option.glow{
  box-shadow:0 0 18px 7px #9ee8c9;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

#endScreen{
  background:linear-gradient(135deg,#e8d7ff,#ffd9df,#d8fff0);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#endScreen h1{
  font-size:clamp(38px,7vw,76px);
  margin:0 0 10px;
  z-index:2;
}

#endScreen p{
  font-size:clamp(20px,3vw,34px);
  z-index:2;
}

.playAgain{
  font-size:clamp(20px,2.5vw,28px);
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#9ee8c9;
  color:#4b3448;
  font-weight:bold;
  cursor:pointer;
  z-index:2;
}

.fallingSparkle{
  position:absolute;
  width:34px;
  height:34px;
  animation:sparkleFall 3s linear forwards;
  pointer-events:none;
}

@keyframes sparkleFall{
  0%{transform:translateY(-30px) scale(1);opacity:1}
  100%{transform:translateY(110dvh) scale(.5);opacity:0}
}

@media(max-width:900px){
  .header{height:58px}

  .gameArea{
    height:calc(100dvh - 58px);
    grid-template-columns:1fr;
    grid-template-rows:25% 42% 31%;
    padding:8px;
  }

  .leftPanel,.rightPanel{
    padding:6px;
    border-radius:20px;
  }

  .bucketImg{
    width:82px;
    height:82px;
  }

  .plus{font-size:30px}

  .bowlBox{
    height:32vh;
  }

  .wand{
    width:80px;
  }

  .optionGrid{
    flex-direction:row;
    justify-content:center;
    gap:8px;
  }

  .option{
    flex-direction:column;
    padding:7px;
    width:32%;
  }

  .colourCircle{
    width:42px;
    height:42px;
  }
}

@media(max-width:600px) and (orientation:portrait){
  .header h1{font-size:19px}
  .header p{font-size:11px}
  .questionText,.optionsTitle{font-size:16px}

  .gameArea{
    grid-template-rows:24% 42% 32%;
  }

  .bucketImg{
    width:70px;
    height:70px;
  }

  .mixButton{
    padding:9px 24px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Magic Paint Mixing Lab</h1>
    <p>Mix the colours and tap the correct new colour.</p>
  </div>

  <div class="gameArea">

    <div class="leftPanel">
      <div class="questionText">Mix these colours</div>
      <div class="bucketRow" id="bucketRow"></div>
    </div>

    <div class="centerPanel">
      <div class="bowlBox" id="bowlBox">
        <img class="bowl" src="assets/mixing-bowl.png" alt="Magic Mixing Bowl">
        <img class="wand" id="wand" src="assets/magic-wand.png" alt="Magic Wand">
      </div>
      <button class="mixButton" id="mixButton" onclick="mixColours()">Mix</button>
    </div>

    <div class="rightPanel">
      <div class="optionsTitle">Choose the new colour</div>
      <div class="optionGrid" id="optionGrid"></div>
    </div>

  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Magic Colour Scientist!</h1>
  <p>You mixed all the colours.</p>
  <button class="playAgain" onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
const questions = [
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["blue","red"], answer:"purple" },
  { colours:["yellow","red"], answer:"orange" },
  { colours:["blue","yellow"], answer:"green" },
  { colours:["red","blue"], answer:"purple" },
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["blue","red"], answer:"purple" },
  { colours:["red","blue"], answer:"purple" }
];

const colourHex = {
  red:"#ef3b45",
  yellow:"#f4e84a",
  blue:"#2385c7",
  orange:"#f7941e",
  green:"#35b85a",
  purple:"#713ca6"
};

const bucketImages = {
  red:"red-bucket.png",
  yellow:"yellow-bucket.png",
  blue:"blue-bucket.png"
};

let order = [];
let currentIndex = 0;
let currentQuestion = null;
let mixed = false;
let canAnswer = false;
let wrongAttempts = 0;
let sparkleTimer = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const bucketRow = document.getElementById("bucketRow");
const optionGrid = document.getElementById("optionGrid");
const mixButton = document.getElementById("mixButton");
const wand = document.getElementById("wand");
const bowlBox = document.getElementById("bowlBox");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(()=>{
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  },5000);
};

function playSound(sound){
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function startGame(){
  stopSparkles();
  currentIndex = 0;
  order = shuffle([...questions]);
  showQuestion();
}

function showQuestion(){
  if(currentIndex >= order.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    startSparkles();
    return;
  }

  currentQuestion = order[currentIndex];
  mixed = false;
  canAnswer = false;
  wrongAttempts = 0;

  mixButton.disabled = false;
  bowlBox.classList.remove("glow");

  renderBuckets();
  renderOptions();
}

function renderBuckets(){
  bucketRow.innerHTML = "";

  currentQuestion.colours.forEach((colour,index)=>{
    const img = document.createElement("img");
    img.className = "bucketImg";
    img.src = "assets/" + bucketImages[colour];
    img.alt = colour + " bucket";
    bucketRow.appendChild(img);

    if(index === 0){
      const plus = document.createElement("div");
      plus.className = "plus";
      plus.textContent = "+";
      bucketRow.appendChild(plus);
    }
  });
}

function renderOptions(){
  optionGrid.innerHTML = "";

  shuffle(["orange","green","purple"]).forEach(colour=>{
    const option = document.createElement("div");
    option.className = "option";
    option.dataset.answer = colour;
    option.innerHTML = `
      <div class="colourCircle" style="background:${colourHex[colour]}"></div>
      <div>${colour}</div>
    `;
    option.onclick = ()=>checkAnswer(option, colour);
    optionGrid.appendChild(option);
  });
}

function mixColours(){
  if(mixed) return;

  mixed = true;
  canAnswer = false;
  mixButton.disabled = true;

  wand.classList.add("mix");
  bowlBox.classList.add("glow");
  createBubbles();

  setTimeout(()=>{
    wand.classList.remove("mix");
    bowlBox.classList.remove("glow");
    canAnswer = true;
  },1200);
}

function createBubbles(){
  for(let i=0;i<12;i++){
    setTimeout(()=>{
      const bubble = document.createElement("div");
      bubble.className = "magicBubble";
      bubble.style.left = (35 + Math.random()*30) + "%";
      bubble.style.top = (45 + Math.random()*20) + "%";
      bubble.style.width = bubble.style.height = (8 + Math.random()*16) + "px";
      bowlBox.appendChild(bubble);
      setTimeout(()=>bubble.remove(),1300);
    },i*70);
  }
}

function checkAnswer(option, selected){
  if(!canAnswer) return;

  if(selected === currentQuestion.answer){
    canAnswer = false;

    playSound(correctSound);
    setTimeout(()=>playSound(clapSound),150);

    option.classList.add("correct");

    setTimeout(()=>{
      currentIndex++;
      showQuestion();
    },1200);

  }else{
    wrongAttempts++;
    playSound(wrongSound);

    option.classList.add("wrong");

    setTimeout(()=>{
      option.classList.remove("wrong");
    },600);

    if(wrongAttempts >= 2){
      const correctOption = document.querySelector(`[data-answer="${currentQuestion.answer}"]`);
      if(correctOption) correctOption.classList.add("glow");
    }
  }
}

function startSparkles(){
  stopSparkles();

  sparkleTimer = setInterval(()=>{
    const sparkle = document.createElement("img");
    sparkle.className = "fallingSparkle";
    sparkle.src = "assets/sparkle.png";
    sparkle.style.left = Math.random()*100 + "vw";
    sparkle.style.top = "-30px";
    sparkle.style.width = sparkle.style.height = (26 + Math.random()*24) + "px";
    endScreen.appendChild(sparkle);

    setTimeout(()=>sparkle.remove(),3200);
  },120);
}

function stopSparkles(){
  if(sparkleTimer){
    clearInterval(sparkleTimer);
    sparkleTimer = null;
  }
  document.querySelectorAll(".fallingSparkle").forEach(s=>s.remove());
}

function restartGame(){
  stopSparkles();
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
