<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Paint Mixing Lab</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(135deg,#f7e4ff,#ffe6f2,#dcfff4);
  color:#563b59;
}

.screen{
  width:100vw;
  height:100dvh;
  display:none;
}

.active{display:flex}

#logoScreen{
  background:white;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:min(320px,70vw);
}

#gameScreen{
  flex-direction:column;
}

.header{
  height:58px;
  background:#fff1df;
  border-bottom:4px solid #caa8ff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.header h1{
  font-size:clamp(22px,2.5vw,36px);
  line-height:1;
}

.header p{
  font-size:clamp(9px,1vw,14px);
  line-height:1;
  margin-top:3px;
}

.gameArea{
  height:calc(100dvh - 58px);
  display:grid;
  grid-template-rows:38px 1fr 150px;
  padding:8px 16px 12px;
  gap:8px;
  align-items:center;
}

/* SMALL INSTRUCTION */
.message{
  justify-self:center;
  font-size:clamp(11px,1vw,16px);
  font-weight:bold;
  background:rgba(255,255,255,.88);
  border:2px solid #c9a7ff;
  border-radius:14px;
  padding:4px 16px;
  min-width:220px;
  max-width:420px;
  text-align:center;
}

/* BIG MAIN BUCKET AREA */
.bucketLine{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:32px;
}

.bucketBox{
  width:min(360px,27vw);
  height:min(360px,50vh);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  touch-action:manipulation;
}

.bucketBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.plus,.equals{
  font-size:clamp(46px,5vw,78px);
  font-weight:bold;
  color:#755383;
}

.emptyBucket{
  width:min(330px,25vw);
  height:min(280px,38vh);
  background:#fffdf7;
  border:7px solid #c9a7ff;
  border-radius:34px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 22px rgba(0,0,0,.12);
}

.paintArea{
  position:absolute;
  inset:0;
  overflow:hidden;
  border-radius:26px;
}

.fillBottom,.fillTop{
  position:absolute;
  width:100%;
  left:0;
  transition:.5s;
}

.fillBottom{
  bottom:0;
  height:0%;
}

.fillTop{
  bottom:50%;
  height:0%;
}

.bucketSmile{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:42px;
  z-index:5;
}

.pourDrop{
  position:absolute;
  width:30px;
  height:62px;
  border-radius:20px;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  animation:dropFall .8s linear forwards;
  z-index:10;
}

@keyframes dropFall{
  from{top:-12px;opacity:1}
  to{top:78%;opacity:0}
}

.tapGlow{
  animation:tapGlow .7s ease;
}

@keyframes tapGlow{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

/* SMALLER OPTIONS */
.optionsPanel{
  display:none;
  justify-content:center;
  align-items:center;
  gap:18px;
}

.option{
  width:min(190px,24vw);
  height:130px;
  background:#fffaf5;
  border:4px solid #c9a7ff;
  border-radius:24px;
  padding:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
}

.circle{
  width:52px;
  height:52px;
  border-radius:50%;
  border:4px solid white;
  box-shadow:0 5px 12px rgba(0,0,0,.18);
}

.optionName{
  font-size:clamp(18px,2.3vw,30px);
  font-weight:bold;
}

.option.correct{
  background:#dfffd9;
  border-color:#77cf74;
}

.option.wrong{
  animation:wiggle .35s ease;
}

.option.glow{
  box-shadow:0 0 18px #98e7c7;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

#endScreen{
  background:linear-gradient(135deg,#f7e4ff,#ffe6f2,#dcfff4);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#endScreen h1{
  font-size:clamp(48px,8vw,90px);
  z-index:5;
}

#endScreen p{
  font-size:clamp(22px,3vw,36px);
  z-index:5;
}

.playAgain{
  margin-top:18px;
  padding:14px 34px;
  font-size:clamp(20px,2vw,30px);
  border:none;
  border-radius:18px;
  background:#a8ecd1;
  color:#563b59;
  font-weight:bold;
  cursor:pointer;
  z-index:5;
}

.sparkle{
  position:absolute;
  width:34px;
  height:34px;
  animation:sparkleFall 3s linear forwards;
}

@keyframes sparkleFall{
  from{transform:translateY(-30px) scale(1);opacity:1}
  to{transform:translateY(110vh) scale(.4);opacity:0}
}

.burst{
  position:absolute;
  width:10px;
  height:10px;
}

.burst span{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  animation:burstMove 1.1s ease-out forwards;
}

@keyframes burstMove{
  from{transform:translate(0,0) scale(1);opacity:1}
  to{transform:translate(var(--x),var(--y)) scale(.2);opacity:0}
}

@media(max-width:900px){
  .header{height:52px}
  .header h1{font-size:20px}
  .header p{font-size:9px}

  .gameArea{
    height:calc(100dvh - 52px);
    grid-template-rows:30px 1fr 120px;
    padding:6px;
    gap:6px;
  }

  .message{
    font-size:10px;
    padding:3px 12px;
    min-width:190px;
  }

  .bucketLine{
    gap:6px;
  }

  .bucketBox{
    width:27vw;
    height:27vw;
  }

  .emptyBucket{
    width:26vw;
    height:23vw;
    border-width:4px;
    border-radius:18px;
  }

  .plus,.equals{
    font-size:28px;
  }

  .bucketSmile{
    font-size:22px;
  }

  .optionsPanel{
    gap:6px;
  }

  .option{
    width:30vw;
    height:95px;
    padding:5px;
    border-radius:16px;
  }

  .circle{
    width:38px;
    height:38px;
  }

  .optionName{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Magic Paint Mixing Lab</h1>
    <p>Tap both paint buckets and see the new colour.</p>
  </div>

  <div class="gameArea">
    <div class="message" id="message">Tap the first paint bucket.</div>

    <div class="bucketLine">
      <div class="bucketBox" id="bucket1"></div>
      <div class="plus">+</div>
      <div class="bucketBox" id="bucket2"></div>
      <div class="equals">=</div>

      <div class="emptyBucket" id="emptyBucket">
        <div class="paintArea">
          <div class="fillBottom" id="fillBottom"></div>
          <div class="fillTop" id="fillTop"></div>
        </div>
        <div class="bucketSmile">😊</div>
      </div>
    </div>

    <div class="optionsPanel" id="optionsPanel"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You made all secondary colours!</p>
  <button class="playAgain" onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const questions = [
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["red","blue"], answer:"purple" }
];

const bucketImages = {
  red:"red-bucket.png",
  yellow:"yellow-bucket.png",
  blue:"blue-bucket.png"
};

const colourHex = {
  red:"#ef3b45",
  yellow:"#f4e84a",
  blue:"#2385c7",
  orange:"#f7941e",
  green:"#35b85a",
  purple:"#713ca6"
};

let currentIndex = 0;
let currentQuestion;
let tapped = [];
let canTap = true;
let canAnswer = false;
let wrongAttempts = 0;
let sparkleInterval = null;
let burstInterval = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");

const bucket1 = document.getElementById("bucket1");
const bucket2 = document.getElementById("bucket2");
const fillBottom = document.getElementById("fillBottom");
const fillTop = document.getElementById("fillTop");
const optionsPanel = document.getElementById("optionsPanel");
const message = document.getElementById("message");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(()=>{
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  },5000);
};

function playSound(sound){
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function startGame(){
  stopCelebration();
  currentIndex = 0;
  showQuestion();
}

function showQuestion(){
  if(currentIndex >= questions.length){
    showEndScreen();
    return;
  }

  currentQuestion = questions[currentIndex];
  tapped = [];
  canTap = true;
  canAnswer = false;
  wrongAttempts = 0;

  fillBottom.style.height = "0%";
  fillTop.style.height = "0%";

  optionsPanel.style.display = "none";
  optionsPanel.innerHTML = "";

  message.textContent = "Tap the first paint bucket.";

  bucket1.innerHTML = `<img src="assets/${bucketImages[currentQuestion.colours[0]]}" alt="${currentQuestion.colours[0]} bucket">`;
  bucket2.innerHTML = `<img src="assets/${bucketImages[currentQuestion.colours[1]]}" alt="${currentQuestion.colours[1]} bucket">`;

  bucket1.onclick = () => tapBucket(bucket1,currentQuestion.colours[0]);
  bucket2.onclick = () => tapBucket(bucket2,currentQuestion.colours[1]);
}

function tapBucket(bucket, colour){
  if(!canTap || tapped.includes(colour)) return;

  tapped.push(colour);
  bucket.classList.add("tapGlow");
  setTimeout(()=>bucket.classList.remove("tapGlow"),700);

  pourPaint(colour);

  if(tapped.length === 1){
    fillBottom.style.height = "50%";
    fillBottom.style.background = colourHex[colour];
    message.textContent = "Tap the second paint bucket.";
  }

  if(tapped.length === 2){
    canTap = false;

    setTimeout(()=>{
      fillTop.style.height = "50%";
      fillTop.style.background = colourHex[colour];
      message.textContent = "Choose the new colour.";
      showOptions();
    },500);
  }
}

function pourPaint(colour){
  const drop = document.createElement("div");
  drop.className = "pourDrop";
  drop.style.background = colourHex[colour];

  document.getElementById("emptyBucket").appendChild(drop);

  setTimeout(()=>drop.remove(),800);
}

function showOptions(){
  canAnswer = true;
  optionsPanel.style.display = "flex";

  ["orange","green","purple"].sort(()=>Math.random()-0.5).forEach(colour=>{
    const option = document.createElement("div");
    option.className = "option";
    option.dataset.answer = colour;

    option.innerHTML = `
      <div class="circle" style="background:${colourHex[colour]}"></div>
      <div class="optionName">${colour}</div>
    `;

    option.onclick = () => checkAnswer(option,colour);
    optionsPanel.appendChild(option);
  });
}

function checkAnswer(option, selected){
  if(!canAnswer) return;

  if(selected === currentQuestion.answer){
    canAnswer = false;

    playSound(correctSound);
    setTimeout(()=>playSound(clapSound),120);

    option.classList.add("correct");
    message.textContent = "Good job!";

    setTimeout(()=>{
      fillTop.style.height = "0%";
      fillBottom.style.height = "100%";
      fillBottom.style.background = colourHex[currentQuestion.answer];
    },400);

    setTimeout(()=>{
      currentIndex++;
      showQuestion();
    },1800);

  }else{
    wrongAttempts++;
    playSound(wrongSound);

    option.classList.add("wrong");

    setTimeout(()=>{
      option.classList.remove("wrong");
    },400);

    if(wrongAttempts >= 2){
      const correctOption = document.querySelector(`[data-answer="${currentQuestion.answer}"]`);
      if(correctOption){
        correctOption.classList.add("glow");
      }
    }
  }
}

function showEndScreen(){
  gameScreen.classList.remove("active");
  endScreen.classList.add("active");
  startCelebration();
}

function startCelebration(){
  stopCelebration();

  sparkleInterval = setInterval(()=>{
    const sparkle = document.createElement("img");
    sparkle.className = "sparkle";
    sparkle.src = "assets/sparkle.png";
    sparkle.style.left = Math.random()*100 + "vw";
    sparkle.style.top = "-30px";

    const size = 24 + Math.random()*24;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";

    endScreen.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),3000);
  },70);

  burstInterval = setInterval(()=>{
    createBurst(Math.random()*window.innerWidth, Math.random()*window.innerHeight*.7);
  },220);
}

function createBurst(x,y){
  const burst = document.createElement("div");
  burst.className = "burst";
  burst.style.left = x + "px";
  burst.style.top = y + "px";

  const colours = ["#ffd45c","#ff7aa8","#9ee7ff","#8df2a6","#d9b3ff","#ff9f43"];

  for(let i=0;i<16;i++){
    const dot = document.createElement("span");
    const angle = (Math.PI*2*i)/16;
    const distance = 50 + Math.random()*40;

    dot.style.background = colours[Math.floor(Math.random()*colours.length)];
    dot.style.setProperty("--x", Math.cos(angle)*distance + "px");
    dot.style.setProperty("--y", Math.sin(angle)*distance + "px");

    burst.appendChild(dot);
  }

  endScreen.appendChild(burst);
  setTimeout(()=>burst.remove(),1200);
}

function stopCelebration(){
  if(sparkleInterval){
    clearInterval(sparkleInterval);
    sparkleInterval = null;
  }

  if(burstInterval){
    clearInterval(burstInterval);
    burstInterval = null;
  }

  document.querySelectorAll(".sparkle,.burst").forEach(el=>el.remove());
}

function restartGame(){
  stopCelebration();
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
