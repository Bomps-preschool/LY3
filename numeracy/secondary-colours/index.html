<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Paint Mixing Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;background:linear-gradient(135deg,#f7e4ff,#ffe6f2,#dcfff4);color:#563b59;overflow-x:hidden;}
.screen{width:100vw;height:100vh;display:none;flex-direction:column;align-items:center;justify-content:flex-start;}
.active{display:flex;}
#logoScreen{background:white;align-items:center;justify-content:center;}
#logoScreen img{width:min(320px,70vw);}
#gameScreen{flex-direction:column;width:100%;align-items:center;}
.header{width:100%;padding:20px 0;display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,0.85);border-bottom:3px solid #caa8ff;box-shadow:0 2px 5px rgba(0,0,0,0.08);}
.header h1{font-size:clamp(22px,2.5vw,36px);line-height:1;}
.header p{font-size:clamp(12px,1.2vw,16px);line-height:1.3;margin-top:12px;}
.gameArea{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;padding:16px;gap:16px;}
.message{font-size:12px;font-weight:bold;background:rgba(255,255,255,.88);border:2px solid #c9a7ff;border-radius:14px;padding:6px 16px;text-align:center;min-width:150px;max-width:320px;}
.bucketLine{width:100%;display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:24px;padding:0 16px;}
.bucketBox{width:min(35vw,200px);height:min(35vw,200px);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.bucketBox img{width:100%;height:100%;object-fit:contain;}
.plus,.equals{font-size:clamp(46px,5vw,78px);color:#755383;font-weight:bold;}
.emptyBucket{width:min(420px,60vw);height:min(280px,40vw);background: url('assets/empty-bucket.png') no-repeat center/contain;border:7px solid #c9a7ff;border-radius:34px;position:relative;overflow:hidden;}
.paintArea{position:absolute;inset:0;overflow:hidden;border-radius:26px;}
.fillBottom,.fillTop{position:absolute;width:100%;left:0;transition:.5s;height:0%;bottom:0;}
.fillTop{bottom:50%;}
.bucketSmile{position:absolute;width:100%;text-align:center;top:50%;transform:translateY(-50%);font-size:42px;z-index:5;}
.optionsPanel{display:none;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap;}
.option{width:min(150px,24vw);height:110px;background:#fffaf5;border:4px solid #c9a7ff;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:8px;}
.circle{width:52px;height:52px;border-radius:50%;border:4px solid white;box-shadow:0 5px 12px rgba(0,0,0,.18);}
.optionName{font-size:clamp(18px,2.3vw,30px);font-weight:bold;}
.option.correct{background:#dfffd9;border-color:#77cf74;}
.option.wrong{animation:none;}
.option.glow{box-shadow:0 0 18px #98e7c7;}
</style>
</head>
<body>
<div id="logoScreen" class="screen active"><img src="assets/innovine-logo.png" alt="Innovine Logo"></div>
<div id="gameScreen" class="screen">
<div class="header"><h1>Magic Paint Mixing Lab</h1><p>Tap both paint buckets and see the new colour.</p></div>
<div class="gameArea">
<div class="message" id="message">Tap the first paint bucket.</div>
<div class="bucketLine">
<div class="bucketBox" id="bucket1"></div>
<div class="plus">+</div>
<div class="bucketBox" id="bucket2"></div>
<div class="equals">=</div>
<div class="emptyBucket" id="emptyBucket">
<div class="paintArea">
<div class="fillBottom" id="fillBottom"></div>
<div class="fillTop" id="fillTop"></div>
</div>
<div class="bucketSmile">😊</div>
</div>
</div>
<div class="optionsPanel" id="optionsPanel"></div>
</div>
</div>
<div id="congratsScreen" class="screen">
<h1>Congratulations!</h1>
<p>You made all secondary colours!</p>
<button class="playAgain" onclick="restartGame()">Play Again</button>
</div>
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>
<script>
const questions=[{colours:["red","yellow"], answer:"orange"},{colours:["yellow","blue"], answer:"green"},{colours:["red","blue"], answer:"purple"}];
const bucketImages={red:"assets/red-bucket.png",yellow:"assets/yellow-bucket.png",blue:"assets/blue-bucket.png"};
const colourHex={red:"#ef3b45",yellow:"#f4e84a",blue:"#2385c7",orange:"#f7941e",green:"#35b85a",purple:"#713ca6"};
let currentIndex=0,currentQuestion,tapped=[],canTap=true,canAnswer=false,wrongAttempts=0;
const logoScreen=document.getElementById("logoScreen"),gameScreen=document.getElementById("gameScreen"),congratsScreen=document.getElementById("congratsScreen"),bucket1=document.getElementById("bucket1"),bucket2=document.getElementById("bucket2"),fillBottom=document.getElementById("fillBottom"),fillTop=document.getElementById("fillTop"),optionsPanel=document.getElementById("optionsPanel"),message=document.getElementById("message"),correctSound=document.getElementById("correctSound"),wrongSound=document.getElementById("wrongSound"),clapSound=document.getElementById("clapSound");
window.addEventListener("load",()=>{setTimeout(()=>{logoScreen.classList.remove("active");gameScreen.classList.add("active");startGame();},1500);});
function playSound(s){s.pause();s.currentTime=0;s.play().catch(()=>{});}
function startGame(){currentIndex=0;showQuestion();}
function showQuestion(){if(currentIndex>=questions.length){gameScreen.classList.remove("active");congratsScreen.classList.add("active");startConfetti();return;}currentQuestion=questions[currentIndex];tapped=[];canTap=true;canAnswer=false;wrongAttempts=0;fillBottom.style.height="0%";fillTop.style.height="0%";fillBottom.style.background="";fillTop.style.background="";optionsPanel.style.display="none";optionsPanel.innerHTML="";message.textContent="Tap the first paint bucket.";bucket1.innerHTML=`<img src="${bucketImages[currentQuestion.colours[0]]}">`;bucket2.innerHTML=`<img src="${bucketImages[currentQuestion.colours[1]]}">`;bucket1.onclick=()=>tapBucket(bucket1,currentQuestion.colours[0]);bucket2.onclick=()=>tapBucket(bucket2,currentQuestion.colours[1]);}
function tapBucket(bucket,colour){if(!canTap||tapped.includes(colour))return;tapped.push(colour);bucket.classList.add("tapGlow");setTimeout(()=>bucket.classList.remove("tapGlow"),700);pourPaint(colour);if(tapped.length===1){fillBottom.style.height="50%";fillBottom.style.background=colourHex[colour];message.textContent="Tap the second paint bucket.";}else if(tapped.length===2){canTap=false;fillTop.style.height="50%";fillTop.style.background=colourHex[colour];message.textContent="Choose the new colour.";showOptions();}}
function pourPaint(colour){const drop=document.createElement("div");drop.className="pourDrop";drop.style.background=colourHex[colour];document.getElementById("emptyBucket").appendChild(drop);setTimeout(()=>drop.remove(),800);}
function showOptions(){canAnswer=true;optionsPanel.style.display="flex";["orange","green","purple"].sort(()=>Math.random()-0.5).forEach(c=>{const opt=document.createElement("div");opt.className="option";opt.dataset.answer=c;opt.innerHTML=`<div class="circle" style="background:${colourHex[c]}"></div><div class="optionName">${c}</div>`;opt.onclick=()=>checkAnswer(opt,c);optionsPanel.appendChild(opt);});}
function checkAnswer(option,selected){if(!canAnswer)return;if(selected===currentQuestion.answer){canAnswer=false;playSound(correctSound);setTimeout(()=>playSound(clapSound),120);option.classList.add("correct");message.textContent="Good job!";fillBottom.style.height="100%";fillTop.style.height="0%";fillBottom.style.background=colourHex[currentQuestion.answer];setTimeout(()=>{currentIndex++;showQuestion();},1500);startConfetti();}else{wrongAttempts++;playSound(wrongSound);option.classList.add("option");setTimeout(()=>option.classList.remove("option"),400);if(wrongAttempts>=2){const copt=document.querySelector(`[data-answer="${currentQuestion.answer}"]`);if(copt)copt.classList.add("glow");}}}
function startConfetti(){const confettiInterval=setInterval(()=>{const confetti=document.createElement("div");confetti.style.position="absolute";confetti.style.width="8px";confetti.style.height="8px";confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;confetti.style.left=Math.random()*window.innerWidth+"px";confetti.style.top="-10px";confetti.style.opacity=Math.random()+0.5;confetti.style.borderRadius="50%";confetti.style.zIndex=999;document.body.appendChild(confetti);const fallSpeed=2+Math.random()*3;let topPos=-10;const fallInterval=setInterval(()=>{topPos+=fallSpeed;confetti.style.top=topPos+"px";if(topPos>window.innerHeight){clearInterval(fallInterval);confetti.remove();}},16);},50);setTimeout(()=>clearInterval(confettiInterval),5000);}
function restartGame(){congratsScreen.classList.remove("active");gameScreen.classList.add("active");startGame();}
</script>
</body>
</html>
