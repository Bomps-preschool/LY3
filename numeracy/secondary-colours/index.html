<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Paint Mixing Lab</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(135deg,#f4e4ff,#ffe6f0,#dcfff2);
  color:#51374d;
}

.screen{
  width:100vw;
  height:100dvh;
  display:none;
}

.active{display:flex}

/* LOGO */
#logoScreen{
  background:#fff;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:min(280px,70vw);
}

/* GAME SCREEN */
#gameScreen{
  flex-direction:column;
}

/* HEADER */
.header{
  height:78px;
  background:#fff0df;
  border-bottom:4px solid #c9a7ff;
  text-align:center;
  padding:4px 10px;
  flex-shrink:0;
}

.header h1{
  margin:0;
  font-size:clamp(25px,3.1vw,42px);
  line-height:1.1;
}

.header p{
  margin:2px 0 0;
  font-size:clamp(13px,1.45vw,20px);
  line-height:1.1;
  white-space:nowrap;
}

/* MAIN AREA */
.gameArea{
  height:calc(100dvh - 78px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-evenly;
  padding:12px;
}

/* QUESTION */
.message{
  font-size:clamp(28px,4vw,52px);
  font-weight:bold;
  text-align:center;
  background:rgba(255,255,255,.72);
  border:4px solid #c9a7ff;
  border-radius:28px;
  padding:12px 42px;
}

/* MIXING LINE */
.bucketLine{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
}

.bucketBox{
  width:min(175px,18vw);
  height:min(175px,25vh);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  touch-action:manipulation;
}

.bucketBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.plus,.equals{
  font-size:clamp(34px,5vw,62px);
  font-weight:bold;
  color:#6c4d75;
}

/* PROPER EMPTY BUCKET */
.emptyBucket{
  width:min(220px,22vw);
  height:min(190px,27vh);
  position:relative;
  overflow:hidden;
  border:7px solid #b99ce0;
  border-top:0;
  border-radius:0 0 42px 42px;
  background:#fffdf7;
  box-shadow:0 12px 22px rgba(0,0,0,.15);
}

/* bucket rim */
.emptyBucket::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:108%;
  height:36px;
  border:7px solid #b99ce0;
  border-radius:50%;
  background:#fffdf7;
  z-index:5;
}

/* bucket handle */
.emptyBucket::after{
  content:"";
  position:absolute;
  top:-44px;
  left:17%;
  width:66%;
  height:82px;
  border:7px solid #b99ce0;
  border-bottom:0;
  border-radius:80px 80px 0 0;
  z-index:1;
}

/* two colour layers */
.fillTop,
.fillBottom{
  position:absolute;
  left:0;
  width:100%;
  height:0%;
  transition:height .55s ease, background .45s ease;
  z-index:2;
}

.fillBottom{
  bottom:0;
}

.fillTop{
  bottom:50%;
}

/* face */
.bucketFace{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:35%;
  font-size:36px;
  z-index:6;
}

/* drops */
.pourDrop{
  position:absolute;
  width:26px;
  height:58px;
  border-radius:18px;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  animation:pour .7s ease forwards;
  z-index:10;
}

@keyframes pour{
  from{top:8%;opacity:1}
  to{top:72%;opacity:0}
}

.tapGlow{
  animation:tapGlow .8s ease;
}

@keyframes tapGlow{
  0%{transform:scale(1)}
  50%{transform:scale(1.06)}
  100%{transform:scale(1)}
}

/* OPTIONS */
.optionsPanel{
  width:100%;
  display:none;
  justify-content:center;
  gap:24px;
}

.option{
  width:min(235px,28vw);
  padding:14px;
  background:#fffaf5;
  border:4px solid #c9a7ff;
  border-radius:28px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-size:clamp(22px,3vw,38px);
  font-weight:bold;
  touch-action:manipulation;
}

.circle{
  width:72px;
  height:72px;
  border-radius:50%;
  border:5px solid white;
  box-shadow:0 5px 12px rgba(0,0,0,.18);
}

.option.correct{
  background:#dcffd8;
  border-color:#72c96d;
}

.option.wrong{
  animation:wiggle .35s ease;
}

.option.glow{
  box-shadow:0 0 18px 8px #9ee8c9;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

/* END SCREEN */
#endScreen{
  background:linear-gradient(135deg,#f4e4ff,#ffe6f0,#dcfff2);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#endScreen h1{
  font-size:clamp(42px,7vw,78px);
  margin:0 0 10px;
  z-index:5;
}

#endScreen p{
  font-size:clamp(22px,3vw,34px);
  z-index:5;
}

.playAgain{
  font-size:clamp(20px,2.5vw,28px);
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#a7ecd0;
  color:#51374d;
  font-weight:bold;
  cursor:pointer;
  z-index:5;
}

/* SPARKLES */
.sparkle{
  position:absolute;
  width:34px;
  height:34px;
  pointer-events:none;
  animation:sparkleFall 3s linear forwards;
  z-index:2;
}

@keyframes sparkleFall{
  0%{transform:translateY(-30px) scale(1);opacity:1}
  100%{transform:translateY(110dvh) scale(.4);opacity:0}
}

/* CRACKER BURSTS */
.burst{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  pointer-events:none;
  z-index:3;
}

.burst span{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  animation:burstMove 1.1s ease-out forwards;
}

@keyframes burstMove{
  from{
    transform:translate(0,0) scale(1);
    opacity:1;
  }
  to{
    transform:translate(var(--x),var(--y)) scale(.2);
    opacity:0;
  }
}

/* RESPONSIVE */
@media(max-width:900px){
  .header{
    height:58px;
  }

  .header h1{
    font-size:20px;
  }

  .header p{
    font-size:11px;
  }

  .gameArea{
    height:calc(100dvh - 58px);
    padding:8px;
  }

  .message{
    font-size:22px;
    padding:8px 20px;
  }

  .bucketLine{
    gap:8px;
  }

  .bucketBox{
    width:22vw;
    height:22vw;
  }

  .emptyBucket{
    width:24vw;
    height:22vw;
    border-width:5px;
  }

  .emptyBucket::before{
    height:24px;
    border-width:5px;
  }

  .emptyBucket::after{
    top:-30px;
    height:58px;
    border-width:5px;
  }

  .bucketFace{
    font-size:22px;
  }

  .plus,.equals{
    font-size:28px;
  }

  .optionsPanel{
    gap:8px;
  }

  .option{
    width:30vw;
    padding:8px;
    font-size:18px;
  }

  .circle{
    width:42px;
    height:42px;
  }
}

@media(max-width:600px) and (orientation:portrait){
  .header{
    height:66px;
  }

  .header h1{
    font-size:19px;
  }

  .header p{
    font-size:10px;
    white-space:normal;
  }

  .gameArea{
    height:calc(100dvh - 66px);
    justify-content:space-around;
  }

  .bucketLine{
    gap:5px;
  }

  .bucketBox{
    width:24vw;
    height:24vw;
  }

  .emptyBucket{
    width:25vw;
    height:23vw;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Magic Paint Mixing Lab</h1>
    <p>Tap both paint buckets and see the new colour.</p>
  </div>

  <div class="gameArea">
    <div class="message" id="message">Tap the first paint bucket.</div>

    <div class="bucketLine">
      <div class="bucketBox" id="bucket1"></div>
      <div class="plus">+</div>
      <div class="bucketBox" id="bucket2"></div>
      <div class="equals">=</div>

      <div class="emptyBucket" id="emptyBucket">
        <div class="fillBottom" id="fillBottom"></div>
        <div class="fillTop" id="fillTop"></div>
        <div class="bucketFace">😊</div>
      </div>
    </div>

    <div class="optionsPanel" id="optionsPanel"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You made all secondary colours.</p>
  <button class="playAgain" onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
const questions = [
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["red","blue"], answer:"purple" }
];

const bucketImages = {
  red:"red-bucket.png",
  yellow:"yellow-bucket.png",
  blue:"blue-bucket.png"
};

const colourHex = {
  red:"#ef3b45",
  yellow:"#f4e84a",
  blue:"#2385c7",
  orange:"#f7941e",
  green:"#35b85a",
  purple:"#713ca6"
};

let currentIndex = 0;
let currentQuestion;
let tapped = [];
let canTap = true;
let canAnswer = false;
let wrongAttempts = 0;
let sparkleTimer = null;
let burstTimer = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");

const bucket1 = document.getElementById("bucket1");
const bucket2 = document.getElementById("bucket2");
const emptyBucket = document.getElementById("emptyBucket");

const fillBottom = document.getElementById("fillBottom");
const fillTop = document.getElementById("fillTop");

const optionsPanel = document.getElementById("optionsPanel");
const message = document.getElementById("message");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(()=>{
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  },5000);
};

function playSound(sound){
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function startGame(){
  stopCelebration();
  currentIndex = 0;
  showQuestion();
}

function showQuestion(){
  if(currentIndex >= questions.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    startCelebration();
    return;
  }

  currentQuestion = questions[currentIndex];
  tapped = [];
  canTap = true;
  canAnswer = false;
  wrongAttempts = 0;

  fillBottom.style.height = "0%";
  fillBottom.style.background = "transparent";

  fillTop.style.height = "0%";
  fillTop.style.background = "transparent";

  optionsPanel.style.display = "none";
  optionsPanel.innerHTML = "";

  message.textContent = "Tap the first paint bucket.";

  bucket1.innerHTML = `<img src="assets/${bucketImages[currentQuestion.colours[0]]}" alt="${currentQuestion.colours[0]} bucket">`;
  bucket2.innerHTML = `<img src="assets/${bucketImages[currentQuestion.colours[1]]}" alt="${currentQuestion.colours[1]} bucket">`;

  bucket1.onclick = () => tapBucket(bucket1,currentQuestion.colours[0]);
  bucket2.onclick = () => tapBucket(bucket2,currentQuestion.colours[1]);
}

function tapBucket(bucket, colour){
  if(!canTap || tapped.includes(colour)) return;

  tapped.push(colour);

  bucket.classList.add("tapGlow");
  setTimeout(()=>bucket.classList.remove("tapGlow"),800);

  pourPaint(colour);

  if(tapped.length === 1){
    fillBottom.style.height = "50%";
    fillBottom.style.background = colourHex[colour];
    message.textContent = "Now tap the second paint bucket.";
  }

  if(tapped.length === 2){
    canTap = false;

    setTimeout(()=>{
      fillTop.style.height = "50%";
      fillTop.style.background = colourHex[colour];
      message.textContent = "What colour did we make?";
      showOptions();
    },550);
  }
}

function pourPaint(colour){
  const drop = document.createElement("div");
  drop.className = "pourDrop";
  drop.style.background = colourHex[colour];
  emptyBucket.appendChild(drop);
  setTimeout(()=>drop.remove(),800);
}

function showOptions(){
  canAnswer = true;
  optionsPanel.style.display = "flex";

  ["orange","green","purple"].sort(()=>Math.random()-0.5).forEach(colour=>{
    const option = document.createElement("div");
    option.className = "option";
    option.dataset.answer = colour;
    option.innerHTML = `
      <div class="circle" style="background:${colourHex[colour]}"></div>
      <div>${colour}</div>
    `;
    option.onclick = () => checkAnswer(option,colour);
    optionsPanel.appendChild(option);
  });
}

function checkAnswer(option, selected){
  if(!canAnswer) return;

  if(selected === currentQuestion.answer){
    canAnswer = false;

    playSound(correctSound);
    setTimeout(()=>playSound(clapSound),150);

    option.classList.add("correct");
    message.textContent = "Good job!";

    setTimeout(()=>{
      fillTop.style.height = "0%";
      fillBottom.style.height = "85%";
      fillBottom.style.background = colourHex[currentQuestion.answer];
    },400);

    setTimeout(()=>{
      currentIndex++;
      showQuestion();
    },1800);

  }else{
    wrongAttempts++;

    playSound(wrongSound);

    option.classList.add("wrong");
    setTimeout(()=>option.classList.remove("wrong"),600);

    if(wrongAttempts >= 2){
      const correctOption = document.querySelector(`[data-answer="${currentQuestion.answer}"]`);
      if(correctOption) correctOption.classList.add("glow");
    }
  }
}

function startCelebration(){
  stopCelebration();

  sparkleTimer = setInterval(()=>{
    const sparkle = document.createElement("img");
    sparkle.className = "sparkle";
    sparkle.src = "assets/sparkle.png";
    sparkle.style.left = Math.random()*100 + "vw";
    sparkle.style.top = "-35px";

    const size = 28 + Math.random()*26;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";

    endScreen.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),3200);
  },80);

  burstTimer = setInterval(()=>{
    createBurst(Math.random()*window.innerWidth, Math.random()*window.innerHeight*0.75);
  },260);
}

function createBurst(x,y){
  const burst = document.createElement("div");
  burst.className = "burst";
  burst.style.left = x + "px";
  burst.style.top = y + "px";

  const colours = ["#ffd45c","#ff7aa8","#9ee7ff","#8df2a6","#d9b3ff","#ff9f43"];

  for(let i=0;i<16;i++){
    const dot = document.createElement("span");
    const angle = (Math.PI * 2 * i) / 16;
    const distance = 55 + Math.random()*45;

    dot.style.background = colours[Math.floor(Math.random()*colours.length)];
    dot.style.setProperty("--x", Math.cos(angle)*distance + "px");
    dot.style.setProperty("--y", Math.sin(angle)*distance + "px");

    burst.appendChild(dot);
  }

  endScreen.appendChild(burst);
  setTimeout(()=>burst.remove(),1200);
}

function stopCelebration(){
  if(sparkleTimer){
    clearInterval(sparkleTimer);
    sparkleTimer = null;
  }

  if(burstTimer){
    clearInterval(burstTimer);
    burstTimer = null;
  }

  document.querySelectorAll(".sparkle,.burst").forEach(el=>el.remove());
}

function restartGame(){
  stopCelebration();
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
