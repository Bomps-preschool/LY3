<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secondary Colours Game</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
  background:linear-gradient(135deg,#f3e7ff,#ffe4ef,#dcfff2);
  color:#50364d;
}

.screen{
  width:100vw;
  height:100dvh;
  display:none;
}

.active{display:flex}

#logoScreen{
  background:white;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:min(280px,70vw);
}

#gameScreen{
  flex-direction:column;
}

.header{
  height:64px;
  background:#fff0df;
  border-bottom:4px solid #c9a7ff;
  text-align:center;
  padding:5px 10px;
}

.header h1{
  margin:0;
  font-size:clamp(22px,3vw,34px);
}

.header p{
  margin:2px 0 0;
  font-size:clamp(12px,1.5vw,17px);
}

.gameArea{
  height:calc(100dvh - 64px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-around;
  padding:16px;
}

.bucketLine{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
}

.bucketBox{
  width:min(190px,24vw);
  height:min(190px,28vh);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
}

.bucketBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.plus,.equals{
  font-size:clamp(34px,5vw,60px);
  font-weight:bold;
  color:#6c4d75;
}

.emptyBucket{
  width:min(190px,24vw);
  height:min(190px,28vh);
  border:5px solid #bca3d8;
  border-radius:24px 24px 34px 34px;
  background:#fffaf5;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 16px rgba(0,0,0,.12);
}

.emptyBucket::before{
  content:"";
  position:absolute;
  top:-20px;
  left:22%;
  width:56%;
  height:42px;
  border:6px solid #bca3d8;
  border-bottom:none;
  border-radius:50px 50px 0 0;
}

.fill{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:0%;
  transition:height .6s ease, background .6s ease;
}

.bucketFace{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:35%;
  font-size:34px;
  z-index:2;
}

.pourDrop{
  position:absolute;
  width:28px;
  height:60px;
  border-radius:20px;
  top:25%;
  left:50%;
  transform:translateX(-50%);
  animation:pour .7s ease forwards;
  z-index:5;
}

@keyframes pour{
  from{top:20%;opacity:1}
  to{top:80%;opacity:0}
}

.tapGlow{
  animation:tapGlow .8s ease;
}

@keyframes tapGlow{
  0%{transform:scale(1)}
  50%{transform:scale(1.06)}
  100%{transform:scale(1)}
}

.optionsPanel{
  width:100%;
  display:none;
  justify-content:center;
  gap:18px;
}

.option{
  width:min(210px,28vw);
  padding:14px;
  background:#fffaf5;
  border:4px solid #c9a7ff;
  border-radius:26px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-size:clamp(18px,2.4vw,30px);
  font-weight:bold;
}

.circle{
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid white;
  box-shadow:0 5px 12px rgba(0,0,0,.18);
}

.option.correct{
  background:#dcffd8;
  border-color:#72c96d;
}

.option.wrong{
  animation:wiggle .35s ease;
}

.option.glow{
  box-shadow:0 0 18px 8px #9ee8c9;
}

@keyframes wiggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

.message{
  font-size:clamp(20px,2.6vw,34px);
  font-weight:bold;
  text-align:center;
  background:rgba(255,255,255,.75);
  padding:10px 24px;
  border-radius:22px;
  border:3px solid #c9a7ff;
}

#endScreen{
  background:linear-gradient(135deg,#f3e7ff,#ffe4ef,#dcfff2);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

#endScreen h1{
  font-size:clamp(42px,7vw,78px);
  margin:0 0 10px;
  z-index:2;
}

#endScreen p{
  font-size:clamp(22px,3vw,34px);
  z-index:2;
}

.playAgain{
  font-size:clamp(20px,2.5vw,28px);
  padding:14px 34px;
  border:none;
  border-radius:18px;
  background:#a7ecd0;
  color:#51374d;
  font-weight:bold;
  cursor:pointer;
  z-index:2;
}

.sparkle{
  position:absolute;
  width:32px;
  height:32px;
  pointer-events:none;
  animation:sparkleFall 3s linear forwards;
}

@keyframes sparkleFall{
  0%{transform:translateY(-30px) scale(1);opacity:1}
  100%{transform:translateY(110dvh) scale(.4);opacity:0}
}

@media(max-width:800px){
  .header{height:58px}
  .header h1{font-size:20px}
  .header p{font-size:11px}

  .gameArea{
    height:calc(100dvh - 58px);
    padding:8px;
  }

  .bucketLine{
    gap:8px;
  }

  .bucketBox,.emptyBucket{
    width:24vw;
    height:24vw;
  }

  .bucketFace{
    font-size:24px;
  }

  .optionsPanel{
    gap:8px;
  }

  .option{
    width:30vw;
    padding:8px;
  }

  .circle{
    width:45px;
    height:45px;
  }
}
</style>
</head>

<body>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <h1>Magic Paint Mixing Lab</h1>
    <p>Tap both paint buckets and see the new colour.</p>
  </div>

  <div class="gameArea">
    <div class="message" id="message">Tap the first paint bucket.</div>

    <div class="bucketLine">
      <div class="bucketBox" id="bucket1"></div>
      <div class="plus">+</div>
      <div class="bucketBox" id="bucket2"></div>
      <div class="equals">=</div>

      <div class="emptyBucket" id="emptyBucket">
        <div class="fill" id="fill"></div>
        <div class="bucketFace">😊</div>
      </div>
    </div>

    <div class="optionsPanel" id="optionsPanel"></div>
  </div>
</div>

<div id="endScreen" class="screen">
  <h1>Excellent!</h1>
  <p>You made all secondary colours.</p>
  <button class="playAgain" onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/claps.mp3" preload="auto"></audio>

<script>
const questions = [
  { colours:["red","yellow"], answer:"orange" },
  { colours:["yellow","blue"], answer:"green" },
  { colours:["red","blue"], answer:"purple" }
];

const bucketImages = {
  red:"red-bucket.png",
  yellow:"yellow-bucket.png",
  blue:"blue-bucket.png"
};

const colourHex = {
  red:"#ef3b45",
  yellow:"#f4e84a",
  blue:"#2385c7",
  orange:"#f7941e",
  green:"#35b85a",
  purple:"#713ca6"
};

let currentIndex = 0;
let currentQuestion;
let tapped = [];
let canTap = true;
let canAnswer = false;
let wrongAttempts = 0;
let sparkleTimer = null;

const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const bucket1 = document.getElementById("bucket1");
const bucket2 = document.getElementById("bucket2");
const emptyBucket = document.getElementById("emptyBucket");
const fill = document.getElementById("fill");
const optionsPanel = document.getElementById("optionsPanel");
const message = document.getElementById("message");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(()=>{
    logoScreen.classList.remove("active");
    gameScreen.classList.add("active");
    startGame();
  },5000);
};

function playSound(sound){
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function startGame(){
  stopSparkles();
  currentIndex = 0;
  showQuestion();
}

function showQuestion(){
  if(currentIndex >= questions.length){
    gameScreen.classList.remove("active");
    endScreen.classList.add("active");
    startSparkles();
    return;
  }

  currentQuestion = questions[currentIndex];
  tapped = [];
  canTap = true;
  canAnswer = false;
  wrongAttempts = 0;

  fill.style.height = "0%";
  fill.style.background = "transparent";
  optionsPanel.style.display = "none";
  optionsPanel.innerHTML = "";
  message.textContent = "Tap the first paint bucket.";

  bucket1.innerHTML = `<img src="assets/${bucketImages[currentQuestion.colours[0]]}" alt="${currentQuestion.colours[0]} bucket">`;
  bucket2.innerHTML = `<img src="assets/${bucketImages[currentQuestion.colours[1]]}" alt="${currentQuestion.colours[1]} bucket">`;

  bucket1.onclick = () => tapBucket(bucket1,currentQuestion.colours[0]);
  bucket2.onclick = () => tapBucket(bucket2,currentQuestion.colours[1]);
}

function tapBucket(bucket, colour){
  if(!canTap || tapped.includes(colour)) return;

  tapped.push(colour);
  bucket.classList.add("tapGlow");
  setTimeout(()=>bucket.classList.remove("tapGlow"),800);

  pourPaint(colour);

  if(tapped.length === 1){
    fill.style.height = "45%";
    fill.style.background = colourHex[colour];
    message.textContent = "Now tap the second paint bucket.";
  }

  if(tapped.length === 2){
    canTap = false;

    setTimeout(()=>{
      fill.style.height = "85%";
      fill.style.background = colourHex[currentQuestion.answer];
      message.textContent = "What colour did we make?";
      showOptions();
    },700);
  }
}

function pourPaint(colour){
  const drop = document.createElement("div");
  drop.className = "pourDrop";
  drop.style.background = colourHex[colour];
  emptyBucket.appendChild(drop);
  setTimeout(()=>drop.remove(),800);
}

function showOptions(){
  canAnswer = true;
  optionsPanel.style.display = "flex";

  ["orange","green","purple"].sort(()=>Math.random()-0.5).forEach(colour=>{
    const option = document.createElement("div");
    option.className = "option";
    option.dataset.answer = colour;
    option.innerHTML = `
      <div class="circle" style="background:${colourHex[colour]}"></div>
      <div>${colour}</div>
    `;
    option.onclick = () => checkAnswer(option,colour);
    optionsPanel.appendChild(option);
  });
}

function checkAnswer(option, selected){
  if(!canAnswer) return;

  if(selected === currentQuestion.answer){
    canAnswer = false;

    playSound(correctSound);
    setTimeout(()=>playSound(clapSound),150);

    option.classList.add("correct");

    setTimeout(()=>{
      currentIndex++;
      showQuestion();
    },1400);

  }else{
    wrongAttempts++;
    playSound(wrongSound);

    option.classList.add("wrong");
    setTimeout(()=>option.classList.remove("wrong"),600);

    if(wrongAttempts >= 2){
      const correctOption = document.querySelector(`[data-answer="${currentQuestion.answer}"]`);
      if(correctOption) correctOption.classList.add("glow");
    }
  }
}

function startSparkles(){
  stopSparkles();

  sparkleTimer = setInterval(()=>{
    const sparkle = document.createElement("img");
    sparkle.className = "sparkle";
    sparkle.src = "assets/sparkle.png";
    sparkle.style.left = Math.random()*100 + "vw";
    sparkle.style.top = "-30px";
    const size = 26 + Math.random()*22;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";
    endScreen.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),3000);
  },120);
}

function stopSparkles(){
  if(sparkleTimer){
    clearInterval(sparkleTimer);
    sparkleTimer = null;
  }
  document.querySelectorAll(".sparkle").forEach(s=>s.remove());
}

function restartGame(){
  stopSparkles();
  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
  startGame();
}
</script>

</body>
</html>
