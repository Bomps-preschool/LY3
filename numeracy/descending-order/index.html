<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ice Cream Game FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Comic Sans MS;
  background:url("assets/background.png") no-repeat center center;
  background-size:cover;
  overflow:hidden;
  height:100vh;
}

/* SPLASH */
#splash{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:white;
}

/* GAME */
#game{
  display:none;
  height:100vh;
  width:100vw;
  display:flex;
  flex-direction:column;
}

/* TITLE */
#title{
  text-align:center;
  padding:8px;
  font-size:22px;
  color:#333;
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* CONE (BIG FIX) */
#cone{
  width:180px;   /* 🔥 increased size */
  position:absolute;
  bottom:30px;
}

/* STACK */
#stack{
  position:absolute;
  bottom:200px;
  display:flex;
  flex-direction:column-reverse;
  align-items:center;
}

/* SLOT */
.slot{
  width:110px;
  height:55px;
  border:2px dashed rgba(0,0,0,0.2);
  border-radius:40px;
  margin:3px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* SCOOP TRAY */
#tray{
  height:160px;
  background:rgba(255,255,255,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  padding:10px;
}

/* SCOOPS (BIG FIX) */
.scoop{
  width:90px;   /* 🔥 increased size */
  height:90px;
  object-fit:contain;

  /* 🔥 IMPORTANT: removes white box illusion */
  background:transparent;
  border:none;

  cursor:pointer;
  transition:0.2s;
}

.scoop:active{
  transform:scale(1.1);
}

/* SOUND SAFETY */
audio{
  display:none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

<div id="title">🍦 Build Ice Cream (Descending Order)</div>

<div id="main">

  <img id="cone" src="assets/cone.png">

  <div id="stack"></div>

</div>

<div id="tray"></div>

</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let levels = [
  [2,7,5],
  [3,8,9],
  [7,4,6],
  [9,1,8],
  [4,7,2]
];

let levelIndex=0;
let selected=null;

/* SAFE SOUND PLAY */
function play(id){
  let a=document.getElementById(id);
  if(a){
    a.currentTime=0;
    a.play().catch(()=>{});
  }
}

/* START */
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="flex";
    loadLevel();
  },2000);
};

/* LOAD LEVEL */
function loadLevel(){

  let set=levels[levelIndex];

  document.getElementById("title").innerText =
    "🍦 Level " + (levelIndex+1) + " (Descending Order)";

  createStack();
  createScoops(set);
}

/* STACK */
function createStack(){

  let stack=document.getElementById("stack");
  stack.innerHTML="";

  for(let i=1;i<=3;i++){
    let d=document.createElement("div");
    d.className="slot";
    stack.appendChild(d);
  }
}

/* SCOOPS */
function createScoops(arr){

  let tray=document.getElementById("tray");
  tray.innerHTML="";

  arr.sort(()=>Math.random()-0.5);

  arr.forEach(n=>{
    let img=document.createElement("img");
    img.src=`assets/scoop-${n}.png`;
    img.className="scoop";
    img.dataset.value=n;

    img.onclick=()=>selected={img,n};

    tray.appendChild(img);
  });
}

/* PLACE */
document.getElementById("stack").onclick=()=>{

  if(!selected) return;

  let slots=document.querySelectorAll(".slot");

  for(let s of slots){

    if(s.innerHTML==""){

      let expected = getExpected(slots);

      if(selected.n === expected){

        play("correct");

        s.innerHTML=`<img src="assets/scoop-${selected.n}.png" style="width:100px">`;

        selected.img.style.visibility="hidden";
        selected=null;

        checkWin();

      }else{
        play("wrong");
      }

      break;
    }
  }
};

/* DESCENDING LOGIC */
function getExpected(slots){

  let set=levels[levelIndex].slice().sort((a,b)=>b-a);

  let filled=Array.from(slots).filter(x=>x.innerHTML!="").length;

  return set[filled];
}

/* WIN */
function checkWin(){

  let filled=0;

  document.querySelectorAll(".slot").forEach(s=>{
    if(s.innerHTML!="") filled++;
  });

  if(filled===3){

    play("clap");

    confetti({
      particleCount:350,
      spread:160,
      origin:{y:0.6}
    });

    setTimeout(()=>{

      levelIndex++;

      if(levelIndex<levels.length){
        loadLevel();
      }else{
        document.getElementById("game").innerHTML=
        "<h1 style='text-align:center;margin-top:40vh'>🎉 All Levels Done!</h1>";
      }

    },1200);
  }
}

</script>

</body>
</html>
