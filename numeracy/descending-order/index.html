<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ice Cream Stack Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/background.png") no-repeat center center fixed;
    background-size:cover;
    overflow:hidden;
}

/* SPLASH */
#splash{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:10px;
}

/* TITLE */
h1{
    margin:10px;
    color:#2c3e50;
}

/* CONE AREA */
#coneArea{
    margin-top:20px;
    position:relative;
    height:320px;
}

/* CONE */
#cone{
    width:140px;
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
}

/* STACK AREA */
#stack{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
}

/* SCOOP SLOT */
.slot{
    width:90px;
    height:45px;
    margin:2px;
    border-radius:50px 50px 20px 20px;
    border:2px dashed rgba(0,0,0,0.2);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SCOOPS */
#scoops{
    margin-top:20px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

/* SCOOP IMAGE BUTTON */
.scoop{
    width:70px;
    cursor:pointer;
    transition:0.2s;
}

.scoop:active{
    transform:scale(1.1);
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

button{
    padding:10px 20px;
    font-size:18px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:8px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<h1>🍦 Build the Ice Cream!</h1>
<p>Tap scoops in correct order (1 → 9)</p>

<div id="coneArea">

    <div id="stack"></div>

    <img id="cone" src="assets/cone.png">

</div>

<div id="scoops"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Ice Cream Ready!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let selected = null;
let current = 1;

/* START */
window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("game").style.display="block";
        initGame();
    },5000);
};

/* INIT */
function initGame(){
    createStack();
    createScoops();
}

/* STACK */
function createStack(){
    let stack = document.getElementById("stack");
    stack.innerHTML = "";

    for(let i=1;i<=9;i++){
        let div = document.createElement("div");
        div.className = "slot";
        div.dataset.value = i;
        stack.appendChild(div);
    }
}

/* SCOOPS */
function createScoops(){

    let box = document.getElementById("scoops");
    box.innerHTML = "";

    let order = [1,2,3,4,5,6,7,8,9];
    order.sort(()=>Math.random()-0.5);

    order.forEach(n=>{
        let img = document.createElement("img");
        img.src = `assets/scoop-${n}.png`;
        img.className = "scoop";
        img.dataset.value = n;

        img.onclick = ()=>select(img,n);

        box.appendChild(img);
    });
}

/* SELECT SCOOP */
function select(el,n){
    selected = {el,n};
}

/* PLACE */
document.getElementById("stack").addEventListener("click",function(e){

    if(!selected) return;

    let slots = document.querySelectorAll(".slot");

    for(let slot of slots){

        if(slot.innerText === ""){

            if(parseInt(slot.dataset.value) === selected.n){

                document.getElementById("correct").play();

                slot.innerHTML = `<img src="assets/scoop-${selected.n}.png" style="width:70px">`;

                selected.el.style.visibility="hidden";
                selected=null;

                checkWin();

            } else {
                document.getElementById("wrong").play();
            }

            break;
        }
    }
});

/* WIN */
function checkWin(){

    let filled = 0;
    document.querySelectorAll(".slot").forEach(s=>{
        if(s.innerText !== "") filled++;
    });

    if(filled === 9){

        document.getElementById("clap").play();

        confetti({
            particleCount:400,
            spread:160,
            origin:{y:0.6}
        });

        setTimeout(()=>{
            document.getElementById("game").style.display="none";
            document.getElementById("end").style.display="flex";
        },1200);
    }
}

/* RESTART */
function restart(){
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="block";
    selected=null;
    initGame();
}

</script>

</body>
</html>
