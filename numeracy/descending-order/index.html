<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Descending Numbers Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:20px;
}

/* MAIN TITLE */
h2{
    font-size:28px;
    margin-bottom:20px;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* BOXES */
#numberBoxes{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.box{
    width:100px;
    height:100px;
    border:2px dashed #666;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    cursor:pointer;
    transition:0.3s;
}

/* CORRECT ANIMATION */
.correctAnim{
    animation:correctPulse 0.6s ease;
}

@keyframes correctPulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* WRONG ANIMATION */
.wrongAnim{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
#end h1{
    font-size:48px;
    margin-bottom:20px;
}
#playAgain{
    padding:10px 30px;
    font-size:24px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">
<h2>Arrange the numbers in descending order!</h2>
<div id="numberBoxes"></div>
<div id="choices" style="margin-top:30px; display:flex; gap:15px; justify-content:center;"></div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button id="playAgain">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
const numbers = [1,3,5,7,9];
let currentIndex = 0;

function shuffleArray(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function loadGame(){
    if(currentIndex >= numbers.length){
        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";
        document.getElementById("clap").play();
        return;
    }

    const boxesDiv = document.getElementById("numberBoxes");
    const choicesDiv = document.getElementById("choices");
    boxesDiv.innerHTML = '';
    choicesDiv.innerHTML = '';

    // show empty boxes
    for(let i=0; i<numbers.length; i++){
        let box = document.createElement("div");
        box.classList.add("box");
        box.dataset.index = i;
        boxesDiv.appendChild(box);
    }

    // create shuffled choices
    let shuffled = shuffleArray([...numbers]);
    shuffled.forEach(num=>{
        let choice = document.createElement("div");
        choice.classList.add("box");
        choice.style.backgroundColor = num===1?"#4CAF50": num===3?"#FF5722": num===5?"#FF9800": num===7?"#9C27B0":"#2196F3";
        choice.style.color = "white";
        choice.textContent = num;
        choice.addEventListener("click",()=> checkAnswer(num, choice));
        choicesDiv.appendChild(choice);
    });
}

function checkAnswer(num, element){
    const correctNum = numbers[currentIndex];
    if(num === correctNum){
        element.classList.add("correctAnim");
        document.getElementById("correct").play();
        document.getElementById("correct").onended = ()=>{
            document.getElementById("clap").play();
            document.getElementById("clap").onended = ()=>{
                currentIndex++;
                loadGame();
            }
        };
    } else {
        element.classList.add("wrongAnim");
        document.getElementById("wrong").play();
        setTimeout(()=>{element.classList.remove("wrongAnim");},500);
    }
}

document.getElementById("playAgain").addEventListener("click",()=>{
    currentIndex=0;
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="block";
    loadGame();
});

// initial logo
setTimeout(()=>{
    document.getElementById("logo").style.display="none";
    document.getElementById("game").style.display="block";
    loadGame();
},5000);
</script>

</body>
</html>
