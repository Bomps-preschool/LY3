<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ice Cream Game FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* GLOBAL FIX */
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Comic Sans MS;
    background:url("assets/background.png") no-repeat center center;
    background-size:cover;
    height:100vh;
    overflow:hidden;
}

/* SPLASH */
#splash{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

/* GAME WRAPPER */
#game{
    display:none;
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
}

/* TITLE */
#title{
    text-align:center;
    font-size:22px;
    padding:8px;
    color:#2c3e50;
}

/* MAIN AREA */
#main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* CONE */
#cone{
    width:120px;
    position:absolute;
    bottom:40px;
}

/* STACK AREA */
#stack{
    position:absolute;
    bottom:160px;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
}

/* SLOT */
.slot{
    width:80px;
    height:40px;
    border:2px dashed #aaa;
    border-radius:30px;
    margin:2px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SCOOP TRAY */
#tray{
    height:140px;
    background:rgba(255,255,255,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
}

/* SCOOPS */
.scoop{
    width:60px;
    cursor:pointer;
    transition:0.2s;
}

.scoop:active{
    transform:scale(1.1);
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" width="200">
</div>

<!-- GAME -->
<div id="game">

<div id="title">🍦 Build the Ice Cream (1 → 9)</div>

<div id="main">

    <img id="cone" src="assets/cone.png">

    <div id="stack"></div>

</div>

<div id="tray"></div>

</div>

<script>

let selected=null;

/* START */
window.onload=()=>{
    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("game").style.display="flex";
        init();
    },2000);
};

function init(){
    createStack();
    createScoops();
}

/* STACK */
function createStack(){

    let stack=document.getElementById("stack");
    stack.innerHTML="";

    for(let i=1;i<=9;i++){
        let d=document.createElement("div");
        d.className="slot";
        d.dataset.value=i;
        stack.appendChild(d);
    }
}

/* SCOOPS */
function createScoops(){

    let tray=document.getElementById("tray");
    tray.innerHTML="";

    let arr=[1,2,3,4,5,6,7,8,9];
    arr.sort(()=>Math.random()-0.5);

    arr.forEach(n=>{
        let img=document.createElement("img");
        img.src=`assets/scoop-${n}.png`;
        img.className="scoop";
        img.dataset.value=n;

        img.onclick=()=>selected={img,n};

        tray.appendChild(img);
    });
}

/* PLACE */
document.getElementById("stack").onclick=(e)=>{

    if(!selected) return;

    let slots=document.querySelectorAll(".slot");

    for(let s of slots){
        if(s.innerHTML==""){

            if(parseInt(s.dataset.value)==selected.n){

                s.innerHTML=`<img src="assets/scoop-${selected.n}.png" style="width:60px">`;
                selected.img.style.visibility="hidden";
                selected=null;

                checkWin();
            }
            break;
        }
    }
};

function checkWin(){

    let filled=0;
    document.querySelectorAll(".slot").forEach(s=>{
        if(s.innerHTML!="") filled++;
    });

    if(filled==9){

        confetti({
            particleCount:300,
            spread:160,
            origin:{y:0.6}
        });
    }
}

</script>

</body>
</html>
