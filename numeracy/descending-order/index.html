<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Descending Order Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    background:#eaf6f6;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}
#logo img{width:250px;}
#game{text-align:center;padding:20px;display:none;}
h1{font-size:28px;margin-bottom:20px;}
#boxes{display:flex;justify-content:center;gap:15px;margin-bottom:30px;}
.box{
    width:100px;height:100px;border:3px dashed #666;border-radius:12px;
    display:flex;justify-content:center;align-items:center;font-size:32px;background:white;
}
#numbers{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;}
.number-tile{
    width:100px;height:100px;border-radius:12px;
    display:flex;justify-content:center;align-items:center;
    font-size:36px;font-weight:bold;color:white;cursor:pointer;user-select:none;
}
.number-tile.purple{background:#9b59b6;}
.number-tile.orange{background:#f39c12;}
.number-tile.green{background:#27ae60;}
.number-tile.red{background:#e74c3c;}
.number-tile.blue{background:#3498db;}
#end{display:none;text-align:center;}
#end h1{font-size:40px;margin-bottom:20px;}
#end button{padding:10px 30px;font-size:24px;background:#4CAF50;color:white;border:none;border-radius:10px;cursor:pointer;}
canvas{position:fixed;top:0;left:0;pointer-events:none;width:100%;height:100%;}
</style>
</head>
<body>

<!-- Logo -->
<div id="logo">
    <img src="assets/innovine-logo.png">
</div>

<!-- Game -->
<div id="game">
    <h1>Arrange the numbers in descending order!</h1>
    <div id="boxes">
        <div class="box" data-index="0"></div>
        <div class="box" data-index="1"></div>
        <div class="box" data-index="2"></div>
        <div class="box" data-index="3"></div>
        <div class="box" data-index="4"></div>
    </div>
    <div id="numbers"></div>
</div>

<!-- End -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<!-- Confetti canvas -->
<canvas id="confetti"></canvas>

<script>
// Game setup
let numbersArray = [
    {value:9,color:'blue'},
    {value:7,color:'purple'},
    {value:5,color:'orange'},
    {value:3,color:'red'},
    {value:1,color:'green'}
];
let draggedNumber = null;
let boxes = document.querySelectorAll('.box');

// Show logo first
setTimeout(() => {
    document.getElementById('logo').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    initGame();
}, 5000);

// Initialize game
function initGame(){
    shuffleArray(numbersArray);
    displayNumbers();
    boxes.forEach(box => { box.textContent=''; });
}

// Display numbers as tiles
function displayNumbers(){
    const container = document.getElementById('numbers');
    container.innerHTML='';
    numbersArray.forEach(num=>{
        const div = document.createElement('div');
        div.classList.add('number-tile',num.color);
        div.textContent=num.value;
        container.appendChild(div);

        div.addEventListener('click',()=>{
            handleNumberClick(num.value, div);
        });
    });
}

// Shuffle helper
function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

// Handle number click
function handleNumberClick(selectedValue, element){
    // Next box to fill
    let nextIndex = Array.from(boxes).findIndex(b=>b.textContent==='');
    if(nextIndex===-1) return;

    let correctValue = numbersArray.map(n=>n.value).sort((a,b)=>b-a)[nextIndex];

    if(selectedValue === correctValue){
        boxes[nextIndex].textContent = selectedValue;
        // Remove number visually
        element.style.visibility='hidden';
        document.getElementById('correct').play();
        document.getElementById('correct').onended = ()=>{
            document.getElementById('clap').play();
        };

        // Check completion
        let completed = Array.from(boxes).every((b,i)=>parseInt(b.textContent)===numbersArray.map(n=>n.value).sort((a,b)=>b-a)[i]);
        if(completed){
            setTimeout(()=>{
                document.getElementById('game').style.display='none';
                document.getElementById('end').style.display='block';
                launchConfetti();
            },600);
        }
    } else {
        // Wrong answer: number stays visible
        document.getElementById('wrong').play();
        element.classList.add('wrongAnim');
        setTimeout(()=>element.classList.remove('wrongAnim'),400);
    }
}

// Restart game
function restartGame(){
    document.getElementById('end').style.display='none';
    document.getElementById('game').style.display='block';
    initGame();
}

// Confetti effect
function launchConfetti(){
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const confettis=[];
    const colors=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#2ecc71'];
    for(let i=0;i<80;i++){
        confettis.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height-100,
            r: Math.random()*6+4,
            d: Math.random()*10+5,
            color: colors[Math.floor(Math.random()*colors.length)],
            tilt: Math.random()*10-10,
            tiltAngleIncrement: Math.random()*0.07+0.05
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettis.forEach(c=>{
            ctx.beginPath();
            ctx.lineWidth = c.r;
            ctx.strokeStyle = c.color;
            ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
            ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
            ctx.stroke();
        });
        update();
        requestAnimationFrame(draw);
    }

    function update(){
        confettis.forEach(c=>{
            c.tiltAngle += c.tiltAngleIncrement;
            c.y += (Math.cos(c.d)+1+c.r/2)/2;
            c.tilt = Math.sin(c.tiltAngle)*12;
            if(c.y>canvas.height){c.y=-20;c.x=Math.random()*canvas.width;}
        });
    }
    draw();
}
</script>
</body>
</html>
