<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ice Cream Stack Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/background.png") no-repeat center center fixed;
    background-size:cover;
    overflow:hidden;
}

/* SPLASH */
#splash{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:10px;
}

/* TITLE */
h1{
    margin:10px;
    color:#2c3e50;
}

/* ICE CREAM CONE */
#cone{
    width:120px;
    margin:20px auto;
}

/* STACK AREA */
#stack{
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    margin-top:20px;
    min-height:300px;
}

/* SCOOP SLOT */
.slot{
    width:90px;
    height:45px;
    margin:3px;
    border-radius:50px 50px 20px 20px;
    background:#fff;
    border:2px dashed #aaa;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

/* SCOOPS PANEL */
#scoops{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

/* SCOOP */
.scoop{
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:white;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* COLORS */
.c1{background:#ff6b6b;}
.c2{background:#feca57;}
.c3{background:#48dbfb;}
.c4{background:#1dd1a1;}
.c5{background:#5f27cd;}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

button{
    padding:10px 20px;
    font-size:18px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* SPRINKLES */
.sprinkle{
    position:absolute;
    width:6px;
    height:6px;
    background:gold;
    border-radius:50%;
    animation:fall 1s linear forwards;
}

@keyframes fall{
    from{transform:translateY(-20px);}
    to{transform:translateY(400px); opacity:0;}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<h1>🍦 Build the Ice Cream!</h1>
<p>Tap scoops in correct order (1 → 5)</p>

<div id="cone">
    <img src="assets/cone.png" width="120">
</div>

<div id="stack"></div>

<div id="scoops"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Yummy Ice Cream Ready!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

let selected = null;
let current = 1;

/* START */
window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("game").style.display="block";
        startGame();
    },5000);
};

/* INIT */
function startGame(){
    createStack();
    createScoops();
}

/* STACK */
function createStack(){

    let stack = document.getElementById("stack");
    stack.innerHTML = "";

    for(let i=1;i<=5;i++){
        let div = document.createElement("div");
        div.className = "slot";
        div.dataset.value = i;

        div.onclick = ()=>place(div);

        stack.appendChild(div);
    }
}

/* SCOOPS */
function createScoops(){

    let colors = ["c1","c2","c3","c4","c5"];
    let nums = [1,2,3,4,5];

    nums.sort(()=>Math.random()-0.5);

    let box = document.getElementById("scoops");
    box.innerHTML = "";

    nums.forEach((n,i)=>{
        let div = document.createElement("div");
        div.className = "scoop " + colors[i];
        div.innerText = n;

        div.onclick = ()=>select(div,n);

        box.appendChild(div);
    });
}

/* SELECT SCOOP */
function select(div,n){
    selected = {div,n};
}

/* PLACE */
function place(slot){

    if(!selected) return;

    if(parseInt(slot.dataset.value) === selected.n){

        document.getElementById("correct").play();

        slot.innerText = selected.n;

        selected.div.style.visibility="hidden";
        selected = null;

        checkWin();

    } else {
        document.getElementById("wrong").play();
    }
}

/* SPRINKLES */
function sprinkleEffect(){
    for(let i=0;i<20;i++){
        let s = document.createElement("div");
        s.className = "sprinkle";
        s.style.left = Math.random()*100 + "%";
        document.body.appendChild(s);

        setTimeout(()=>s.remove(),1000);
    }
}

/* WIN */
function checkWin(){

    let filled = document.querySelectorAll(".slot").length;
    let done = 0;

    document.querySelectorAll(".slot").forEach(s=>{
        if(s.innerText !== "") done++;
    });

    if(done === 5){

        sprinkleEffect();

        confetti({
            particleCount:300,
            spread:160,
            origin:{y:0.6}
        });

        setTimeout(()=>{
            document.getElementById("game").style.display="none";
            document.getElementById("end").style.display="flex";
        },1000);
    }
}

/* RESTART */
function restart(){
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="block";
    selected=null;
    current=1;
    startGame();
}

</script>

</body>
</html>
