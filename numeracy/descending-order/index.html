<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Descending Order Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{
        margin:0;
        font-family: 'Comic Sans MS', sans-serif;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:#eaf6f6;
        height:100vh;
    }

    /* LOGO */
    #logo{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        width:100%;
        background:white;
    }

    #logo img{
        width:250px;
    }

    /* GAME */
    #game{
        display:none;
        text-align:center;
        width:90%;
        max-width:800px;
    }

    h2{
        font-size:28px;
        margin-bottom:20px;
    }

    .box-container{
        display:flex;
        justify-content:center;
        gap:10px;
        margin-bottom:30px;
    }

    .box{
        width:80px;
        height:100px;
        border:3px dashed #666;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:32px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    .box.correct{
        border-color:#4CAF50;
        background:#d1ffd1;
    }

    .box.wrong{
        border-color:red;
        background:#ffd1d1;
        animation:shake 0.3s;
    }

    @keyframes shake{
        0%{transform:translateX(0);}
        25%{transform:translateX(-5px);}
        50%{transform:translateX(5px);}
        75%{transform:translateX(-5px);}
        100%{transform:translateX(0);}
    }

    .number-row{
        display:flex;
        justify-content:center;
        gap:15px;
        flex-wrap:wrap;
    }

    .number{
        width:80px;
        height:80px;
        background:#6c5ce7;
        color:white;
        font-size:32px;
        font-weight:bold;
        border-radius:15px;
        display:flex;
        justify-content:center;
        align-items:center;
        cursor:pointer;
        user-select:none;
        transition:0.3s;
    }

    .number.orange{background:#fd9644;}
    .number.green{background:#00b894;}
    .number.pink{background:#ff7675;}
    .number.blue{background:#0984e3;}

    #end{
        display:none;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-align:center;
    }

    #end h1{
        font-size:48px;
        margin-bottom:20px;
    }

    #playAgain{
        font-size:22px;
        padding:10px 25px;
        border:none;
        border-radius:12px;
        background:#00b894;
        color:white;
        cursor:pointer;
    }
</style>
</head>
<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" alt="Logo">
</div>

<!-- GAME -->
<div id="game">
    <h2>Arrange the numbers in descending order!</h2>

    <div class="box-container">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
        <div class="box" id="box5"></div>
    </div>

    <div class="number-row" id="numbersRow">
        <div class="number purple">7</div>
        <div class="number orange">9</div>
        <div class="number green">1</div>
        <div class="number pink">3</div>
        <div class="number blue">5</div>
    </div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button id="playAgain">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
const logo = document.getElementById('logo');
const game = document.getElementById('game');
const end = document.getElementById('end');
const numbersRow = document.getElementById('numbersRow');
const boxes = Array.from(document.querySelectorAll('.box'));
const numberElems = Array.from(document.querySelectorAll('.number'));

let sequence = [9,7,5,3,1];
let currentIndex = 0;
let correctAudio = document.getElementById('correct');
let wrongAudio = document.getElementById('wrong');
let clapAudio = document.getElementById('clap');

function shuffleNumbers(){
    // shuffle numberElems
    let nums = Array.from(numberElems);
    for(let i=nums.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        let temp = nums[i].textContent;
        nums[i].textContent = nums[j].textContent;
        nums[j].textContent = temp;
    }
}

// Show logo 5s then game
setTimeout(()=>{
    logo.style.display='none';
    game.style.display='block';
    shuffleNumbers();
},5000);

numberElems.forEach(num=>{
    num.addEventListener('click',()=>{
        if(currentIndex >= sequence.length) return;
        let selected = parseInt(num.textContent);

        if(selected === sequence[currentIndex]){
            num.style.visibility='hidden';
            boxes[currentIndex].textContent = selected;
            currentIndex++;
            correctAudio.play();
            correctAudio.onended = ()=>{
                if(currentIndex === sequence.length){
                    game.style.display='none';
                    end.style.display='flex';
                    clapAudio.play();
                }
            };
        } else{
            wrongAudio.play();
            num.classList.add('wrong');
            setTimeout(()=>{num.classList.remove('wrong');},400);
        }
    });
});

document.getElementById('playAgain').addEventListener('click',()=>{
    end.style.display='none';
    game.style.display='block';
    boxes.forEach(box=>box.textContent='');
    numberElems.forEach(num=>num.style.visibility='visible');
    currentIndex=0;
    shuffleNumbers();
});
</script>

</body>
</html>
