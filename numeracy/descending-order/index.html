<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Descending Order Game - Full Version</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background: url('assets/background.png') no-repeat center center fixed;
    background-size: cover;
}
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}
#logo img{width:250px;}
#game{text-align:center;padding:20px;display:none;position:relative;}
h1{font-size:28px;margin-bottom:20px;}
#boxes{display:flex;justify-content:center;gap:15px;margin-bottom:30px;}
.box{width:100px;height:100px;border:3px dashed #666;border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:32px;background:white;}
#numbers{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;}
.number-tile{width:100px;height:100px;border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:36px;font-weight:bold;color:white;cursor:grab;user-select:none;}
.number-tile.purple{background:#9b59b6;}
.number-tile.orange{background:#f39c12;}
.number-tile.green{background:#27ae60;}
.number-tile.red{background:#e74c3c;}
.number-tile.blue{background:#3498db;}
#bear{position:absolute;bottom:0;left:10px;width:150px;}
#end{display:none;text-align:center;width:100%;height:100vh;justify-content:center;align-items:center;flex-direction:column;background:none;}
#end h1{font-size:40px;margin-bottom:20px;}
#end button{padding:10px 30px;font-size:24px;background:#4CAF50;color:white;border:none;border-radius:10px;cursor:pointer;}
canvas{position:fixed;top:0;left:0;pointer-events:none;width:100%;height:100%;}
.wrongAnim{animation:shake 0.4s;}
@keyframes shake{0%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-5px);}100%{transform:translateX(0);}}
</style>
</head>
<body>

<!-- Logo -->
<div id="logo">
    <img src="assets/innovine-logo.png">
</div>

<!-- Game -->
<div id="game">
<h1>Arrange the numbers in descending order!</h1>
<img id="bear" src="assets/bear.png">
<div id="boxes">
    <div class="box" data-index="0"></div>
    <div class="box" data-index="1"></div>
    <div class="box" data-index="2"></div>
</div>
<div id="numbers"></div>
</div>

<!-- End -->
<div id="end">
<h1>🎉 Well Done!</h1>
<button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<canvas id="confetti"></canvas>

<script>
const slides = [
    [3,8,1],
    [2,5,9],
    [4,9,6],
    [7,1,9],
    [6,4,5]
];

let currentSlide = 0;
let currentIndex = 0;
let draggedNumber = null;
let boxes = document.querySelectorAll('.box');

setTimeout(() => {
    document.getElementById('logo').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide(currentSlide);
},5000);

function loadSlide(slideNumber){
    const numbers = slides[slideNumber].slice();
    const boxesDiv = document.getElementById('boxes');
    const numbersDiv = document.getElementById('numbers');

    boxes.forEach(box=>box.textContent='');
    numbersDiv.innerHTML='';

    let shuffled = numbers.sort(()=>Math.random()-0.5);

    shuffled.forEach((num,i)=>{
        const div = document.createElement('div');
        div.classList.add('number-tile');
        if(i===0) div.classList.add('purple');
        if(i===1) div.classList.add('orange');
        if(i===2) div.classList.add('green');
        div.textContent = num;
        numbersDiv.appendChild(div);
        div.addEventListener('click',()=> handleNumberClick(num, div));
    });

    currentIndex = 0;
}

function handleNumberClick(num, element){
    const correctNum = slides[currentSlide].slice().sort((a,b)=>b-a)[currentIndex];

    if(num === correctNum){
        boxes[currentIndex].textContent = num;
        element.style.visibility='hidden';
        currentIndex++;

        // Play clap only after last number on slide
        if(currentIndex === slides[currentSlide].length){
            const clap = document.getElementById('clap');
            clap.currentTime=0;
            clap.play();
            clap.onended=()=>{
                currentSlide++;
                if(currentSlide >= slides.length){
                    document.getElementById('game').style.display='none';
                    document.getElementById('end').style.display='flex';
                    launchConfetti();
                } else {
                    loadSlide(currentSlide);
                }
            };
        } 
    } else {
        document.getElementById('wrong').play();
        element.classList.add('wrongAnim');
        setTimeout(()=>{element.classList.remove('wrongAnim');},400);
    }
}

function restartGame(){
    currentSlide=0;
    currentIndex=0;
    document.getElementById('end').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide(currentSlide);
}

// Confetti effect
function launchConfetti(){
    const canvas=document.getElementById('confetti');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const confettis=[];
    const colors=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#2ecc71'];
    for(let i=0;i<80;i++){
        confettis.push({x: Math.random()*canvas.width,y: Math.random()*canvas.height-100,r: Math.random()*6+4,d: Math.random()*10+5,color: colors[Math.floor(Math.random()*colors.length)],tilt: Math.random()*10-10,tiltAngleIncrement: Math.random()*0.07+0.05});
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettis.forEach(c=>{
            ctx.beginPath();
            ctx.lineWidth=c.r;
            ctx.strokeStyle=c.color;
            ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
            ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
            ctx.stroke();
        });
        update();
        requestAnimationFrame(draw);
    }

    function update(){
        confettis.forEach(c=>{
            c.tiltAngle+=c.tiltAngleIncrement;
            c.y+=(Math.cos(c.d)+1+c.r/2)/2;
            c.tilt=Math.sin(c.tiltAngle)*12;
            if(c.y>canvas.height){c.y=-20;c.x=Math.random()*canvas.width;}
        });
    }
    draw();
}
</script>

</body>
</html>
