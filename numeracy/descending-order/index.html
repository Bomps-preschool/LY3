<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Descending Order Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
}

/* LOGO */
#logo {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

/* GAME */
#game {
    display:none;
    text-align:center;
    padding:20px;
}

h2 {
    font-size:28px;
    margin-bottom:30px;
}

/* NUMBER BOXES */
.number-container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.number-box {
    width:110px;
    height:140px;
    border: 2px dashed #999;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:bold;
}

/* NUMBER OPTIONS */
.option-container {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.option {
    width:100px;
    height:100px;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.option:hover {
    transform: scale(1.1);
}

/* COLORS FOR OPTIONS */
.option1 { background:#9b59b6; }
.option2 { background:#f39c12; }
.option3 { background:#27ae60; }
.option4 { background:#e74c3c; }
.option5 { background:#3498db; }

/* CHARACTER */
#character {
    position:absolute;
    bottom:10px;
    left:10px;
    width:180px;
}

/* END SCREEN */
#end {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* CONFETTI */
.confetti {
    position:fixed;
    width:10px;
    height:10px;
    background:transparent;
    pointer-events:none;
    z-index:9999;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">
    <h2>Arrange the numbers in descending order!</h2>
    <img id="character" src="assets/bear-character.png">

    <div class="number-container">
        <div class="number-box" data-index="0"></div>
        <div class="number-box" data-index="1"></div>
        <div class="number-box" data-index="2"></div>
        <div class="number-box" data-index="3"></div>
        <div class="number-box" data-index="4"></div>
    </div>

    <div class="option-container">
        <div class="option option1">7</div>
        <div class="option option2">3</div>
        <div class="option option3">9</div>
        <div class="option option4">5</div>
        <div class="option option5">1</div>
    </div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button onclick="playAgain()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
const numbers = [7,3,9,5,1];
let currentBoxIndex = 0;
const boxes = document.querySelectorAll(".number-box");
const options = document.querySelectorAll(".option");

function shuffle(arr) {
    return arr.sort(()=>Math.random()-0.5);
}

function playSound(audio){
    return new Promise(resolve=>{
        audio.play();
        audio.onended = resolve;
    });
}

function resetGame() {
    currentBoxIndex = 0;
    boxes.forEach(box => box.textContent="");
    document.getElementById("game").style.display="block";
    document.getElementById("end").style.display="none";
    shuffledOptions = shuffle([...numbers]);
    options.forEach((option, i)=>option.textContent = shuffledOptions[i]);
}

let shuffledOptions = shuffle([...numbers]);

setTimeout(()=> {
    document.getElementById("logo").style.display="none";
    resetGame();
}, 5000);

options.forEach(option=>{
    option.addEventListener("click", async ()=>{
        const selected = Number(option.textContent);
        const correct = Math.max(...shuffledOptions.slice(currentBoxIndex));

        if(selected === correct) {
            boxes[currentBoxIndex].textContent = selected;
            await playSound(document.getElementById("clap"));
            currentBoxIndex++;
            if(currentBoxIndex >= boxes.length){
                document.getElementById("game").style.display="none";
                document.getElementById("end").style.display="flex";
            }
        } else {
            playSound(document.getElementById("wrong"));
        }
    });
});

function playAgain() {
    resetGame();
}
</script>

</body>
</html>
