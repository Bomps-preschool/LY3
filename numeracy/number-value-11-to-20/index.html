<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number Value Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family:"Comic Sans MS", sans-serif;
  background:#fff6e9;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffe8b5,#c8ebff,#ffd6e8);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#logoScreen img{
  width:min(60vw,340px);
}

#game{
  display:none;
  width:100vw;
  height:100vh;
  overflow:hidden;
  flex-direction:column;
}

.header{
  background:#fff2cf;
  text-align:center;
  padding:10px;
  font-size:clamp(22px,3vw,36px);
  font-weight:bold;
  color:#7a4200;
  box-shadow:0 3px 6px rgba(0,0,0,.1);
}

.scene{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#dff5ff,#fff5db);
  padding:10px;
  position:relative;
}

.placeValueBoard{
  width:min(90vw,520px);
  background:white;
  border-radius:24px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  gap:30px;
}

.column{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.rod{
  width:14px;
  height:280px;
  background:#c7802f;
  border-radius:20px;
  position:relative;
}

.bead{
  width:42px;
  height:42px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#b6e3ff,#3d86cc);
  border:3px solid #2b5d92;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 3px 6px rgba(0,0,0,.2);
}

.label{
  margin-top:12px;
  background:#3ea4df;
  color:white;
  font-size:clamp(20px,2.5vw,30px);
  font-weight:bold;
  padding:6px 22px;
  border-radius:12px;
}

.options{
  margin-top:28px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:18px;
}

.option{
  width:95px;
  height:95px;
  border-radius:50%;
  border:none;
  background:linear-gradient(#ffce73,#ff9b4a);
  color:#5a2b00;
  font-size:34px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,.2);
  transition:.2s;
}

.option:hover{
  transform:scale(1.08);
}

.feedback{
  margin-top:20px;
  font-size:clamp(22px,2.5vw,34px);
  font-weight:bold;
  min-height:40px;
}

.correct{
  color:#179b36;
}

.wrong{
  color:#d93333;
}

.nextBtn{
  margin-top:18px;
  padding:12px 28px;
  border:none;
  border-radius:16px;
  background:#7dcf63;
  color:#123b00;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  display:none;
}

.final{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(#2f1f5b,#6d36a8);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  overflow:hidden;
}

.final h1{
  font-size:clamp(50px,7vw,90px);
}

.final p{
  font-size:clamp(28px,4vw,48px);
}

.playAgain{
  margin-top:24px;
  padding:14px 30px;
  border:none;
  border-radius:18px;
  background:#ffd04f;
  color:#5a3500;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
}

.confetti{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:3px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  0%{
    transform:translateY(-100px) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

@media(max-width:768px){

  .rod{
    height:200px;
  }

  .bead{
    width:34px;
    height:34px;
  }

  .option{
    width:78px;
    height:78px;
    font-size:28px;
  }

  .placeValueBoard{
    gap:18px;
  }
}

</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png">
</div>

<div id="game">

  <div class="header">
    Count the beads and choose the correct number.
  </div>

  <div class="scene">

    <div class="placeValueBoard">

      <div class="column">
        <div class="rod" id="tensRod"></div>
        <div class="label">T</div>
      </div>

      <div class="column">
        <div class="rod" id="onesRod"></div>
        <div class="label">O</div>
      </div>

    </div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback"></div>

    <button class="nextBtn" id="nextBtn" onclick="nextQuestion()">
      Next
    </button>

  </div>

</div>

<div class="final" id="finalScreen">
  <h1>🎉 Well Done 🎉</h1>
  <p>You completed the game!</p>

  <button class="playAgain" onclick="playAgain()">
    Play Again
  </button>
</div>

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const questions = [
  {tens:1, ones:3, options:[12,15,13], answer:13},
  {tens:1, ones:7, options:[17,16,20], answer:17},
  {tens:1, ones:5, options:[13,15,12], answer:15},
  {tens:1, ones:1, options:[11,15,19], answer:11},
  {tens:1, ones:9, options:[18,19,14], answer:19},
  {tens:1, ones:4, options:[14,17,13], answer:14},
  {tens:1, ones:8, options:[18,15,11], answer:18},
  {tens:1, ones:2, options:[19,12,15], answer:12},
  {tens:2, ones:0, options:[20,18,16], answer:20},
  {tens:1, ones:6, options:[14,19,16], answer:16}
];

let current = 0;
let gameQuestions = [...questions];

const tensRod = document.getElementById("tensRod");
const onesRod = document.getElementById("onesRod");
const optionsDiv = document.getElementById("options");
const feedback = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  document.getElementById("game").style.display="flex";
  loadQuestion();
},5000);

function playSound(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play().catch(()=>{});
}

function createBeads(rod,count){

  rod.innerHTML="";

  for(let i=0;i<count;i++){

    const bead=document.createElement("div");
    bead.className="bead";

    bead.style.top=(10 + i*48)+"px";

    rod.appendChild(bead);
  }
}

function loadQuestion(){

  feedback.textContent="";
  feedback.className="feedback";

  nextBtn.style.display="none";

  const q=gameQuestions[current];

  createBeads(tensRod,q.tens);
  createBeads(onesRod,q.ones);

  optionsDiv.innerHTML="";

  q.options.forEach(opt=>{

    const btn=document.createElement("button");

    btn.className="option";
    btn.textContent=opt;

    btn.onclick=()=>checkAnswer(opt);

    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(selected){

  const q=gameQuestions[current];

  if(selected===q.answer){

    feedback.textContent="Correct!";
    feedback.classList.add("correct");

    playSound("rightSound");

    nextBtn.style.display="inline-block";

    disableOptions();

  }else{

    feedback.textContent="Try Again!";
    feedback.classList.add("wrong");

    playSound("wrongSound");
  }
}

function disableOptions(){

  document.querySelectorAll(".option").forEach(btn=>{
    btn.disabled=true;
    btn.style.opacity=".7";
  });
}

function nextQuestion(){

  current++;

  if(current>=gameQuestions.length){

    showFinal();

  }else{

    loadQuestion();
  }
}

function showFinal(){

  document.getElementById("game").style.display="none";

  const final=document.getElementById("finalScreen");

  final.style.display="flex";

  createConfetti();
}

function createConfetti(){

  const colors=[
    "#ff4d4d",
    "#ffd93d",
    "#6bff95",
    "#4dc3ff",
    "#ff73d9",
    "#ffffff"
  ];

  for(let i=0;i<220;i++){

    const c=document.createElement("div");

    c.className="confetti";

    c.style.left=Math.random()*100+"vw";

    c.style.background=
      colors[Math.floor(Math.random()*colors.length)];

    c.style.animationDelay=Math.random()*2+"s";

    c.style.width=(8+Math.random()*10)+"px";
    c.style.height=(8+Math.random()*10)+"px";

    document.getElementById("finalScreen").appendChild(c);
  }
}

function playAgain(){

  document.querySelectorAll(".confetti").forEach(c=>c.remove());

  gameQuestions=[...questions].sort(()=>Math.random()-0.5);

  current=0;

  document.getElementById("finalScreen").style.display="none";

  document.getElementById("game").style.display="flex";

  loadQuestion();
}

</script>

</body>
</html>
