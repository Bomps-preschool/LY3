<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Number Value 11–20</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(180deg,#d8e9f3,#f6edd2);
touch-action:manipulation;
}

#logoScreen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#d9edf7,#fce8d5,#e5f5dc);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#logoScreen img{
width:min(65vw,320px);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

#gameContainer{
display:none;
width:100%;
height:100%;
flex-direction:column;
}

.header{
width:100%;
background:#fff3d9;
padding:12px 10px;
text-align:center;
font-size:clamp(16px,2.5vw,28px);
font-weight:bold;
color:#6b3a00;
line-height:1.3;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
z-index:5;
}

.header span{
font-size:clamp(14px,2vw,22px);
color:#7a4200;
}

.gameArea{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
overflow:hidden;
}

.card{
width:min(92vw,900px);
height:min(80vh,560px);
background:#f9f9f9;
border-radius:30px;
display:flex;
overflow:hidden;
box-shadow:0 12px 25px rgba(0,0,0,0.18);
position:relative;
}

.left{
width:50%;
background:#f4f0ff;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
}

.right{
width:50%;
background:#eef8ec;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
}

.title{
position:absolute;
top:16px;
font-size:clamp(22px,2.5vw,34px);
font-weight:bold;
color:#6b3a00;
}

.abacus{
display:flex;
gap:40px;
align-items:flex-end;
justify-content:center;
width:100%;
margin-top:40px;
}

.rod{
position:relative;
width:80px;
height:320px;
display:flex;
justify-content:center;
}

.stick{
position:absolute;
bottom:0;
width:12px;
height:270px;
background:linear-gradient(#d78c28,#b96b0b);
border-radius:10px;
}

.label{
position:absolute;
bottom:-60px;
background:#46a2de;
color:white;
padding:10px 18px;
border-radius:18px;
font-size:clamp(20px,2vw,30px);
font-weight:bold;
}

.bead{
position:absolute;
width:58px;
height:58px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,#bfe8ff,#5d9ed6);
border:4px solid #295d96;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
transition:all .35s ease;
cursor:pointer;
touch-action:manipulation;
}

.questionText{
position:absolute;
top:16px;
text-align:center;
font-size:clamp(22px,2.4vw,34px);
font-weight:bold;
color:#6b3a00;
line-height:1.2;
}

.options{
display:flex;
flex-direction:column;
gap:18px;
margin-top:40px;
width:100%;
align-items:center;
}

.option{
width:min(220px,70%);
padding:16px;
border-radius:20px;
background:linear-gradient(180deg,#ffcf7d,#ff9d3d);
font-size:clamp(24px,2.5vw,36px);
font-weight:bold;
color:#5a2d00;
text-align:center;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.15);
transition:.2s;
}

.option:active{
transform:scale(.95);
}

.message{
height:34px;
margin-top:10px;
font-size:clamp(18px,2vw,26px);
font-weight:bold;
color:#b10000;
}

.finalScreen{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
background:linear-gradient(135deg,#ffe7d2,#d7f0ff,#e6f8d8);
z-index:999;
overflow:hidden;
}

.finalScreen h1{
font-size:clamp(42px,7vw,88px);
color:#6b3a00;
margin-bottom:20px;
text-align:center;
z-index:2;
}

.playAgain{
padding:16px 34px;
border:none;
border-radius:22px;
font-size:clamp(24px,2.5vw,34px);
font-weight:bold;
background:#7bc96f;
color:white;
cursor:pointer;
z-index:2;
box-shadow:0 8px 16px rgba(0,0,0,.2);
}

.confetti{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
animation:burst 2.5s linear forwards;
}

@keyframes burst{
0%{
transform:translate(0,0) scale(.5);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(1.4);
opacity:0;
}
}

@media(max-width:768px){

.card{
width:96vw;
height:78vh;
}

.abacus{
gap:16px;
}

.rod{
width:60px;
height:250px;
}

.stick{
height:210px;
}

.bead{
width:44px;
height:44px;
}

.label{
font-size:18px;
padding:8px 14px;
bottom:-52px;
}

.option{
width:78%;
font-size:28px;
padding:14px;
}

.questionText{
font-size:20px;
width:90%;
}

.header{
font-size:15px;
padding:10px;
}
}

</style>
</head>

<body>

<div id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<div id="gameContainer">

<div class="header">
Count the beads and choose the correct answer.<br>
<span>Tap on the beads.</span>
</div>

<div class="gameArea">

<div class="card">

<div class="left">

<div class="abacus">

<div class="rod">
<div class="stick"></div>
<div class="label">Tens</div>
<div id="tensContainer"></div>
</div>

<div class="rod">
<div class="stick"></div>
<div class="label">Ones</div>
<div id="onesContainer"></div>
</div>

</div>

</div>

<div class="right">

<div class="questionText">Choose the correct answer</div>

<div class="options" id="options"></div>

<div class="message" id="message"></div>

</div>

</div>

</div>

</div>

<div class="finalScreen" id="finalScreen">
<h1>🎉 Well Done 🎉</h1>
<button class="playAgain" onclick="restartGame()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>

const originalQuestions = [
{tens:1, ones:3, options:[12,15,13], answer:13},
{tens:1, ones:7, options:[17,16,20], answer:17},
{tens:1, ones:5, options:[15,12,14], answer:15},
{tens:1, ones:1, options:[11,14,18], answer:11},
{tens:1, ones:9, options:[19,18,17], answer:19},
{tens:1, ones:4, options:[14,12,18], answer:14},
{tens:1, ones:8, options:[18,17,20], answer:18},
{tens:1, ones:2, options:[12,11,16], answer:12},
{tens:2, ones:0, options:[20,18,19], answer:20},
{tens:1, ones:6, options:[16,14,15], answer:16}
];

let questions=[...originalQuestions];
let current=0;

const tensContainer=document.getElementById("tensContainer");
const onesContainer=document.getElementById("onesContainer");
const optionsDiv=document.getElementById("options");
const message=document.getElementById("message");

function playSound(id){
const audio=document.getElementById(id);
audio.currentTime=0;
audio.play().catch(()=>{});
}

setTimeout(()=>{
document.getElementById("logoScreen").style.display="none";
document.getElementById("gameContainer").style.display="flex";
loadQuestion();
},5000);

function createBeads(container,count){

container.innerHTML="";

for(let i=0;i<count;i++){

const bead=document.createElement("div");
bead.className="bead";

const startY=20 + (i*62);

bead.style.top=startY+"px";

bead.addEventListener("click",()=>{

let targetY=180-(count-i-1)*48;

bead.style.top=targetY+"px";

});

container.appendChild(bead);
}
}

function loadQuestion(){

message.textContent="";

const q=questions[current];

createBeads(tensContainer,q.tens);
createBeads(onesContainer,q.ones);

optionsDiv.innerHTML="";

q.options.forEach(option=>{

const btn=document.createElement("div");
btn.className="option";
btn.textContent=option;

btn.onclick=()=>checkAnswer(option);

optionsDiv.appendChild(btn);

});
}

function checkAnswer(selected){

const q=questions[current];

if(selected===q.answer){

playSound("correctSound");

setTimeout(()=>{
nextQuestion();
},700);

}else{

message.textContent="Try Again!";
playSound("wrongSound");

}
}

function nextQuestion(){

current++;

if(current>=questions.length){

showFinal();

}else{

loadQuestion();

}
}

function showFinal(){

document.getElementById("gameContainer").style.display="none";

const final=document.getElementById("finalScreen");
final.style.display="flex";

playSound("clapSound");

createConfetti();

}

function createConfetti(){

const colors=["#ff4d4d","#ffd93d","#4dff88","#4dc3ff","#ff73d9","#ffffff","#ff9f43"];

for(let i=0;i<220;i++){

const c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.top=Math.random()*100+"vh";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.setProperty("--x",(Math.random()*600-300)+"px");
c.style.setProperty("--y",(Math.random()*600-300)+"px");

c.style.animationDelay=(Math.random()*1.5)+"s";

document.getElementById("finalScreen").appendChild(c);
}
}

function restartGame(){

document.querySelectorAll(".confetti").forEach(e=>e.remove());

questions=[...originalQuestions].sort(()=>Math.random()-0.5);

current=0;

document.getElementById("finalScreen").style.display="none";
document.getElementById("gameContainer").style.display="flex";

loadQuestion();
}

</script>

</body>
</html>
