<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Cycle Sequence Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/background.png") no-repeat center center fixed;
    background-size:cover;
    text-align:center;
    overflow:hidden;
}

/* HEADER */
h1{
    margin-top:20px;
    color:#1b4f72;
}

/* INSTRUCTION */
#instruction{
    font-size:22px;
    margin:10px;
    color:#333;
}

/* GAME AREA */
#gameArea{
    display:block;
}

/* CARDS */
.container{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:40px;
}

.card{
    width:180px;
    height:180px;
    background:white;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.card img{
    width:80px;
}

/* EFFECTS */
.correct{
    background:#b6f7c1 !important;
    transform:scale(1.05);
    box-shadow:0 0 15px #2ecc71;
}

.wrong{
    animation:shake 0.3s;
    background:#ffb3b3 !important;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* END SCREEN */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

button{
    padding:10px 20px;
    font-size:18px;
    border:none;
    background:#27ae60;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1 id="title">🌊 Water Cycle Sequence Game</h1>
<div id="instruction">Click the stages in correct order</div>

<!-- GAME -->
<div id="gameArea">
    <div class="container" id="gameBox"></div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done Scientist!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<audio id="clap" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

const correctOrder = ["evaporation","condensation","precipitation","collection"];

let currentStep = 0;

/* ORIGINAL DATA */
const baseCards = [
    {id:"evaporation", img:"assets/sun.png", name:"Evaporation ☀"},
    {id:"condensation", img:"assets/cloud.png", name:"Condensation ☁"},
    {id:"precipitation", img:"assets/rain.png", name:"Precipitation 🌧"},
    {id:"collection", img:"assets/ocean.png", name:"Collection 🌊"}
];

/* 🔥 FIX 1: proper shuffle function */
function shuffle(array){
    let arr = [...array];
    for(let i = arr.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

let gameCards = [];

/* LOAD GAME */
function loadGame(){

    let box = document.getElementById("gameBox");
    box.innerHTML = "";

    gameCards.forEach(card=>{
        let div = document.createElement("div");
        div.className = "card";
        div.dataset.id = card.id;

        div.innerHTML = `
            <img src="${card.img}">
            <p>${card.name}</p>
        `;

        div.onclick = ()=>check(card.id, div);

        box.appendChild(div);
    });
}

/* CHECK CLICK */
function check(id, element){

    if(id === correctOrder[currentStep]){

        element.classList.add("correct");
        currentStep++;

        if(currentStep === correctOrder.length){

            document.getElementById("clap").play();

            setTimeout(()=>{

                /* 🔥 FIX 2: hide everything except end screen */
                document.getElementById("gameArea").style.display="none";
                document.getElementById("instruction").style.display="none";
                document.getElementById("title").style.display="none";

                document.getElementById("end").style.display="flex";

                confetti({
                    particleCount:200,
                    spread:120,
                    origin:{y:0.6}
                });

            },800);
        }

    } else {
        document.getElementById("wrong").play();
        element.classList.add("wrong");

        setTimeout(()=>{
            element.classList.remove("wrong");
        },500);
    }
}

/* RESTART */
function restart(){

    currentStep = 0;

    /* 🔥 FIX 3: reshuffle every restart */
    gameCards = shuffle(baseCards);

    document.getElementById("end").style.display="none";
    document.getElementById("gameArea").style.display="block";
    document.getElementById("instruction").style.display="block";
    document.getElementById("title").style.display="block";

    loadGame();
}

/* INIT */
gameCards = shuffle(baseCards);
loadGame();

</script>

</body>
</html>
