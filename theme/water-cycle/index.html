<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Cycle Sequence Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background:url("assets/background.png") no-repeat center center fixed;
    background-size:cover;
    text-align:center;
    overflow:hidden;
    height:100vh;
}

/* SCREEN SYSTEM */
.screen{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SPLASH */
#splash{
    background:white;
    display:flex;
}

/* GAME */
#gameScreen{
    padding:10px;
    box-sizing:border-box;
}

/* END */
#endScreen{
    background:white;
}

/* TITLE */
h1{
    color:#1b4f72;
    font-size:clamp(18px, 3vw, 32px);
}

/* INSTRUCTION */
#instruction{
    font-size:clamp(14px, 2.2vw, 22px);
    margin:10px;
    color:#333;
}

/* GAME BOX */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
    max-width:95vw;
}

/* CARDS */
.card{
    width:clamp(120px, 20vw, 180px);
    height:clamp(120px, 20vw, 180px);
    background:white;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 5px 12px rgba(0,0,0,0.2);
    transition:0.2s;
}

.card img{
    width:clamp(70px, 12vw, 110px);
}

/* CORRECT */
.correct{
    background:#b6f7c1 !important;
    transform:scale(1.05);
    box-shadow:0 0 15px #2ecc71;
}

/* WRONG */
.wrong{
    animation:shake 0.3s;
    background:#ffb3b3 !important;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* BUTTON */
button{
    padding:10px 18px;
    font-size:clamp(14px, 2vw, 18px);
    border:none;
    background:#27ae60;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<h1>🌊 Water Cycle Sequence Game</h1>
<div id="instruction">Click the stages in correct order</div>

<div class="container" id="gameBox"></div>

</div>

<!-- END -->
<div id="endScreen" class="screen">
    <h1>🎉 Well Done Scientist!</h1>
    <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="clap" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

const correctOrder = ["evaporation","condensation","precipitation","collection"];

let currentStep = 0;

/* DATA */
const baseCards = [
    {id:"evaporation", img:"assets/sun.png", name:"Evaporation ☀"},
    {id:"condensation", img:"assets/cloud.png", name:"Condensation ☁"},
    {id:"precipitation", img:"assets/rain.png", name:"Precipitation 🌧"},
    {id:"collection", img:"assets/ocean.png", name:"Collection 🌊"}
];

/* SHUFFLE */
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

let gameCards = [];

/* SCREEN CONTROL */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    document.getElementById(id).style.display="flex";
}

/* START */
window.onload = ()=>{

    showScreen("splash");

    setTimeout(()=>{
        showScreen("gameScreen");
        startGame();
    },5000);
};

/* INIT GAME */
function startGame(){
    currentStep = 0;
    gameCards = shuffle([...baseCards]);
    loadGame();
}

/* LOAD */
function loadGame(){

    let box = document.getElementById("gameBox");
    box.innerHTML = "";

    gameCards.forEach(card=>{
        let div = document.createElement("div");
        div.className = "card";
        div.dataset.id = card.id;

        div.innerHTML = `
            <img src="${card.img}">
            <p>${card.name}</p>
        `;

        div.onclick = ()=>check(card.id, div);

        box.appendChild(div);
    });
}

/* CHECK */
function check(id, element){

    if(id === correctOrder[currentStep]){

        element.classList.add("correct");
        currentStep++;

        if(currentStep === correctOrder.length){

            document.getElementById("clap").play();

            setTimeout(()=>{

                confetti({
                    particleCount:200,
                    spread:120,
                    origin:{y:0.6}
                });

                showScreen("endScreen");

            },800);
        }

    } else {
        document.getElementById("wrong").play();
        element.classList.add("wrong");

        setTimeout(()=>{
            element.classList.remove("wrong");
        },500);
    }
}

/* RESTART */
function restart(){
    showScreen("gameScreen");
    startGame();
}

</script>

</body>
</html>
