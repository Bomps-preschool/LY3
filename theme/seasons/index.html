<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Sorting Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
}

/* TITLE */
h1{
  text-align:center;
  color:#2e7d32;
  margin:10px;
}

/* WRAPPER */
.wrapper{
  display:flex;
  justify-content:space-evenly;
  margin-top:20px;
}

/* ❌ PINK BOX REMOVED COMPLETELY */
.box{
  width:30%;
  min-height:260px;
  background:transparent;   /* no box background */
  border:none;              /* no border */
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
}

/* OPTIONAL LABEL STYLE */
.label{
  font-size:26px;
  font-weight:bold;
  margin:10px;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}

.item{
  width:80px;
  cursor:grab;
}

.item img{
  width:100%;
}

/* MESSAGE */
#msg{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body>

<h1>Seasons Sorting Game</h1>

<div class="wrapper">

  <div class="box" ondrop="drop(event,'summer')" ondragover="allowDrop(event)">
    <div class="label">🌞 Summer</div>
  </div>

  <div class="box" ondrop="drop(event,'winter')" ondragover="allowDrop(event)">
    <div class="label">❄ Winter</div>
  </div>

  <div class="box" ondrop="drop(event,'rainy')" ondragover="allowDrop(event)">
    <div class="label">🌧 Rainy</div>
  </div>

</div>

<!-- ITEMS -->
<div class="items">

  <div class="item" id="sunglasses" data-season="summer" draggable="true" ondragstart="drag(event)">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" id="icecream" data-season="summer" draggable="true" ondragstart="drag(event)">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" id="mittens" data-season="winter" draggable="true" ondragstart="drag(event)">
    <img src="assets/mittens.png">
  </div>

  <div class="item" id="winterhat" data-season="winter" draggable="true" ondragstart="drag(event)">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" id="umbrella" data-season="rainy" draggable="true" ondragstart="drag(event)">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" id="raincoat" data-season="rainy" draggable="true" ondragstart="drag(event)">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

<script>

function allowDrop(ev){
  ev.preventDefault();
}

function drag(ev){
  ev.dataTransfer.setData("text", ev.target.id);
}

/* DROP LOGIC */
function drop(ev, season){

  ev.preventDefault();

  let id = ev.dataTransfer.getData("text");
  let item = document.getElementById(id);

  let box = ev.currentTarget;

  if(item.dataset.season === season){

    box.appendChild(item);

    item.style.width = "60px";
    item.style.margin = "5px";

    showMsg("Correct ✔");

  } else {
    showMsg("Try Again ✖");
  }
}

/* MESSAGE */
function showMsg(text){
  let msg = document.getElementById("msg");
  msg.innerText = text;

  setTimeout(()=>{
    msg.innerText = "";
  },1500);
}

</script>

</body>
</html>
