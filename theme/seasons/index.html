<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Sorting Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
}

/* ---------- SCREENS ---------- */
.screen{
    display:none;
    width:100%;
    height:100vh;
    text-align:center;
}

/* ---------- LOGO ---------- */
#logoScreen{
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

/* ---------- GAME ---------- */
#gameScreen{
    padding:20px;
}

/* INSTRUCTION */
h2{
    margin:10px;
    font-size:22px;
}

/* BOXES */
.box-container{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:20px;
    flex-wrap:wrap;
}

.box{
    width:150px;
    height:150px;
    border:3px dashed #666;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

/* OBJECTS */
.objects{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:40px;
}

.obj{
    width:120px;
    height:120px;
    background:white;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.obj img{
    width:80%;
}

.label{
    font-size:14px;
    margin-top:5px;
}

/* END SCREEN */
#endScreen{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- ---------- LOGO SCREEN ---------- -->
<div id="logoScreen" class="screen" style="display:flex;">
    <img src="assets/innovine-logo.png" style="width:250px;">
</div>

<!-- ---------- GAME SCREEN ---------- -->
<div id="gameScreen" class="screen">

    <h2>Tap an object → then tap correct season box</h2>

    <!-- BOXES -->
    <div class="box-container">
        <div class="box" data-box="summer">
            <img src="assets/summer-box.png" style="width:90%">
        </div>
        <div class="box" data-box="rainy">
            <img src="assets/rainy-box.png" style="width:90%">
        </div>
        <div class="box" data-box="winter">
            <img src="assets/winter-box.png" style="width:90%">
        </div>
    </div>

    <!-- OBJECTS -->
    <div class="objects">

        <div class="obj" data-type="summer">
            <img src="assets/sunglasses.png">
            <div class="label">Sunglasses</div>
        </div>

        <div class="obj" data-type="rainy">
            <img src="assets/raincoat.png">
            <div class="label">Raincoat</div>
        </div>

        <div class="obj" data-type="rainy">
            <img src="assets/umbrella.png">
            <div class="label">Umbrella</div>
        </div>

        <div class="obj" data-type="summer">
            <img src="assets/ice-cream.png">
            <div class="label">Ice Cream</div>
        </div>

        <div class="obj" data-type="winter">
            <img src="assets/winter-hat.png">
            <div class="label">Winter Hat</div>
        </div>

    </div>
</div>

<!-- ---------- END SCREEN ---------- -->
<div id="endScreen" class="screen">
    <h1>🎉 Well Done!</h1>
</div>

<!-- ---------- AUDIO ---------- -->
<audio id="right" src="assets/right.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let selected = null;
let correct = 0;

const logo = document.getElementById("logoScreen");
const game = document.getElementById("gameScreen");
const end = document.getElementById("endScreen");

setTimeout(()=>{
    logo.style.display="none";
    game.style.display="block";
},5000);

/* ---------- SELECT OBJECT ---------- */
document.querySelectorAll(".obj").forEach(o=>{
    o.addEventListener("click",()=>{
        selected = o;
        o.style.border="3px solid green";
    });
});

/* ---------- BOX CLICK ---------- */
document.querySelectorAll(".box").forEach(b=>{
    b.addEventListener("click",()=>{

        if(!selected) return;

        let type = selected.dataset.type;
        let box = b.dataset.box;

        if(type === box){
            document.getElementById("right").play();
            selected.style.visibility="hidden";
            correct++;
        } else {
            document.getElementById("wrong").play();
        }

        selected.style.border="none";
        selected=null;

        if(correct === document.querySelectorAll(".obj").length){
            showEnd();
        }
    });
});

/* ---------- END ---------- */
function showEnd(){
    game.style.display="none";
    end.style.display="flex";
    startConfetti();
    document.getElementById("clap").play();
}

/* ---------- CONFETTI FIXED ---------- */
function startConfetti(){
    for(let i=0;i<150;i++){
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = (2+Math.random()*3)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),5000);
    }
}

</script>

</body>
</html>
