<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100vh;
}

/* ACTIVE SLIDE */
.active{
  display:block;
}

/* SPLASH */
#splash{
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
}

#splash img{
  width:220px;
}

/* GAME */
h1{
  text-align:center;
  color:#2e7d32;
  margin:10px;
}

.wrapper{
  display:flex;
  justify-content:space-evenly;
  margin-top:20px;
}

.box{
  width:30%;
  height:260px;
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:bold;
  border:2px solid #ff69b4;
}

.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}

.item{
  width:80px;
}

.item img{
  width:100%;
}

#msg{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div class="slide" id="game">

<h1>Seasons Sorting Game</h1>

<div class="wrapper">

  <div class="box" onclick="check('summer')">🌞 Summer</div>
  <div class="box" onclick="check('winter')">❄ Winter</div>
  <div class="box" onclick="check('rainy')">🌧 Rainy</div>

</div>

<div class="items">

  <div class="item" data="summer" onclick="select(this)">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" data="summer" onclick="select(this)">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" data="winter" onclick="select(this)">
    <img src="assets/mittens.png">
  </div>

  <div class="item" data="winter" onclick="select(this)">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" data="rainy" onclick="select(this)">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" data="rainy" onclick="select(this)">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

</div>

<script>

let selected = null;

/* ✅ FIXED SLIDE TRANSITION */
window.onload = function(){

  setTimeout(()=>{

    document.getElementById("splash").classList.remove("active");
    document.getElementById("game").classList.add("active");

  },3000);

}

/* SELECT ITEM */
function select(el){

  document.querySelectorAll(".item").forEach(i=>{
    i.style.border = "none";
  });

  selected = el;
  el.style.border = "3px solid green";
}

/* CHECK */
function check(season){

  if(!selected) return;

  if(selected.getAttribute("data") === season){
    document.getElementById("msg").innerText = "Correct ✔";
    selected.style.opacity = "0.5";
  } else {
    document.getElementById("msg").innerText = "Try Again ✖";
  }

  selected = null;
}

</script>

</body>
</html>
