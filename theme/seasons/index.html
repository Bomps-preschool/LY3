<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f7f9fc;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100vh;
}

.active{
  display:block;
}

/* SPLASH */
#splash{
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
}

/* GAME */
#game{
  padding:20px;
  text-align:center;
}

h1{
  color:#2f6f3e;
  font-size:28px;
}

/* instruction */
#instruction{
  font-size:18px;
  margin:10px 0;
  color:#333;
}

/* BOXES */
.box-container{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.box{
  width:28%;
  background:#ffffff;
  border-radius:15px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

.box img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.box-title{
  margin-top:8px;
  font-size:18px;
  font-weight:bold;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin-top:20px;
}

.item{
  width:110px;
  cursor:pointer;
  border-radius:10px;
  padding:5px;
}

.item img{
  width:100%;
}

.selected{
  outline:3px solid #4caf50;
}

/* END */
#end{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:40px;
  color:#2f6f3e;
  background:#fff;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- 1️⃣ SPLASH -->
<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- 2️⃣ GAME -->
<div class="slide" id="game">

<h1>Seasons Sorting Game</h1>

<div id="instruction">
Tap the object, then tap the correct season box
</div>

<!-- BOXES -->
<div class="box-container">

  <div class="box" onclick="check('summer', this)">
    <img src="assets/summer-box.png">
    <div class="box-title">Summer</div>
  </div>

  <div class="box" onclick="check('winter', this)">
    <img src="assets/winter-box.png">
    <div class="box-title">Winter</div>
  </div>

  <div class="box" onclick="check('rainy', this)">
    <img src="assets/rainy-box.png">
    <div class="box-title">Rainy</div>
  </div>

</div>

<!-- OBJECTS -->
<div class="items">

  <div class="item" data="summer" onclick="selectItem(this)">
    <img src="assets/ice-cream.png">
    <div>Ice Cream</div>
  </div>

  <div class="item" data="summer" onclick="selectItem(this)">
    <img src="assets/sunglasses.png">
    <div>Sunglasses</div>
  </div>

  <div class="item" data="winter" onclick="selectItem(this)">
    <img src="assets/mittens.png">
    <div>Mittens</div>
  </div>

  <div class="item" data="winter" onclick="selectItem(this)">
    <img src="assets/winter-hat.png">
    <div>Winter Hat</div>
  </div>

  <div class="item" data="rainy" onclick="selectItem(this)">
    <img src="assets/umbrella.png">
    <div>Umbrella</div>
  </div>

  <div class="item" data="rainy" onclick="selectItem(this)">
    <img src="assets/raincoat.png">
    <div>Raincoat</div>
  </div>

</div>

</div>

<!-- 3️⃣ END -->
<div class="slide" id="end">
  🎉 WELL DONE 🎉
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/right.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let selected = null;

/* 🔥 SPLASH TIMER (GUARANTEED 5s) */
setTimeout(()=>{
  document.getElementById("splash").classList.remove("active");
  document.getElementById("game").classList.add("active");
},5000);

/* SELECT ITEM */
function selectItem(el){

  document.querySelectorAll(".item").forEach(i=>{
    i.classList.remove("selected");
  });

  selected = el;
  el.classList.add("selected");
}

/* CHECK ANSWER */
function check(season, box){

  if(!selected) return;

  if(selected.getAttribute("data") === season){

    document.getElementById("correct").play();
    document.getElementById("clap").play();

    selected.style.opacity = "0.5";
    selected.classList.remove("selected");

  } else {

    document.getElementById("wrong").play();
  }

  selected = null;
}

/* END AFTER 25s */
setTimeout(()=>{
  document.getElementById("game").classList.remove("active");
  document.getElementById("end").classList.add("active");
},25000);

</script>

</body>
</html>
