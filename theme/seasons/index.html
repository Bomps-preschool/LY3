<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seasons Sorting Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

h1{
  text-align:center;
  color:#2e7d32;
  margin:10px;
}

/* GAME AREA */
.container{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

/* SEASON BOXES */
.box{
  width:30%;
  min-height:300px;
  background:white;
  border:3px solid #ff69b4;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.box h2{
  margin:10px 0;
}

/* OBJECTS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
  gap:20px;
}

.item{
  width:90px;
  cursor:pointer;
}

.item img{
  width:100%;
}

/* FEEDBACK */
#msg{
  text-align:center;
  font-size:30px;
  margin-top:10px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* END SCREEN */
#end{
  display:none;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:50px;
  color:#2e7d32;
}

</style>
</head>

<body>

<h1>Seasons Sorting Game</h1>

<div class="container">

  <div class="box" ondrop="drop(event,'summer')" ondragover="allowDrop(event)">
    <h2>🌞 Summer</h2>
  </div>

  <div class="box" ondrop="drop(event,'winter')" ondragover="allowDrop(event)">
    <h2>❄ Winter</h2>
  </div>

  <div class="box" ondrop="drop(event,'rainy')" ondragover="allowDrop(event)">
    <h2>🌧 Rainy</h2>
  </div>

</div>

<div class="items">

  <div class="item" draggable="true" ondragstart="drag(event)" id="sunglasses" data-season="summer">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="icecream" data-season="summer">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="mittens" data-season="winter">
    <img src="assets/mittens.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="umbrella" data-season="rainy">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="raincoat" data-season="rainy">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

<div id="end">
🎉 GOOD JOB 🎉
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

let count = 0;
let total = 5;

function allowDrop(ev){
  ev.preventDefault();
}

function drag(ev){
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev, season){

  ev.preventDefault();

  let id = ev.dataTransfer.getData("text");
  let item = document.getElementById(id);

  if(item.dataset.season === season){

    document.getElementById("correct").play();
    ev.target.appendChild(item);

    item.style.cursor="default";

    count++;

    showMsg("Correct ✔", "correct");

    if(count === total){
      document.getElementById("end").style.display="flex";
    }

  } else {

    document.getElementById("wrong").play();
    showMsg("Try Again ✖", "wrong");
  }
}

function showMsg(text,type){

  let msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = type;

  setTimeout(()=>{
    msg.innerText = "";
  },1500);
}

</script>

</body>
</html>
