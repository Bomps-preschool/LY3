<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Sorting Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS, sans-serif;
    background:#eaf6f6;
    overflow:hidden;
}

/* --------- SLIDES --------- */
.slide{
    display:none;
    width:100%;
    height:100vh;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

#logoSlide{
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

/* --------- INSTRUCTIONS --------- */
#instruction{
    font-size:22px;
    margin:10px;
    color:#333;
}

/* --------- BOXES --------- */
.box-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.box{
    width:140px;
    height:140px;
    border:3px dashed #555;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

/* --------- OBJECTS --------- */
.objects{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:30px;
}

.obj{
    width:110px;
    height:110px;
    cursor:pointer;
    background:white;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.obj img{
    width:90%;
}

/* --------- WELL DONE --------- */
#endSlide{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#fff;
}

/* --------- CONFETTI --------- */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- ================= LOGO ================= -->
<div id="logoSlide" class="slide" style="display:flex;">
    <img src="assets/innovine-logo.png" style="width:250px;">
</div>

<!-- ================= GAME ================= -->
<div id="gameSlide" class="slide">

    <div id="instruction">
        Tap an object → then tap the correct season box
    </div>

    <!-- BOXES -->
    <div class="box-container">
        <div class="box" data-box="summer">
            <img src="assets/summer-box.png" style="width:90%">
        </div>
        <div class="box" data-box="rainy">
            <img src="assets/rainy-box.png" style="width:90%">
        </div>
        <div class="box" data-box="winter">
            <img src="assets/winter-box.png" style="width:90%">
        </div>
    </div>

    <!-- OBJECTS -->
    <div class="objects">
        <div class="obj" data-type="summer"><img src="assets/sunglasses.png"><div class="label">Sunglasses</div></div>
        <div class="obj" data-type="rainy"><img src="assets/raincoat.png"><div class="label">Raincoat</div></div>
        <div class="obj" data-type="summer"><img src="assets/icecream.png"><div class="label">Ice Cream</div></div>
        <div class="obj" data-type="winter"><img src="assets/jacket.png"><div class="label">Jacket</div></div>
    </div>

</div>

<!-- ================= END ================= -->
<div id="endSlide" class="slide">
    <h1>🎉 Well Done!</h1>
</div>

<!-- ================= AUDIO ================= -->
<audio id="correctSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

let selectedObject = null;
let correctCount = 0;
let total = document.querySelectorAll('.obj').length;

const logo = document.getElementById("logoSlide");
const game = document.getElementById("gameSlide");
const end = document.getElementById("endSlide");

setTimeout(()=>{
    logo.style.display="none";
    game.style.display="block";
},5000);

// -------- OBJECT SELECT --------
document.querySelectorAll(".obj").forEach(obj=>{
    obj.addEventListener("click",()=>{
        selectedObject = obj;
        obj.style.outline="3px solid #4CAF50";
    });
});

// -------- BOX SELECT --------
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!selectedObject) return;

        let objType = selectedObject.dataset.type;
        let boxType = box.dataset.box;

        if(objType === boxType){
            document.getElementById("correctSound").play();
            selectedObject.style.visibility="hidden";
            correctCount++;
        }
        else{
            document.getElementById("wrongSound").play();
        }

        selectedObject.style.outline="none";
        selectedObject=null;

        if(correctCount === total){
            showEnd();
        }
    });
});

// -------- END + CONFETTI --------
function showEnd(){
    game.style.display="none";
    end.style.display="flex";
    startConfetti();
}

function startConfetti(){
    for(let i=0;i<120;i++){
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = (2+Math.random()*3)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),4000);
    }
}

</script>

</body>
</html>
