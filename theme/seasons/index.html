<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
}

h1{
  text-align:center;
  color:#2e7d32;
}

/* GAME LAYOUT */
.wrapper{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

/* SEASON BOXES */
.box{
  width:28%;
  min-height:320px;
  background:white;
  border-radius:15px;
  border:3px solid #ff69b4;
  text-align:center;
  padding:10px;
}

.box img{
  width:100%;
  max-height:120px;
  object-fit:contain;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

.item{
  width:90px;
  cursor:grab;
}

.item img{
  width:100%;
}

/* MESSAGE */
#msg{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

/* END SCREEN */
#end{
  display:none;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:50px;
  color:#2e7d32;
}

</style>
</head>

<body>

<h1>Seasons Sorting Game</h1>

<div class="wrapper">

  <div class="box" ondrop="drop(event,'summer')" ondragover="allowDrop(event)">
    <img src="assets/summer-box.png">
    <h2>Summer</h2>
  </div>

  <div class="box" ondrop="drop(event,'winter')" ondragover="allowDrop(event)">
    <img src="assets/winter-box.png">
    <h2>Winter</h2>
  </div>

  <div class="box" ondrop="drop(event,'rainy')" ondragover="allowDrop(event)">
    <img src="assets/rainy-box.png">
    <h2>Rainy</h2>
  </div>

</div>

<!-- ITEMS -->
<div class="items">

  <div class="item" draggable="true" ondragstart="drag(event)" id="sunglasses" data-season="summer">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="icecream" data-season="summer">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="mittens" data-season="winter">
    <img src="assets/mittens.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="winterhat" data-season="winter">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="umbrella" data-season="rainy">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" draggable="true" ondragstart="drag(event)" id="raincoat" data-season="rainy">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

<div id="end">🎉 GOOD JOB 🎉</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

let count = 0;
let total = 6;

function allowDrop(ev){
  ev.preventDefault();
}

function drag(ev){
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev, season){

  ev.preventDefault();

  let id = ev.dataTransfer.getData("text");
  let item = document.getElementById(id);

  if(item.dataset.season === season){

    document.getElementById("correct").play();
    ev.target.appendChild(item);

    item.setAttribute("draggable", false);

    count++;

    showMsg("Correct ✔");

    if(count === total){
      document.getElementById("end").style.display="flex";
    }

  } else {

    document.getElementById("wrong").play();
    showMsg("Try Again ✖");
  }
}

function showMsg(text){
  let msg = document.getElementById("msg");
  msg.innerText = text;

  setTimeout(()=>{
    msg.innerText = "";
  },1500);
}

</script>

</body>
</html>
