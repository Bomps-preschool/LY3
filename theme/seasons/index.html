<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game Upgrade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    overflow:hidden;
}

/* ---------- FADE TRANSITION ---------- */
.screen{
    opacity:0;
    transition:opacity 1s ease;
}
.show{
    opacity:1;
}

/* ---------- BACKGROUND LAYERS ---------- */
#bg{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* ---------- PARTICLES ---------- */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    opacity:0.6;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}

/* ---------- BOX GLOW ---------- */
.box.active{
    box-shadow:0 0 15px rgba(0,150,255,0.4);
    transform:scale(1.03);
    transition:0.3s;
}

/* ---------- CONFETTI ---------- */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LOGO -->
<div id="logo" class="screen show">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
        <img src="assets/innovine-logo.png" width="250">
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer">
        <img src="assets/summer-box.png" width="140">
    </div>
    <div class="box" data-box="rainy">
        <img src="assets/rainy-box.png" width="140">
    </div>
    <div class="box" data-box="winter">
        <img src="assets/winter-box.png" width="140">
    </div>
</div>

<div id="objectArea"></div>

</div>

<!-- END -->
<div id="end" class="screen">
    <h1>🎉 Well Done!</h1>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ---------- SMOOTH SCREEN SWITCH ---------- */
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
    document.getElementById(id).classList.add('show');
}

/* ---------- START FLOW ---------- */
setTimeout(()=>{
    showScreen("game");
    startSeasonParticles();
    loadGame();
},5000);

/* ---------- AUDIO LOCK (FIX DOUBLE CLAP) ---------- */
let audioLock = false;

function playOnce(audio){
    if(audioLock) return;
    audioLock = true;
    audio.play();
    audio.onended = ()=> audioLock = false;
}

/* ---------- DATA ---------- */
const objects = [
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"}
];

let index = 0;
let current = null;

/* ---------- LOAD GAME ---------- */
function loadGame(){

    if(index >= objects.length){
        showScreen("end");
        burstConfetti();
        playOnce(document.getElementById("clap"));
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}" width="140">
            <div>${current.label}</div>
        </div>
    `;

    speak("Which season do we use " + current.label);
}

/* ---------- VOICE ---------- */
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

/* ---------- BOX HOVER GLOW ---------- */
document.querySelectorAll(".box").forEach(b=>{
    b.addEventListener("click",()=>{

        if(!current) return;

        let obj = document.querySelector(".obj");

        obj.classList.add("active");

        setTimeout(()=>obj.classList.remove("active"),300);

        if(b.dataset.box === current.type){

            playOnce(document.getElementById("correct"));

            setTimeout(()=>{
                index++;
                loadGame();
            },800);

        }else{
            document.getElementById("wrong").play();
        }
    });
});

/* ---------- SEASON BACKGROUND PARTICLES ---------- */
function startSeasonParticles(){
    let types = ["summer","rain","snow"];

    for(let i=0;i<12;i++){
        let p = document.createElement("div");
        p.className="particle";

        p.style.left = Math.random()*100+"vw";
        p.style.top = Math.random()*100+"vh";
        p.style.animationDuration = (5+Math.random()*5)+"s";

        let season = "snow";
        p.style.background = season==="snow" ? "#fff" : "#ffd";

        document.body.appendChild(p);
    }
}

/* ---------- CONFETTI (MULTI-LAYER) ---------- */
function burstConfetti(){
    for(let i=0;i<120;i++){
        let c = document.createElement("div");
        c.className="confetti";

        c.style.left = Math.random()*100+"vw";
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = (2+Math.random()*3)+"s";

        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
    }
}

</script>

</body>
</html>
