<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Sorting Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    overflow:hidden;
    background:#eaf6f6;
}

/* ---------- SCREEN SYSTEM FIX ---------- */
.screen{
    display:none;
    width:100%;
    height:100vh;
    text-align:center;
}

.screen.active{
    display:block;
}

/* ---------- LOGO ---------- */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

/* ---------- GAME ---------- */
#game{
    padding:20px;
}

/* ---------- INSTRUCTION ---------- */
h2{
    font-size:28px;
}

/* ---------- BOXES ---------- */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.box.active{
    box-shadow:0 0 12px rgba(0,150,255,0.4);
    transform:scale(1.05);
}

/* ---------- OBJECT ---------- */
#objectArea{
    margin-top:60px;
}

.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.obj img{
    width:130px;
}

.label{
    font-size:22px;
    margin-top:8px;
}

/* ---------- END ---------- */
#end{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* ---------- PARTICLES ---------- */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    opacity:0.5;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}

/* ---------- CONFETTI ---------- */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- ---------- LOGO ---------- -->
<div id="logo" class="screen active">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- ---------- GAME ---------- -->
<div id="game" class="screen">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer">
        <img src="assets/summer-box.png" width="140">
    </div>
    <div class="box" data-box="rainy">
        <img src="assets/rainy-box.png" width="140">
    </div>
    <div class="box" data-box="winter">
        <img src="assets/winter-box.png" width="140">
    </div>
</div>

<div id="objectArea"></div>

</div>

<!-- ---------- END ---------- -->
<div id="end" class="screen">
    <h1>🎉 Well Done!</h1>
</div>

<!-- ---------- AUDIO ---------- -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ---------- SCREEN FIX ---------- */
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ---------- START FLOW ---------- */
setTimeout(()=>{
    showScreen("game");
    startSeasonParticles();
    loadGame();
},5000);

/* ---------- AUDIO LOCK ---------- */
let audioBusy = false;

function playAudio(audio){
    if(audioBusy) return;
    audioBusy = true;
    audio.play();
    audio.onended = ()=> audioBusy = false;
}

/* ---------- DATA ---------- */
const objects = [
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"}
];

let index = 0;
let current = null;

/* ---------- LOAD GAME ---------- */
function loadGame(){

    if(index >= objects.length){
        showScreen("end");
        burstConfetti();
        playAudio(document.getElementById("clap"));
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;

    speak("Which season do we use " + current.label);
}

/* ---------- VOICE ---------- */
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* ---------- BOX CLICK ---------- */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        let obj = document.querySelector(".obj");
        obj.classList.add("active");

        setTimeout(()=>obj.classList.remove("active"),300);

        if(box.dataset.box === current.type){

            playAudio(document.getElementById("correct"));

            setTimeout(()=>{
                index++;
                loadGame();
            },700);

        } else {
            playAudio(document.getElementById("wrong"));
        }
    });
});

/* ---------- SEASON PARTICLES ---------- */
function startSeasonParticles(){

    for(let i=0;i<12;i++){
        let p = document.createElement("div");
        p.className="particle";
        p.style.left = Math.random()*100+"vw";
        p.style.animationDuration = (5+Math.random()*5)+"s";
        p.style.background = "#fff";
        document.body.appendChild(p);
    }
}

/* ---------- CONFETTI ---------- */
function burstConfetti(){
    for(let i=0;i<140;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left = Math.random()*100+"vw";
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = (2+Math.random()*3)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
    }
}

</script>

</body>
</html>
