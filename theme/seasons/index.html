<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game Final Fix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🎉 CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;

    /* ✅ ADDED BACKGROUND IMAGE */
    background: url("assets/background.png") no-repeat center center fixed;
    background-size: cover;

    overflow:hidden;
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
    transition:opacity 1.2s ease;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1.2s ease;
}

/* BOXES */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* OBJECT */
.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
}

.obj img{
    width:130px;
}

.label{
    font-size:22px;
    margin-top:8px;
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* PLAY AGAIN BUTTON */
#restartBtn{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer"><img src="assets/summer-box.png" width="140"></div>
    <div class="box" data-box="rainy"><img src="assets/rainy-box.png" width="140"></div>
    <div class="box" data-box="winter"><img src="assets/winter-box.png" width="140"></div>
</div>

<div id="objectArea"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button id="restartBtn" onclick="restartGame()">🔄 Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ---------------- SPEECH ---------------- */
function speak(text){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

/* ---------------- START FLOW ---------------- */
window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("logo").style.opacity = 0;

        setTimeout(()=>{
            document.getElementById("logo").style.display = "none";
            document.getElementById("game").style.display = "block";
            setTimeout(()=>document.getElementById("game").style.opacity = 1,50);

            loadGame();
        },1200);

    },5000);
};

/* ---------------- GAME DATA ---------------- */
const objects = [
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"}
];

let index = 0;
let current = null;

/* ---------------- LOAD GAME ---------------- */
function loadGame(){

    if(index >= objects.length){

        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";

        confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
        });

        document.getElementById("clap").play();
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;

    speak("Which season do we use " + current.label);
}

/* ---------------- BOX CLICK ---------------- */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        if(box.dataset.box === current.type){

            document.getElementById("correct").play();

            let clap = document.getElementById("clap");
            clap.currentTime = 0;
            clap.play();

            clap.onended = null;

            setTimeout(()=>{
                index++;
                loadGame();
            },500);

        } else {
            document.getElementById("wrong").play();
        }
    });
});

/* ---------------- RESTART ---------------- */
function restartGame(){
    index = 0;
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="block";
    loadGame();
}

</script>

</body>
</html>
