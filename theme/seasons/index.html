<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game Full Fix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    overflow:hidden;
}

/* 🌈 BACKGROUND */
#bg{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    animation:seasonShift 25s infinite linear;
}

@keyframes seasonShift {
    0%   { background: linear-gradient(#ffeaa7, #ffffff); }
    25%  { background: linear-gradient(#dfe6e9, #ffffff); }
    50%  { background: linear-gradient(#74b9ff, #ffffff); }
    75%  { background: linear-gradient(#b2bec3, #ffffff); }
    100% { background: linear-gradient(#ffeaa7, #ffffff); }
}

/* 🌟 FLOATING ICONS */
.particle{
    position:absolute;
    z-index:-1;
    opacity:0.2;
    animation:floatDown linear infinite;
}

@keyframes floatDown{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
    transition:opacity 1.2s ease;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1.2s ease;
}

/* BOXES */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.box{
    width:200px;
    height:200px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* OBJECT */
.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
}

.obj img{
    width:130px;
}

.label{
    font-size:22px;
    margin-top:8px;
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg"></div>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer"><img src="assets/summer-box.png" width="140"></div>
    <div class="box" data-box="rainy"><img src="assets/rainy-box.png" width="140"></div>
    <div class="box" data-box="winter"><img src="assets/winter-box.png" width="140"></div>
</div>

<div id="objectArea"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ---------------- SPEECH FIX (RESTORED) ---------------- */
function speak(text){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

/* ---------------- QUESTION MAP ---------------- */
const questions = {
    "Ice Cream":"Which season do we eat ice cream?",
    "Raincoat":"Which season do we wear raincoat?",
    "Mittens":"Which season do we wear mittens?",
    "Umbrella":"Which season do we use umbrella?",
    "Sunglasses":"Which season do we wear sunglasses?",
    "Winter Hat":"Which season do we wear winter hat?"
};

/* ---------------- GAME DATA ---------------- */
const objects = [
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"}
];

let index = 0;
let current = null;

/* ---------------- START FLOW ---------------- */
window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("logo").style.opacity = 0;

        setTimeout(()=>{
            document.getElementById("logo").style.display = "none";
            document.getElementById("game").style.display = "block";
            setTimeout(()=>document.getElementById("game").style.opacity = 1,50);

            createParticles();
            loadGame();
        },1200);

    },5000);
};

/* ---------------- LOAD GAME ---------------- */
function loadGame(){

    if(index >= objects.length){
        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";
        document.getElementById("clap").play();
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;

    /* 🎤 INSTRUCTION AUDIO RESTORED */
    speak(questions[current.label]);
}

/* ---------------- CLICK ---------------- */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        if(box.dataset.box === current.type){

            document.getElementById("correct").play();

            index++;
            setTimeout(loadGame,600);

        } else {
            document.getElementById("wrong").play();
        }
    });
});

/* ---------------- FLOATING ICONS ---------------- */
function createParticles(){

    const icons = [
        "☀️","🌻","🍦","🕶","🍉",
        "🌧","☂️","🧥","🌈","💧",
        "❄️","🧤","🧣","⛄","🎩"
    ];

    for(let i=0;i<30;i++){

        let p = document.createElement("div");
        p.className="particle";

        p.innerHTML = icons[Math.floor(Math.random()*icons.length)];

        p.style.left = Math.random()*100 + "vw";
        p.style.top = Math.random()*100 + "vh";

        p.style.fontSize = (16 + Math.random()*10) + "px";
        p.style.opacity = 0.15;

        p.style.animationDuration = (8 + Math.random()*10) + "s";

        document.body.appendChild(p);
    }
}

</script>

</body>
</html>
