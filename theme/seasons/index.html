<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game Upgrade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Comic Sans MS;
    background: url("assets/background.png") no-repeat center center fixed;
    background-size: cover;
    overflow:hidden;
}

/* 🌤️ WEATHER LAYERS */
.weather{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
}

/* SUN */
.sun{
    position:absolute;
    top:40px;
    left:40px;
    width:80px;
    animation: floatSlow 6s infinite ease-in-out;
}

/* RAIN */
.rain{
    position:absolute;
    width:2px;
    height:12px;
    background:#4fc3f7;
    top:-20px;
    animation: rainFall linear infinite;
}

@keyframes rainFall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

/* SNOW */
.snow{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    top:-10px;
    animation: snowFall linear infinite;
}

@keyframes snowFall{
    from{transform:translateY(-50px);}
    to{transform:translateY(110vh);}
}

@keyframes floatSlow{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:20px;
}

/* ⭐ STARS */
#stars{
    font-size:26px;
    color:gold;
    margin-bottom:10px;
}

/* BOXES */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

/* OBJECT */
.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
}

.obj img{
    width:130px;
}

.label{
    font-size:22px;
    margin-top:8px;
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
}

</style>
</head>

<body>

<!-- 🌤️ WEATHER BACKGROUND -->
<div class="weather" id="weather"></div>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<div id="stars">⭐ ⭐ ⭐ ⭐ ⭐</div>

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer">🌞 Summer</div>
    <div class="box" data-box="rainy">🌧 Rainy</div>
    <div class="box" data-box="winter">❄ Winter</div>
</div>

<div id="objectArea"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <div id="finalStars">⭐ ⭐ ⭐ ⭐ ⭐</div>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let index = 0;
let current = null;
let stars = 0;

/* 🌤️ CREATE WEATHER */
function createWeather(){

    let w = document.getElementById("weather");

    // SUN
    let sun = document.createElement("img");
    sun.src = "assets/sun.png";
    sun.className = "sun";
    w.appendChild(sun);

    // RAIN
    for(let i=0;i<20;i++){
        let r = document.createElement("div");
        r.className = "rain";
        r.style.left = Math.random()*100 + "%";
        r.style.animationDuration = (1+Math.random()*2)+"s";
        w.appendChild(r);
    }

    // SNOW
    for(let i=0;i<20;i++){
        let s = document.createElement("div");
        s.className = "snow";
        s.style.left = Math.random()*100 + "%";
        s.style.animationDuration = (2+Math.random()*3)+"s";
        w.appendChild(s);
    }
}

/* START */
window.onload = ()=>{

    createWeather();

    setTimeout(()=>{
        document.getElementById("logo").style.display="none";
        document.getElementById("game").style.display="block";
        loadGame();
    },5000);
};

/* DATA */
const objects = [
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"}
];

/* LOAD */
function loadGame(){

    if(index >= objects.length){

        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";

        confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
        });

        document.getElementById("clap").play();
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;
}

/* BOX CLICK */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        if(box.dataset.box === current.type){

            document.getElementById("correct").play();

            stars = Math.min(5, stars+1);
            updateStars();

            setTimeout(()=>{
                index++;
                loadGame();
            },500);

        } else {
            document.getElementById("wrong").play();
        }
    });
});

/* ⭐ STAR UPDATE */
function updateStars(){
    let s = "⭐ ".repeat(stars);
    document.getElementById("stars").innerText = s;
    document.getElementById("finalStars").innerText = s;
}

</script>

</body>
</html>
