<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game Fixed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
    transition:opacity 1.2s ease;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1.2s ease;
}

/* BOXES */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* OBJECT */
.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
}

.obj img{
    width:130px;
}

.label{
    font-size:22px;
    margin-top:8px;
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer"><img src="assets/summer-box.png" width="140"></div>
    <div class="box" data-box="rainy"><img src="assets/rainy-box.png" width="140"></div>
    <div class="box" data-box="winter"><img src="assets/winter-box.png" width="140"></div>
</div>

<div id="objectArea"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ---------------- CLEAN SPEECH FIX ---------------- */
function speak(text){

    // always stop previous speech
    speechSynthesis.cancel();

    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    msg.pitch = 1;

    speechSynthesis.speak(msg);
}

/* ---------------- START FLOW ---------------- */
window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("logo").style.opacity = 0;

        setTimeout(()=>{
            document.getElementById("logo").style.display = "none";
            document.getElementById("game").style.display = "block";
            setTimeout(()=>document.getElementById("game").style.opacity = 1,50);

            loadGame();
        },1200);

    },5000);
};

/* ---------------- GAME DATA ---------------- */
const objects = [
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"}
];

let index = 0;
let current = null;

/* ---------------- LOAD GAME ---------------- */
function loadGame(){

    if(index >= objects.length){
        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";

        document.getElementById("clap").play();
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;

    /* ---------------- INSTRUCTION AUDIO (FIXED) ---------------- */
    let questions = {
        "Ice Cream":"Which season do we eat ice cream?",
        "Raincoat":"Which season do we wear raincoat?",
        "Mittens":"Which season do we wear mittens?",
        "Umbrella":"Which season do we use umbrella?",
        "Sunglasses":"Which season do we wear sunglasses?",
        "Winter Hat":"Which season do we wear winter hat?"
    };

    speak(questions[current.label]);
}

/* ---------------- BOX CLICK ---------------- */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        if(box.dataset.box === current.type){

            document.getElementById("correct").play();

            index++;
            setTimeout(loadGame,600);

        } else {
            document.getElementById("wrong").play();
        }
    });
});

</script>

</body>
</html>
