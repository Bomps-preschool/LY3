<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

/* HEADER */
h1{
  text-align:center;
  color:#2e7d32;
  margin:10px;
}

/* GAME AREA */
.container{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

/* SEASON BOXES (FIXED ALIGNMENT) */
.box{
  width:30%;
  height:300px;
  background:white;
  border-radius:20px;
  border:3px solid #ff69b4;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* IMAGE FIX */
.box img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
}

/* LABEL */
.box-title{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:25px;
}

/* OBJECTS */
.item{
  width:80px;
  cursor:pointer;
  transition:0.2s;
}

.item img{
  width:100%;
}

/* SELECTED ITEM */
.selected{
  transform:scale(1.2);
  border:3px solid #2e7d32;
  border-radius:10px;
}

/* MESSAGE */
#msg{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

/* SPLASH LOGO */
#logo{
  width:200px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img id="logo" src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<h1>Seasons Sorting Game</h1>

<div class="container">

  <div class="box" onclick="drop('summer')">
    <img src="assets/summer-box.png">
    <div class="box-title">Summer</div>
  </div>

  <div class="box" onclick="drop('winter')">
    <img src="assets/winter-box.png">
    <div class="box-title">Winter</div>
  </div>

  <div class="box" onclick="drop('rainy')">
    <img src="assets/rainy-box.png">
    <div class="box-title">Rainy</div>
  </div>

</div>

<!-- ITEMS -->
<div class="items">

  <div class="item" onclick="selectItem(this)" data-season="summer">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" onclick="selectItem(this)" data-season="summer">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" onclick="selectItem(this)" data-season="winter">
    <img src="assets/mittens.png">
  </div>

  <div class="item" onclick="selectItem(this)" data-season="winter">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" onclick="selectItem(this)" data-season="rainy">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" onclick="selectItem(this)" data-season="rainy">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

<script>

let selected = null;

/* SPLASH CONTROL */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},3000);

/* SELECT ITEM */
function selectItem(el){

  document.querySelectorAll('.item').forEach(i=>{
    i.classList.remove('selected');
  });

  selected = el;
  el.classList.add('selected');
}

/* DROP (TAP BASED) */
function drop(season){

  if(!selected){
    showMsg("Select an item first");
    return;
  }

  if(selected.dataset.season === season){

    showMsg("Correct ✔");

    selected.style.visibility="hidden";
    selected.classList.remove("selected");
    selected = null;

  } else {

    showMsg("Try Again ✖");
  }
}

/* MESSAGE */
function showMsg(text){
  let msg = document.getElementById("msg");
  msg.innerText = text;

  setTimeout(()=>{
    msg.innerText = "";
  },1500);
}

</script>

</body>
</html>
