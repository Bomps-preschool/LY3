<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Tap Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SLIDES */
.slide{
  display:none;
  width:100%;
  height:100vh;
}

/* SHOW ACTIVE SLIDE */
.active{
  display:block;
}

/* SPLASH */
#splash{
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
}

/* LOGO */
#splash img{
  width:220px;
}

/* GAME HEADER */
h1{
  text-align:center;
  color:#2e7d32;
  margin:10px;
}

.instruction{
  text-align:center;
  font-size:20px;
  margin-bottom:10px;
}

/* BOX AREA */
.box-container{
  display:flex;
  justify-content:space-evenly;
  margin-top:10px;
}

/* BOX */
.box{
  width:28%;
  height:180px;
  background:white;
  border-radius:15px;
  border:2px solid #ff69b4;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

.item{
  width:80px;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:10px;
}

.item img{
  width:100%;
}

/* SELECTED */
.selected{
  border:3px solid #2e7d32;
  transform:scale(1.1);
}

/* FEEDBACK GLOW */
.greenGlow{
  box-shadow:0 0 20px 10px #00ff00;
}

.redGlow{
  box-shadow:0 0 20px 10px red;
}

/* END */
#end{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#fff;
  font-size:40px;
  color:#2e7d32;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- SLIDE 2 -->
<div class="slide" id="game">

<h1>Seasons Sorting Game</h1>

<div class="instruction">
Tap an object, then tap the correct season box
</div>

<div class="box-container">

  <div class="box" onclick="checkBox('summer',this)">🌞 Summer</div>
  <div class="box" onclick="checkBox('winter',this)">❄ Winter</div>
  <div class="box" onclick="checkBox('rainy',this)">🌧 Rainy</div>

</div>

<div class="items">

  <div class="item" data-season="summer" onclick="selectItem(this)">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" data-season="summer" onclick="selectItem(this)">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" data-season="winter" onclick="selectItem(this)">
    <img src="assets/mittens.png">
  </div>

  <div class="item" data-season="winter" onclick="selectItem(this)">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" data-season="rainy" onclick="selectItem(this)">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" data-season="rainy" onclick="selectItem(this)">
    <img src="assets/raincoat.png">
  </div>

</div>

</div>

<!-- SLIDE 3 -->
<div class="slide" id="end">
  <div class="confetti">🎉🎉🎉🎉🎉</div>
  <h2>🎉 WELL DONE 🎉</h2>
</div>

<audio id="clap" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

let selectedItem = null;

/* SPLASH → GAME */
setTimeout(()=>{
  document.getElementById("splash").classList.remove("active");
  document.getElementById("game").classList.add("active");
},3000);

/* SELECT ITEM */
function selectItem(el){

  document.querySelectorAll('.item').forEach(i=>{
    i.classList.remove('selected');
  });

  selectedItem = el;
  el.classList.add('selected');
}

/* CHECK BOX */
function checkBox(season, box){

  if(!selectedItem){
    return;
  }

  if(selectedItem.dataset.season === season){

    document.getElementById("clap").play();

    selectedItem.classList.remove("selected");
    selectedItem.style.opacity = "0.4";

    box.classList.add("greenGlow");

    setTimeout(()=>{
      box.classList.remove("greenGlow");
    },800);

  } else {

    document.getElementById("wrong").play();

    box.classList.add("redGlow");

    setTimeout(()=>{
      box.classList.remove("redGlow");
    },800);
  }

  selectedItem = null;
}

/* END AFTER SOME TIME */
setTimeout(()=>{
  document.getElementById("game").classList.remove("active");
  document.getElementById("end").classList.add("active");
},25000);

</script>

</body>
</html>
