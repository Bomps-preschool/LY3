<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Sorting Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
}

/* TITLE */
h1{
  text-align:center;
  color:#2e7d32;
  margin:10px;
}

/* BOX LAYOUT */
.wrapper{
  display:flex;
  justify-content:space-evenly;
  margin-top:10px;
}

/* SEASON CARD */
.box{
  width:30%;
  min-height:360px;
  background:white;
  border-radius:20px;
  border:3px solid #ff69b4;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-bottom:10px;
}

/* TOP IMAGE */
.box img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:15px 15px 0 0;
}

/* TITLE */
.box-title{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

/* DROP AREA INSIDE BOX */
.drop-area{
  width:100%;
  min-height:140px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:10px;
  padding:10px;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

/* DRAG ITEM */
.item{
  width:80px;
  cursor:grab;
  text-align:center;
}

.item img{
  width:100%;
}

/* MESSAGE */
#msg{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body>

<h1>Seasons Sorting Game</h1>

<div class="wrapper">

  <!-- SUMMER -->
  <div class="box">
    <img src="assets/summer-box.png">
    <div class="box-title">Summer</div>
    <div class="drop-area" ondrop="drop(event,'summer')" ondragover="allowDrop(event)"></div>
  </div>

  <!-- WINTER -->
  <div class="box">
    <img src="assets/winter-box.png">
    <div class="box-title">Winter</div>
    <div class="drop-area" ondrop="drop(event,'winter')" ondragover="allowDrop(event)"></div>
  </div>

  <!-- RAINY -->
  <div class="box">
    <img src="assets/rainy-box.png">
    <div class="box-title">Rainy</div>
    <div class="drop-area" ondrop="drop(event,'rainy')" ondragover="allowDrop(event)"></div>
  </div>

</div>

<!-- ITEMS -->
<div class="items">

  <div class="item" id="sunglasses" data-season="summer" draggable="true" ondragstart="drag(event)">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" id="icecream" data-season="summer" draggable="true" ondragstart="drag(event)">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" id="mittens" data-season="winter" draggable="true" ondragstart="drag(event)">
    <img src="assets/mittens.png">
  </div>

  <div class="item" id="winterhat" data-season="winter" draggable="true" ondragstart="drag(event)">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" id="umbrella" data-season="rainy" draggable="true" ondragstart="drag(event)">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" id="raincoat" data-season="rainy" draggable="true" ondragstart="drag(event)">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

<script>

function allowDrop(ev){
  ev.preventDefault();
}

function drag(ev){
  ev.dataTransfer.setData("text", ev.target.id);
}

/* CLEAN DROP LOGIC */
function drop(ev, season){

  ev.preventDefault();

  let id = ev.dataTransfer.getData("text");
  let item = document.getElementById(id);

  let box = ev.currentTarget;

  if(item.dataset.season === season){

    // IMPORTANT: keep visible inside box
    item.style.width = "70px";
    item.style.margin = "5px";

    box.appendChild(item);

  } else {
    showMsg("Try Again ✖");
  }
}

/* MESSAGE */
function showMsg(text){
  let msg = document.getElementById("msg");
  msg.innerText = text;

  setTimeout(()=>{
    msg.innerText = "";
  },1500);
}

</script>

</body>
</html>
