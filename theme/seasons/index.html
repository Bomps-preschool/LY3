<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:20px;
}

/* INSTRUCTION */
h2{
    font-size:28px;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* BOXES */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

/* glow animation */
.box.active{
    border-color:#4CAF50;
    box-shadow:0 0 15px rgba(76,175,80,0.5);
}

/* OBJECT */
#objectArea{
    margin-top:60px;
}

.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.obj img{
    width:130px;
}

.label{
    font-size:22px;
    margin-top:8px;
}

/* CORRECT ANIMATION */
.correctAnim{
    animation:correctPulse 0.6s ease;
}

@keyframes correctPulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.2) rotate(3deg);}
    100%{transform:scale(1);}
}

/* WRONG ANIMATION */
.wrongAnim{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* END */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer">
        <img src="assets/summer-box.png" width="140">
    </div>
    <div class="box" data-box="rainy">
        <img src="assets/rainy-box.png" width="140">
    </div>
    <div class="box" data-box="winter">
        <img src="assets/winter-box.png" width="140">
    </div>
</div>

<div id="objectArea"></div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

setTimeout(()=>{
    document.getElementById("logo").style.display="none";
    document.getElementById("game").style.display="block";
    loadGame();
},5000);

const objects = [
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"}
];

let index = 0;
let current = null;

/* 🔥 AUDIO LOCK SYSTEM (FIX OVERLAP) */
let audioPlaying = false;

function playSound(audio){
    return new Promise(resolve=>{
        audioPlaying = true;
        audio.play();
        audio.onended = ()=>{
            audioPlaying = false;
            resolve();
        };
    });
}

/* VOICE */
function speak(text){
    if(audioPlaying) return;

    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

/* LOAD GAME */
function loadGame(){

    if(index >= objects.length){
        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";
        playSound(document.getElementById("clap"));
        return;
    }

    let obj = objects[index];
    current = obj;

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${obj.img}">
            <div class="label">${obj.label}</div>
        </div>
    `;

    speak("Which season do we use " + obj.label);
}

/* BOX CLICK */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        let type = box.dataset.box;

        let objCard = document.querySelector(".obj");

        if(type === current.type){

            objCard.classList.add("correctAnim");

            playSound(document.getElementById("correct")).then(()=>{
                playSound(document.getElementById("clap")).then(()=>{
                    index++;
                    loadGame();
                });
            });

        } else {

            objCard.classList.add("wrongAnim");

            playSound(document.getElementById("wrong"));

            setTimeout(()=>{
                objCard.classList.remove("wrongAnim");
            },500);
        }
    });
});

</script>

</body>
</html>
