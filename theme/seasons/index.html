<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Sorting Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
}

h1{
  text-align:center;
  color:#2e7d32;
}

/* CONTAINER */
.wrapper{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

/* BOX FIX */
.box{
  width:30%;
  min-height:350px;
  background:white;
  border-radius:20px;
  border:3px solid #ff69b4;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
  padding-bottom:10px;
}

/* IMAGE FIX (FULL COVER) */
.box img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* TITLE */
.box-title{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

/* ITEMS */
.items{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

/* DRAG ITEM */
.item{
  width:80px;
  cursor:grab;
  text-align:center;
}

.item img{
  width:100%;
}

/* WHEN INSIDE BOX */
.box .item{
  width:70px;
  margin:8px;
}

/* MESSAGE */
#msg{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body>

<h1>Seasons Sorting Game</h1>

<div class="wrapper">

  <div class="box" ondrop="drop(event,'summer')" ondragover="allowDrop(event)">
    <img src="assets/summer-box.png">
    <div class="box-title">Summer</div>
  </div>

  <div class="box" ondrop="drop(event,'winter')" ondragover="allowDrop(event)">
    <img src="assets/winter-box.png">
    <div class="box-title">Winter</div>
  </div>

  <div class="box" ondrop="drop(event,'rainy')" ondragover="allowDrop(event)">
    <img src="assets/rainy-box.png">
    <div class="box-title">Rainy</div>
  </div>

</div>

<!-- ITEMS -->
<div class="items">

  <div class="item" draggable="true" id="sunglasses" data-season="summer" ondragstart="drag(event)">
    <img src="assets/sunglasses.png">
  </div>

  <div class="item" draggable="true" id="icecream" data-season="summer" ondragstart="drag(event)">
    <img src="assets/ice-cream.png">
  </div>

  <div class="item" draggable="true" id="mittens" data-season="winter" ondragstart="drag(event)">
    <img src="assets/mittens.png">
  </div>

  <div class="item" draggable="true" id="winterhat" data-season="winter" ondragstart="drag(event)">
    <img src="assets/winter-hat.png">
  </div>

  <div class="item" draggable="true" id="umbrella" data-season="rainy" ondragstart="drag(event)">
    <img src="assets/umbrella.png">
  </div>

  <div class="item" draggable="true" id="raincoat" data-season="rainy" ondragstart="drag(event)">
    <img src="assets/raincoat.png">
  </div>

</div>

<div id="msg"></div>

<script>

function allowDrop(ev){
  ev.preventDefault();
}

function drag(ev){
  ev.dataTransfer.setData("text", ev.target.id);
}

/* ✅ FIXED DROP LOGIC */
function drop(ev, season){

  ev.preventDefault();

  let id = ev.dataTransfer.getData("text");
  let item = document.getElementById(id);

  let box = ev.currentTarget;

  if(item.dataset.season === season){

    // KEEP ITEM VISIBLE INSIDE BOX
    item.style.width = "70px";
    item.style.margin = "8px";

    box.appendChild(item);

  } else {

    showMsg("Try Again ✖");
  }
}

/* MESSAGE */
function showMsg(text){
  let msg = document.getElementById("msg");
  msg.innerText = text;

  setTimeout(()=>{
    msg.innerText = "";
  },1500);
}

</script>

</body>
</html>
