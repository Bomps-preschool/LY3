<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seasons Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
}

/* ---------- SCREEN SYSTEM (FIXED) ---------- */
.screen{
    display:none;
    width:100%;
    height:100vh;
    text-align:center;
    position:absolute;
    top:0;
    left:0;
}

.screen.active{
    display:block;
}

/* ---------- LOGO ---------- */
#logo{
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ---------- GAME ---------- */
h2{
    margin-top:20px;
}

/* ---------- BOXES ---------- */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:30px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.box.active{
    transform:scale(1.05);
    box-shadow:0 0 10px rgba(0,150,255,0.4);
}

/* ---------- OBJECT ---------- */
.obj{
    margin-top:60px;
    display:inline-block;
    background:white;
    padding:15px;
    border-radius:15px;
    cursor:pointer;
}

.obj img{
    width:140px;
}

.label{
    font-size:20px;
}

/* ---------- END ---------- */
#end{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

/* ---------- PARTICLES (LIGHT SEASON EFFECT) ---------- */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    opacity:0.4;
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}

/* ---------- CONFETTI ---------- */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:drop 3s linear forwards;
}

@keyframes drop{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- ---------- LOGO ---------- -->
<div id="logo" class="screen active">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- ---------- GAME ---------- -->
<div id="game" class="screen">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-type="summer"><img src="assets/summer-box.png" width="140"></div>
    <div class="box" data-type="rainy"><img src="assets/rainy-box.png" width="140"></div>
    <div class="box" data-type="winter"><img src="assets/winter-box.png" width="140"></div>
</div>

<div id="objectArea"></div>

</div>

<!-- ---------- END ---------- -->
<div id="end" class="screen">
    <h1>🎉 Well Done!</h1>
</div>

<!-- ---------- AUDIO ---------- -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

/* ---------- SINGLE SCREEN CONTROLLER (FIXED) ---------- */
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ---------- START GAME AFTER LOGO ---------- */
setTimeout(()=>{
    showScreen("game");
    startParticles();
    loadGame();
},5000);

/* ---------- AUDIO LOCK (NO OVERLAP) ---------- */
let audioPlaying = false;

function playSound(audio){
    if(audioPlaying) return;
    audioPlaying = true;
    audio.play();
    audio.onended = ()=> audioPlaying = false;
}

/* ---------- GAME DATA ---------- */
const items = [
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"}
];

let index = 0;
let current = null;

/* ---------- LOAD ITEM ---------- */
function loadGame(){

    if(index >= items.length){
        showScreen("end");
        burstConfetti();
        playSound(document.getElementById("clap"));
        return;
    }

    current = items[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;

    speak("Which season do we use " + current.label);
}

/* ---------- TEXT TO SPEECH ---------- */
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* ---------- BOX CLICK ---------- */
document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        let obj = document.querySelector(".obj");
        obj.style.transform = "scale(1.1)";

        setTimeout(()=>obj.style.transform="scale(1)",200);

        if(box.dataset.type === current.type){
            playSound(document.getElementById("correct"));
            index++;
            setTimeout(loadGame,700);
        }
        else{
            playSound(document.getElementById("wrong"));
        }
    });
});

/* ---------- SEASON PARTICLES ---------- */
function startParticles(){

    for(let i=0;i<15;i++){
        let p = document.createElement("div");
        p.className="particle";
        p.style.left = Math.random()*100 + "vw";
        p.style.background = "white";
        p.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(p);
    }
}

/* ---------- CONFETTI ---------- */
function burstConfetti(){
    for(let i=0;i<120;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = (2 + Math.random()*2) + "s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),4000);
    }
}

</script>

</body>
</html>
