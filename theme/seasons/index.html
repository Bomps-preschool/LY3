<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background:#eaf6f6;
    overflow:hidden;
}

/* ---------------- LOGO ---------------- */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
    transition:opacity 1.2s ease;
}

/* ---------------- GAME ---------------- */
#game{
    display:none;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1.2s ease;
}

/* ---------------- INSTRUCTION ---------------- */
h2{
    font-size:28px;
}

/* ---------------- BOXES ---------------- */
.box-container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.box{
    width:170px;
    height:170px;
    border:3px dashed #666;
    border-radius:15px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

/* 🌟 NEW: hover glow */
.box:hover{
    box-shadow:0 0 15px rgba(100,180,255,0.5);
    transform:scale(1.03);
}

/* ---------------- OBJECT ---------------- */
#objectArea{
    margin-top:60px;
}

.obj{
    width:170px;
    background:white;
    border-radius:15px;
    padding:12px;
    display:inline-block;
    cursor:pointer;
}

.obj img{
    width:130px;
}

/* ---------------- ANIMATIONS ---------------- */
.correctAnim{
    animation:pop 0.5s ease;
}

@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.wrongAnim{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* ---------------- END ---------------- */
#end{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* ---------------- SEASON PARTICLES ---------------- */
.particle{
    position:absolute;
    pointer-events:none;
    opacity:0.4;
}

/* ---------------- CONFETTI (MULTI LAYER) ---------------- */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
}

.confetti.star{
    clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}

.confetti.big{
    width:12px;
    height:12px;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- ---------------- LOGO ---------------- -->
<div id="logo">
    <img src="assets/innovine-logo.png" width="250">
</div>

<!-- ---------------- GAME ---------------- -->
<div id="game">

<h2>Tap the correct season box</h2>

<div class="box-container">
    <div class="box" data-box="summer"><img src="assets/summer-box.png" width="140"></div>
    <div class="box" data-box="rainy"><img src="assets/rainy-box.png" width="140"></div>
    <div class="box" data-box="winter"><img src="assets/winter-box.png" width="140"></div>
</div>

<div id="objectArea"></div>

</div>

<!-- ---------------- END ---------------- -->
<div id="end">
    <h1>🎉 Well Done!</h1>
</div>

<!-- ---------------- AUDIO ---------------- -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>

let clapPlayed = false;

/* ---------------- SMOOTH TRANSITION FIX ---------------- */
window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("logo").style.opacity = 0;

        setTimeout(()=>{
            document.getElementById("logo").style.display = "none";
            document.getElementById("game").style.display = "block";
            setTimeout(()=>document.getElementById("game").style.opacity = 1,50);

            startSeason();
        },1200);

    },5000);
};

/* ---------------- GAME DATA ---------------- */
const objects = [
    {img:"assets/sunglasses.png", label:"Sunglasses", type:"summer"},
    {img:"assets/ice-cream.png", label:"Ice Cream", type:"summer"},
    {img:"assets/raincoat.png", label:"Raincoat", type:"rainy"},
    {img:"assets/umbrella.png", label:"Umbrella", type:"rainy"},
    {img:"assets/winter-hat.png", label:"Winter Hat", type:"winter"},
    {img:"assets/mittens.png", label:"Mittens", type:"winter"}
];

let index = 0;
let current = null;

/* ---------------- LOAD ---------------- */
function loadGame(){

    if(index >= objects.length){
        document.getElementById("game").style.display="none";
        document.getElementById("end").style.display="flex";

        if(!clapPlayed){
            document.getElementById("clap").play();
            clapPlayed = true;
        }

        burstConfetti();
        return;
    }

    current = objects[index];

    document.getElementById("objectArea").innerHTML = `
        <div class="obj">
            <img src="${current.img}">
            <div class="label">${current.label}</div>
        </div>
    `;
}

document.querySelectorAll(".box").forEach(box=>{
    box.addEventListener("click",()=>{

        if(!current) return;

        let obj = document.querySelector(".obj");

        if(box.dataset.box === current.type){

            document.getElementById("correct").play();

            obj.classList.add("correctAnim");

            index++;
            setTimeout(loadGame,600);

        } else {
            document.getElementById("wrong").play();
            obj.classList.add("wrongAnim");
        }
    });
});

/* ---------------- SEASON BACKGROUND ---------------- */
function startSeason(){

    for(let i=0;i<12;i++){
        let p = document.createElement("div");
        p.className="particle";
        p.style.left = Math.random()*100+"vw";
        p.style.top = Math.random()*100+"vh";
        p.style.width = p.style.height = "4px";
        p.style.background = "white";
        p.style.animation = "fall 10s linear infinite";
        document.body.appendChild(p);
    }

    loadGame();
}

/* ---------------- CONFETTI (MULTI LAYER) ---------------- */
function burstConfetti(){

    const shapes = ["square","circle","star"];

    for(let i=0;i<120;i++){
        let c = document.createElement("div");
        c.className="confetti";

        if(Math.random()>0.7) c.classList.add("big");
        if(Math.random()>0.8) c.classList.add("star");

        c.style.left = Math.random()*100+"vw";
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = (2+Math.random()*3)+"s";

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),5000);
    }
}

</script>

</body>
</html>
