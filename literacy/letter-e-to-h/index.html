<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Odd Man Out - Letters E to H</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#dff2fb;
}

/* GAME CONTAINER */

.game-container{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;

    background:
    linear-gradient(rgba(235,247,252,0.88),
    rgba(235,247,252,0.88)),
    url('assets/image(25).png');

    background-size:cover;
    background-position:center;
}

/* DECORATION BOOK */

.book-decor{
    position:absolute;
    right:10px;
    top:10px;
    width:220px;
    opacity:0.95;
    z-index:1;
}

/* FLOATING LETTERS */

.float-letter{
    position:absolute;
    color:#ffffff;
    font-weight:bold;
    opacity:0.8;
    animation:float 5s infinite ease-in-out;
    z-index:1;
}

.l1{top:30px; right:220px; font-size:40px;}
.l2{top:80px; right:150px; font-size:28px;}
.l3{top:140px; right:260px; font-size:34px;}
.l4{top:180px; right:180px; font-size:26px;}
.l5{top:220px; right:290px; font-size:32px;}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* SLIDES */

.slide{
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;

    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:10px;
    z-index:2;
}

.active{
    display:flex;
}

/* LOGO */

.logo{
    width:320px;
    max-width:80%;
    animation:pulse 1.6s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* LETTER TITLE */

.letter-title{
    font-size:75px;
    color:#ff6f00;
    font-weight:bold;
    margin-bottom:8px;

    text-shadow:3px 3px #fff;
}

/* GRID */

.grid{
    width:100%;
    max-width:950px;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:14px;
}

/* CARD */

.card{
    background:#fffdf7;

    border-radius:24px;

    border:4px solid #ffffff;

    padding:10px;

    text-align:center;

    box-shadow:0 4px 10px rgba(0,0,0,0.12);

    transition:0.2s;

    cursor:pointer;
}

.card:active{
    transform:scale(0.96);
}

.card img{
    width:100%;
    height:21vh;
    object-fit:contain;
}

.card p{
    margin-top:6px;
    font-size:28px;
    font-weight:bold;
    color:#24476b;
}

/* TRACE */

.trace-container{
    width:220px;
    height:220px;

    margin-top:8px;

    position:relative;
}

.trace-image{
    width:100%;
    height:100%;
    border-radius:20px;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* FINAL */

.final-text{
    font-size:85px;
    font-weight:bold;
    color:#ff7a00;

    text-shadow:4px 4px #fff;

    z-index:5;
}

/* CONFETTI */

.confetti{
    position:absolute;
    width:12px;
    height:12px;

    border-radius:50%;

    animation:fall linear forwards;

    z-index:10;
}

@keyframes fall{

    from{
        transform:translateY(-50px) rotate(0deg);
    }

    to{
        transform:translateY(120vh) rotate(720deg);
    }
}

/* MOBILE */

@media(max-width:768px){

    .letter-title{
        font-size:52px;
    }

    .grid{
        gap:10px;
    }

    .card img{
        height:14vh;
    }

    .card p{
        font-size:20px;
    }

    .trace-container{
        width:170px;
        height:170px;
    }

    .book-decor{
        width:140px;
    }

    .final-text{
        font-size:48px;
        text-align:center;
    }
}

</style>
</head>

<body>

<div class="game-container">

    <!-- BACKGROUND DECOR -->

    <img src="assets/image(26).png" class="book-decor">

    <div class="float-letter l1">A</div>
    <div class="float-letter l2">B</div>
    <div class="float-letter l3">C</div>
    <div class="float-letter l4">D</div>
    <div class="float-letter l5">E</div>

    <!-- INTRO -->

    <div class="slide active" id="introSlide">

        <img src="assets/innovine-logo.png" class="logo">

    </div>

    <!-- LETTER E -->

    <div class="slide" id="slideE">

        <div class="letter-title">Ee</div>

        <div class="grid">

            <div class="card wrong" onclick="wrongAnswer(this)">
                <img src="assets/sunflower.png">
                <p>Sunflower</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/elf.png">
                <p>Elf</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/envelope.png">
                <p>Envelope</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/egg.png">
                <p>Egg</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-image">
            <canvas id="canvasE"></canvas>
        </div>

    </div>

    <!-- LETTER H -->

    <div class="slide" id="slideH">

        <div class="letter-title">Hh</div>

        <div class="grid">

            <div class="card wrong" onclick="wrongAnswer(this)">
                <img src="assets/queen.png">
                <p>Queen</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/helicopter.png">
                <p>Helicopter</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/helmet.png">
                <p>Helmet</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/hat.png">
                <p>Hat</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-image">
            <canvas id="canvasH"></canvas>
        </div>

    </div>

    <!-- LETTER G -->

    <div class="slide" id="slideG">

        <div class="letter-title">Gg</div>

        <div class="grid">

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/grasshopper.png">
                <p>Grasshopper</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/guitar.png">
                <p>Guitar</p>
            </div>

            <div class="card wrong" onclick="wrongAnswer(this)">
                <img src="assets/vegetables.png">
                <p>Vegetables</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/globe.png">
                <p>Globe</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-image">
            <canvas id="canvasG"></canvas>
        </div>

    </div>

    <!-- LETTER F -->

    <div class="slide" id="slideF">

        <div class="letter-title">Ff</div>

        <div class="grid">

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/feather.png">
                <p>Feather</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/finch.png">
                <p>Finch</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/flamingo.png">
                <p>Flamingo</p>
            </div>

            <div class="card wrong" onclick="wrongAnswer(this)">
                <img src="assets/lollipop.png">
                <p>Lollipop</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-image">
            <canvas id="canvasF"></canvas>
        </div>

    </div>

    <!-- FINAL -->

    <div class="slide" id="finalSlide">

        <div class="final-text">EXCELLENT!</div>

    </div>

</div>

<!-- AUDIO -->

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<audio id="soundE" src="assets/letter-e-sound.mp3"></audio>
<audio id="soundF" src="assets/letter-f-sound.mp3"></audio>
<audio id="soundG" src="assets/letter-g-sound.mp3"></audio>
<audio id="soundH" src="assets/letter-h-sound.mp3"></audio>

<script>

/* SLIDES */

const slides = [
    "introSlide",
    "slideE",
    "slideH",
    "slideG",
    "slideF",
    "finalSlide"
];

let currentSlide = 0;

/* SHOW SLIDE */

function showSlide(index){

    document.querySelectorAll('.slide').forEach(slide=>{
        slide.classList.remove('active');
    });

    document.getElementById(slides[index]).classList.add('active');

    currentSlide = index;

    if(slides[index] === "slideE"){
        playLetter("soundE");
    }

    if(slides[index] === "slideH"){
        playLetter("soundH");
    }

    if(slides[index] === "slideG"){
        playLetter("soundG");
    }

    if(slides[index] === "slideF"){
        playLetter("soundF");
    }

    if(slides[index] === "finalSlide"){
        createConfetti();
    }
}

/* INTRO SCREEN */

setTimeout(()=>{
    showSlide(1);
},5000);

/* LETTER SOUND */

function playLetter(id){

    const audio = document.getElementById(id);

    audio.currentTime = 0;

    audio.play().catch(()=>{});
}

/* CORRECT ANSWER */

function correctAnswer(card){

    document.getElementById("rightSound").play();

    card.style.borderColor = "#4CAF50";

    setTimeout(()=>{
        enableTracing();
    },900);
}

/* WRONG ANSWER */

function wrongAnswer(card){

    document.getElementById("wrongSound").play();

    card.style.borderColor = "#ff5e5e";

    setTimeout(()=>{
        card.style.borderColor = "#fff";
    },700);
}

/* TRACING */

function enableTracing(){

    const activeSlide =
    document.querySelector('.slide.active');

    const canvas =
    activeSlide.querySelector('canvas');

    if(!canvas) return;

    const box =
    activeSlide.querySelector('.trace-container');

    canvas.width = box.offsetWidth;
    canvas.height = box.offsetHeight;

    const ctx = canvas.getContext('2d');

    ctx.strokeStyle = "#ff7a00";
    ctx.lineWidth = 18;
    ctx.lineCap = "round";

    let drawing = false;
    let drawCount = 0;

    function start(e){
        drawing = true;
        draw(e);
    }

    function stop(){

        drawing = false;

        ctx.beginPath();

        if(drawCount > 35){

            nextSlide();
        }
    }

    function draw(e){

        if(!drawing) return;

        e.preventDefault();

        const rect = canvas.getBoundingClientRect();

        const x =
        (e.touches ? e.touches[0].clientX : e.clientX)
        - rect.left;

        const y =
        (e.touches ? e.touches[0].clientY : e.clientY)
        - rect.top;

        ctx.lineTo(x,y);
        ctx.stroke();

        ctx.beginPath();

        ctx.moveTo(x,y);

        drawCount++;
    }

    canvas.addEventListener('mousedown',start);
    canvas.addEventListener('mousemove',draw);
    canvas.addEventListener('mouseup',stop);

    canvas.addEventListener('touchstart',start,{passive:false});
    canvas.addEventListener('touchmove',draw,{passive:false});
    canvas.addEventListener('touchend',stop);
}

/* NEXT SLIDE */

function nextSlide(){

    if(currentSlide < slides.length - 1){

        showSlide(currentSlide + 1);
    }
}

/* CONFETTI */

function createConfetti(){

    const colors = [
        "#ff6b6b",
        "#ffd93d",
        "#6bcB77",
        "#4d96ff",
        "#ff8fab",
        "#ff9f1c"
    ];

    for(let i=0;i<220;i++){

        const confetti =
        document.createElement('div');

        confetti.classList.add('confetti');

        confetti.style.left =
        Math.random() * 100 + 'vw';

        confetti.style.background =
        colors[Math.floor(Math.random()*colors.length)];

        confetti.style.animationDuration =
        (Math.random()*3 + 2) + 's';

        document.body.appendChild(confetti);
    }
}

</script>

</body>
</html>
