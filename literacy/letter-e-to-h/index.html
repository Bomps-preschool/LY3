<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Letters E to H Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  overflow:hidden;
  font-family:Arial, sans-serif;
}

.game-container{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:url("assets/background.png") center/cover no-repeat;
}

.slide{
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:12px;
}

.active{
  display:flex;
}

.logo{
  width:300px;
  max-width:80%;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.07);}
  100%{transform:scale(1);}
}

.title{
  font-size:42px;
  color:#ff7300;
  background:white;
  padding:12px 22px;
  border-radius:25px;
  margin-bottom:18px;
  box-shadow:0 4px 10px rgba(0,0,0,0.18);
  text-align:center;
}

.letter-title{
  font-size:74px;
  font-weight:bold;
  color:#ff7300;
  text-shadow:3px 3px white;
  margin-bottom:12px;
}

.grid{
  width:100%;
  max-width:850px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.card{
  background:white;
  border-radius:24px;
  border:5px solid white;
  padding:10px;
  text-align:center;
  box-shadow:0 5px 14px rgba(0,0,0,0.18);
  cursor:pointer;
  transition:0.2s;
}

.card:active{
  transform:scale(0.95);
}

.card img{
  width:100%;
  height:21vh;
  object-fit:contain;
}

.card p{
  font-size:27px;
  font-weight:bold;
  color:#234c70;
  margin-top:6px;
}

.message{
  margin-top:14px;
  font-size:28px;
  font-weight:bold;
  color:#ff7300;
  background:white;
  padding:8px 18px;
  border-radius:20px;
  min-height:48px;
  text-align:center;
}

.final-text{
  font-size:70px;
  font-weight:bold;
  color:#ff7300;
  text-shadow:4px 4px white;
  text-align:center;
}

.restart-btn{
  margin-top:25px;
  font-size:26px;
  padding:12px 30px;
  border:none;
  border-radius:25px;
  background:#ff7300;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.confetti{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  animation:fall linear forwards;
  z-index:999;
}

@keyframes fall{
  from{
    transform:translateY(-50px) rotate(0deg);
  }
  to{
    transform:translateY(120vh) rotate(720deg);
  }
}

@media(max-width:768px){

  .title{
    font-size:26px;
    padding:10px 16px;
  }

  .letter-title{
    font-size:52px;
  }

  .grid{
    gap:10px;
  }

  .card{
    border-radius:18px;
    padding:8px;
  }

  .card img{
    height:15vh;
  }

  .card p{
    font-size:19px;
  }

  .message{
    font-size:21px;
  }

  .final-text{
    font-size:44px;
  }

  .restart-btn{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="game-container">

  <!-- INTRO LOGO SCREEN -->
  <div class="slide active" id="introSlide">
    <img src="assets/innovine-logo.png" class="logo">
  </div>

  <!-- INSTRUCTION SCREEN -->
  <div class="slide" id="instructionSlide">
    <div class="title">
      Listen to the letter sound.<br>
      Tap the pictures that begin with that letter.
    </div>
    <button class="restart-btn" onclick="nextSlide()">Start</button>
  </div>

  <!-- LETTER E -->
  <div class="slide" id="slideE">
    <div class="letter-title">Ee</div>

    <div class="grid">
      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/eggplant.png">
        <p>Eggplant</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/elf.png">
        <p>Elf</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/envelope.png">
        <p>Envelope</p>
      </div>

      <div class="card wrong" onclick="checkAnswer(this,false)">
        <img src="assets/guitar.png">
        <p>Guitar</p>
      </div>
    </div>

    <div class="message" id="msgE"></div>
  </div>

  <!-- LETTER F -->
  <div class="slide" id="slideF">
    <div class="letter-title">Ff</div>

    <div class="grid">
      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/feather.png">
        <p>Feather</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/finch.png">
        <p>Finch</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/flamingo.png">
        <p>Flamingo</p>
      </div>

      <div class="card wrong" onclick="checkAnswer(this,false)">
        <img src="assets/helmet.png">
        <p>Helmet</p>
      </div>
    </div>

    <div class="message" id="msgF"></div>
  </div>

  <!-- LETTER G -->
  <div class="slide" id="slideG">
    <div class="letter-title">Gg</div>

    <div class="grid">
      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/globe.png">
        <p>Globe</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/grasshopper.png">
        <p>Grasshopper</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/guitar.png">
        <p>Guitar</p>
      </div>

      <div class="card wrong" onclick="checkAnswer(this,false)">
        <img src="assets/hat.png">
        <p>Hat</p>
      </div>
    </div>

    <div class="message" id="msgG"></div>
  </div>

  <!-- LETTER H -->
  <div class="slide" id="slideH">
    <div class="letter-title">Hh</div>

    <div class="grid">
      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/hat.png">
        <p>Hat</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/helicopter.png">
        <p>Helicopter</p>
      </div>

      <div class="card correct" onclick="checkAnswer(this,true)">
        <img src="assets/helmet.png">
        <p>Helmet</p>
      </div>

      <div class="card wrong" onclick="checkAnswer(this,false)">
        <img src="assets/lollipop.png">
        <p>Lollipop</p>
      </div>
    </div>

    <div class="message" id="msgH"></div>
  </div>

  <!-- FINAL -->
  <div class="slide" id="finalSlide">
    <div class="final-text">Excellent!</div>
    <button class="restart-btn" onclick="restartGame()">Play Again</button>
  </div>

</div>

<!-- AUDIO FILES -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapsSound" src="assets/claps.mp3"></audio>

<audio id="soundE" src="assets/letter-e-sound.mp3"></audio>
<audio id="soundF" src="assets/letter-f-sound.mp3"></audio>
<audio id="soundG" src="assets/letter-g-sound.mp3"></audio>
<audio id="soundH" src="assets/letter-h-sound.mp3"></audio>

<script>

const slides = [
  "introSlide",
  "instructionSlide",
  "slideE",
  "slideF",
  "slideG",
  "slideH",
  "finalSlide"
];

let currentSlide = 0;
let correctCount = 0;

function showSlide(index){

  document.querySelectorAll(".slide").forEach(slide=>{
    slide.classList.remove("active");
  });

  document.getElementById(slides[index]).classList.add("active");
  currentSlide = index;
  correctCount = 0;

  document.querySelectorAll(".message").forEach(msg=>{
    msg.textContent = "";
  });

  document.querySelectorAll(".card").forEach(card=>{
    card.style.borderColor = "white";
    card.style.pointerEvents = "auto";
  });

  if(slides[index] === "slideE"){
    playSound("soundE");
  }

  if(slides[index] === "slideF"){
    playSound("soundF");
  }

  if(slides[index] === "slideG"){
    playSound("soundG");
  }

  if(slides[index] === "slideH"){
    playSound("soundH");
  }

  if(slides[index] === "finalSlide"){
    playSound("clapsSound");
    createConfetti();
  }
}

setTimeout(()=>{
  showSlide(1);
},5000);

function nextSlide(){
  if(currentSlide < slides.length - 1){
    showSlide(currentSlide + 1);
  }
}

function playSound(id){
  const audio = document.getElementById(id);
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

function checkAnswer(card,isCorrect){

  const activeSlide = document.querySelector(".slide.active");
  const message = activeSlide.querySelector(".message");

  if(isCorrect){

    playSound("correctSound");

    card.style.borderColor = "#39d353";
    card.style.pointerEvents = "none";

    correctCount++;

    message.textContent = "Good job!";

    if(correctCount === 3){
      setTimeout(()=>{
        nextSlide();
      },1200);
    }

  }else{

    playSound("wrongSound");

    if(navigator.vibrate){
      navigator.vibrate(200);
    }

    card.style.borderColor = "#ff4d4d";
    message.textContent = "Try again!";

    setTimeout(()=>{
      card.style.borderColor = "white";
      message.textContent = "";
    },900);
  }
}

function createConfetti(){

  const colors = [
    "#ff595e",
    "#ffca3a",
    "#8ac926",
    "#1982c4",
    "#6a4c93",
    "#ff85a1"
  ];

  for(let i=0;i<220;i++){

    const confetti = document.createElement("div");

    confetti.classList.add("confetti");

    confetti.style.left = Math.random()*100 + "vw";

    confetti.style.background = colors[Math.floor(Math.random()*colors.length)];

    confetti.style.animationDuration = Math.random()*3 + 2 + "s";

    document.body.appendChild(confetti);

    setTimeout(()=>{
      confetti.remove();
    },5000);
  }
}

function restartGame(){
  showSlide(1);
}

</script>

</body>
</html>
