<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Odd Man Out - Letters E to H</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    overflow:hidden;
    font-family: 'Arial', sans-serif;
    background:#8fd3ff;
    touch-action: manipulation;
}

.game-container{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    background-image:url('assets/image(24).png');
    background-size:cover;
    background-position:center;
}

.slide{
    width:100%;
    height:100%;
    display:none;
    position:absolute;
    top:0;
    left:0;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:10px;
}

.active{
    display:flex;
}

/* INTRO */
.logo{
    width:300px;
    max-width:80%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* LETTER */
.letter-title{
    font-size:80px;
    color:#ff7a00;
    font-weight:bold;
    margin-bottom:10px;
    text-shadow:3px 3px 0 #fff;
}

/* IMAGE GRID */
.grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:10px;
    max-width:950px;
}

.card{
    background:#ffffffdd;
    border-radius:25px;
    padding:12px;
    text-align:center;
    border:5px solid #ffffff;
    transition:0.3s;
    cursor:pointer;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.card:active{
    transform:scale(0.96);
}

.card img{
    width:100%;
    height:22vh;
    object-fit:contain;
}

.card p{
    font-size:28px;
    color:#333;
    font-weight:bold;
    margin-top:8px;
}

/* TRACING */
.trace-container{
    width:260px;
    height:260px;
    margin-top:10px;
    position:relative;
}

.trace-letter{
    width:100%;
    height:100%;
    background:#fff;
    border-radius:30px;
    padding:10px;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* FINAL */
.final-text{
    font-size:75px;
    color:#ff6b00;
    text-shadow:4px 4px 0 white;
    font-weight:bold;
    z-index:2;
}

.confetti{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* MOBILE */
@media(max-width:768px){

    .letter-title{
        font-size:55px;
    }

    .grid{
        gap:10px;
    }

    .card img{
        height:16vh;
    }

    .card p{
        font-size:20px;
    }

    .trace-container{
        width:200px;
        height:200px;
    }

    .final-text{
        font-size:50px;
        text-align:center;
    }
}

@media(max-height:700px){
    .card img{
        height:14vh;
    }
}
</style>
</head>

<body>

<div class="game-container">

    <!-- INTRO -->
    <div class="slide active" id="introSlide">
        <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">
    </div>

    <!-- LETTER E -->
    <div class="slide" id="slideE">
        <div class="letter-title">Ee</div>

        <div class="grid">
            <div class="card correct" onclick="checkAnswer(this,true)">
                <img src="assets/sunflower.png">
                <p>Sunflower</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/elf.png">
                <p>Elf</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/envelope.png">
                <p>Envelope</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/egg.png">
                <p>Egg</p>
            </div>
        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-letter">
            <canvas id="canvasE"></canvas>
        </div>
    </div>

    <!-- LETTER H -->
    <div class="slide" id="slideH">
        <div class="letter-title">Hh</div>

        <div class="grid">
            <div class="card correct" onclick="checkAnswer(this,true)">
                <img src="assets/queen.png">
                <p>Queen</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/helicopter.png">
                <p>Helicopter</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/helmet.png">
                <p>Helmet</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/hat.png">
                <p>Hat</p>
            </div>
        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-letter">
            <canvas id="canvasH"></canvas>
        </div>
    </div>

    <!-- LETTER G -->
    <div class="slide" id="slideG">
        <div class="letter-title">Gg</div>

        <div class="grid">
            <div class="card correct" onclick="checkAnswer(this,true)">
                <img src="assets/vegetables.png">
                <p>Vegetables</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/grasshopper.png">
                <p>Grasshopper</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/guitar.png">
                <p>Guitar</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/globe.png">
                <p>Globe</p>
            </div>
        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-letter">
            <canvas id="canvasG"></canvas>
        </div>
    </div>

    <!-- LETTER F -->
    <div class="slide" id="slideF">
        <div class="letter-title">Ff</div>

        <div class="grid">
            <div class="card correct" onclick="checkAnswer(this,true)">
                <img src="assets/lollipop.png">
                <p>Lollipop</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/feather.png">
                <p>Feather</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/finch.png">
                <p>Finch</p>
            </div>

            <div class="card" onclick="checkAnswer(this,false)">
                <img src="assets/flamingo.png">
                <p>Flamingo</p>
            </div>
        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-letter">
            <canvas id="canvasF"></canvas>
        </div>
    </div>

    <!-- FINAL -->
    <div class="slide" id="finalSlide">
        <div class="final-text">EXCELLENT!</div>
    </div>

</div>

<!-- AUDIO -->
<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<audio id="soundE" src="assets/letter-e-sound.mp3"></audio>
<audio id="soundF" src="assets/letter-f-sound.mp3"></audio>
<audio id="soundG" src="assets/letter-g-sound.mp3"></audio>
<audio id="soundH" src="assets/letter-h-sound.mp3"></audio>

<script>
const slides = [
    "introSlide",
    "slideE",
    "slideH",
    "slideG",
    "slideF",
    "finalSlide"
];

let currentSlide = 0;

function showSlide(index){

    document.querySelectorAll('.slide').forEach(slide=>{
        slide.classList.remove('active');
    });

    document.getElementById(slides[index]).classList.add('active');

    currentSlide = index;

    if(slides[index] === "slideE"){
        playLetter("soundE");
    }

    if(slides[index] === "slideH"){
        playLetter("soundH");
    }

    if(slides[index] === "slideG"){
        playLetter("soundG");
    }

    if(slides[index] === "slideF"){
        playLetter("soundF");
    }

    if(slides[index] === "finalSlide"){
        createConfetti();
    }
}

setTimeout(()=>{
    showSlide(1);
},5000);

/* LETTER SOUND */
function playLetter(id){
    const audio = document.getElementById(id);

    audio.currentTime = 0;
    audio.play().catch(()=>{});
}

/* ANSWERS */
function checkAnswer(element,wrongItem){

    if(wrongItem){
        document.getElementById('wrongSound').play();

        element.style.borderColor = "#ff4d4d";

        setTimeout(()=>{
            element.style.borderColor = "#fff";
        },700);

    }else{

        document.getElementById('rightSound').play();

        element.style.borderColor = "#00c853";

        setTimeout(()=>{
            startTracing();
        },1000);
    }
}

/* TRACING */
function startTracing(){

    enableCanvas();

}

/* CANVAS */
function enableCanvas(){

    const activeSlide = document.querySelector('.slide.active');
    const canvas = activeSlide.querySelector('canvas');

    if(!canvas) return;

    const container = activeSlide.querySelector('.trace-container');

    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;

    const ctx = canvas.getContext('2d');

    ctx.lineWidth = 20;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#ff6b00";

    let drawing = false;
    let drawCount = 0;

    function start(e){
        drawing = true;
        draw(e);
    }

    function end(){
        drawing = false;
        ctx.beginPath();

        if(drawCount > 30){
            nextSlide();
        }
    }

    function draw(e){

        if(!drawing) return;

        e.preventDefault();

        const rect = canvas.getBoundingClientRect();

        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

        ctx.lineTo(x,y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x,y);

        drawCount++;
    }

    canvas.addEventListener('mousedown',start);
    canvas.addEventListener('mouseup',end);
    canvas.addEventListener('mousemove',draw);

    canvas.addEventListener('touchstart',start,{passive:false});
    canvas.addEventListener('touchend',end);
    canvas.addEventListener('touchmove',draw,{passive:false});
}

/* NEXT SLIDE */
function nextSlide(){

    if(currentSlide < slides.length - 1){
        showSlide(currentSlide + 1);
    }
}

/* CONFETTI */
function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti = document.createElement('div');

        confetti.classList.add('confetti');

        confetti.style.left = Math.random() * 100 + 'vw';

        confetti.style.background = [
            '#ff6b6b',
            '#ffd93d',
            '#6bcB77',
            '#4d96ff',
            '#ff8fab'
        ][Math.floor(Math.random()*5)];

        confetti.style.animationDuration =
            (Math.random()*3 + 2) + 's';

        document.body.appendChild(confetti);
    }
}
</script>

</body>
</html>
