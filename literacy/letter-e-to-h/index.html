<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Odd Man Out - Letters E to H</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#cfefff;
}

/* MAIN GAME */
.game-container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;

    background:
    linear-gradient(rgba(255,255,255,0.75),
    rgba(255,255,255,0.75)),
    url('assets/image(24).png');

    background-size:cover;
    background-position:center;
}

/* BOOK SHAPES */
.book{
    position:absolute;
    width:90px;
    opacity:0.12;
    z-index:0;
    animation:float 5s infinite ease-in-out;
}

.book1{
    top:8%;
    left:5%;
}

.book2{
    bottom:10%;
    right:5%;
}

.book3{
    top:40%;
    right:15%;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0px);}
}

/* SLIDES */
.slide{
    width:100%;
    height:100%;
    position:absolute;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:10px;
    z-index:2;
}

.active{
    display:flex;
}

/* LOGO */
.logo{
    width:320px;
    max-width:80%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* LETTER */
.letter-title{
    font-size:85px;
    font-weight:bold;
    color:#ff7b00;
    text-shadow:3px 3px 0 white;
    margin-bottom:8px;
}

/* GRID */
.grid{
    width:100%;
    max-width:950px;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:14px;
    margin-top:10px;
}

.card{
    background:#ffffff;
    border-radius:24px;
    padding:10px;
    text-align:center;
    cursor:pointer;

    border:5px solid #ffffff;

    box-shadow:0 5px 12px rgba(0,0,0,0.12);

    transition:0.2s;
}

.card:active{
    transform:scale(0.95);
}

.card img{
    width:100%;
    height:22vh;
    object-fit:contain;
}

.card p{
    margin-top:6px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}

/* TRACE */
.trace-container{
    width:250px;
    height:250px;
    position:relative;
    margin-top:10px;
}

.trace-bg{
    width:100%;
    height:100%;
    border-radius:20px;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* FINAL */
.final-text{
    font-size:80px;
    font-weight:bold;
    color:#ff7300;
    text-shadow:4px 4px white;
    z-index:5;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    top:-20px;
    z-index:4;

    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }

    to{
        transform:translateY(120vh) rotate(720deg);
    }
}

/* MOBILE */
@media(max-width:768px){

    .letter-title{
        font-size:60px;
    }

    .card img{
        height:15vh;
    }

    .card p{
        font-size:20px;
    }

    .trace-container{
        width:190px;
        height:190px;
    }

    .final-text{
        font-size:50px;
        text-align:center;
    }
}

</style>
</head>

<body>

<div class="game-container">

    <!-- BOOK DECOR -->
    <img src="assets/book.png" class="book book1">
    <img src="assets/book.png" class="book book2">
    <img src="assets/book.png" class="book book3">

    <!-- INTRO -->
    <div class="slide active" id="introSlide">
        <img src="assets/innovine-logo.png" class="logo">
    </div>

    <!-- LETTER E -->
    <div class="slide" id="slideE">

        <div class="letter-title">Ee</div>

        <div class="grid">

            <div class="card" onclick="wrongAnswer(this)">
                <img src="assets/sunflower.png">
                <p>Sunflower</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/elf.png">
                <p>Elf</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/envelope.png">
                <p>Envelope</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/egg.png">
                <p>Egg</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-bg">
            <canvas id="canvasE"></canvas>
        </div>

    </div>

    <!-- LETTER H -->
    <div class="slide" id="slideH">

        <div class="letter-title">Hh</div>

        <div class="grid">

            <div class="card" onclick="wrongAnswer(this)">
                <img src="assets/queen.png">
                <p>Queen</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/helicopter.png">
                <p>Helicopter</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/helmet.png">
                <p>Helmet</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/hat.png">
                <p>Hat</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-bg">
            <canvas id="canvasH"></canvas>
        </div>

    </div>

    <!-- LETTER G -->
    <div class="slide" id="slideG">

        <div class="letter-title">Gg</div>

        <div class="grid">

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/grasshopper.png">
                <p>Grasshopper</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/guitar.png">
                <p>Guitar</p>
            </div>

            <div class="card" onclick="wrongAnswer(this)">
                <img src="assets/vegetables.png">
                <p>Vegetables</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/globe.png">
                <p>Globe</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-bg">
            <canvas id="canvasG"></canvas>
        </div>

    </div>

    <!-- LETTER F -->
    <div class="slide" id="slideF">

        <div class="letter-title">Ff</div>

        <div class="grid">

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/feather.png">
                <p>Feather</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/finch.png">
                <p>Finch</p>
            </div>

            <div class="card" onclick="correctAnswer(this)">
                <img src="assets/flamingo.png">
                <p>Flamingo</p>
            </div>

            <div class="card" onclick="wrongAnswer(this)">
                <img src="assets/lollipop.png">
                <p>Lollipop</p>
            </div>

        </div>

        <div class="trace-container">
            <img src="assets/tracing.PNG" class="trace-bg">
            <canvas id="canvasF"></canvas>
        </div>

    </div>

    <!-- FINAL -->
    <div class="slide" id="finalSlide">

        <div class="final-text">EXCELLENT!</div>

    </div>

</div>

<!-- AUDIO -->

<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<audio id="soundE" src="assets/letter-e-sound.mp3"></audio>
<audio id="soundF" src="assets/letter-f-sound.mp3"></audio>
<audio id="soundG" src="assets/letter-g-sound.mp3"></audio>
<audio id="soundH" src="assets/letter-h-sound.mp3"></audio>

<script>

const slides = [
    "introSlide",
    "slideE",
    "slideH",
    "slideG",
    "slideF",
    "finalSlide"
];

let currentSlide = 0;

/* SHOW SLIDE */

function showSlide(index){

    document.querySelectorAll('.slide').forEach(slide=>{
        slide.classList.remove('active');
    });

    document.getElementById(slides[index]).classList.add('active');

    currentSlide = index;

    if(slides[index] === "slideE"){
        playLetter("soundE");
    }

    if(slides[index] === "slideH"){
        playLetter("soundH");
    }

    if(slides[index] === "slideG"){
        playLetter("soundG");
    }

    if(slides[index] === "slideF"){
        playLetter("soundF");
    }

    if(slides[index] === "finalSlide"){
        createConfetti();
    }
}

/* INTRO */

setTimeout(()=>{
    showSlide(1);
},5000);

/* LETTER SOUND */

function playLetter(id){

    const audio = document.getElementById(id);

    audio.currentTime = 0;

    audio.play().catch(()=>{});
}

/* RIGHT */

function correctAnswer(card){

    document.getElementById("rightSound").play();

    card.style.borderColor = "#44c767";

    setTimeout(()=>{
        enableTracing();
    },1000);
}

/* WRONG */

function wrongAnswer(card){

    document.getElementById("wrongSound").play();

    card.style.borderColor = "#ff5e5e";

    setTimeout(()=>{
        card.style.borderColor = "#fff";
    },700);
}

/* TRACE */

function enableTracing(){

    const activeSlide = document.querySelector('.slide.active');

    const canvas = activeSlide.querySelector('canvas');

    if(!canvas) return;

    const box = activeSlide.querySelector('.trace-container');

    canvas.width = box.offsetWidth;
    canvas.height = box.offsetHeight;

    const ctx = canvas.getContext('2d');

    ctx.strokeStyle = "#ff7b00";
    ctx.lineWidth = 18;
    ctx.lineCap = "round";

    let drawing = false;
    let count = 0;

    function start(e){
        drawing = true;
        draw(e);
    }

    function stop(){
        drawing = false;
        ctx.beginPath();

        if(count > 35){
            nextSlide();
        }
    }

    function draw(e){

        if(!drawing) return;

        e.preventDefault();

        const rect = canvas.getBoundingClientRect();

        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;

        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

        ctx.lineTo(x,y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x,y);

        count++;
    }

    canvas.addEventListener('mousedown',start);
    canvas.addEventListener('mousemove',draw);
    canvas.addEventListener('mouseup',stop);

    canvas.addEventListener('touchstart',start,{passive:false});
    canvas.addEventListener('touchmove',draw,{passive:false});
    canvas.addEventListener('touchend',stop);
}

/* NEXT */

function nextSlide(){

    if(currentSlide < slides.length - 1){

        showSlide(currentSlide + 1);
    }
}

/* CONFETTI */

function createConfetti(){

    const colors = [
        "#ff6b6b",
        "#ffd93d",
        "#6bcB77",
        "#4d96ff",
        "#ff8fab",
        "#ff9f1c"
    ];

    for(let i=0;i<180;i++){

        const confetti = document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";

        confetti.style.background =
        colors[Math.floor(Math.random()*colors.length)];

        confetti.style.animationDuration =
        (Math.random()*3 + 2) + "s";

        confetti.style.width =
        (Math.random()*10 + 8) + "px";

        confetti.style.height =
        confetti.style.width;

        document.body.appendChild(confetti);
    }
}

</script>

</body>
</html>
