<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Letters Aa to Dd</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#fff7ef;
}

#splash{
  position:fixed;
  inset:0;
  background:white;
  z-index:999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#splash img{
  width:230px;
  max-width:75%;
}

#startBtn{
  margin-top:25px;
  padding:14px 30px;
  border:0;
  border-radius:24px;
  background:#7fb77e;
  color:white;
  font-size:22px;
  font-weight:bold;
}

#game{
  display:none;
  width:100vw;
  height:100vh;
  padding:10px;
  background:linear-gradient(#fff7ef,#eef5ff);
}

.header{
  text-align:center;
  height:62px;
}

.header h1{
  font-size:26px;
  color:#5b4b8a;
}

.header p{
  font-size:14px;
  color:#555;
}

.main{
  height:calc(100vh - 105px);
  display:grid;
  grid-template-columns:28% 72%;
  gap:10px;
}

.left,.card{
  background:white;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,.12);
}

.left{
  padding:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.left h2{
  font-size:20px;
  color:#4a6484;
  margin-bottom:10px;
}

#soundBtn{
  width:110px;
  height:110px;
  border:0;
  border-radius:50%;
  background:#ffd27f;
  font-size:50px;
}

#soundText{
  font-size:14px;
  margin:10px 0;
  color:#555;
}

#answerBox{
  width:100%;
  height:105px;
  border:4px dashed #bbb;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  font-weight:bold;
  color:#555;
  background:#fafafa;
}

#answerBox.correct{
  border-color:#5fbf6a;
  background:#effff0;
}

#answerBox.wrong{
  border-color:#e57373;
  background:#fff0f0;
}

.options{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  border:4px solid transparent;
}

.card:active{
  transform:scale(.98);
}

.card img{
  width:100%;
  max-width:210px;
  max-height:190px;
  object-fit:contain;
}

.card div{
  margin-top:8px;
  font-size:22px;
  font-weight:bold;
  color:#333;
  text-align:center;
}

#nextBtn{
  display:none;
  margin:8px auto 0;
  padding:10px 28px;
  border:0;
  border-radius:18px;
  background:#7fb77e;
  color:white;
  font-size:20px;
  font-weight:bold;
}

#complete{
  display:none;
  text-align:center;
  padding-top:120px;
}

#complete h2{
  font-size:42px;
  color:#5b4b8a;
}

#complete button{
  margin-top:20px;
  padding:12px 28px;
  border:0;
  border-radius:20px;
  background:#7fb77e;
  color:white;
  font-size:22px;
  font-weight:bold;
}

@media(max-width:768px){
  #game{
    padding:7px;
  }

  .header{
    height:55px;
  }

  .header h1{
    font-size:22px;
  }

  .header p{
    font-size:12px;
  }

  .main{
    height:calc(100vh - 95px);
    grid-template-columns:1fr;
    grid-template-rows:38% 62%;
  }

  .left{
    padding:7px;
  }

  .left h2{
    font-size:16px;
    margin-bottom:4px;
  }

  #soundBtn{
    width:70px;
    height:70px;
    font-size:34px;
  }

  #soundText{
    font-size:12px;
    margin:5px 0;
  }

  #answerBox{
    height:54px;
    font-size:17px;
  }

  .options{
    grid-template-columns:repeat(3,1fr);
    gap:6px;
  }

  .card{
    padding:5px;
    border-radius:14px;
  }

  .card img{
    max-height:92px;
  }

  .card div{
    font-size:13px;
    margin-top:3px;
  }
}
</style>
</head>

<body>

<div id="splash">
  <img src="./assets/innovine-logo.png" alt="Logo">
  <button id="startBtn">Tap to Start</button>
</div>

<div id="game">
  <div class="header">
    <h1>Letters Aa to Dd</h1>
    <p>Tap the sound. Choose the correct picture.</p>
  </div>

  <div id="gameContent">
    <div class="main">

      <div class="left">
        <h2>Listen to the Letter Sound</h2>
        <button id="soundBtn">🔊</button>
        <div id="soundText">Tap the speaker to hear the sound.</div>
        <div id="answerBox">Tap Picture</div>
      </div>

      <div class="options" id="options"></div>

    </div>

    <button id="nextBtn">Next</button>
  </div>

  <div id="complete">
    <h2>Great Job! 🎉</h2>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<audio id="letterAudio" preload="auto"></audio>
<audio id="correctAudio" src="./assets/claps.mp3" preload="auto"></audio>
<audio id="wrongAudio" src="./assets/wrong.mp3" preload="auto"></audio>

<script>
const gameData = [
  {
    sound:"./assets/letter-a-sound.mp3",
    correct:"alligator",
    options:[
      {name:"Cap", image:"./assets/cap.png", value:"cap"},
      {name:"Alligator", image:"./assets/alligator.png", value:"alligator"},
      {name:"Zip", image:"./assets/zip.png", value:"zip"}
    ]
  },
  {
    sound:"./assets/letter-b-sound.mp3",
    correct:"bird",
    options:[
      {name:"Bird", image:"./assets/bird.png", value:"bird"},
      {name:"Dog", image:"./assets/dog.png", value:"dog"},
      {name:"Flower", image:"./assets/flower.png", value:"flower"}
    ]
  },
  {
    sound:"./assets/letter-c-sound.mp3",
    correct:"carrot",
    options:[
      {name:"Dinosaur", image:"./assets/dinosaur.png", value:"dinosaur"},
      {name:"Frog", image:"./assets/frog.png", value:"frog"},
      {name:"Carrot", image:"./assets/carrot.png", value:"carrot"}
    ]
  },
  {
    sound:"./assets/letter-d-sound.mp3",
    correct:"dice",
    options:[
      {name:"Jelly", image:"./assets/jelly.png", value:"jelly"},
      {name:"Dice", image:"./assets/dice.png", value:"dice"},
      {name:"Gun", image:"./assets/gun.png", value:"gun"}
    ]
  }
];

let current = 0;
let questions = shuffle([...gameData]);

const splash = document.getElementById("splash");
const game = document.getElementById("game");
const optionsBox = document.getElementById("options");
const answerBox = document.getElementById("answerBox");
const nextBtn = document.getElementById("nextBtn");
const gameContent = document.getElementById("gameContent");
const complete = document.getElementById("complete");

const letterAudio = document.getElementById("letterAudio");
const correctAudio = document.getElementById("correctAudio");
const wrongAudio = document.getElementById("wrongAudio");

document.getElementById("startBtn").onclick = function(){
  splash.style.display = "none";
  game.style.display = "block";
  loadQuestion();
};

document.getElementById("soundBtn").onclick = function(){
  playLetterSound();
};

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function loadQuestion(){
  nextBtn.style.display = "none";
  answerBox.className = "";
  answerBox.innerText = "Tap Picture";
  optionsBox.innerHTML = "";

  const q = questions[current];

  letterAudio.src = q.sound;
  letterAudio.load();

  shuffle([...q.options]).forEach(opt => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = opt.image;
    img.alt = opt.name;

    const label = document.createElement("div");
    label.innerText = opt.name;

    card.appendChild(img);
    card.appendChild(label);

    card.onclick = function(){
      checkAnswer(opt.value);
    };

    optionsBox.appendChild(card);
  });
}

function playLetterSound(){
  const q = questions[current];

  letterAudio.pause();
  letterAudio.currentTime = 0;
  letterAudio.src = q.sound;
  letterAudio.load();

  letterAudio.play().catch(function(){
    document.getElementById("soundText").innerText =
    "Sound not found. Check file name.";
  });
}

function checkAnswer(value){
  const correct = questions[current].correct;

  if(value === correct){
    answerBox.className = "correct";
    answerBox.innerText = "Correct!";
    correctAudio.currentTime = 0;
    correctAudio.play().catch(()=>{});
    nextBtn.style.display = "block";
  }else{
    answerBox.className = "wrong";
    answerBox.innerText = "Try Again";
    wrongAudio.currentTime = 0;
    wrongAudio.play().catch(()=>{});

    setTimeout(() => {
      answerBox.className = "";
      answerBox.innerText = "Tap Picture";
    }, 900);
  }
}

nextBtn.onclick = function(){
  current++;

  if(current < questions.length){
    loadQuestion();
  }else{
    gameContent.style.display = "none";
    complete.style.display = "block";
  }
};

function restartGame(){
  current = 0;
  questions = shuffle([...gameData]);
  complete.style.display = "none";
  gameContent.style.display = "block";
  loadQuestion();
}
</script>

</body>
</html>
