<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Letters Aa to Dd Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#fff8ef;}

#splashScreen{
  position:fixed;inset:0;background:white;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:9999;
}
#splashScreen img{width:240px;max-width:75%;}
#startBtn{
  margin-top:25px;padding:14px 32px;border:none;border-radius:25px;
  background:#7fb77e;color:white;font-size:22px;font-weight:bold;
}

#gameWrapper{
  display:none;width:100vw;height:100vh;padding:10px;
  background:linear-gradient(to bottom,#fff7ef,#eef5ff);
}

.top-bar{text-align:center;height:75px;}
.top-bar h1{font-size:28px;color:#5b4b8a;}
.top-bar p{font-size:16px;color:#555;margin-top:5px;}

.game-area{
  height:calc(100vh - 125px);
  display:flex;gap:12px;justify-content:center;
}

.sound-panel{
  width:30%;min-width:250px;background:white;border-radius:22px;padding:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.sound-title{font-size:22px;text-align:center;color:#4a6484;margin-bottom:12px;font-weight:bold;}

#playSoundBtn{
  width:120px;height:120px;border:none;border-radius:50%;
  background:#ffd27f;font-size:55px;cursor:pointer;
}

.instruction{text-align:center;margin-top:12px;font-size:16px;color:#555;}

#answerZone{
  width:100%;height:120px;margin-top:15px;border-radius:20px;
  border:4px dashed #ccc;background:#fafafa;
  display:flex;justify-content:center;align-items:center;
}

#answerZone.correct{border-color:#81c784;background:#effff0;}
#answerZone.wrong{border-color:#ef9a9a;background:#fff0f0;}

.drop-text{font-size:22px;font-weight:bold;color:#666;}

.options-panel{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
}

.option-card{
  background:white;border-radius:22px;padding:10px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.draggable{
  width:100%;max-width:210px;max-height:185px;object-fit:contain;
  cursor:grab;
}

.image-label{
  margin-top:8px;font-size:22px;font-weight:bold;text-align:center;color:#444;
}

#nextBtn,.game-btn{
  display:none;margin:10px auto 0;padding:12px 28px;border:none;border-radius:18px;
  background:#7fb77e;color:white;font-size:20px;font-weight:bold;
}

#completeScreen{
  display:none;text-align:center;padding-top:120px;
}

#completeScreen h2{font-size:42px;color:#5b4b8a;margin-bottom:15px;}
#completeScreen p{font-size:22px;color:#555;}

@media(max-width:768px){
  #gameWrapper{padding:8px;}
  .top-bar{height:65px;}
  .top-bar h1{font-size:24px;}
  .top-bar p{font-size:14px;}

  .game-area{
    height:calc(100vh - 110px);
    flex-direction:column;
  }

  .sound-panel{
    width:100%;min-width:0;padding:8px;
  }

  .sound-title{font-size:17px;margin-bottom:5px;}

  #playSoundBtn{
    width:72px;height:72px;font-size:35px;
  }

  .instruction{font-size:13px;margin-top:5px;}

  #answerZone{
    height:60px;margin-top:6px;
  }

  .drop-text{font-size:18px;}

  .options-panel{
    grid-template-columns:repeat(3,1fr);
    gap:7px;
  }

  .option-card{
    padding:6px;border-radius:16px;
  }

  .draggable{
    max-height:90px;
  }

  .image-label{
    font-size:14px;margin-top:4px;
  }
}
</style>
</head>

<body>

<div id="splashScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
  <button id="startBtn">Tap to Start</button>
</div>

<div id="gameWrapper">

  <div class="top-bar">
    <h1>Letters Aa to Dd</h1>
    <p>Listen to the sound and drag the correct picture.</p>
  </div>

  <div id="gameContent">
    <div class="game-area">

      <div class="sound-panel">
        <div class="sound-title">Listen to the Letter Sound</div>
        <button id="playSoundBtn">🔊</button>
        <div class="instruction">Tap the sound button, then drag the correct picture.</div>

        <div id="answerZone">
          <div class="drop-text">Drop Here</div>
        </div>
      </div>

      <div class="options-panel" id="optionsPanel"></div>

    </div>

    <button id="nextBtn">Next</button>
  </div>

  <div id="completeScreen">
    <h2>Great Job! 🎉</h2>
    <p>You completed the game.</p>
    <button class="game-btn" id="playAgainBtn" style="display:block;">Play Again</button>
  </div>

</div>

<audio id="letterSound" preload="auto"></audio>
<audio id="correctSound" src="assets/claps.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>

<script>
const gameData = [
  {
    sound:"assets/letter a sound.mp3",
    correct:"alligator",
    options:[
      {name:"Cap", image:"assets/cap.png", value:"cap"},
      {name:"Alligator", image:"assets/alligator.png", value:"alligator"},
      {name:"Zip", image:"assets/zip.png", value:"zip"}
    ]
  },
  {
    sound:"assets/letter b sound.mp3",
    correct:"bird",
    options:[
      {name:"Bird", image:"assets/bird.png", value:"bird"},
      {name:"Dog", image:"assets/dog.png", value:"dog"},
      {name:"Flower", image:"assets/flower.png", value:"flower"}
    ]
  },
  {
    sound:"assets/letter c sound.mp3",
    correct:"carrot",
    options:[
      {name:"Dinosaur", image:"assets/dinosaur.png", value:"dinosaur"},
      {name:"Frog", image:"assets/frog.png", value:"frog"},
      {name:"Carrot", image:"assets/carrot.png", value:"carrot"}
    ]
  },
  {
    sound:"assets/letter d sound.mp3",
    correct:"dice",
    options:[
      {name:"Jelly", image:"assets/jelly.png", value:"jelly"},
      {name:"Dice", image:"assets/dice.png", value:"dice"},
      {name:"Gun", image:"assets/gun.png", value:"gun"}
    ]
  }
];

let currentQuestion = 0;
let shuffledGameData = shuffleArray(gameData);
let draggedValue = "";

const splashScreen = document.getElementById("splashScreen");
const startBtn = document.getElementById("startBtn");
const gameWrapper = document.getElementById("gameWrapper");
const optionsPanel = document.getElementById("optionsPanel");
const answerZone = document.getElementById("answerZone");
const playSoundBtn = document.getElementById("playSoundBtn");
const nextBtn = document.getElementById("nextBtn");
const gameContent = document.getElementById("gameContent");
const completeScreen = document.getElementById("completeScreen");
const playAgainBtn = document.getElementById("playAgainBtn");
const letterSound = document.getElementById("letterSound");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function shuffleArray(arr){
  return [...arr].sort(() => Math.random() - 0.5);
}

startBtn.onclick = function(){
  splashScreen.style.display = "none";
  gameWrapper.style.display = "block";
  loadQuestion();
};

function loadQuestion(){
  nextBtn.style.display = "none";
  answerZone.className = "";
  optionsPanel.innerHTML = "";

  const data = shuffledGameData[currentQuestion];

  letterSound.src = data.sound;
  letterSound.load();

  data.options.sort(() => Math.random() - 0.5).forEach(option => {
    const card = document.createElement("div");
    card.className = "option-card";

    const img = document.createElement("img");
    img.src = option.image;
    img.className = "draggable";
    img.alt = option.name;
    img.draggable = true;
    img.dataset.value = option.value;

    img.addEventListener("dragstart", function(e){
      draggedValue = option.value;
      e.dataTransfer.setData("text/plain", option.value);
    });

    const label = document.createElement("div");
    label.className = "image-label";
    label.textContent = option.name;

    card.appendChild(img);
    card.appendChild(label);
    optionsPanel.appendChild(card);
  });
}

function playLetterSound(){
  const data = shuffledGameData[currentQuestion];

  letterSound.pause();
  letterSound.currentTime = 0;
  letterSound.src = data.sound;
  letterSound.load();

  letterSound.play().catch(function(){
    alert("Please tap the speaker button again.");
  });
}

playSoundBtn.onclick = playLetterSound;

answerZone.addEventListener("dragover", function(e){
  e.preventDefault();
});

answerZone.addEventListener("drop", function(e){
  e.preventDefault();

  draggedValue = e.dataTransfer.getData("text/plain");

  const correctAnswer = shuffledGameData[currentQuestion].correct;

  if(draggedValue === correctAnswer){
    answerZone.className = "correct";
    correctSound.currentTime = 0;
    correctSound.play().catch(()=>{});
    nextBtn.style.display = "block";
  }else{
    answerZone.className = "wrong";
    wrongSound.currentTime = 0;
    wrongSound.play().catch(()=>{});

    setTimeout(() => {
      answerZone.className = "";
    }, 800);
  }
});

nextBtn.onclick = function(){
  currentQuestion++;

  if(currentQuestion < shuffledGameData.length){
    loadQuestion();
  }else{
    gameContent.style.display = "none";
    completeScreen.style.display = "block";
  }
};

playAgainBtn.onclick = function(){
  currentQuestion = 0;
  shuffledGameData = shuffleArray(gameData);
  completeScreen.style.display = "none";
  gameContent.style.display = "block";
  loadQuestion();
};
</script>

</body>
</html>
