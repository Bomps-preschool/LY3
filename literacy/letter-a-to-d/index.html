<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Letters Aa to Dd</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
}

html,body{
  width:100%;
  height:100%;
  font-family:Arial,sans-serif;
  overflow:hidden;

  /* LETTER BACKGROUND */
  background:
  url("./assets/letters-background.png")
  center center / cover no-repeat fixed;

  position:relative;
}

/* LIGHT OVERLAY */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.88);
  z-index:-1;
}

/* =========================
   SPLASH
========================= */

#splash{
  position:fixed;
  inset:0;

  background:
  linear-gradient(
    rgba(255,255,255,0.92),
    rgba(255,255,255,0.92)
  ),
  url("./assets/letters-background.png")
  center center / cover no-repeat;

  z-index:9999;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#splash img{
  width:230px;
  max-width:75%;
}

#startBtn{
  margin-top:25px;

  padding:14px 34px;

  border:none;
  border-radius:24px;

  background:#7fb77e;

  color:white;

  font-size:22px;
  font-weight:bold;

  cursor:pointer;
}

/* =========================
   GAME
========================= */

#game{
  display:none;

  width:100vw;
  height:100vh;

  padding:10px;
}

.header{
  text-align:center;
  height:62px;
}

.header h1{
  font-size:28px;
  color:#5b4b8a;
}

.header p{
  font-size:14px;
  color:#555;
}

/* =========================
   MAIN
========================= */

.main{
  height:calc(100vh - 90px);

  display:grid;

  grid-template-columns:28% 72%;

  gap:10px;
}

/* =========================
   LEFT PANEL
========================= */

.left,
.card{
  background:white;

  border-radius:20px;

  box-shadow:
  0 5px 15px rgba(0,0,0,.12);
}

.left{
  padding:12px;

  display:flex;
  flex-direction:column;

  align-items:center;
  justify-content:center;

  text-align:center;
}

.left h2{
  font-size:20px;
  color:#4a6484;

  margin-bottom:12px;
}

#soundBtn{
  width:110px;
  height:110px;

  border:none;
  border-radius:50%;

  background:#ffd27f;

  font-size:50px;

  cursor:pointer;
}

#soundText{
  font-size:14px;
  color:#555;

  margin:10px 0;
}

#answerBox{
  width:100%;
  height:105px;

  border:4px dashed #bbb;

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;
  font-weight:bold;

  color:#555;

  background:#fafafa;
}

#answerBox.correct{
  border-color:#5fbf6a;
  background:#effff0;
}

#answerBox.wrong{
  border-color:#e57373;
  background:#fff0f0;
}

/* =========================
   OPTIONS
========================= */

.options{
  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:10px;
}

.card{
  padding:10px;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  cursor:pointer;

  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

.card:active{
  transform:scale(.97);
}

.card img{
  width:100%;

  max-width:210px;
  max-height:190px;

  object-fit:contain;
}

.card div{
  margin-top:8px;

  font-size:22px;
  font-weight:bold;

  color:#333;

  text-align:center;
}

/* =========================
   COMPLETE
========================= */

#complete{
  display:none;

  text-align:center;

  padding-top:120px;
}

#complete h2{
  font-size:42px;
  color:#5b4b8a;
}

#complete button{
  margin-top:20px;

  padding:12px 30px;

  border:none;
  border-radius:20px;

  background:#7fb77e;

  color:white;

  font-size:22px;
  font-weight:bold;

  cursor:pointer;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  #game{
    padding:7px;
  }

  .header{
    height:55px;
  }

  .header h1{
    font-size:22px;
  }

  .header p{
    font-size:12px;
  }

  .main{
    height:calc(100vh - 85px);

    grid-template-columns:1fr;

    grid-template-rows:38% 62%;
  }

  .left{
    padding:8px;
  }

  .left h2{
    font-size:16px;
    margin-bottom:5px;
  }

  #soundBtn{
    width:70px;
    height:70px;

    font-size:34px;
  }

  #soundText{
    font-size:12px;
    margin:5px 0;
  }

  #answerBox{
    height:55px;
    font-size:17px;
  }

  .options{
    grid-template-columns:
    repeat(3,1fr);

    gap:6px;
  }

  .card{
    padding:5px;
    border-radius:14px;
  }

  .card img{
    max-height:90px;
  }

  .card div{
    font-size:13px;
    margin-top:3px;
  }

}

</style>

</head>

<body>

<!-- =========================
     SPLASH
========================= -->

<div id="splash">

  <img
    src="./assets/innovine-logo.png"
    alt="Innovine Logo"
  >

  <button id="startBtn">
    Tap to Start
  </button>

</div>

<!-- =========================
     GAME
========================= -->

<div id="game">

  <div class="header">

    <h1>
      Letters Aa to Dd
    </h1>

    <p>
      Tap the sound and choose the correct picture.
    </p>

  </div>

  <div id="gameContent">

    <div class="main">

      <!-- LEFT -->

      <div class="left">

        <h2>
          Listen to the Letter Sound
        </h2>

        <button id="soundBtn">
          🔊
        </button>

        <div id="soundText">
          Tap the speaker to hear the sound.
        </div>

        <div id="answerBox">
          Tap Picture
        </div>

      </div>

      <!-- RIGHT -->

      <div
        class="options"
        id="options"
      ></div>

    </div>

  </div>

  <!-- COMPLETE -->

  <div id="complete">

    <h2>
      Great Job! 🎉
    </h2>

    <button onclick="restartGame()">
      Play Again
    </button>

  </div>

</div>

<!-- =========================
     AUDIO
========================= -->

<audio id="letterAudio" preload="auto"></audio>

<audio
  id="correctAudio"
  preload="auto"
  src="./assets/claps.mp3"
></audio>

<audio
  id="wrongAudio"
  preload="auto"
  src="./assets/wrong.mp3"
></audio>

<!-- =========================
     SCRIPT
========================= -->

<script>

/* =========================
   PRELOAD IMAGES
========================= */

const preloadImages = [

  "./assets/alligator.png",
  "./assets/bird.png",
  "./assets/cap.png",
  "./assets/carrot.png",
  "./assets/dinosaur.png",
  "./assets/dice.png",
  "./assets/dog.png",
  "./assets/flower.png",
  "./assets/frog.png",
  "./assets/gun.png",
  "./assets/jelly.png",
  "./assets/zip.png",
  "./assets/innovine-logo.png",
  "./assets/letters-background.png"

];

preloadImages.forEach(src => {

  const img = new Image();
  img.src = src;

});

/* =========================
   PRELOAD AUDIO
========================= */

const preloadAudio = [

  "./assets/letter-a-sound.mp3",
  "./assets/letter-b-sound.mp3",
  "./assets/letter-c-sound.mp3",
  "./assets/letter-d-sound.mp3",
  "./assets/claps.mp3",
  "./assets/wrong.mp3"

];

preloadAudio.forEach(src => {

  const audio = new Audio();
  audio.src = src;
  audio.preload = "auto";

});

/* =========================
   GAME DATA
========================= */

const gameData = [

  {

    sound:
    "./assets/letter-a-sound.mp3",

    correct:"alligator",

    options:[

      {
        name:"Cap",
        image:"./assets/cap.png",
        value:"cap"
      },

      {
        name:"Alligator",
        image:"./assets/alligator.png",
        value:"alligator"
      },

      {
        name:"Zip",
        image:"./assets/zip.png",
        value:"zip"
      }

    ]

  },

  {

    sound:
    "./assets/letter-b-sound.mp3",

    correct:"bird",

    options:[

      {
        name:"Bird",
        image:"./assets/bird.png",
        value:"bird"
      },

      {
        name:"Dog",
        image:"./assets/dog.png",
        value:"dog"
      },

      {
        name:"Flower",
        image:"./assets/flower.png",
        value:"flower"
      }

    ]

  },

  {

    sound:
    "./assets/letter-c-sound.mp3",

    correct:"carrot",

    options:[

      {
        name:"Dinosaur",
        image:"./assets/dinosaur.png",
        value:"dinosaur"
      },

      {
        name:"Frog",
        image:"./assets/frog.png",
        value:"frog"
      },

      {
        name:"Carrot",
        image:"./assets/carrot.png",
        value:"carrot"
      }

    ]

  },

  {

    sound:
    "./assets/letter-d-sound.mp3",

    correct:"dice",

    options:[

      {
        name:"Jelly",
        image:"./assets/jelly.png",
        value:"jelly"
      },

      {
        name:"Dice",
        image:"./assets/dice.png",
        value:"dice"
      },

      {
        name:"Gun",
        image:"./assets/gun.png",
        value:"gun"
      }

    ]

  }

];

/* =========================
   VARIABLES
========================= */

let current = 0;

let questions =
shuffle([...gameData]);

/* =========================
   ELEMENTS
========================= */

const splash =
document.getElementById("splash");

const game =
document.getElementById("game");

const optionsBox =
document.getElementById("options");

const answerBox =
document.getElementById("answerBox");

const complete =
document.getElementById("complete");

const gameContent =
document.getElementById("gameContent");

const letterAudio =
document.getElementById("letterAudio");

const correctAudio =
document.getElementById("correctAudio");

const wrongAudio =
document.getElementById("wrongAudio");

/* =========================
   START BUTTON
========================= */

document
.getElementById("startBtn")
.onclick = function(){

  splash.style.display =
  "none";

  game.style.display =
  "block";

  loadQuestion();

};

/* =========================
   SOUND BUTTON
========================= */

document
.getElementById("soundBtn")
.onclick = function(){

  playLetterSound();

};

/* =========================
   SHUFFLE
========================= */

function shuffle(arr){

  return arr.sort(
    () => Math.random() - 0.5
  );

}

/* =========================
   LOAD QUESTION
========================= */

function loadQuestion(){

  answerBox.className = "";

  answerBox.innerText =
  "Tap Picture";

  optionsBox.innerHTML = "";

  const q =
  questions[current];

  /* LOAD AUDIO */

  letterAudio.src =
  q.sound;

  letterAudio.load();

  /* AUTO PLAY */

  setTimeout(() => {

    playLetterSound();

  }, 300);

  /* LOAD OPTIONS */

  shuffle([...q.options])
  .forEach(opt => {

    const card =
    document.createElement("div");

    card.className =
    "card";

    const img =
    document.createElement("img");

    img.src =
    opt.image;

    img.loading = "eager";

    img.alt =
    opt.name;

    const label =
    document.createElement("div");

    label.innerText =
    opt.name;

    card.appendChild(img);

    card.appendChild(label);

    card.onclick =
    function(){

      checkAnswer(
        opt.value
      );

    };

    optionsBox.appendChild(card);

  });

}

/* =========================
   PLAY LETTER SOUND
========================= */

function playLetterSound(){

  const q =
  questions[current];

  letterAudio.pause();

  letterAudio.currentTime = 0;

  letterAudio.src =
  q.sound;

  letterAudio.load();

  const playPromise =
  letterAudio.play();

  if(playPromise !== undefined){

    playPromise.catch(() => {

      console.log(
        "Audio blocked until user interaction."
      );

    });

  }

}

/* =========================
   CHECK ANSWER
========================= */

function checkAnswer(value){

  const correct =
  questions[current].correct;

  if(value === correct){

    answerBox.className =
    "correct";

    answerBox.innerText =
    "Correct!";

    correctAudio.currentTime = 0;

    correctAudio.play()
    .catch(()=>{});

    /* AUTO NEXT */

    setTimeout(() => {

      current++;

      if(
        current <
        questions.length
      ){

        loadQuestion();

      }

      else{

        gameContent.style.display =
        "none";

        complete.style.display =
        "block";

      }

    }, 1200);

  }

  else{

    answerBox.className =
    "wrong";

    answerBox.innerText =
    "Try Again";

    wrongAudio.currentTime = 0;

    wrongAudio.play()
    .catch(()=>{});

    setTimeout(() => {

      answerBox.className =
      "";

      answerBox.innerText =
      "Tap Picture";

    }, 900);

  }

}

/* =========================
   RESTART
========================= */

function restartGame(){

  current = 0;

  questions =
  shuffle([...gameData]);

  complete.style.display =
  "none";

  gameContent.style.display =
  "block";

  loadQuestion();

}

</script>

</body>
</html>
