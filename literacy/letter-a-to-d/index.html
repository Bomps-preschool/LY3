<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Letters Aa to Dd Game</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f7f4ee;
  color:#333;
  overflow-x:hidden;
}

/* =========================
   SPLASH SCREEN
========================= */

#splashScreen{
  position:fixed;
  inset:0;

  background:#fff7ef;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  z-index:9999;
}

#splashScreen img{
  width:min(320px,70vw);
  height:auto;
}

#startBtn{
  margin-top:30px;

  padding:14px 28px;

  border:none;
  border-radius:16px;

  background:#7fb77e;

  color:white;

  font-size:1.2rem;

  cursor:pointer;
}

/* =========================
   MAIN GAME
========================= */

.game-wrapper{
  display:none;

  min-height:100vh;

  padding:20px;

  background:
  linear-gradient(
    to bottom,
    #fff7ef,
    #eef5ff
  );
}

.top-bar{
  text-align:center;
  margin-bottom:25px;
}

.top-bar h1{
  font-size:
  clamp(2rem,4vw,3rem);

  color:#5b4b8a;

  margin-bottom:10px;
}

.top-bar p{
  font-size:
  clamp(1rem,2vw,1.2rem);

  color:#666;
}

/* =========================
   GAME AREA
========================= */

.game-area{
  display:flex;
  gap:25px;

  flex-wrap:wrap;

  justify-content:center;
  align-items:flex-start;

  max-width:1400px;
  margin:auto;
}

/* =========================
   LEFT PANEL
========================= */

.sound-panel{
  flex:1 1 300px;
  max-width:340px;

  background:white;

  border-radius:24px;

  padding:25px;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.08);

  text-align:center;
}

.sound-title{
  font-size:
  clamp(1.6rem,3vw,2.2rem);

  color:#4a6484;

  margin-bottom:20px;
}

.speaker-btn{
  width:160px;
  height:160px;

  border:none;
  border-radius:50%;

  background:#ffd27f;

  font-size:4rem;

  cursor:pointer;
}

.instruction{
  margin-top:20px;

  font-size:1rem;

  line-height:1.5;
}

/* =========================
   ANSWER BOX
========================= */

#answerZone{
  width:100%;

  min-height:170px;

  margin-top:25px;

  border-radius:24px;

  border:
  4px dashed #d8d8d8;

  display:flex;

  justify-content:center;
  align-items:center;

  text-align:center;

  background:#fafafa;

  padding:20px;
}

#answerZone.correct{
  border-color:#81c784;
  background:#effff0;
}

#answerZone.wrong{
  border-color:#ef9a9a;
  background:#fff0f0;
}

.drop-text{
  font-size:1.3rem;
  font-weight:bold;

  color:#666;
}

/* =========================
   OPTIONS
========================= */

.options-panel{
  flex:3 1 700px;

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(220px,1fr)
  );

  gap:22px;
}

.option-card{
  background:white;

  border-radius:24px;

  padding:20px;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.08);

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  min-height:380px;

  cursor:pointer;

  transition:0.2s;
}

.option-card:hover{
  transform:translateY(-3px);
}

.option-card.selected{
  border:5px solid #8cb7ff;
}

.option-card img{
  width:100%;
  max-width:240px;
  max-height:240px;

  object-fit:contain;
}

.image-label{
  margin-top:18px;

  font-size:1.5rem;
  font-weight:bold;

  text-align:center;
}

/* =========================
   BUTTONS
========================= */

.game-btn{
  display:none;

  margin:30px auto 0;

  padding:14px 30px;

  border:none;

  border-radius:16px;

  background:#7fb77e;

  color:white;

  font-size:1.2rem;

  cursor:pointer;
}

/* =========================
   COMPLETE SCREEN
========================= */

.complete-screen{
  display:none;

  text-align:center;

  padding:80px 20px;
}

.complete-screen h2{
  font-size:
  clamp(2rem,4vw,3.5rem);

  color:#5b4b8a;

  margin-bottom:20px;
}

.complete-screen p{
  font-size:1.3rem;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .game-area{
    flex-direction:column;
  }

  .sound-panel{
    max-width:100%;
  }

  .option-card{
    min-height:320px;
  }

  .speaker-btn{
    width:130px;
    height:130px;

    font-size:3.5rem;
  }

}

</style>

</head>

<body>

<!-- SPLASH SCREEN -->

<div id="splashScreen">

  <img
  src="assets/innovine logo.png"
  alt="Innovine Logo"
  >

  <button id="startBtn">
    Start Game
  </button>

</div>

<!-- MAIN GAME -->

<div
class="game-wrapper"
id="gameWrapper"
>

<div class="top-bar">

  <h1>
    Letters Aa to Dd
  </h1>

  <p>
    Listen to the sound and choose the correct picture.
  </p>

</div>

<div id="gameContent">

  <div class="game-area">

    <!-- LEFT PANEL -->

    <div class="sound-panel">

      <div class="sound-title">
        Listen to the Letter Sound
      </div>

      <button
      class="speaker-btn"
      id="playSoundBtn"
      >
        🔊
      </button>

      <div class="instruction">
        Tap the correct picture and submit your answer.
      </div>

      <div id="answerZone">

        <div class="drop-text">
          Select a Picture
        </div>

      </div>

    </div>

    <!-- RIGHT PANEL -->

    <div
    class="options-panel"
    id="optionsPanel"
    ></div>

  </div>

  <button
  class="game-btn"
  id="nextBtn"
  >
    Next
  </button>

</div>

<!-- COMPLETE SCREEN -->

<div
class="complete-screen"
id="completeScreen"
>

<h2>
  Great Job!
</h2>

<p>
  You completed the game.
</p>

<button
class="game-btn"
id="playAgainBtn"
style="display:block;margin-top:30px;"
>
  Play Again
</button>

</div>

</div>

<!-- AUDIO -->

<audio
id="correctSound"
src="assets/correct.mp3"
preload="auto"
></audio>

<audio
id="wrongSound"
src="assets/wrong.mp3"
preload="auto"
></audio>

<audio
id="letterAudio"
preload="auto"
></audio>

<!-- CONFETTI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

// =========================
// GAME DATA
// =========================

const gameData = [

{
  letter:"A",

  sound:"assets/letter a sound.m4a",

  correct:"alligator",

  options:[

    {
      name:"Cap",
      image:"assets/cap.png",
      value:"cap"
    },

    {
      name:"Alligator",
      image:"assets/alligator.png",
      value:"alligator"
    },

    {
      name:"Zip",
      image:"assets/zip.png",
      value:"zip"
    }

  ]

},

{
  letter:"B",

  sound:"assets/letter b sound.m4a",

  correct:"bird",

  options:[

    {
      name:"Bird",
      image:"assets/bird.png",
      value:"bird"
    },

    {
      name:"Dog",
      image:"assets/dog.png",
      value:"dog"
    },

    {
      name:"Flower",
      image:"assets/flower.png",
      value:"flower"
    }

  ]

},

{
  letter:"C",

  sound:"assets/letter c sound.m4a",

  correct:"carrot",

  options:[

    {
      name:"Dinosaur",
      image:"assets/dinosaur.png",
      value:"dinosaur"
    },

    {
      name:"Frog",
      image:"assets/frog.png",
      value:"frog"
    },

    {
      name:"Carrot",
      image:"assets/carrot.png",
      value:"carrot"
    }

  ]

},

{
  letter:"D",

  sound:"assets/letter d sound.mp3",

  correct:"dice",

  options:[

    {
      name:"Jelly",
      image:"assets/jelly.png",
      value:"jelly"
    },

    {
      name:"Dice",
      image:"assets/dice.png",
      value:"dice"
    },

    {
      name:"Gun",
      image:"assets/gun.png",
      value:"gun"
    }

  ]

}

];

// =========================
// SHUFFLE
// =========================

function shuffleArray(array){

  return [...array]
  .sort(() => Math.random() - 0.5);

}

let shuffledGameData =
shuffleArray(gameData);

// =========================
// ELEMENTS
// =========================

const splashScreen =
document.getElementById(
"splashScreen"
);

const startBtn =
document.getElementById(
"startBtn"
);

const gameWrapper =
document.getElementById(
"gameWrapper"
);

const optionsPanel =
document.getElementById(
"optionsPanel"
);

const answerZone =
document.getElementById(
"answerZone"
);

const playSoundBtn =
document.getElementById(
"playSoundBtn"
);

const nextBtn =
document.getElementById(
"nextBtn"
);

const playAgainBtn =
document.getElementById(
"playAgainBtn"
);

const gameContent =
document.getElementById(
"gameContent"
);

const completeScreen =
document.getElementById(
"completeScreen"
);

const correctSound =
document.getElementById(
"correctSound"
);

const wrongSound =
document.getElementById(
"wrongSound"
);

const letterAudio =
document.getElementById(
"letterAudio"
);

let currentQuestion = 0;

let selectedAnswer = null;

// =========================
// START GAME
// =========================

startBtn.addEventListener(
"click",
startGame
);

function startGame(){

  splashScreen.style.display =
  "none";

  gameWrapper.style.display =
  "block";

  loadQuestion();

}

// =========================
// LOAD QUESTION
// =========================

function loadQuestion(){

  nextBtn.style.display =
  "none";

  selectedAnswer = null;

  answerZone.classList.remove(
  "correct",
  "wrong"
  );

  answerZone.innerHTML = `
  <div class="drop-text">
    Select a Picture
  </div>
  `;

  const data =
  shuffledGameData[currentQuestion];

  optionsPanel.innerHTML = "";

  const shuffledOptions =
  shuffleArray(data.options);

  shuffledOptions.forEach(
  option => {

    const card =
    document.createElement("div");

    card.className =
    "option-card";

    card.innerHTML = `
    <img
    src="${option.image}"
    alt="${option.name}"
    >

    <div class="image-label">
      ${option.name}
    </div>
    `;

    card.addEventListener(
    "click",
    () => {

      selectOption(
      option.value,
      option.name,
      card
      );

    }
    );

    optionsPanel.appendChild(card);

  }
  );

  playLetterSound();

}

// =========================
// PLAY LETTER SOUND
// =========================

function playLetterSound(){

  const data =
  shuffledGameData[currentQuestion];

  letterAudio.src =
  data.sound;

  letterAudio.play();

}

playSoundBtn.addEventListener(
"click",
playLetterSound
);

// =========================
// SELECT OPTION
// =========================

function selectOption(
value,
name,
card
){

  document
  .querySelectorAll(".option-card")
  .forEach(card => {

    card.classList.remove(
    "selected"
    );

  });

  card.classList.add(
  "selected"
  );

  selectedAnswer = value;

  answerZone.innerHTML = `
  <div class="drop-text">
    Selected:
    <br><br>
    ${name}
    <br><br>
    Tap Here To Submit
  </div>
  `;

}

// =========================
// SUBMIT ANSWER
// =========================

answerZone.addEventListener(
"click",
submitAnswer
);

function submitAnswer(){

  if(!selectedAnswer) return;

  const correctAnswer =
  shuffledGameData[
  currentQuestion
  ].correct;

  if(
  selectedAnswer ===
  correctAnswer
  ){

    answerZone.classList.remove(
    "wrong"
    );

    answerZone.classList.add(
    "correct"
    );

    correctSound.currentTime = 0;

    correctSound.play();

    nextBtn.style.display =
    "block";

  }

  else{

    answerZone.classList.remove(
    "correct"
    );

    answerZone.classList.add(
    "wrong"
    );

    wrongSound.currentTime = 0;

    wrongSound.play();

    setTimeout(() => {

      answerZone.classList.remove(
      "wrong"
      );

    }, 900);

  }

}

// =========================
// NEXT
// =========================

nextBtn.addEventListener(
"click",
nextQuestion
);

function nextQuestion(){

  currentQuestion++;

  if(
  currentQuestion <
  shuffledGameData.length
  ){

    loadQuestion();

  }

  else{

    gameContent.style.display =
    "none";

    completeScreen.style.display =
    "block";

    startConfetti();

  }

}

// =========================
// PLAY AGAIN
// =========================

playAgainBtn.addEventListener(
"click",
restartGame
);

function restartGame(){

  shuffledGameData =
  shuffleArray(gameData);

  currentQuestion = 0;

  completeScreen.style.display =
  "none";

  gameContent.style.display =
  "block";

  loadQuestion();

}

// =========================
// CONFETTI
// =========================

function startConfetti(){

  const duration = 5000;

  const end =
  Date.now() + duration;

  (function frame(){

    confetti({

      particleCount:4,

      angle:60,

      spread:55,

      origin:{ x:0 }

    });

    confetti({

      particleCount:4,

      angle:120,

      spread:55,

      origin:{ x:1 }

    });

    if(
    Date.now() < end
    ){

      requestAnimationFrame(
      frame
      );

    }

  })();

}

</script>

</body>
</html>
