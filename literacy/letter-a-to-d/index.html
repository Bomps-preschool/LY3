<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Letters Aa to Dd</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  font-family:Arial,sans-serif;
  background:#fff7ef;
  overflow-x:hidden;
}

/* SPLASH */

#splash{
  position:fixed;
  inset:0;
  background:white;
  z-index:9999;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#splash img{
  width:240px;
  max-width:80%;
  object-fit:contain;
}

#startBtn{
  margin-top:25px;
  padding:14px 28px;
  border:none;
  border-radius:22px;
  background:#7fb77e;
  color:white;
  font-size:22px;
  cursor:pointer;
}

/* GAME */

#game{
  display:none;
  width:100%;
  min-height:100vh;
  padding:10px;

  background:
  linear-gradient(
    #fff7ef,
    #eef5ff
  );
}

.header{
  text-align:center;
  margin-bottom:10px;
}

.header h1{
  font-size:30px;
  color:#5b4b8a;
}

.header p{
  color:#555;
  margin-top:5px;
}

.main{
  display:grid;
  grid-template-columns:28% 72%;
  gap:12px;
}

/* LEFT */

.left{
  background:white;
  border-radius:20px;

  padding:14px;

  box-shadow:
  0 5px 15px rgba(0,0,0,.12);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.left h2{
  color:#4a6484;
  margin-bottom:10px;
}

#soundBtn{
  width:110px;
  height:110px;

  border:none;
  border-radius:50%;

  background:#ffd27f;

  font-size:50px;
  cursor:pointer;
}

#soundText{
  margin:10px 0;
  color:#555;
}

#answerBox{
  width:100%;
  height:100px;

  border:
  4px dashed #bdbdbd;

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:24px;
  font-weight:bold;

  background:#fafafa;
}

#answerBox.correct{
  border-color:#5fbf6a;
  background:#effff0;
}

#answerBox.wrong{
  border-color:#e57373;
  background:#fff0f0;
}

/* OPTIONS */

.options{
  display:grid;
  grid-template-columns:
  repeat(3,1fr);

  gap:12px;
}

.card{
  background:white;
  border-radius:20px;

  padding:12px;

  box-shadow:
  0 5px 15px rgba(0,0,0,.12);

  cursor:pointer;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  transition:.2s;
}

.card:hover{
  transform:scale(1.02);
}

.card img{
  width:100%;
  max-width:220px;
  max-height:200px;
  object-fit:contain;
}

.card div{
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
}

/* COMPLETE */

#complete{
  display:none;

  width:100%;
  min-height:80vh;

  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#complete h2{
  font-size:48px;
  color:#5b4b8a;
}

#complete button{
  margin-top:20px;

  padding:14px 30px;

  border:none;
  border-radius:22px;

  background:#7fb77e;
  color:white;

  font-size:22px;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.main{
  grid-template-columns:1fr;
}

.options{
  grid-template-columns:
  repeat(2,1fr);
}

.card img{
  max-height:120px;
}

.header h1{
  font-size:24px;
}

}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">

<img
src="./assets/innovine-logo.png"
alt="Innovine Logo"
>

<button id="startBtn">
Tap to Start
</button>

</div>

<!-- GAME -->

<div id="game">

<div class="header">

<h1>
Letters Aa to Dd
</h1>

<p>
Listen to the sound and choose the correct picture.
</p>

</div>

<div id="gameContent">

<div class="main">

<!-- LEFT -->

<div class="left">

<h2>
Listen to the Letter Sound
</h2>

<button id="soundBtn">
🔊
</button>

<div id="soundText">
Tap speaker to hear sound.
</div>

<div id="answerBox">
Tap Picture
</div>

</div>

<!-- RIGHT -->

<div
class="options"
id="options"
></div>

</div>

</div>

<!-- COMPLETE -->

<div id="complete">

<h2>
Great Job! 🎉
</h2>

<button onclick="restartGame()">
Play Again
</button>

</div>

</div>

<!-- AUDIO -->

<audio id="letterAudio"></audio>

<audio id="correctAudio">
<source src="./assets/claps.mp3">
</audio>

<audio id="wrongAudio">
<source src="./assets/wrong.mp3">
</audio>

<!-- CONFETTI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

/* DATA */

const gameData = [

{
sound:"./assets/letter-a-sound.mp3",
correct:"alligator",

options:[

{
name:"Cap",
image:"./assets/cap.png",
value:"cap"
},

{
name:"Alligator",
image:"./assets/alligator.png",
value:"alligator"
},

{
name:"Zip",
image:"./assets/zip.png",
value:"zip"
}

]

},

{
sound:"./assets/letter-b-sound.mp3",
correct:"bird",

options:[

{
name:"Bird",
image:"./assets/bird.png",
value:"bird"
},

{
name:"Dog",
image:"./assets/dog.png",
value:"dog"
},

{
name:"Flower",
image:"./assets/flower.png",
value:"flower"
}

]

},

{
sound:"./assets/letter-c-sound.mp3",
correct:"carrot",

options:[

{
name:"Dinosaur",
image:"./assets/dinosaur.png",
value:"dinosaur"
},

{
name:"Frog",
image:"./assets/frog.png",
value:"frog"
},

{
name:"Carrot",
image:"./assets/carrot.png",
value:"carrot"
}

]

},

{
sound:"./assets/letter-d-sound.mp3",
correct:"dice",

options:[

{
name:"Jelly",
image:"./assets/jelly.png",
value:"jelly"
},

{
name:"Dice",
image:"./assets/dice.png",
value:"dice"
},

{
name:"Gun",
image:"./assets/gun.png",
value:"gun"
}

]

}

];

/* VARIABLES */

let current = 0;

let questions =
shuffle([...gameData]);

/* ELEMENTS */

const splash =
document.getElementById("splash");

const game =
document.getElementById("game");

const optionsBox =
document.getElementById("options");

const answerBox =
document.getElementById("answerBox");

const soundBtn =
document.getElementById("soundBtn");

const letterAudio =
document.getElementById("letterAudio");

const correctAudio =
document.getElementById("correctAudio");

const wrongAudio =
document.getElementById("wrongAudio");

/* PRELOAD */

function preloadAssets(){

gameData.forEach(item => {

item.options.forEach(opt => {

const img = new Image();

img.src = opt.image;

});

});

}

preloadAssets();

/* START */

document
.getElementById("startBtn")
.addEventListener(
"click",
startGame
);

function startGame(){

splash.style.display =
"none";

game.style.display =
"block";

loadQuestion();

}

/* SHUFFLE */

function shuffle(arr){

return arr.sort(
() => Math.random() - 0.5
);

}

/* LOAD QUESTION */

function loadQuestion(){

answerBox.className = "";

answerBox.innerText =
"Tap Picture";

optionsBox.innerHTML = "";

const q =
questions[current];

shuffle(
[...q.options]
).forEach(opt => {

const card =
document.createElement("div");

card.className =
"card";

const img =
document.createElement("img");

img.src =
opt.image;

img.loading =
"eager";

img.decoding =
"sync";

const label =
document.createElement("div");

label.innerText =
opt.name;

card.appendChild(img);

card.appendChild(label);

card.onclick =
() => checkAnswer(opt.value);

optionsBox.appendChild(card);

});

playLetterSound();

}

/* PLAY SOUND */

function playLetterSound(){

const q =
questions[current];

letterAudio.src =
q.sound;

letterAudio.play()
.catch(() => {});

}

soundBtn.onclick =
playLetterSound;

/* CHECK */

function checkAnswer(value){

const correct =
questions[current].correct;

if(value === correct){

answerBox.className =
"correct";

answerBox.innerText =
"Correct!";

correctAudio.play();

setTimeout(() => {

current++;

if(
current <
questions.length
){

loadQuestion();

}

else{

finishGame();

}

}, 1200);

}

else{

answerBox.className =
"wrong";

answerBox.innerText =
"Try Again";

wrongAudio.play();

setTimeout(() => {

answerBox.className = "";

answerBox.innerText =
"Tap Picture";

}, 900);

}

}

/* FINISH */

function finishGame(){

document
.getElementById("gameContent")
.style.display =
"none";

document
.getElementById("complete")
.style.display =
"flex";

confetti({
particleCount:200,
spread:100
});

}

/* RESTART */

function restartGame(){

current = 0;

questions =
shuffle([...gameData]);

document
.getElementById("complete")
.style.display =
"none";

document
.getElementById("gameContent")
.style.display =
"block";

loadQuestion();

}

</script>

</body>
</html>
