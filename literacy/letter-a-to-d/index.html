<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters Aa to Dd Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#f6f4ef;}

#splashScreen{
  position:fixed;inset:0;background:#fff;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:9999;
}
#splashScreen img{width:min(300px,70vw);}
#startBtn{
  margin-top:25px;padding:14px 30px;border:none;border-radius:20px;
  background:#7fb77e;color:white;font-size:1.3rem;font-weight:bold;
}

.game-wrapper{
  display:none;width:100vw;height:100vh;padding:15px;
  background:linear-gradient(to bottom,#fff7ef,#eef5ff);
}

.top-bar{text-align:center;margin-bottom:12px;}
.top-bar h1{font-size:clamp(1.8rem,4vw,2.7rem);color:#5b4b8a;}
.top-bar p{font-size:clamp(1rem,2vw,1.2rem);color:#666;}

.game-area{
  height:calc(100vh - 115px);
  display:flex;gap:15px;justify-content:center;align-items:stretch;
}

.sound-panel{
  width:30%;min-width:260px;background:white;border-radius:24px;padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.sound-title{font-size:1.6rem;text-align:center;color:#4a6484;margin-bottom:15px;}

.speaker-btn{
  width:135px;height:135px;border:none;border-radius:50%;
  background:#ffd27f;font-size:4rem;cursor:pointer;
}

.instruction{text-align:center;margin-top:15px;font-size:1rem;color:#555;}

#answerZone{
  width:100%;height:130px;margin-top:18px;border-radius:22px;
  border:4px dashed #d8d8d8;background:#fafafa;
  display:flex;justify-content:center;align-items:center;
}

#answerZone.hovered{border-color:#8cb7ff;background:#f2f7ff;}
#answerZone.correct{border-color:#81c784;background:#effff0;}
#answerZone.wrong{border-color:#ef9a9a;background:#fff0f0;}

.drop-text{font-size:1.3rem;font-weight:bold;color:#666;}

.options-panel{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:15px;
}

.option-card{
  background:white;border-radius:24px;padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.draggable{
  width:100%;max-width:210px;max-height:190px;object-fit:contain;
  cursor:grab;touch-action:none;
}

.image-label{
  margin-top:10px;font-size:1.3rem;font-weight:bold;color:#444;text-align:center;
}

.game-btn{
  display:none;margin:12px auto 0;padding:12px 28px;border:none;border-radius:16px;
  background:#7fb77e;color:white;font-size:1.2rem;font-weight:bold;
}

.complete-screen{
  display:none;text-align:center;padding-top:120px;
}

.complete-screen h2{font-size:3rem;color:#5b4b8a;margin-bottom:15px;}
.complete-screen p{font-size:1.4rem;color:#555;}

@media(max-width:768px){
  .game-wrapper{padding:10px;}
  .game-area{flex-direction:column;height:calc(100vh - 95px);}
  .sound-panel{width:100%;min-width:0;padding:10px;}
  .sound-title{font-size:1.2rem;margin-bottom:8px;}
  .speaker-btn{width:80px;height:80px;font-size:2.8rem;}
  .instruction{font-size:.9rem;margin-top:8px;}
  #answerZone{height:70px;margin-top:8px;}
  .options-panel{grid-template-columns:repeat(3,1fr);gap:8px;}
  .option-card{padding:8px;border-radius:18px;}
  .draggable{max-height:95px;}
  .image-label{font-size:.95rem;margin-top:5px;}
}
</style>
</head>

<body>

<div id="splashScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
  <button id="startBtn">Tap to Start</button>
</div>

<div class="game-wrapper" id="gameWrapper">

  <div class="top-bar">
    <h1>Letters Aa to Dd</h1>
    <p>Listen to the sound and drag the correct picture.</p>
  </div>

  <div id="gameContent">
    <div class="game-area">

      <div class="sound-panel">
        <div class="sound-title">Listen to the Letter Sound</div>

        <button class="speaker-btn" id="playSoundBtn">🔊</button>

        <div class="instruction">Drag the correct picture into the box below.</div>

        <div id="answerZone">
          <div class="drop-text">Drop Here</div>
        </div>
      </div>

      <div class="options-panel" id="optionsPanel"></div>

    </div>

    <button class="game-btn" id="nextBtn">Next</button>
  </div>

  <div class="complete-screen" id="completeScreen">
    <h2>Great Job! 🎉</h2>
    <p>You completed the game.</p>
    <button class="game-btn" id="playAgainBtn" style="display:block;">Play Again</button>
  </div>

</div>

<audio id="correctSound" src="assets/claps.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="letterSound" preload="auto"></audio>

<script>
const gameData = [
  {
    letter:"A",
    sound:"assets/letter a sound.m4a",
    correct:"alligator",
    options:[
      {name:"Cap", image:"assets/cap.png", value:"cap"},
      {name:"Alligator", image:"assets/alligator.png", value:"alligator"},
      {name:"Zip", image:"assets/zip.png", value:"zip"}
    ]
  },
  {
    letter:"B",
    sound:"assets/letter b sound.m4a",
    correct:"bird",
    options:[
      {name:"Bird", image:"assets/bird.png", value:"bird"},
      {name:"Dog", image:"assets/dog.png", value:"dog"},
      {name:"Flower", image:"assets/flower.png", value:"flower"}
    ]
  },
  {
    letter:"C",
    sound:"assets/letter c sound.m4a",
    correct:"carrot",
    options:[
      {name:"Dinosaur", image:"assets/dinosaur.png", value:"dinosaur"},
      {name:"Frog", image:"assets/frog.png", value:"frog"},
      {name:"Carrot", image:"assets/carrot.png", value:"carrot"}
    ]
  },
  {
    letter:"D",
    sound:"assets/letter d sound.mp3",
    correct:"dice",
    options:[
      {name:"Jelly", image:"assets/jelly.png", value:"jelly"},
      {name:"Dice", image:"assets/dice.png", value:"dice"},
      {name:"Gun", image:"assets/gun.png", value:"gun"}
    ]
  }
];

let shuffledGameData = shuffleArray(gameData);
let currentQuestion = 0;
let draggedValue = "";

const splashScreen = document.getElementById("splashScreen");
const startBtn = document.getElementById("startBtn");
const gameWrapper = document.getElementById("gameWrapper");
const optionsPanel = document.getElementById("optionsPanel");
const answerZone = document.getElementById("answerZone");
const playSoundBtn = document.getElementById("playSoundBtn");
const nextBtn = document.getElementById("nextBtn");
const playAgainBtn = document.getElementById("playAgainBtn");
const gameContent = document.getElementById("gameContent");
const completeScreen = document.getElementById("completeScreen");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const letterSound = document.getElementById("letterSound");

function shuffleArray(array){
  return [...array].sort(() => Math.random() - 0.5);
}

startBtn.addEventListener("click", () => {
  splashScreen.style.display = "none";
  gameWrapper.style.display = "block";
  unlockAudio();
  loadQuestion();
});

function unlockAudio(){
  [correctSound, wrongSound, letterSound].forEach(audio => {
    audio.muted = true;
    audio.play().then(() => {
      audio.pause();
      audio.currentTime = 0;
      audio.muted = false;
    }).catch(() => {
      audio.muted = false;
    });
  });
}

function loadQuestion(){
  nextBtn.style.display = "none";
  answerZone.classList.remove("correct","wrong","hovered");
  optionsPanel.innerHTML = "";

  const data = shuffledGameData[currentQuestion];
  letterSound.src = data.sound;
  letterSound.load();

  setTimeout(playLetterSound, 400);

  shuffleArray(data.options).forEach(option => {
    const card = document.createElement("div");
    card.className = "option-card";

    const img = document.createElement("img");
    img.src = option.image;
    img.alt = option.name;
    img.className = "draggable";
    img.draggable = true;
    img.dataset.value = option.value;

    img.addEventListener("dragstart", e => {
      draggedValue = option.value;
      e.dataTransfer.setData("text/plain", option.value);
    });

    img.addEventListener("touchstart", () => {
      draggedValue = option.value;
    });

    const label = document.createElement("div");
    label.className = "image-label";
    label.textContent = option.name;

    card.appendChild(img);
    card.appendChild(label);
    optionsPanel.appendChild(card);
  });
}

function playLetterSound(){
  const data = shuffledGameData[currentQuestion];

  letterSound.pause();
  letterSound.currentTime = 0;
  letterSound.src = data.sound;
  letterSound.load();

  letterSound.play().catch(() => {});
}

playSoundBtn.addEventListener("click", playLetterSound);

answerZone.addEventListener("dragover", e => {
  e.preventDefault();
  answerZone.classList.add("hovered");
});

answerZone.addEventListener("dragleave", () => {
  answerZone.classList.remove("hovered");
});

answerZone.addEventListener("drop", e => {
  e.preventDefault();
  draggedValue = e.dataTransfer.getData("text/plain");
  checkAnswer();
});

answerZone.addEventListener("touchend", () => {
  if(draggedValue) checkAnswer();
});

function checkAnswer(){
  answerZone.classList.remove("hovered");

  const correctAnswer = shuffledGameData[currentQuestion].correct;

  if(draggedValue === correctAnswer){
    answerZone.classList.add("correct");
    correctSound.currentTime = 0;
    correctSound.play().catch(()=>{});
    nextBtn.style.display = "block";
  }else{
    answerZone.classList.add("wrong");
    wrongSound.currentTime = 0;
    wrongSound.play().catch(()=>{});

    setTimeout(() => {
      answerZone.classList.remove("wrong");
    }, 800);
  }

  draggedValue = "";
}

nextBtn.addEventListener("click", () => {
  currentQuestion++;

  if(currentQuestion < shuffledGameData.length){
    loadQuestion();
  }else{
    gameContent.style.display = "none";
    completeScreen.style.display = "block";
  }
});

playAgainBtn.addEventListener("click", () => {
  shuffledGameData = shuffleArray(gameData);
  currentQuestion = 0;
  completeScreen.style.display = "none";
  gameContent.style.display = "block";
  loadQuestion();
});
</script>

</body>
</html>
