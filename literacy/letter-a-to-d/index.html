<script>

// =========================
// GAME DATA
// =========================

const gameData = [

{
  letter:"A",

  sound:"assets/letter a sound.m4a",

  correct:"alligator",

  options:[

    {
      name:"Cap",
      image:"assets/cap.png",
      value:"cap"
    },

    {
      name:"Alligator",
      image:"assets/alligator.png",
      value:"alligator"
    },

    {
      name:"Zip",
      image:"assets/zip.png",
      value:"zip"
    }

  ]
},

{
  letter:"B",

  sound:"assets/letter b sound.m4a",

  correct:"bird",

  options:[

    {
      name:"Bird",
      image:"assets/bird.png",
      value:"bird"
    },

    {
      name:"Dog",
      image:"assets/dog.png",
      value:"dog"
    },

    {
      name:"Flower",
      image:"assets/flower.png",
      value:"flower"
    }

  ]
},

{
  letter:"C",

  sound:"assets/letter c sound.m4a",

  correct:"carrot",

  options:[

    {
      name:"Dinosaur",
      image:"assets/dinosaur.png",
      value:"dinosaur"
    },

    {
      name:"Frog",
      image:"assets/frog.png",
      value:"frog"
    },

    {
      name:"Carrot",
      image:"assets/carrot.png",
      value:"carrot"
    }

  ]
},

{
  letter:"D",

  sound:"assets/letter d sound.mp3",

  correct:"dice",

  options:[

    {
      name:"Jelly",
      image:"assets/jelly.png",
      value:"jelly"
    },

    {
      name:"Dice",
      image:"assets/dice.png",
      value:"dice"
    },

    {
      name:"Gun",
      image:"assets/gun.png",
      value:"gun"
    }

  ]
}

];

// =========================
// SHUFFLE
// =========================

function shuffleArray(array){

  return [...array]
  .sort(() => Math.random() - 0.5);

}

let shuffledGameData =
shuffleArray(gameData);

// =========================
// ELEMENTS
// =========================

const splashScreen =
document.getElementById(
  "splashScreen"
);

const gameWrapper =
document.getElementById(
  "gameWrapper"
);

const optionsPanel =
document.getElementById(
  "optionsPanel"
);

const answerZone =
document.getElementById(
  "answerZone"
);

const playSoundBtn =
document.getElementById(
  "playSoundBtn"
);

const nextBtn =
document.getElementById(
  "nextBtn"
);

const playAgainBtn =
document.getElementById(
  "playAgainBtn"
);

const gameContent =
document.getElementById(
  "gameContent"
);

const completeScreen =
document.getElementById(
  "completeScreen"
);

const correctSound =
document.getElementById(
  "correctSound"
);

const wrongSound =
document.getElementById(
  "wrongSound"
);

// =========================
// AUDIO OBJECT
// =========================

const letterAudio =
new Audio();

letterAudio.preload = "auto";

// =========================
// VARIABLES
// =========================

let currentQuestion = 0;

let selectedAnswer = null;

// =========================
// IOS AUDIO UNLOCK
// =========================

function unlockAudio(){

  letterAudio.play()
  .then(() => {

    letterAudio.pause();
    letterAudio.currentTime = 0;

  })
  .catch(() => {});

  correctSound.play()
  .then(() => {

    correctSound.pause();
    correctSound.currentTime = 0;

  })
  .catch(() => {});

  wrongSound.play()
  .then(() => {

    wrongSound.pause();
    wrongSound.currentTime = 0;

  })
  .catch(() => {});

  document.removeEventListener(
    "touchstart",
    unlockAudio
  );

  document.removeEventListener(
    "click",
    unlockAudio
  );

}

document.addEventListener(
  "touchstart",
  unlockAudio,
  { once:true }
);

document.addEventListener(
  "click",
  unlockAudio,
  { once:true }
);

// =========================
// SPLASH SCREEN
// =========================

window.addEventListener(
  "load",
  () => {

    setTimeout(() => {

      splashScreen.style.display =
      "none";

      gameWrapper.style.display =
      "block";

      loadQuestion();

    }, 5000);

  }
);

// =========================
// LOAD QUESTION
// =========================

function loadQuestion(){

  nextBtn.style.display =
  "none";

  selectedAnswer = null;

  answerZone.classList.remove(
    "correct",
    "wrong"
  );

  answerZone.innerHTML = `
    <div class="drop-text">
      Tap Here To Submit
    </div>
  `;

  const data =
  shuffledGameData[currentQuestion];

  optionsPanel.innerHTML = "";

  const shuffledOptions =
  shuffleArray(data.options);

  shuffledOptions.forEach(
    option => {

      const card =
      document.createElement("div");

      card.className =
      "option-card";

      const imageWrapper =
      document.createElement("div");

      imageWrapper.className =
      "image-wrapper";

      const img =
      document.createElement("img");

      img.src = option.image;

      img.alt = option.name;

      img.className =
      "draggable";

      img.draggable = true;

      img.dataset.value =
      option.value;

      // Desktop Drag
      img.addEventListener(
        "dragstart",
        dragStart
      );

      // Mobile Tap
      img.addEventListener(
        "click",
        () => {

          selectImage(option);

        }
      );

      // Touch devices
      img.addEventListener(
        "touchstart",
        () => {

          selectImage(option);

        }
      );

      const label =
      document.createElement("div");

      label.className =
      "image-label";

      label.textContent =
      option.name;

      imageWrapper.appendChild(img);

      card.appendChild(
        imageWrapper
      );

      card.appendChild(label);

      optionsPanel.appendChild(card);

    }
  );

}

// =========================
// PLAY LETTER SOUND
// =========================

function playLetterSound(){

  const data =
  shuffledGameData[currentQuestion];

  letterAudio.src =
  data.sound;

  letterAudio.load();

  const playPromise =
  letterAudio.play();

  if(playPromise !== undefined){

    playPromise.catch(() => {});

  }

}

playSoundBtn.addEventListener(
  "click",
  playLetterSound
);

playSoundBtn.addEventListener(
  "touchstart",
  playLetterSound
);

// =========================
// SELECT IMAGE
// =========================

function selectImage(option){

  selectedAnswer =
  option.value;

  answerZone.innerHTML = `
    <div class="drop-text">
      Selected: ${option.name}
      <br><br>
      Tap Here To Submit
    </div>
  `;

}

// =========================
// DESKTOP DRAG
// =========================

function dragStart(e){

  e.dataTransfer.setData(
    "text/plain",
    e.target.dataset.value
  );

}

// =========================
// DRAG OVER
// =========================

answerZone.addEventListener(
  "dragover",
  (e) => {

    e.preventDefault();

  }
);

// =========================
// DROP DESKTOP
// =========================

answerZone.addEventListener(
  "drop",
  (e) => {

    e.preventDefault();

    const draggedValue =
    e.dataTransfer.getData(
      "text/plain"
    );

    checkAnswer(draggedValue);

  }
);

// =========================
// MOBILE TAP SUBMIT
// =========================

answerZone.addEventListener(
  "click",
  () => {

    if(selectedAnswer){

      checkAnswer(selectedAnswer);

    }

  }
);

answerZone.addEventListener(
  "touchstart",
  () => {

    if(selectedAnswer){

      checkAnswer(selectedAnswer);

    }

  }
);

// =========================
// CHECK ANSWER
// =========================

function checkAnswer(answer){

  const correctAnswer =
  shuffledGameData[
    currentQuestion
  ].correct;

  if(answer === correctAnswer){

    answerZone.classList.remove(
      "wrong"
    );

    answerZone.classList.add(
      "correct"
    );

    correctSound.currentTime = 0;

    correctSound.play();

    nextBtn.style.display =
    "block";

  }

  else{

    answerZone.classList.remove(
      "correct"
    );

    answerZone.classList.add(
      "wrong"
    );

    wrongSound.currentTime = 0;

    wrongSound.play();

    setTimeout(() => {

      answerZone.classList.remove(
        "wrong"
      );

    }, 800);

  }

}

// =========================
// NEXT BUTTON
// =========================

nextBtn.addEventListener(
  "click",
  nextQuestion
);

nextBtn.addEventListener(
  "touchstart",
  nextQuestion
);

function nextQuestion(){

  currentQuestion++;

  if(
    currentQuestion <
    shuffledGameData.length
  ){

    loadQuestion();

  }

  else{

    gameContent.style.display =
    "none";

    completeScreen.style.display =
    "block";

    startConfetti();

  }

}

// =========================
// PLAY AGAIN
// =========================

playAgainBtn.addEventListener(
  "click",
  restartGame
);

playAgainBtn.addEventListener(
  "touchstart",
  restartGame
);

function restartGame(){

  shuffledGameData =
  shuffleArray(gameData);

  currentQuestion = 0;

  completeScreen.style.display =
  "none";

  gameContent.style.display =
  "block";

  loadQuestion();

}

// =========================
// CONFETTI
// =========================

function startConfetti(){

  const duration =
  5000;

  const end =
  Date.now() + duration;

  (function frame(){

    confetti({

      particleCount:4,

      angle:60,

      spread:55,

      origin:{ x:0 }

    });

    confetti({

      particleCount:4,

      angle:120,

      spread:55,

      origin:{ x:1 }

    });

    if(
      Date.now() < end
    ){

      requestAnimationFrame(
        frame
      );

    }

  })();

}

</script>
