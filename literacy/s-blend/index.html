<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-Blend Tap Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background:#eaf6f6;
}
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}
#logo img{width:250px;}
#game{
    display:none;
    text-align:center;
    padding:20px;
}
h1{
    font-size:28px;
    margin-bottom:20px;
}
/* BOXES */
#boxes{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:40px;
}
.box{
    width:180px;
    height:180px;
    border:3px dashed #666;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}
/* OBJECTS */
#objectArea{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}
.obj{
    width:180px;
    height:180px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    background:white;
    cursor:pointer;
    animation:pop 0.5s ease;
}
.obj img{
    max-width:150px;
    max-height:150px;
}
@keyframes pop{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}
.correct{border:5px solid #27ae60;box-shadow:0 0 15px rgba(39,174,96,0.5);}
.wrong{border:5px solid #e74c3c;box-shadow:0 0 15px rgba(231,76,60,0.5);}
#end{display:none;text-align:center;}
#end h1{font-size:40px;margin-bottom:20px;}
#end button{
    padding:10px 30px;
    font-size:24px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
/* Confetti */
canvas{position:fixed;top:0;left:0;pointer-events:none;width:100%;height:100%;}
</style>
</head>
<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">
    <h1 id="instruction">Tap all pictures that has 'sm' blend</h1>
    <div id="boxes">
        <div class="box" data-index="0"></div>
        <div class="box" data-index="1"></div>
        <div class="box" data-index="2"></div>
    </div>
    <div id="objectArea"></div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<!-- Confetti -->
<canvas id="confetti"></canvas>

<script>
// Slides
const slides = [
    {blend:'sm', objects:['smile','spectacles','smell','swim','smoke'], correct:['smile','smell','smoke']},
    {blend:'sn', objects:['swan','snail','snake','star','snowman'], correct:['snail','snake','snowman']},
    {blend:'st', objects:['stamp','smell','swing','star','stair'], correct:['stamp','star','stair']},
    {blend:'sw', objects:['snowman','spider','swim','swing','swan'], correct:['swim','swing','swan']},
    {blend:'sp', objects:['smoke','spade','spider','spectacles','stair'], correct:['spade','spider','spectacles']}
];

let currentSlide = 0;
let clickedCount = 0;

// Show logo first
setTimeout(()=>{
    document.getElementById('logo').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide(currentSlide);
},5000);

function loadSlide(slideIndex){
    clickedCount = 0;
    const slide = slides[slideIndex];
    document.getElementById('instruction').textContent = `Tap all pictures that has '${slide.blend}' blend`;

    const objectArea = document.getElementById('objectArea');
    objectArea.innerHTML='';

    slide.objects.forEach(objName=>{
        const div = document.createElement('div');
        div.classList.add('obj');
        div.innerHTML = `<img src="assets/${objName}.png">`;
        objectArea.appendChild(div);

        div.addEventListener('click',()=>{
            if(slide.correct.includes(objName)){
                div.classList.add('correct');
                document.getElementById('correct').play();
                clickedCount++;
                // If all correct clicked, play clap
                if(clickedCount === slide.correct.length){
                    document.getElementById('clap').play();
                    setTimeout(()=>{
                        currentSlide++;
                        if(currentSlide>=slides.length){
                            document.getElementById('game').style.display='none';
                            document.getElementById('end').style.display='block';
                            launchConfetti();
                        }else{
                            loadSlide(currentSlide);
                        }
                    },700);
                }
            }else{
                div.classList.add('wrong');
                document.getElementById('wrong').play();
                setTimeout(()=>{div.classList.remove('wrong');},400);
            }
        });
    });
}

// Restart
function restartGame(){
    currentSlide=0;
    document.getElementById('end').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide(currentSlide);
}

// Confetti
function launchConfetti(){
    const canvas=document.getElementById('confetti');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const confettis=[];
    const colors=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#2ecc71'];
    for(let i=0;i<80;i++){
        confettis.push({x: Math.random()*canvas.width,y: Math.random()*canvas.height-100,r: Math.random()*6+4,d: Math.random()*10+5,color: colors[Math.floor(Math.random()*colors.length)],tilt: Math.random()*10-10,tiltAngleIncrement: Math.random()*0.07+0.05});
    }
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettis.forEach(c=>{
            ctx.beginPath();
            ctx.lineWidth=c.r;
            ctx.strokeStyle=c.color;
            ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
            ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
            ctx.stroke();
        });
        update();
        requestAnimationFrame(draw);
    }
    function update(){
        confettis.forEach(c=>{
            c.tiltAngle+=c.tiltAngleIncrement;
            c.y+=(Math.cos(c.d)+1+c.r/2)/2;
            c.tilt=Math.sin(c.tiltAngle)*12;
            if(c.y>canvas.height){c.y=-20;c.x=Math.random()*canvas.width;}
        });
    }
    draw();
}
</script>

</body>
</html>
