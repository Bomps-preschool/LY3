<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-Blend Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    background:#eaf6f6;
}

#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}
#logo img{width:250px;}

#game{
    display:none;
    text-align:center;
    padding:20px;
    position:relative;
}

h1{
    font-size:28px;
    margin-bottom:30px;
}

/* OBJECTS */
#objectArea{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap: nowrap;
    margin-top:20px;
}

.obj{
    width:150px;
    height:150px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    background:white;
    cursor:pointer;
    transition:0.2s;
}
.obj img{
    max-width:130px;
    max-height:130px;
}

.obj.correct{
    border:3px solid green;
    box-shadow:0 0 15px rgba(0,255,0,0.4);
}

.obj.wrong{
    border:3px solid red;
    box-shadow:0 0 15px rgba(255,0,0,0.4);
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* END */
#end{
    display:none;
    text-align:center;
    margin-top:50px;
}
#end h1{
    font-size:40px;
    margin-bottom:20px;
}
#end button{
    padding:10px 30px;
    font-size:24px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* AUDIO */
</style>
</head>

<body>

<!-- Logo -->
<div id="logo">
    <img src="assets/innovine-logo.png">
</div>

<!-- Game -->
<div id="game">
<h1 id="instruction">Tap all pictures that has 'sm' blend</h1>
<div id="objectArea"></div>
</div>

<!-- End -->
<div id="end">
<h1>🎉 Well Done!</h1>
<button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
const slides = [
    {blend:'sm', objects:['smile.png','spectacles.png','smell.png','swim.png','smoke.png'], correct:['smile.png','smell.png','smoke.png']},
    {blend:'sn', objects:['swan.png','snail.png','snake.png','star.png','snowman.png'], correct:['snail.png','snake.png','snowman.png']},
    {blend:'st', objects:['stamp.png','smell.png','swing.png','star.png','stair.png'], correct:['stamp.png','star.png','stair.png']},
    {blend:'sw', objects:['snowman.png','spider.png','swim.png','swing.png','swan.png'], correct:['swim.png','swing.png','swan.png']},
    {blend:'sp', objects:['smoke.png','spade.png','spider.png','spectacles.png','stair.png'], correct:['spade.png','spider.png','spectacles.png']}
];

let currentSlide = 0;
let clicked = 0;
let selected = [];

let correctAudio = document.getElementById('correct');
let wrongAudio = document.getElementById('wrong');
let clapAudio = document.getElementById('clap');

// Logo display
setTimeout(()=>{
    document.getElementById('logo').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide();
},5000);

function loadSlide(){
    const slide = slides[currentSlide];
    const objectArea = document.getElementById('objectArea');
    const instruction = document.getElementById('instruction');
    instruction.textContent = `Tap all pictures that has '${slide.blend}' blend`;
    objectArea.innerHTML = '';
    selected = [];
    clicked = 0;

    slide.objects.forEach(obj=>{
        const div = document.createElement('div');
        div.classList.add('obj');
        div.innerHTML = `<img src="assets/${obj}">`;
        objectArea.appendChild(div);

        div.addEventListener('click',()=>{
            if(selected.includes(obj)) return;

            if(slide.correct.includes(obj)){
                div.classList.add('correct');
                playSound(correctAudio);
                selected.push(obj);
            } else {
                div.classList.add('wrong');
                playSound(wrongAudio);
                setTimeout(()=> div.classList.remove('wrong'),400);
            }

            clicked++;
            // When all correct objects clicked
            if(selected.length === slide.correct.length){
                playSound(clapAudio).then(()=>{
                    currentSlide++;
                    if(currentSlide >= slides.length){
                        document.getElementById('game').style.display='none';
                        document.getElementById('end').style.display='block';
                    } else {
                        loadSlide();
                    }
                });
            }
        });
    });
}

// Play audio
function playSound(audio){
    return new Promise(resolve=>{
        audio.currentTime=0;
        audio.play();
        audio.onended = resolve;
    });
}

// Restart game
function restartGame(){
    currentSlide=0;
    document.getElementById('end').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide();
}
</script>
</body>
</html>
