<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Picture Comprehension - Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    background:#dff6ff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    overflow:hidden;
}

/* Logo */
#logo {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}
#logo img{width:250px;}

/* Game */
#game{
    display:none;
    text-align:center;
    padding:20px;
    width:100%;
    max-width:1200px;
}

/* Instruction Boxes */
.instruction-box{
    background:white;
    border-radius:12px;
    padding:10px 20px;
    margin:10px 0;
    font-size:24px;
    font-weight:bold;
    color:#ff1493;
    text-align:center;
    width:90%;
}

/* Main content layout */
#mainContent {
    display:flex;
    justify-content:center;
    gap:50px;
    width:100%;
    flex-wrap:wrap;
    margin-top:20px;
}

/* Playground Image */
#playground-img{
    width:45%;
    max-width:550px;
    border-radius:15px;
}

/* Question & Options */
#questionArea {
    display:flex;
    flex-direction:column;
    width:45%;
    max-width:500px;
    gap:20px;
}

#question{
    font-size:24px;
    font-weight:bold;
    text-align:center;
    background:white;
    border-radius:12px;
    padding:15px;
    color:#ff1493;
}

/* Options */
.options {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.option {
    flex:1 1 40%;
    padding:15px;
    font-size:22px;
    cursor:pointer;
    background:white;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    text-align:center;
    transition:0.3s;
}
.option.correct{border:4px solid #27ae60;}
.option.wrong{border:4px solid #e74c3c;}

/* Scoreboard */
#scoreboard{
    position:absolute;
    bottom:20px;
    right:20px;
    background:#fff7aa;
    padding:10px 20px;
    border-radius:12px;
    font-size:24px;
    font-weight:bold;
    color:#563d7c;
}

/* END */
#end{
    display:none;
    text-align:center;
    padding:20px;
    background:none;
}
#end h1{
    font-size:48px;
    margin-bottom:20px;
}
#end button{
    padding:10px 30px;
    font-size:24px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* Confetti */
canvas{
    position:fixed;
    top:0; left:0;
    pointer-events:none;
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<!-- Logo -->
<div id="logo">
    <img src="assets/innovine-logo.png">
</div>

<!-- Game -->
<div id="game">
    <div class="instruction-box">Picture Comprehension - At the Playground</div>
    <div class="instruction-box">Read the question and click on the correct answer</div>
    <div id="mainContent">
        <img id="playground-img" src="assets/at-the-playground.png">
        <div id="questionArea">
            <div id="question"></div>
            <div class="options" id="options"></div>
        </div>
    </div>
    <div id="scoreboard">Score: 0/5</div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Congratulations!</h1>
    <button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>
<audio id="q1" src="assets/question-1.mp3"></audio>
<audio id="q2" src="assets/question-2.mp3"></audio>
<audio id="q3" src="assets/question-3.mp3"></audio>
<audio id="q4" src="assets/question-4.mp3"></audio>
<audio id="q5" src="assets/question-5.mp3"></audio>

<canvas id="confetti"></canvas>

<script>
// Questions
const questions = [
    {text:"Where are the children playing?", options:["farm","playground"], correct:"playground", audio:"q1"},
    {text:"How many children are on the swings?", options:["2","3"], correct:"2", audio:"q2"},
    {text:"What is the colour of the ball?", options:["blue","red"], correct:"red", audio:"q3"},
    {text:"What is in the sand box?", options:["shovel","ball"], correct:"shovel", audio:"q4"},
    {text:"Who is playing on the slide?", options:["girl","boy"], correct:"girl", audio:"q5"}
];

let currentQ = 0;
let score = 0;

// Show logo first
setTimeout(()=>{
    document.getElementById('logo').style.display='none';
    document.getElementById('game').style.display='block';
    loadQuestion(currentQ);
},5000);

function playAudio(id){
    return new Promise(resolve=>{
        let audio=document.getElementById(id);
        audio.currentTime=0;
        audio.play();
        audio.onended=resolve;
    });
}

async function loadQuestion(index){
    const q = questions[index];
    document.getElementById('question').textContent = q.text;
    const opts = document.getElementById('options');
    opts.innerHTML='';
    q.options.forEach(opt=>{
        const div = document.createElement('div');
        div.classList.add('option');
        div.textContent=opt;
        opts.appendChild(div);
        div.addEventListener('click',()=>handleAnswer(div,q));
    });
    await playAudio(q.audio);
    document.getElementById('scoreboard').textContent = `Score: ${score}/5`;
}

function handleAnswer(div,q){
    if(div.textContent === q.correct){
        div.classList.add('correct');
        document.getElementById('correct').play();
        score++;
        document.getElementById('scoreboard').textContent = `Score: ${score}/5`;
    } else {
        div.classList.add('wrong');
        document.getElementById('wrong').play();
        setTimeout(()=> div.classList.remove('wrong'),500);
        return;
    }
    setTimeout(()=>{
        div.classList.remove('correct');
        currentQ++;
        if(currentQ >= questions.length){
            document.getElementById('game').style.display='none';
            document.getElementById('end').style.display='block';
            launchConfetti();
        } else loadQuestion(currentQ);
    },600);
}

// Restart
function restartGame(){
    currentQ=0; score=0;
    document.getElementById('end').style.display='none';
    document.getElementById('game').style.display='block';
    loadQuestion(currentQ);
}

// Confetti
function launchConfetti(){
    const canvas=document.getElementById('confetti');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const confettis=[];
    const colors=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#2ecc71'];
    for(let i=0;i<80;i++){
        confettis.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height-100,
            r:Math.random()*6+4,
            d:Math.random()*10+5,
            color:colors[Math.floor(Math.random()*colors.length)],
            tilt:Math.random()*10-10,
            tiltAngleIncrement:Math.random()*0.07+0.05
        });
    }
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettis.forEach(c=>{
            ctx.beginPath();
            ctx.lineWidth=c.r;
            ctx.strokeStyle=c.color;
            ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
            ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
            ctx.stroke();
        });
        update();
        requestAnimationFrame(draw);
    }
    function update(){
        confettis.forEach(c=>{
            c.tiltAngle+=c.tiltAngleIncrement;
            c.y+=(Math.cos(c.d)+1+c.r/2)/2;
            c.tilt=Math.sin(c.tiltAngle)*12;
            if(c.y>canvas.height){c.y=-20;c.x=Math.random()*canvas.width;}
        });
    }
    draw();
}
</script>
</body>
</html>
