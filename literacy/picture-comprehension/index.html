<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Playground Picture Comprehension</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    background:#eaf6f6;
    overflow:hidden;
}

/* LOGO */
#logo{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100%;
    background:white;
}
#logo img{width:250px;}

/* GAME */
#game{
    display:none;
    text-align:center;
    position:relative;
    width:100%;
    max-width:1200px;
}

/* Instruction */
#instructionBox{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
    background:white;
    display:inline-block;
    padding:15px 25px;
    border-radius:15px;
    color:black;
}

/* Scoreboard */
#scoreboard{
    position:absolute;
    top:20px;
    right:20px;
    background:#ffefb5;
    padding:10px 20px;
    border-radius:12px;
    font-size:24px;
    font-weight:bold;
    color:#563d7c;
}

/* Playground background */
#playground{
    position:relative;
    margin-top:30px;
    display:inline-block;
}
#playground img{
    width:100%;
    max-width:900px;
}

/* Object overlays */
.object{
    position:absolute;
    cursor:pointer;
    transition: transform 0.2s, border 0.2s;
    border-radius:12px;
}
.object.correct{
    border:4px solid #27ae60;
    transform:scale(1.1);
}
.object.wrong{
    border:4px solid #e74c3c;
    transform:scale(1.1);
}

/* End Screen */
#end{
    display:none;
    text-align:center;
    padding:20px;
}
#end h1{
    font-size:48px;
    margin-bottom:20px;
}
#end button{
    padding:10px 30px;
    font-size:24px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* Confetti */
canvas{
    position:fixed;
    top:0; left:0;
    pointer-events:none;
    width:100%;
    height:100%;
}
</style>
</head>
<body>

<!-- LOGO -->
<div id="logo">
    <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">
    <div id="scoreboard">Score: 0</div>
    <div id="instructionBox"></div>
    <div id="playground">
        <img src="assets/at-the-playground.png" alt="Playground">
    </div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Well Done!</h1>
    <button onclick="restartGame()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<!-- Confetti -->
<canvas id="confetti"></canvas>

<script>
// Slides data
const slides = [
    {instruction:"Tap all pictures that has 'sm' blend", objects:[
        {file:'smile.png', top:'45%', left:'10%'}, 
        {file:'spectacles.png', top:'50%', left:'30%'}, 
        {file:'smell.png', top:'40%', left:'50%'}, 
        {file:'swim.png', top:'60%', left:'70%'}, 
        {file:'smoke.png', top:'60%', left:'50%'}
    ], correct:['smile.png','smell.png','smoke.png']},

    {instruction:"Tap all pictures that has 'sn' blend", objects:[
        {file:'swan.png', top:'50%', left:'10%'}, 
        {file:'snail.png', top:'40%', left:'30%'}, 
        {file:'snake.png', top:'60%', left:'50%'}, 
        {file:'star.png', top:'50%', left:'70%'}, 
        {file:'snowman.png', top:'40%', left:'90%'}
    ], correct:['snail.png','snake.png','snowman.png']},

    {instruction:"Tap all pictures that has 'st' blend", objects:[
        {file:'stamp.png', top:'50%', left:'10%'}, 
        {file:'smell.png', top:'40%', left:'30%'}, 
        {file:'swing.png', top:'60%', left:'50%'}, 
        {file:'star.png', top:'50%', left:'70%'}, 
        {file:'stair.png', top:'40%', left:'90%'}
    ], correct:['stamp.png','star.png','stair.png']},

    {instruction:"Tap all pictures that has 'sw' blend", objects:[
        {file:'snowman.png', top:'50%', left:'10%'}, 
        {file:'spider.png', top:'40%', left:'30%'}, 
        {file:'swim.png', top:'60%', left:'50%'}, 
        {file:'swing.png', top:'50%', left:'70%'}, 
        {file:'swan.png', top:'40%', left:'90%'}
    ], correct:['swim.png','swing.png','swan.png']},

    {instruction:"Tap all pictures that has 'sp' blend", objects:[
        {file:'smoke.png', top:'50%', left:'10%'}, 
        {file:'spade.png', top:'40%', left:'30%'}, 
        {file:'spider.png', top:'60%', left:'50%'}, 
        {file:'spectacles.png', top:'50%', left:'70%'}, 
        {file:'stair.png', top:'40%', left:'90%'}
    ], correct:['spade.png','spider.png','spectacles.png']}
];

let currentSlide = 0;
let answeredObjects = new Set();
let score = 0;

// Show logo first
setTimeout(()=>{
    document.getElementById('logo').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide(currentSlide);
},5000);

function loadSlide(slideIndex){
    answeredObjects.clear();
    const slide = slides[slideIndex];
    document.getElementById('instructionBox').textContent = slide.instruction;
    
    const playground = document.getElementById('playground');
    // Remove existing objects
    document.querySelectorAll('.object').forEach(o=>o.remove());

    // Add objects
    slide.objects.forEach(obj=>{
        const div = document.createElement('div');
        div.classList.add('object');
        div.style.top = obj.top;
        div.style.left = obj.left;
        const img = document.createElement('img');
        img.src = 'assets/'+obj.file;
        img.style.width='120px';
        div.appendChild(img);
        playground.appendChild(div);

        div.addEventListener('click',()=>{
            handleClick(obj.file,div);
        });
    });

    updateScore();
}

function handleClick(file, div){
    if(slides[currentSlide].correct.includes(file)){
        if(answeredObjects.has(file)) return;
        answeredObjects.add(file);
        div.classList.add('correct');

        if(answeredObjects.size === slides[currentSlide].correct.length){
            score++;
            updateScore();
            const clap = document.getElementById('clap');
            clap.currentTime=0;
            clap.play();
            clap.onended=()=>{
                currentSlide++;
                if(currentSlide>=slides.length){
                    document.getElementById('game').style.display='none';
                    document.getElementById('end').style.display='block';
                    launchConfetti();
                } else loadSlide(currentSlide);
            };
        }
    } else {
        div.classList.add('wrong');
        document.getElementById('wrong').play();
        setTimeout(()=>div.classList.remove('wrong'),500);
    }
}

function updateScore(){
    document.getElementById('scoreboard').textContent = `Score: ${score}/5`;
}

function restartGame(){
    currentSlide=0;
    score=0;
    document.getElementById('end').style.display='none';
    document.getElementById('game').style.display='block';
    loadSlide(currentSlide);
}

// Confetti effect
function launchConfetti(){
    const canvas=document.getElementById('confetti');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const confettis=[];
    const colors=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#2ecc71'];
    for(let i=0;i<80;i++){
        confettis.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height-100,
            r: Math.random()*6+4,
            d: Math.random()*10+5,
            color: colors[Math.floor(Math.random()*colors.length)],
            tilt: Math.random()*10-10,
            tiltAngleIncrement: Math.random()*0.07+0.05
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettis.forEach(c=>{
            ctx.beginPath();
            ctx.lineWidth=c.r;
            ctx.strokeStyle=c.color;
            ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
            ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
            ctx.stroke();
        });
        update();
        requestAnimationFrame(draw);
    }

    function update(){
        confettis.forEach(c=>{
            c.tiltAngle+=c.tiltAngleIncrement;
            c.y+=(Math.cos(c.d)+1+c.r/2)/2;
            c.tilt=Math.sin(c.tiltAngle)*12;
            if(c.y>canvas.height){c.y=-20;c.x=Math.random()*canvas.width;}
        });
    }
    draw();
}
</script>
</body>
</html>
