<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Picture Comprehension - Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
/* Existing CSS kept unchanged */
:root{--pink:#ff1493;--pink-border:#ff78b7;--green:#27ae60;--red:#e74c3c;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:white;}
body{font-family:"Comic Sans MS","Trebuchet MS",sans-serif;-webkit-text-size-adjust:100%;touch-action:manipulation;}
button,.option{font-family:"Comic Sans MS","Trebuchet MS",sans-serif;-webkit-tap-highlight-color:transparent;}
/* ... rest of the CSS remains unchanged ... */
</style>
</head>
<body>

<!-- LOGO SCREEN -->
<div id="logo">
<img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME SCREEN -->
<div id="game">
<div class="instruction-box">Picture Comprehension - At the Playground</div>
<div class="instruction-box">Read the question and click on the correct answer</div>
<div id="mainContent">
<div id="pictureWrap">
<img id="playground-img" src="assets/at-the-playground.png" alt="Children playing at the playground">
</div>
<div id="questionArea">
<div id="question"></div>
<div class="options" id="options"></div>
</div>
</div>
<div id="scoreboard">Score: 0/5</div>
</div>

<!-- END SCREEN -->
<div id="end">
<h1>🎉 Congratulations! 🎉</h1>
<button type="button" onclick="restartGame()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrong" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clap" src="assets/claps.mp3" preload="auto"></audio>
<audio id="q1" src="assets/question-1.mp3" preload="auto"></audio>
<audio id="q2" src="assets/question-2.mp3" preload="auto"></audio>
<audio id="q3" src="assets/question-3.mp3" preload="auto"></audio>
<audio id="q4" src="assets/question-4.mp3" preload="auto"></audio>
<audio id="q5" src="assets/question-5.mp3" preload="auto"></audio>

<!-- CONFETTI -->
<canvas id="confetti"></canvas>

<script>
// ==================================================
// QUESTIONS
// ==================================================
const questions=[
{ text:"Where are the children playing?", options:["farm","playground"], correct:"playground", audio:"q1" },
{ text:"How many children are on the swings?", options:["2","3"], correct:"2", audio:"q2" },
{ text:"What is the colour of the ball?", options:["blue","red"], correct:"red", audio:"q3" },
{ text:"What is in the sand box?", options:["shovel","ball"], correct:"shovel", audio:"q4" },
{ text:"Who is playing on the slide?", options:["girl","boy"], correct:"girl", audio:"q5" }
];

let currentQ=0;
let score=0;
let questionLocked=false;

// ==================================================
// SHOW LOGO FOR 5 SECONDS
// ==================================================
setTimeout(()=>{
    document.getElementById("logo").style.display="none";
    document.getElementById("game").style.display="flex";
    loadQuestion();
},5000);

// ==================================================
// PLAY AUDIO
// ==================================================
function playAudio(id){
    const audio=document.getElementById(id);
    if(!audio) return;
    audio.pause();
    audio.currentTime=0;
    audio.play().catch(()=>{});
}

// ==================================================
// LOAD QUESTION
// ==================================================
function loadQuestion(){
    questionLocked=false;
    const questionData=questions[currentQ];
    const questionBox=document.getElementById("question");
    const optionsBox=document.getElementById("options");
    questionBox.textContent=questionData.text;
    optionsBox.innerHTML="";

    questionData.options.forEach(optionText=>{
        const option=document.createElement("div");
        option.className="option";
        option.textContent=optionText;
        option.setAttribute("role","button");
        option.setAttribute("tabindex","0");
        option.addEventListener("click",()=>checkAnswer(option,questionData));
        option.addEventListener("keydown",event=>{
            if(event.key==="Enter"||event.key===" "){
                event.preventDefault();
                checkAnswer(option,questionData);
            }
        });
        optionsBox.appendChild(option);
    });

    updateScore();

    // ==================================================
    // Play question audio only after previous clap finishes
    // ==================================================
    const clapAudio = document.getElementById("clap");
    if(!clapAudio.paused){
        clapAudio.onended=()=>{ playAudio(questionData.audio); };
    } else {
        playAudio(questionData.audio);
    }
}

// ==================================================
// CHECK ANSWER
// ==================================================
function checkAnswer(selectedOption, questionData){
    if(questionLocked) return;
    const selectedAnswer = selectedOption.textContent;
    if(selectedAnswer===questionData.correct){
        questionLocked=true;
        selectedOption.classList.add("correct");
        playAudio("correct");
        score++;
        updateScore();
        setTimeout(()=>{
            currentQ++;
            if(currentQ>=questions.length){
                showEndScreen();
            } else {
                loadQuestion();
            }
        },850);
    } else {
        selectedOption.classList.remove("wrong");
        void selectedOption.offsetWidth;
        selectedOption.classList.add("wrong");
        playAudio("wrong");
        setTimeout(()=>{ selectedOption.classList.remove("wrong"); },500);
    }
}

// ==================================================
// UPDATE SCORE
// ==================================================
function updateScore(){
    document.getElementById("scoreboard").textContent=`Score: ${score}/${questions.length}`;
}

// ==================================================
// SHOW END SCREEN
// ==================================================
function showEndScreen(){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    playAudio("clap");
    launchConfetti();
}

// ==================================================
// RESTART GAME
// ==================================================
function restartGame(){
    stopConfetti();
    currentQ=0;
    score=0;
    questionLocked=false;
    document.getElementById("end").style.display="none";
    document.getElementById("game").style.display="flex";
    loadQuestion();
}

// ==================================================
// CONFETTI FUNCTIONS
// ==================================================
function launchConfetti(){
    stopConfetti();
    const canvas=document.getElementById("confetti");
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const pieces=[];
    const colours=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db','#2ecc71','#ff1493'];
    const totalPieces = window.innerWidth<600?80:130;
    for(let i=0;i<totalPieces;i++){
        pieces.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height-100,
            r: Math.random()*6+4,
            d: Math.random()*10+5,
            color: colours[Math.floor(Math.random()*colours.length)],
            tilt: Math.random()*10-10,
            tiltAngleIncrement: Math.random()*0.07+0.05
        });
    }
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(c=>{
            ctx.beginPath();
            ctx.lineWidth=c.r;
            ctx.strokeStyle=c.color;
            ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
            ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
            ctx.stroke();
            c.tilt+=c.tiltAngleIncrement;
            c.y+=(Math.cos(c.d)+1+c.r/2)/2;
            if(c.y>canvas.height+20){c.y=-20;c.x=Math.random()*canvas.width;}
        });
        requestAnimationFrame(draw);
    }
    draw();
    confettiTimer=setTimeout(stopConfetti,8000);
}
let confettiTimer=null;
function stopConfetti(){
    const canvas=document.getElementById("confetti");
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(confettiTimer) clearTimeout(confettiTimer);
}
window.addEventListener("resize",()=>{ const canvas=document.getElementById("confetti"); canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
window.addEventListener("orientationchange",()=>{ setTimeout(()=>{ const canvas=document.getElementById("confetti"); canvas.width=window.innerWidth; canvas.height=window.innerHeight; },250); });
</script>
</body>
</html>
