<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Words Game</title>

<style>

body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#e8f6ff;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  text-align:center;
}

/* TITLE */
#title{
  font-size:28px;
  font-weight:bold;
  color:#2e7d32;
  margin-top:10px;
}

/* NEW INSTRUCTION */
#subInstruction{
  font-size:18px;
  margin:8px;
  color:#444;
}

/* IMAGE */
#mainImg{
  width:80%;
  max-width:350px;
  height:300px;
  object-fit:contain;
  border-radius:15px;
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
  margin-top:10px;
}

/* BUTTONS */
.btnRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.btn{
  width:120px;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  border-radius:15px;
  cursor:pointer;
  border:none;
}

.person{background:#ffd166;}
.place{background:#06d6a0;}
.thing{background:#4dabf7;}

/* TRY AGAIN */
#msg{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  font-weight:bold;
  background:white;
  padding:20px;
  display:none;
  border-radius:12px;
}

/* GLOW */
.glow{
  animation: glow 0.8s ease;
}

@keyframes glow{
  0%{box-shadow:0 0 0px green;}
  50%{box-shadow:0 0 25px green;}
  100%{box-shadow:0 0 0px green;}
}

/* END SCREEN */
#end{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:40px;
  font-weight:bold;
  color:#2e7d32;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <!-- TITLE -->
  <div id="title">Naming Words Game</div>

  <!-- NEW INSTRUCTION (UPDATED) -->
  <div id="subInstruction">
    Look at the picture and click on the correct naming word
  </div>

  <img id="mainImg" src="">

  <div class="btnRow">
    <button class="btn person" onclick="check('person')">👦 Person</button>
    <button class="btn place" onclick="check('place')">🏫 Place</button>
    <button class="btn thing" onclick="check('thing')">🧸 Thing</button>
  </div>

  <div id="msg">Try Again</div>

</div>

<!-- END -->
<div id="end">
🎉 Good Job 🎉
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadGame();
},3000);

const data = [
  {img:"assets/teacher.png", ans:"person"},
  {img:"assets/school.png", ans:"place"},
  {img:"assets/book.png", ans:"thing"},
  {img:"assets/doctor.png", ans:"person"},
  {img:"assets/park.png", ans:"place"},
  {img:"assets/ball.png", ans:"thing"}
];

let i=0;
let locked=false;

function loadGame(){

  if(i>=data.length){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    return;
  }

  locked=false;

  let img=document.getElementById("mainImg");
  img.classList.remove("glow");

  img.src=data[i].img;
}

function check(ans){

  if(locked) return;

  if(ans===data[i].ans){

    let img=document.getElementById("mainImg");
    img.classList.add("glow");

    setTimeout(()=>{
      i++;
      loadGame();
    },900);

  }else{

    locked=true;
    document.getElementById("msg").style.display="block";

    setTimeout(()=>{
      document.getElementById("msg").style.display="none";
      locked=false;
    },2000);
  }
}

</script>

</body>
</html>
