<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Words Game</title>

<style>

/* 🌈 NEW ELEGANT BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;

  background: linear-gradient(135deg,#e0f7ff,#fff7e6,#e3fdfd,#fef6ff);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  text-align:center;
}

/* TITLE */
#title{
  font-size:30px;
  font-weight:bold;
  color:#2e7d32;
  margin-top:10px;
}

/* INSTRUCTION */
#subInstruction{
  font-size:18px;
  margin:8px;
  color:#444;
}

/* IMAGE */
#mainImg{
  width:80%;
  max-width:350px;
  height:300px;
  object-fit:contain;
  border-radius:15px;
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
  margin-top:10px;
  animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0px)}
}

/* BUTTONS */
.btnRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.btn{
  width:130px;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  border-radius:15px;
  cursor:pointer;
  border:none;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

.person{background:#ffd166;}
.place{background:#06d6a0;}
.thing{background:#4dabf7;}

/* TRY AGAIN */
#msg{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  font-weight:bold;
  background:white;
  padding:20px;
  display:none;
  border-radius:12px;
}

/* ✨ GLOW */
.glow{
  animation: glow 0.8s ease;
}

@keyframes glow{
  0%{box-shadow:0 0 0px green;}
  50%{box-shadow:0 0 25px green;}
  100%{box-shadow:0 0 0px green;}
}

/* 🎉 END SCREEN (CENTER FIXED) */
#end{
  display:none;
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  font-size:55px;
  font-weight:bold;
  color:#2e7d32;
  text-align:center;
  animation:pop 1s ease;
}

@keyframes pop{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">Naming Words Game</div>

  <div id="subInstruction">
    Look at the picture and click on the correct naming word
  </div>

  <img id="mainImg" src="">

  <div class="btnRow">
    <button class="btn person" onclick="check('person')">👦 Person</button>
    <button class="btn place" onclick="check('place')">🏫 Place</button>
    <button class="btn thing" onclick="check('thing')">🧸 Thing</button>
  </div>

  <div id="msg">Try Again</div>

</div>

<!-- END SCREEN -->
<div id="end">
🎉 GOOD JOB 🎉
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadGame();
},3000);

/* 🧠 DATA WITH AUDIO QUESTIONS */
const data = [
  {img:"assets/teacher.png", ans:"person", audio:"Teacher belongs to which naming word?"},
  {img:"assets/school.png", ans:"place", audio:"School belongs to which naming word?"},
  {img:"assets/book.png", ans:"thing", audio:"Book belongs to which naming word?"},
  {img:"assets/doctor.png", ans:"person", audio:"Doctor belongs to which naming word?"},
  {img:"assets/park.png", ans:"place", audio:"Park belongs to which naming word?"},
  {img:"assets/ball.png", ans:"thing", audio:"Ball belongs to which naming word?"}
];

let i=0;
let locked=false;

/* SPEECH */
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

/* LOAD GAME */
function loadGame(){

  if(i>=data.length){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    speak("Good job");
    return;
  }

  locked=false;

  let img=document.getElementById("mainImg");
  img.classList.remove("glow");

  img.src=data[i].img;

  // 🔊 NEW AUDIO INSTRUCTION
  speak(data[i].audio);
}

/* ANSWER CHECK */
function check(ans){

  if(locked) return;

  if(ans===data[i].ans){

    let img=document.getElementById("mainImg");
    img.classList.add("glow");

    speak("Correct");

    setTimeout(()=>{
      i++;
      loadGame();
    },900);

  }else{

    locked=true;
    document.getElementById("msg").style.display="block";
    speak("Try again");

    setTimeout(()=>{
      document.getElementById("msg").style.display="none";
      locked=false;
    },2000);
  }
}

</script>

</body>
</html>
