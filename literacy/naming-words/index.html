<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Words Game</title>

<style>

/* 🌈 BACKGROUND ANIMATION */
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background: linear-gradient(270deg,#e8f6ff,#fff7e6,#e3fdfd);
  background-size:600% 600%;
  animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  text-align:center;
}

/* TITLE */
#title{
  font-size:30px;
  font-weight:bold;
  color:#2e7d32;
  margin-top:10px;
  animation:fadeIn 1s ease;
}

/* INSTRUCTION */
#subInstruction{
  font-size:18px;
  margin:8px;
  color:#444;
}

/* IMAGE ANIMATION */
#mainImg{
  width:80%;
  max-width:350px;
  height:300px;
  object-fit:contain;
  border-radius:15px;
  margin-top:10px;
  animation:float 2s ease-in-out infinite;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

@keyframes float{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0px)}
}

/* BUTTONS */
.btnRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.btn{
  width:130px;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  border-radius:15px;
  cursor:pointer;
  border:none;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

.person{background:#ffd166;}
.place{background:#06d6a0;}
.thing{background:#4dabf7;}

/* TRY AGAIN */
#msg{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  font-weight:bold;
  background:white;
  padding:20px;
  display:none;
  border-radius:12px;
}

/* END SCREEN - CENTER FIXED */
#end{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:50px;
  font-weight:bold;
  color:#2e7d32;
  text-align:center;
}

/* 🎊 CONFETTI */
.confetti{
  position:absolute;
  width:10px;
  height:10px;
  top:0;
  animation:fall 2.5s linear forwards;
}

@keyframes fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(360deg);opacity:0;}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">Naming Words Game</div>

  <div id="subInstruction">
    Look at the picture and click on the correct naming word
  </div>

  <img id="mainImg" src="">

  <div class="btnRow">
    <button class="btn person" onclick="check('person')">👦 Person</button>
    <button class="btn place" onclick="check('place')">🏫 Place</button>
    <button class="btn thing" onclick="check('thing')">🧸 Thing</button>
  </div>

  <div id="msg">Try Again</div>

</div>

<!-- END -->
<div id="end">
🎉 GOOD JOB 🎉
</div>

<!-- AUDIO -->
<audio id="clap" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadGame();
},3000);

const data = [
  {img:"assets/teacher.png", ans:"person"},
  {img:"assets/school.png", ans:"place"},
  {img:"assets/book.png", ans:"thing"},
  {img:"assets/doctor.png", ans:"person"},
  {img:"assets/park.png", ans:"place"},
  {img:"assets/ball.png", ans:"thing"}
];

let i=0;
let locked=false;

function loadGame(){

  if(i>=data.length){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";

    startConfetti();
    return;
  }

  locked=false;

  let img=document.getElementById("mainImg");
  img.style.opacity=0;

  setTimeout(()=>{
    img.src=data[i].img;
    img.style.opacity=1;
  },200);
}

function check(ans){

  if(locked) return;

  let img=document.getElementById("mainImg");

  if(ans===data[i].ans){

    document.getElementById("clap").play();

    img.style.transform="scale(1.1)";
    setTimeout(()=>img.style.transform="scale(1)",300);

    setTimeout(()=>{
      i++;
      loadGame();
    },800);

  }else{

    document.getElementById("wrong").play();

    locked=true;
    document.getElementById("msg").style.display="block";

    setTimeout(()=>{
      document.getElementById("msg").style.display="none";
      locked=false;
    },2000);
  }
}

/* 🎊 CONFETTI + CRACKER EFFECT */
function startConfetti(){

  for(let i=0;i<120;i++){
    let c=document.createElement("div");
    c.className="confetti";

    c.style.left=Math.random()*100+"vw";
    c.style.background=["#ff4d6d","#ffd166","#06d6a0","#4dabf7","#b197fc"][Math.floor(Math.random()*5)];
    c.style.animationDuration=(1+Math.random()*2)+"s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),3000);
  }
}

</script>

</body>
</html>
