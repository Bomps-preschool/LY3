<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Words Game</title>

<style>

/* 🌈 BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;

  background: url("assets/designer.png") no-repeat center center fixed;
  background-size:cover;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  text-align:center;
}

/* TITLE */
#title{
  font-size:30px;
  font-weight:bold;
  color:#2e7d32;
  margin-top:10px;
}

#subInstruction{
  font-size:18px;
  margin:8px;
  color:#444;
}

/* IMAGE */
#mainImg{
  width:80%;
  max-width:350px;
  height:300px;
  object-fit:contain;
  border-radius:15px;
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
  margin-top:10px;
  animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0px)}
}

/* BUTTONS */
.btnRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.btn{
  width:130px;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  border-radius:15px;
  cursor:pointer;
  border:none;
}

.person{background:#ffd166;}
.place{background:#06d6a0;}
.thing{background:#4dabf7;}

/* TRY AGAIN */
#msg{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  font-weight:bold;
  background:white;
  padding:20px;
  display:none;
  border-radius:12px;
}

/* END SCREEN */
#end{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;

  background:white;

  flex-direction:column;
  justify-content:center;
  align-items:center;

  font-size:60px;
  font-weight:bold;
  color:#2e7d32;
  text-align:center;
  z-index:999;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:10px;
  height:10px;
  top:0;
  animation:fall 2.5s linear forwards;
}

@keyframes fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(360deg);opacity:0;}
}

/* 🟢 STRONG GREEN GLOW */
.correctGlow{
  animation:greenGlow 1s ease-in-out 1;
  border-radius:15px;
}

@keyframes greenGlow{
  0%{box-shadow:0 0 0px rgba(0,255,0,0);}
  30%{box-shadow:0 0 25px rgba(0,255,0,1);}
  60%{box-shadow:0 0 35px rgba(0,255,0,0.9);}
  100%{box-shadow:0 0 0px rgba(0,255,0,0);}
}

/* 🔴 STRONG RED GLOW */
.wrongGlow{
  animation:redGlow 1s ease-in-out 1;
  border-radius:15px;
}

@keyframes redGlow{
  0%{box-shadow:0 0 0px rgba(255,0,0,0);}
  30%{box-shadow:0 0 25px rgba(255,0,0,1);}
  60%{box-shadow:0 0 35px rgba(255,0,0,0.9);}
  100%{box-shadow:0 0 0px rgba(255,0,0,0);}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">Naming Words Game</div>

  <div id="subInstruction">
    Look at the picture and click on the correct naming word
  </div>

  <img id="mainImg" src="">

  <div class="btnRow">
    <button class="btn person" onclick="check('person')">👦 Person</button>
    <button class="btn place" onclick="check('place')">🏫 Place</button>
    <button class="btn thing" onclick="check('thing')">🧸 Thing</button>
  </div>

  <div id="msg">Try Again</div>

</div>

<!-- END -->
<div id="end">
🎉 GOOD JOB 🎉
</div>

<!-- AUDIO -->
<audio id="clap" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

let i = 0;
let locked = false;

/* START */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("end").style.display="none";
  loadGame();
},3000);

/* DATA */
const data = [
  {img:"assets/teacher.png", ans:"person", audio:"Teacher belongs to which naming word?"},
  {img:"assets/school.png", ans:"place", audio:"School belongs to which naming word?"},
  {img:"assets/book.png", ans:"thing", audio:"Book belongs to which naming word?"},
  {img:"assets/doctor.png", ans:"person", audio:"Doctor belongs to which naming word?"},
  {img:"assets/park.png", ans:"place", audio:"Park belongs to which naming word?"},
  {img:"assets/ball.png", ans:"thing", audio:"Ball belongs to which naming word?"}
];

/* SPEECH */
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

/* LOAD GAME */
function loadGame(){

  if(i >= data.length){

    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";

    speak("Good job");
    startConfetti();

    return;
  }

  locked = false;

  let img = document.getElementById("mainImg");

  img.classList.remove("correctGlow","wrongGlow");
  img.style.opacity = 0;

  setTimeout(()=>{
    img.src = data[i].img;
    img.style.opacity = 1;

    speak(data[i].audio);

  },200);
}

/* ANSWER */
function check(ans){

  if(locked) return;

  let img = document.getElementById("mainImg");

  if(ans === data[i].ans){

    // 🔊 CLAP SOUND
    document.getElementById("clap").play();

    // 🟢 GREEN GLOW
    img.classList.add("correctGlow");

    setTimeout(()=> img.classList.remove("correctGlow"),1000);

    // WAIT FOR CLAP BEFORE NEXT QUESTION
    document.getElementById("clap").onended = function(){
      i++;
      loadGame();
    };

  } else {

    // 🔊 WRONG SOUND
    document.getElementById("wrong").play();

    // 🔴 RED GLOW
    img.classList.add("wrongGlow");

    setTimeout(()=> img.classList.remove("wrongGlow"),1000);

    locked = true;

    document.getElementById("msg").style.display="block";

    setTimeout(()=>{
      document.getElementById("msg").style.display="none";
      locked = false;
    },2000);
  }
}

/* CONFETTI */
function startConfetti(){

  for(let j=0;j<120;j++){
    let c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random()*100 + "vw";
    c.style.background = ["#ff4d6d","#ffd166","#06d6a0","#4dabf7","#b197fc"][Math.floor(Math.random()*5)];
    c.style.animationDuration = (1+Math.random()*2) + "s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),3000);
  }
}

</script>

</body>
</html>
